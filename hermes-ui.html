function TerminalPanel({ isOpen, onClose, localLogs, artifacts, onArtifactTab, onAddArtifact, onRemoveArtifact }) {
  const [logLines, setLogLines] = useState([]);
  const [activeTab, setActiveTab] = useState('webui');
  const [isConnected, setIsConnected] = useState(false);
  const bodyRef = useRef(null);
  const eventSourceRef = useRef(null);
  const autoScrollRef = useRef(true);
  const prevArtifactCount = useRef(0);
  const blobUrlCache = useRef({});

  // Auto-switch to artifacts tab when new artifacts are detected
  useEffect(function() {
    if (artifacts && artifacts.length > prevArtifactCount.current) {
      setActiveTab('artifacts');
      if (onArtifactTab) onArtifactTab(true);
    }
    prevArtifactCount.current = (artifacts && artifacts.length) || 0;
  }, [artifacts && artifacts.length]);

  // Colorize a log line
  const colorize = useCallback(function(line, logName) {
    if (logName === 'system') {
      return { className: 'log-system', parts: [{ text: line, cls: 'log-system' }] };
    }
    if (logName === 'webui') {
      var wParts = [];
      var wMatch = line.match(/^(\[[\d:]+\] )(INFO|ERROR|WARNING)(\s+)(.*)/);
      if (wMatch) {
        wParts.push({ text: wMatch[1], cls: 'log-ts' });
        var wLvl = wMatch[2].toLowerCase();
        wParts.push({ text: wMatch[2] + ' ', cls: 'log-level-' + (wLvl === 'warning' ? 'warn' : wLvl) });
        var wText = wMatch[4];
        if (wText.includes('[thinking]')) {
          wParts.push({ text: wText, cls: 'log-thinking' });
        } else if (wText.includes('[tool]')) {
          wParts.push({ text: wText, cls: 'log-tool' });
        } else {
          wParts.push({ text: wText, cls: 'log-webui' });
        }
      } else {
        wParts.push({ text: line, cls: 'log-webui' });
      }
      return { parts: wParts, className: line.includes('ERROR') ? 'highlight' : '' };
    }
    var parts = [];
    var tsMatch = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+)/);
    if (tsMatch) {
      parts.push({ text: tsMatch[1] + ' ', cls: 'log-ts' });
      line = line.slice(tsMatch[1].length + 1);
    }
    var lvlMatch = line.match(/^(INFO|WARNING|ERROR|DEBUG)\s*/);
    if (lvlMatch) {
      var lvl = lvlMatch[1].toLowerCase();
      var lvlCls = 'log-level-' + (lvl === 'warning' ? 'warn' : lvl);
      parts.push({ text: lvlMatch[1] + ' ', cls: lvlCls });
      line = line.slice(lvlMatch[0].length);
    }
    if (line.includes('HTTP Request:') || line.includes('HTTP/1.1')) {
      parts.push({ text: line, cls: 'log-http' });
    } else if (line.includes('tool') || line.includes('Tool') || line.includes('MCP')) {
      parts.push({ text: line, cls: 'log-tool' });
    } else {
      parts.push({ text: line, cls: '' });
    }
    var isHighlight = line.includes('flush') || line.includes('Failsafe') || line.includes('ERROR');
    return { parts: parts, className: isHighlight ? 'highlight' : '' };
  }, []);

  useEffect(function() {
    if (!isOpen) {
      if (eventSourceRef.current) {
        eventSourceRef.current.close();
        eventSourceRef.current = null;
        setIsConnected(false);
      }
      return;
    }

    var url = '/logs/stream?logs=gateway,errors&tail=80';
    var es = new EventSource(url);
    eventSourceRef.current = es;

    es.onopen = function() { setIsConnected(true); };
    es.onerror = function() { setIsConnected(false); };
    es.onmessage = function(event) {
      try {
        var data = JSON.parse(event.data);
        setLogLines(function(prev) {
          var next = prev.concat([{
            id: Date.now() + Math.random(),
            log: data.log,
            line: data.line,
          }]);
          if (next.length > 2000) next = next.slice(next.length - 2000);
          return next;
        });
      } catch(e) { /* ignore */ }
    };

    return function() {
      es.close();
      eventSourceRef.current = null;
      setIsConnected(false);
    };
  }, [isOpen]);

  // Auto-scroll
  useEffect(function() {
    if (bodyRef.current && autoScrollRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [logLines, localLogs]);

  // Detect manual scroll
  var handleScroll = useCallback(function() {
    if (!bodyRef.current) return;
    var el = bodyRef.current;
    var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
    autoScrollRef.current = atBottom;
  }, []);

  // Merge local UI logs into the stream
  var allLines = logLines.slice();
  if (localLogs && localLogs.length > 0) {
    localLogs.forEach(function(ll) {
      allLines.push({ id: ll.id, log: 'webui', line: ll.line });
    });
  }

  var filtered = activeTab === 'all'
    ? allLines
    : allLines.filter(function(l) { return l.log === activeTab || l.log === 'system'; });

  return (
    <div className={"terminal-panel " + (isOpen ? '' : 'hidden')}>
      <div className="terminal-panel-header">
        <div style={{display:'flex', gap:'4px'}}>
          <button className={"terminal-tab " + (activeTab === 'gateway' ? 'active' : '')} onClick={function(){setActiveTab('gateway'); if(onArtifactTab) onArtifactTab(false);}}>Gateway</button>
          <button className={"terminal-tab " + (activeTab === 'errors' ? 'active' : '')} onClick={function(){setActiveTab('errors'); if(onArtifactTab) onArtifactTab(false);}}>Errors</button>
          <button className={"terminal-tab " + (activeTab === 'webui' ? 'active' : '')} onClick={function(){setActiveTab('webui'); if(onArtifactTab) onArtifactTab(false);}}>Web UI</button>
          <button className={"terminal-tab " + (activeTab === 'all' ? 'active' : '')} onClick={function(){setActiveTab('all'); if(onArtifactTab) onArtifactTab(false);}}>All</button>
          <button className={"terminal-tab " + (activeTab === 'artifacts' ? 'active' : '')} style={artifacts && artifacts.length > 0 ? {borderColor:'var(--accent)',color: activeTab === 'artifacts' ? 'white' : 'var(--accent)'} : {}} onClick={function(){setActiveTab('artifacts'); if(onArtifactTab) onArtifactTab(true);}}>Artifacts{artifacts && artifacts.length > 0 ? ' (' + artifacts.length + ')' : ''}</button>
        </div>
        <div className="terminal-controls">
          <div className="terminal-status">
            {isConnected && <div className="live-dot"></div>}
            {isConnected ? 'Live' : 'Disconnected'}
            <span style={{color:'var(--text-muted)'}}>{'(' + filtered.length + ' lines)'}</span>
          </div>
          <button className="terminal-close-btn" onClick={function(){setLogLines([])} } title="Clear">{'C'}</button>
          <button className="terminal-close-btn" onClick={onClose} title="Close">{'✕'}</button>
        </div>
      </div>
      <div className="artifact-container" style={{display: activeTab === 'artifacts' ? 'flex' : 'none', flexDirection: 'column'}}>
          <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'8px', gap:'6px', flexShrink:0}}>
            <label style={{display:'inline-flex', alignItems:'center', gap:'4px', background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'3px 10px', fontSize:'11px', cursor:'pointer', transition:'all 0.15s'}}>
              {'📂 Load File'}
              <input type="file" accept=".html,.htm,.svg,.js,.jsx,.ts,.tsx,.py,.css,.json,.xml,.md,.txt,.yaml,.yml,.sh,.rs,.go,.c,.cpp,.pdf,.csv,.tsv" style={{display:'none'}} onChange={function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'pdf') {
                  var art = { type: 'pdf', url: URL.createObjectURL(file), timestamp: Date.now(), fileName: file.name };
                  if (onAddArtifact) onAddArtifact(art);
                  e.target.value = '';
                  return;
                }
                var reader = new FileReader();
                reader.onload = function(ev) {
                  var type = (ext === 'html' || ext === 'htm') ? 'html' : ext === 'svg' ? 'svg' : (ext === 'csv' || ext === 'tsv') ? 'csv' : 'code';
                  var art = { type: type, content: ev.target.result, timestamp: Date.now(), fileName: file.name };
                  if (type === 'code') art.language = ext;
                  if (onAddArtifact) onAddArtifact(art);
                };
                reader.readAsText(file);
                e.target.value = '';
              }} />
            </label>
          </div>
          {(!artifacts || artifacts.length === 0) ? (
            <div style={{color:'var(--text-muted)', textAlign:'center', padding:'40px 20px', fontSize:'13px'}}>
              <div style={{fontSize:'28px', marginBottom:'12px'}}>{'🎨'}</div>
              <div style={{fontWeight:600, marginBottom:'6px'}}>No artifacts yet</div>
              <div>When Hermes generates HTML, SVG, PDFs, CSVs, or code blocks, they will appear here as live previews.</div>
              <div style={{marginTop:'12px', fontSize:'11px'}}>Or use the Load File button above to open a local file.</div>
            </div>
          ) : (
            artifacts.map(function(art, idx) {
              var cacheKey = art.timestamp + '_' + idx;
              if (art.type === 'html' || art.type === 'svg') {
                if (!blobUrlCache.current[cacheKey]) {
                  var htmlContent = art.type === 'svg' ? '<html><body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e">' + art.content + '</body></html>' : art.content;
                  blobUrlCache.current[cacheKey] = URL.createObjectURL(new Blob([htmlContent], {type: 'text/html'}));
                }
                var cachedUrl = blobUrlCache.current[cacheKey];
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{(art.fileName || art.type.toUpperCase() + ' artifact')}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'2px 8px', fontSize:'10px', cursor:'pointer'}} onClick={function(){ navigator.clipboard.writeText(art.content); }}>Copy</button>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(blobUrlCache.current[cacheKey]){ URL.revokeObjectURL(blobUrlCache.current[cacheKey]); delete blobUrlCache.current[cacheKey]; } if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <iframe className="artifact-iframe" src={cachedUrl} style={{height:'calc(90vh - 100px)', maxHeight:'calc(90vh - 100px)'}} sandbox="allow-scripts allow-same-origin" />
                  </div>
                );
              } else if (art.type === 'pdf') {
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{'📄 ' + (art.fileName || 'PDF document')}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <iframe src={art.url + '#toolbar=1&navpanes=0'} style={{width:'100%', height:'calc(90vh - 100px)', maxHeight:'calc(90vh - 100px)', border:'1px solid var(--border)', borderRadius:'6px', background:'white'}} />
                  </div>
                );
              } else if (art.type === 'csv') {
                var csvRows = (function() {
                  var lines = (art.content || '').trim().split('\n');
                  var sep = art.fileName && art.fileName.endsWith('.tsv') ? '\t' : ',';
                  return lines.map(function(line) {
                    var row = []; var cell = ''; var inQuotes = false;
                    for (var ci = 0; ci < line.length; ci++) {
                      var ch = line[ci];
                      if (inQuotes) {
                        if (ch === '"' && line[ci+1] === '"') { cell += '"'; ci++; }
                        else if (ch === '"') { inQuotes = false; }
                        else { cell += ch; }
                      } else {
                        if (ch === '"') { inQuotes = true; }
                        else if (ch === sep) { row.push(cell.trim()); cell = ''; }
                        else { cell += ch; }
                      }
                    }
                    row.push(cell.trim());
                    return row;
                  });
                })();
                var csvHeader = csvRows[0] || [];
                var csvData = csvRows.slice(1);
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{'📊 ' + (art.fileName || 'CSV data') + ' (' + csvData.length + ' rows)'}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'2px 8px', fontSize:'10px', cursor:'pointer'}} onClick={function(){ navigator.clipboard.writeText(art.content); }}>Copy</button>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <div style={{maxHeight:'calc(90vh - 100px)', overflow:'auto', border:'1px solid var(--border)', borderRadius:'6px'}}>
                      <table style={{width:'100%', borderCollapse:'collapse', fontSize:'12px', fontFamily:'Monaco, Menlo, monospace'}}>
                        <thead>
                          <tr>{csvHeader.map(function(h, hi) { return <th key={hi} style={{position:'sticky', top:0, background:'var(--bg-secondary)', padding:'6px 10px', borderBottom:'2px solid var(--border)', textAlign:'left', fontWeight:700, color:'var(--text-primary)', whiteSpace:'nowrap'}}>{h}</th>; })}</tr>
                        </thead>
                        <tbody>
                          {csvData.slice(0, 500).map(function(row, ri) {
                            return <tr key={ri} style={{background: ri % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)'}}>{row.map(function(cell, ci) { return <td key={ci} style={{padding:'4px 10px', borderBottom:'1px solid var(--border)', color:'var(--text-secondary)', whiteSpace:'nowrap'}}>{cell}</td>; })}</tr>;
                          })}
                          {csvData.length > 500 && <tr><td colSpan={csvHeader.length} style={{padding:'8px 10px', color:'var(--text-muted)', fontStyle:'italic', textAlign:'center'}}>Showing first 500 of {csvData.length} rows</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              } else {
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{(art.fileName || (art.language || 'code').toUpperCase() + ' artifact')}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'2px 8px', fontSize:'10px', cursor:'pointer'}} onClick={function(){ navigator.clipboard.writeText(art.content); }}>Copy</button>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <pre className="artifact-code"><code>{art.content}</code></pre>
                  </div>
                );
              }
            })
          )}
      </div>
      <div className="terminal-body" ref={bodyRef} onScroll={handleScroll} style={{display: activeTab === 'artifacts' ? 'none' : 'block'}}>
          {filtered.map(function(entry) {
            var colored = colorize(entry.line, entry.log);
            return (
              <div key={entry.id} className={"log-line " + colored.className}>
                {colored.parts.map(function(p, i) {
                  return <span key={i} className={p.cls}>{p.text}</span>;
                })}
              </div>
            );
          })}
      </div>
    </div>
  );
}

/* ── Dashboard View ── */
function DashboardView() {
  const [stats, setStats] = useState({ sessions: 0, messages: 0, tools: 0, tokens: 0 });
  const [skills, setSkills] = useState([]);
  const [recentSessions, setRecentSessions] = useState([]);
  const [health, setHealth] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);

  var fetchAll = async function() {
    // v0.7.0: no /api/sessions listing — use client-side conversation data
    try {
      var saved = [];
      try { saved = JSON.parse(localStorage.getItem('hermes-conversations') || '[]'); } catch(e) {}
      var totalMsgs = 0;
      var totalTools = 0;
      var totalTokens = 0;
      for (var i = 0; i < saved.length; i++) {
        var msgs = saved[i].messages || [];
        totalMsgs += msgs.filter(function(m) { return m.role === 'user'; }).length;
        // Sum tool calls from all messages
        for (var j = 0; j < msgs.length; j++) {
          if (msgs[j].toolCalls) totalTools += msgs[j].toolCalls.length;
        }
        // Sum tokens if tracked
        totalTokens += (saved[i].input_tokens || 0) + (saved[i].output_tokens || 0);
      }
      setStats({ sessions: saved.length, messages: totalMsgs, tools: totalTools, tokens: totalTokens });
      setRecentSessions(saved.slice(0, 7));
    } catch (e) { /* ignore */ }
    try {
      var r2 = await fetch(API_BASE + '/api/skills');
      if (r2.ok) { var data2 = await r2.json(); setSkills(data2.skills || []); }
    } catch (e) { /* ignore */ }
    try {
      var r3 = await fetch(API_BASE + '/health');
      if (r3.ok) { setHealth(await r3.json()); }
    } catch (e) { /* ignore */ }
    setLastRefresh(new Date());
  };

  useEffect(function() {
    fetchAll();
    var iv = setInterval(fetchAll, 15000);
    return function() { clearInterval(iv); };
  }, []);

  function formatTokens(n) {
    if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }

  function formatUptime(s) {
    if (!s) return '--';
    var d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  var modelName = (health && (health.model || health.default_model)) || 'Loading...';
  var uptime = health && health.uptime ? formatUptime(health.uptime) : '--';

  var statCards = [
    { key: 'sessions', label: 'Sessions', value: stats.sessions, icon: '💬', color: '#4588e0' },
    { key: 'messages', label: 'Messages', value: formatTokens(stats.messages), icon: '✉️', color: '#44d88a' },
    { key: 'tools', label: 'Tool Calls', value: formatTokens(stats.tools), icon: '⚙️', color: '#c088e0' },

  ];

  return (
    <div className="view-dashboard">
      {/* Live indicator */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <div className="status-dot-live"></div>
          <span style={{fontSize:'12px',color:'var(--text-muted)'}}>Live — auto-refreshing every 15s</span>
        </div>
        {lastRefresh && <span style={{fontSize:'11px',color:'var(--text-muted)'}}>Updated {lastRefresh.toLocaleTimeString()}</span>}
      </div>

      <div className="stat-grid">
        {statCards.map(function(card) {
          return (
            <div key={card.key} className={'stat-card ' + card.key}>
              <div className="stat-label">{card.label}</div>
              <div className="stat-value">{card.value}</div>
              <div className="stat-icon">{card.icon}</div>
            </div>
          );
        })}
      </div>

      <div className="card-row">
        <div className="info-card" style={{flex:1}}>
          <div className="info-card-title">Recent Activity</div>
          <div style={{fontSize:'12px',color:'var(--text-secondary)'}}>
            {recentSessions.length === 0 && <div style={{color:'var(--text-muted)',padding:'12px 0'}}>No sessions yet</div>}
            {recentSessions.map(function(s, i) {
              var title = s.title || s.preview || 'Untitled';
              if (title.length > 50) title = title.slice(0, 50) + '...';
              var sMsgs = s.messages || [];
              var msgs = s.user_prompt_count || sMsgs.filter(function(m) { return m.role === 'user'; }).length;
              var tools = s.tool_call_count || sMsgs.reduce(function(sum, m) { return sum + (m.toolCalls ? m.toolCalls.length : 0); }, 0);
              return (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom: i < recentSessions.length - 1 ? '1px solid var(--glass-border)' : 'none',transition:'background 0.2s'}}>
                  <span style={{color:'var(--text-primary)',fontSize:'12px',fontWeight:500}}>{title}</span>
                  <span style={{fontSize:'11px',color:'var(--text-muted)',whiteSpace:'nowrap',marginLeft:'12px',fontFamily:'JetBrains Mono, monospace'}}>{msgs}m {tools}t</span>
                </div>
              );
            })}
          </div>
        </div>
        <div className="info-card" style={{minWidth:'280px'}}>
          <div className="info-card-title">System</div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px',marginTop:'8px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{width:'40px',height:'40px',borderRadius:'12px',background:'linear-gradient(135deg, var(--accent-dim), rgba(192,136,224,0.15))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}}>{'🧠'}</div>
              <div>
                <div style={{fontFamily:'JetBrains Mono, monospace',color:'var(--accent)',fontWeight:600,fontSize:'14px'}}>{modelName}</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>Active model</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <div style={{background:'rgba(255,255,255,0.02)',borderRadius:'8px',padding:'10px'}}>
                <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'4px'}}>Uptime</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'var(--success)',fontFamily:'JetBrains Mono, monospace'}}>{uptime}</div>
              </div>
              <div style={{background:'rgba(255,255,255,0.02)',borderRadius:'8px',padding:'10px'}}>
                <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'4px'}}>Skills</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'var(--accent)',fontFamily:'JetBrains Mono, monospace'}}>{skills.length}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="info-card">
        <div className="info-card-title">Installed Skills ({skills.length})</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginTop:'10px',maxHeight:'180px',overflowY:'auto'}}>
          {skills.map(function(skill, i) {
            return <span key={i} style={{background:'rgba(124,111,224,0.08)',border:'1px solid rgba(124,111,224,0.15)',padding:'5px 12px',borderRadius:'8px',fontSize:'12px',color:'var(--accent)',fontWeight:500,transition:'all 0.2s',cursor:'default'}}>{skill.name}</span>;
          })}
          {skills.length === 0 && <span style={{color:'var(--text-muted)',fontSize:'12px'}}>No skills installed</span>}
        </div>
      </div>
    </div>
  );
}

/* ── Files View ── */
function FilesView() {
  // Store all directory children in a flat map: path -> items[]
  var [dirCache, setDirCache] = useState({});
  var [expandedDirs, setExpandedDirs] = useState({});
  var [loadingDirs, setLoadingDirs] = useState({});
  var [rootItems, setRootItems] = useState([]);
  var [searchTerm, setSearchTerm] = useState('');
  var [selectedFilePath, setSelectedFilePath] = useState(null);
  var [fileContent, setFileContent] = useState('');
  var [fileMetadata, setFileMetadata] = useState(null);
  var [fileType, setFileType] = useState('text'); // 'text', 'image', 'binary'
  var [loadingFile, setLoadingFile] = useState(false);
  var [isEditing, setIsEditing] = useState(false);
  var [editContent, setEditContent] = useState('');
  var [saving, setSaving] = useState(false);
  var [saveStatus, setSaveStatus] = useState(null);

  // Fetch root directory on mount
  useEffect(function() {
    fetchDir('');
  }, []);

  function fetchDir(path) {
    if (dirCache[path]) return; // already cached
    setLoadingDirs(function(prev) { var n = Object.assign({}, prev); n[path] = true; return n; });
    fetch(API_BASE + '/browse?path=' + encodeURIComponent(path))
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .then(function(data) {
        var items = data.items || [];
        if (path === '') {
          setRootItems(items);
        }
        setDirCache(function(prev) { var n = Object.assign({}, prev); n[path] = items; return n; });
        setLoadingDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
      })
      .catch(function() {
        setDirCache(function(prev) { var n = Object.assign({}, prev); n[path] = []; return n; });
        setLoadingDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
      });
  }

  function toggleDir(path) {
    if (expandedDirs[path]) {
      setExpandedDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
    } else {
      setExpandedDirs(function(prev) { var n = Object.assign({}, prev); n[path] = true; return n; });
      if (!dirCache[path]) fetchDir(path);
    }
  }

  function selectFile(path) {
    setSelectedFilePath(path);
    setLoadingFile(true);
    setIsEditing(false);
    setSaveStatus(null);
    fetch(API_BASE + '/readfile?path=' + encodeURIComponent(path))
      .then(function(r) { return r.ok ? r.json() : { content: '(Could not load file)', name: path.split('/').pop(), path: path, size: 0, type: 'text' }; })
      .then(function(data) {
        setFileContent(data.content || '');
        setFileMetadata({ path: data.path, name: data.name, size: data.size });
        setFileType(data.type || 'text');
        setLoadingFile(false);
      })
      .catch(function() {
        setFileContent('(Error loading file)');
        setFileMetadata({ path: path, name: path.split('/').pop(), size: 0 });
        setFileType('text');
        setLoadingFile(false);
      });
  }

  function startEdit() {
    setEditContent(fileContent);
    setIsEditing(true);
    setSaveStatus(null);
  }

  function cancelEdit() {
    setIsEditing(false);
    setSaveStatus(null);
  }

  function saveFile() {
    if (!fileMetadata) return;
    setSaving(true);
    setSaveStatus(null);
    fetch(API_BASE + '/writefile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: fileMetadata.path, content: editContent })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          setFileContent(editContent);
          setIsEditing(false);
          setSaveStatus('saved');
          setTimeout(function() { setSaveStatus(null); }, 2000);
        } else {
          setSaveStatus('error');
        }
        setSaving(false);
      })
      .catch(function() {
        setSaveStatus('error');
        setSaving(false);
      });
  }

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return bytes + ' B';
  }

  // Render a single file tree row + its children recursively
  function renderItem(item, depth) {
    var isDir = item.type === 'dir';
    var isExpanded = expandedDirs[item.path];
    var isLoading = loadingDirs[item.path];
    var isSelected = selectedFilePath === item.path;
    var children = dirCache[item.path] || [];

    return (
      <div key={item.path}>
        <div className={"file-item " + (isSelected ? 'active' : '')}
          style={{paddingLeft: (12 + depth * 20) + 'px'}}
          onClick={function() { if (isDir) toggleDir(item.path); else selectFile(item.path); }}>
          <span className="file-toggle" style={{width:'16px',display:'inline-block',textAlign:'center'}}>
            {isDir ? (isLoading ? '...' : isExpanded ? '▾' : '▸') : ''}
          </span>
          <span className="file-icon">{isDir ? '📁' : '📄'}</span>
          <span className="file-name">{item.name}</span>
          {item.size > 0 && !isDir && <span style={{fontSize:'10px',color:'var(--text-muted)',marginLeft:'auto'}}>{formatSize(item.size)}</span>}
        </div>
        {isDir && isExpanded && (
          children.length > 0 ? children.map(function(child) {
            return renderItem(child, depth + 1);
          }) : (
            isLoading ? null : <div style={{paddingLeft: (12 + (depth + 1) * 20) + 'px', fontSize:'12px',color:'var(--text-muted)',padding:'4px 0 4px ' + (12 + (depth + 1) * 20) + 'px'}}>(empty)</div>
          )
        )}
      </div>
    );
  }

  var displayItems = rootItems.filter(function(f) {
    if (!searchTerm) return true;
    return f.name.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1;
  });

  return (
    <div className="files-layout-mobile" style={{display:'flex',height:'100%',overflow:'hidden'}}>
      <div className="files-tree-panel-mobile" style={{width:'40%',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'16px',flex:1,overflowY:'auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}}>
            <input type="text" placeholder="Search files..." value={searchTerm}
              onChange={function(e) { setSearchTerm(e.target.value); }}
              style={{flex:1,background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-primary)',fontSize:'13px',outline:'none'}} />
            <button onClick={function() { setDirCache({}); setRootItems([]); fetchDir(''); }}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'14px'}} title="Refresh">{'↻'}</button>
          </div>
          <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'10px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.5px'}}>
            ~/.hermes/
          </div>
          <div className="file-tree">
            {rootItems.length === 0 && !loadingDirs[''] ? (
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>No files found</div>
            ) : loadingDirs[''] ? (
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading...</div>
            ) : displayItems.map(function(item) {
              return renderItem(item, 0);
            })}
          </div>
        </div>
      </div>
      <div className="files-content-panel-mobile" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {selectedFilePath ? (
          <React.Fragment>
            <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'12px'}}>
              <span style={{fontSize:'16px'}}>{fileType === 'image' ? '🖼' : '📄'}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'13px',fontWeight:'600',color:'var(--text-primary)'}}>{fileMetadata ? fileMetadata.name : ''}</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{'~/.hermes/' + (fileMetadata ? fileMetadata.path : '')}{fileMetadata && fileMetadata.size ? ' · ' + formatSize(fileMetadata.size) : ''}</div>
              </div>
              {fileType === 'text' && !isEditing && (
                <button onClick={startEdit}
                  style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Edit</button>
              )}
              {isEditing && (
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  {saveStatus === 'saved' && <span style={{fontSize:'11px',color:'var(--success)'}}>Saved!</span>}
                  {saveStatus === 'error' && <span style={{fontSize:'11px',color:'var(--danger)'}}>Error saving</span>}
                  <button onClick={saveFile} disabled={saving}
                    style={{background:'var(--accent)',border:'none',borderRadius:'6px',padding:'5px 12px',color:'white',cursor:saving ? 'not-allowed' : 'pointer',fontSize:'12px',fontWeight:'600',opacity:saving ? 0.6 : 1}}>{saving ? 'Saving...' : 'Save'}</button>
                  <button onClick={cancelEdit}
                    style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Cancel</button>
                </div>
              )}
            </div>
            <div style={{flex:1,overflow:'auto',background:'var(--bg-secondary)'}}>
              {loadingFile ? (
                <div style={{padding:'20px',color:'var(--text-muted)',fontSize:'13px'}}>Loading...</div>
              ) : fileType === 'image' ? (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',height:'100%'}}>
                  <img src={fileContent} alt={fileMetadata ? fileMetadata.name : ''} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:'4px'}} />
                </div>
              ) : isEditing ? (
                <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
                  style={{width:'100%',height:'100%',background:'var(--bg-primary)',color:'var(--text-secondary)',border:'none',
                    fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',padding:'12px 16px',margin:0,resize:'none',
                    lineHeight:'1.6',outline:'none',boxSizing:'border-box'}} />
              ) : (
                <pre style={{fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',color:'var(--text-secondary)',padding:'12px 16px',margin:0,whiteSpace:'pre-wrap',wordWrap:'break-word',lineHeight:'1.6'}}>{fileContent}</pre>
              )}
            </div>
          </React.Fragment>
        ) : (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',fontSize:'14px'}}>
            Select a file to view its contents
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Memory View ── */
function MemoryView() {
  var [selectedTarget, setSelectedTarget] = useState('memory');
  var [targets, setTargets] = useState([]);
  var [editing, setEditing] = useState(false);
  var [editContent, setEditContent] = useState('');
  var [providerStatus, setProviderStatus] = useState(null);
  var [showProviders, setShowProviders] = useState(false);
  var [expandedProvider, setExpandedProvider] = useState(null);

  useEffect(function() {
    var fetchMemory = async function() {
      try {
        var r = await fetch(API_BASE + '/api/memory');
        if (r.ok) {
          var data = await r.json();
          setTargets(data.targets || []);
        }
      } catch (e) {
        setTargets([]);
      }
    };
    var fetchProviderStatus = async function() {
      try {
        var r = await fetch('/memory/status');
        if (r.ok) {
          var data = await r.json();
          setProviderStatus(data);
        }
      } catch (e) { /* proxy not available */ }
    };
    fetchMemory();
    fetchProviderStatus();
  }, []);

  var selected = targets.find(function(t) { return t.target === selectedTarget; });
  var entries = selected ? (selected.entries || []) : [];
  var usage = selected ? (selected.usage || '') : '';
  var displayContent = entries.join('\n\n---\n\n');

  var memoryFiles = [
    { target: 'memory', name: 'MEMORY.md', desc: 'Agent memory' },
    { target: 'user', name: 'USER.md', desc: 'User profile' }
  ];

  function startEdit() {
    setEditContent(displayContent);
    setEditing(true);
  }

  async function saveEdit() {
    try {
      var body = {};
      if (selectedTarget === 'memory') body.memory = editContent;
      else body.user_profile = editContent;
      var r = await fetch(API_BASE + '/api/memory', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (r.ok) {
        var data = await r.json();
        setTargets(data.targets || targets);
      }
    } catch (e) { /* ignore */ }
    setEditing(false);
  }

  var activeProvider = providerStatus && providerStatus.provider;
  var providerConfig = activeProvider && activeProvider.config;
  var installedProviders = providerStatus ? (providerStatus.installed_providers || []) : [];

  return (
    <div className="view-memory">
      <div className="memory-sidebar">
        {/* Provider status card */}
        {providerStatus && (
          <div style={{marginBottom:'12px',padding:'10px',background:'var(--bg-secondary)',borderRadius:'6px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px'}}>Memory System</div>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}}>
              <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--success)'}}></div>
              <span style={{fontSize:'12px',color:'var(--text-primary)',fontWeight:'500'}}>Built-in</span>
              <span style={{fontSize:'10px',color:'var(--text-muted)'}}>always active</span>
            </div>
            {activeProvider ? (
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--accent)'}}></div>
                <span style={{fontSize:'12px',color:'var(--accent)',fontWeight:'600'}}>{activeProvider.name}</span>
                {providerConfig && providerConfig.mode && (
                  <span style={{fontSize:'10px',color:'var(--text-muted)',background:'var(--bg-tertiary)',padding:'1px 6px',borderRadius:'3px'}}>{providerConfig.mode}</span>
                )}
              </div>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--text-muted)',opacity:0.4}}></div>
                <span style={{fontSize:'11px',color:'var(--text-muted)',fontStyle:'italic'}}>No external provider</span>
              </div>
            )}
            {/* Provider config details */}
            {providerConfig && (
              <div style={{fontSize:'11px',color:'var(--text-secondary)',lineHeight:'1.5',borderTop:'1px solid var(--border)',paddingTop:'6px',marginTop:'2px'}}>
                {providerConfig.bank_id && <div>Bank: <span style={{color:'var(--text-primary)'}}>{providerConfig.bank_id}</span></div>}
                {providerConfig.budget && <div>Budget: <span style={{color:'var(--text-primary)'}}>{providerConfig.budget}</span></div>}
                {providerConfig.memory_mode && <div>Mode: <span style={{color:'var(--text-primary)'}}>{providerConfig.memory_mode}</span></div>}
                {providerConfig.prefetch_method && <div>Prefetch: <span style={{color:'var(--text-primary)'}}>{providerConfig.prefetch_method}</span></div>}
                {providerConfig.llm_provider && <div>LLM: <span style={{color:'var(--text-primary)'}}>{providerConfig.llm_provider}{providerConfig.llm_model ? ' / ' + providerConfig.llm_model : ''}</span></div>}
              </div>
            )}
            {/* Installed providers toggle */}
            {installedProviders.length > 0 && (
              <div style={{borderTop:'1px solid var(--border)',marginTop:'8px',paddingTop:'6px'}}>
                <div onClick={function() { setShowProviders(!showProviders); }}
                  style={{fontSize:'11px',color:'var(--accent)',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',userSelect:'none'}}>
                  <span style={{transform:showProviders ? 'rotate(90deg)' : 'rotate(0deg)',transition:'transform 0.15s',display:'inline-block'}}>{'\u25B6'}</span>
                  {installedProviders.length} provider{installedProviders.length !== 1 ? 's' : ''} installed
                </div>
                {showProviders && (
                  <div style={{marginTop:'6px',display:'flex',flexDirection:'column',gap:'4px'}}>
                    {installedProviders.map(function(p, i) {
                      var isActive = p.active;
                      var isExpanded = expandedProvider === p.name;
                      return (
                        <div key={i}>
                          <div onClick={function() { setExpandedProvider(isExpanded ? null : p.name); }}
                            style={{fontSize:'11px',padding:'4px 6px',borderRadius:'4px',cursor:'pointer',
                              background: isActive ? 'rgba(124,111,224,0.1)' : 'transparent',
                              border: '1px solid ' + (isActive ? 'rgba(124,111,224,0.3)' : 'transparent'),
                              display:'flex',alignItems:'center',gap:'6px',transition:'all 0.15s'}}>
                            <span style={{width:'5px',height:'5px',borderRadius:'50%',
                              background: isActive ? 'var(--accent)' : 'var(--text-muted)',opacity: isActive ? 1 : 0.4}}></span>
                            <span style={{color: isActive ? 'var(--accent)' : 'var(--text-secondary)',fontWeight: isActive ? '600' : '400'}}>{p.name}</span>
                            {p.hooks && p.hooks.length > 0 && (
                              <span style={{marginLeft:'auto',fontSize:'9px',color:'var(--text-muted)'}}>{p.hooks.length} hook{p.hooks.length !== 1 ? 's' : ''}</span>
                            )}
                          </div>
                          {isExpanded && (
                            <div style={{fontSize:'11px',color:'var(--text-secondary)',padding:'6px 6px 6px 17px',lineHeight:'1.5'}}>
                              {p.description && <div style={{marginBottom:'4px'}}>{p.description}</div>}
                              {p.hooks && p.hooks.length > 0 && (
                                <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginTop:'4px'}}>
                                  {p.hooks.map(function(h, j) {
                                    return <span key={j} style={{fontSize:'9px',background:'var(--bg-tertiary)',border:'1px solid var(--border)',padding:'1px 5px',borderRadius:'3px',color:'var(--text-muted)'}}>{h}</span>;
                                  })}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {/* Built-in memory files */}
        <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px',paddingLeft:'2px'}}>Built-in Memory</div>
        {memoryFiles.map(function(file, i) {
          return (
            <div key={i} className={"memory-file-item " + (selectedTarget === file.target ? 'active' : '')}
              onClick={function() { setSelectedTarget(file.target); setEditing(false); }}>
              <div style={{fontWeight:'500',marginBottom:'2px'}}>{file.name}</div>
              <div style={{fontSize:'10px',color:'var(--text-muted)'}}>{file.desc} {usage && selectedTarget === file.target ? '\u00b7 ' + usage : ''}</div>
            </div>
          );
        })}
      </div>
      <div className="memory-content">
        <div className="memory-header">
          <div>
            <div className="memory-title">{selectedTarget === 'memory' ? 'MEMORY.md' : 'USER.md'}</div>
            {usage && <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{usage}</div>}
          </div>
          {!editing ? (
            <button className="memory-edit-btn" onClick={startEdit}>Edit</button>
          ) : (
            <div style={{display:'flex',gap:'8px'}}>
              <button className="memory-edit-btn" onClick={saveEdit} style={{background:'var(--success)',color:'white'}}>Save</button>
              <button className="memory-edit-btn" onClick={function() { setEditing(false); }}>Cancel</button>
            </div>
          )}
        </div>
        <div className="memory-viewer">
          {editing ? (
            <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
              style={{width:'100%',height:'100%',background:'var(--bg-primary)',color:'var(--text-primary)',border:'none',fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',resize:'none',outline:'none',padding:'0',lineHeight:'1.6'}} />
          ) : (
            entries.length > 0 ? entries.map(function(entry, i) {
              return (
                <div key={i} style={{marginBottom:'16px',paddingBottom:'16px',borderBottom: i < entries.length - 1 ? '1px solid var(--border)' : 'none'}}>
                  <div style={{fontSize:'10px',color:'var(--text-muted)',marginBottom:'4px'}}>Entry {i + 1}</div>
                  <div style={{fontSize:'13px',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>{entry}</div>
                </div>
              );
            }) : <div style={{color:'var(--text-muted)'}}>No memory entries</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Skills View ── */
function SkillsView() {
  var [skills, setSkills] = useState([]);
  var [searchTerm, setSearchTerm] = useState('');
  var [activeTab, setActiveTab] = useState('installed');
  var [expandedSkillName, setExpandedSkillName] = useState(null);
  var [expandedSkillDetails, setExpandedSkillDetails] = useState(null);
  var [loadingDetails, setLoadingDetails] = useState(false);
  var [categoryFilter, setCategoryFilter] = useState(null);
  var [skillEnabledState, setSkillEnabledState] = useState({});
  var [skillDates, setSkillDates] = useState({});
  var [sortBy, setSortBy] = useState('newest');
  var [editingSkill, setEditingSkill] = useState(null);
  var [editContent, setEditContent] = useState('');
  var [saving, setSaving] = useState(false);

  useEffect(function() {
    var fetchSkills = async function() {
      try {
        var r = await fetch(API_BASE + '/api/skills');
        if (r.ok) {
          var data = await r.json();
          setSkills(data.skills || []);
          var initialState = {};
          (data.skills || []).forEach(function(s) {
            initialState[s.name] = !s.disabled;
          });
          setSkillEnabledState(initialState);
        }
      } catch (e) { /* ignore */ }
    };
    var fetchDates = async function() {
      try {
        var r = await fetch('/skills/dates');
        if (r.ok) {
          var data = await r.json();
          setSkillDates(data.dates || {});
        }
      } catch (e) { /* ignore */ }
    };
    fetchSkills();
    fetchDates();
  }, []);

  var fetchSkillDetails = async function(skillName) {
    setLoadingDetails(true);
    setExpandedSkillDetails(null);
    try {
      var r = await fetch(API_BASE + '/api/skills/' + encodeURIComponent(skillName));
      if (r.ok) {
        var data = await r.json();
        if (data.success !== false && data.name) {
          setExpandedSkillDetails(data);
        } else {
          setExpandedSkillDetails({ error: 'Could not load skill details', name: skillName });
        }
      } else {
        setExpandedSkillDetails({ error: 'Skill details not available (HTTP ' + r.status + ')', name: skillName });
      }
    } catch (e) {
      setExpandedSkillDetails({ error: 'Failed to fetch skill details', name: skillName });
    }
    setLoadingDetails(false);
  };

  var handleDetailsClick = function(skillName) {
    if (expandedSkillName === skillName) {
      setExpandedSkillName(null);
      setExpandedSkillDetails(null);
    } else {
      setExpandedSkillName(skillName);
      fetchSkillDetails(skillName);
    }
  };

  var handleEnabledToggle = function(skillName) {
    setSkillEnabledState(function(prev) {
      var next = Object.assign({}, prev);
      next[skillName] = !next[skillName];
      return next;
    });
  };

  var handleEditClick = function(skillName) {
    if (editingSkill === skillName) {
      setEditingSkill(null);
      setEditContent('');
    } else {
      setEditingSkill(skillName);
      setEditContent('');
      // Load the skill content for editing
      fetch(API_BASE + '/api/skills/' + encodeURIComponent(skillName))
        .then(function(r) { return r.json(); })
        .then(function(data) { setEditContent(data.content || ''); })
        .catch(function() { setEditContent('(Error loading skill content)'); });
    }
  };

  var handleSaveSkill = async function() {
    if (!editingSkill) return;
    setSaving(true);
    try {
      var r = await fetch(API_BASE + '/api/skills/' + encodeURIComponent(editingSkill), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: editContent }),
      });
      var responseText = await r.text();
      var data;
      try { data = JSON.parse(responseText); } catch (parseErr) {
        alert('Server returned invalid JSON (HTTP ' + r.status + '): ' + responseText.slice(0, 200));
        setSaving(false);
        return;
      }
      if (data.success) {
        setEditingSkill(null);
        setEditContent('');
        if (expandedSkillName === editingSkill) {
          fetchSkillDetails(editingSkill);
        }
      } else {
        alert('Save failed: ' + (data.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Save error: ' + e.message);
    }
    setSaving(false);
  };

  var filtered = skills.filter(function(s) {
    if (categoryFilter && (s.category || 'uncategorized') !== categoryFilter) return false;
    if (!searchTerm) return true;
    var term = searchTerm.toLowerCase();
    return (s.name || '').toLowerCase().indexOf(term) !== -1 ||
           (s.description || '').toLowerCase().indexOf(term) !== -1 ||
           (s.category || '').toLowerCase().indexOf(term) !== -1;
  });

  // Sort filtered results
  var formatSkillDate = function(ts) {
    if (!ts) return '';
    var d = new Date(ts * 1000);
    var now = new Date();
    var diff = now - d;
    var mins = Math.floor(diff / 60000);
    var hrs = Math.floor(diff / 3600000);
    var days = Math.floor(diff / 86400000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    if (hrs < 24) return hrs + 'h ago';
    if (days < 7) return days + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  };

  filtered.sort(function(a, b) {
    if (sortBy === 'newest') {
      return (skillDates[b.name] || 0) - (skillDates[a.name] || 0);
    } else if (sortBy === 'oldest') {
      return (skillDates[a.name] || 0) - (skillDates[b.name] || 0);
    } else {
      return (a.name || '').localeCompare(b.name || '');
    }
  });

  // Get unique categories
  var categories = {};
  skills.forEach(function(s) {
    var cat = s.category || 'uncategorized';
    categories[cat] = (categories[cat] || 0) + 1;
  });
  var categoryList = Object.keys(categories).sort();

  return (
    <div className="view-skills">
      <div className="skills-header">
        <div>
          <div className="skills-title">Skills Browser</div>

                {editingSkill === skill.name && (
                  <div style={{borderTop:'1px solid var(--border)',padding:'12px',background:'var(--bg-secondary)'}}>

                        <button onClick={function() { setEditingSkill(null); setEditContent(''); }}
