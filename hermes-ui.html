/* ── Files View ── */
function FilesView() {
  // Store all directory children in a flat map: path -> items[]
  var [dirCache, setDirCache] = useState({});
  var [expandedDirs, setExpandedDirs] = useState({});
  var [loadingDirs, setLoadingDirs] = useState({});
  var [rootItems, setRootItems] = useState([]);
  var [searchTerm, setSearchTerm] = useState('');
  var [selectedFilePath, setSelectedFilePath] = useState(null);
  var [fileContent, setFileContent] = useState('');
  var [fileMetadata, setFileMetadata] = useState(null);
  var [fileType, setFileType] = useState('text'); // 'text', 'image', 'binary'
  var [loadingFile, setLoadingFile] = useState(false);
  var [isEditing, setIsEditing] = useState(false);
  var [editContent, setEditContent] = useState('');
  var [saving, setSaving] = useState(false);
  var [saveStatus, setSaveStatus] = useState(null);

  // Fetch root directory on mount
  useEffect(function() {
    fetchDir('');
  }, []);

  function fetchDir(path) {
    if (dirCache[path]) return; // already cached
    setLoadingDirs(function(prev) { var n = Object.assign({}, prev); n[path] = true; return n; });
    fetch(API_BASE + '/browse?path=' + encodeURIComponent(path))
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .then(function(data) {
        var items = data.items || [];
        if (path === '') {
          setRootItems(items);
        }
        setDirCache(function(prev) { var n = Object.assign({}, prev); n[path] = items; return n; });
        setLoadingDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
      })
      .catch(function() {
        setDirCache(function(prev) { var n = Object.assign({}, prev); n[path] = []; return n; });
        setLoadingDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
      });
  }

  function toggleDir(path) {
    if (expandedDirs[path]) {
      setExpandedDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
    } else {
      setExpandedDirs(function(prev) { var n = Object.assign({}, prev); n[path] = true; return n; });
      if (!dirCache[path]) fetchDir(path);
    }
  }

  function selectFile(path) {
    setSelectedFilePath(path);
    setLoadingFile(true);
    setIsEditing(false);
    setSaveStatus(null);
    fetch(API_BASE + '/readfile?path=' + encodeURIComponent(path))
      .then(function(r) { return r.ok ? r.json() : { content: '(Could not load file)', name: path.split('/').pop(), path: path, size: 0, type: 'text' }; })
      .then(function(data) {
        setFileContent(data.content || '');
        setFileMetadata({ path: data.path, name: data.name, size: data.size });
        setFileType(data.type || 'text');
        setLoadingFile(false);
      })
      .catch(function() {
        setFileContent('(Error loading file)');
        setFileMetadata({ path: path, name: path.split('/').pop(), size: 0 });
        setFileType('text');
        setLoadingFile(false);
      });
  }

  function startEdit() {
    setEditContent(fileContent);
    setIsEditing(true);
    setSaveStatus(null);
  }

  function cancelEdit() {
    setIsEditing(false);
    setSaveStatus(null);
  }

  function saveFile() {
    if (!fileMetadata) return;
    setSaving(true);
    setSaveStatus(null);
    fetch(API_BASE + '/writefile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: fileMetadata.path, content: editContent })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          setFileContent(editContent);
          setIsEditing(false);
          setSaveStatus('saved');
          setTimeout(function() { setSaveStatus(null); }, 2000);
        } else {
          setSaveStatus('error');
        }
        setSaving(false);
      })
      .catch(function() {
        setSaveStatus('error');
        setSaving(false);
      });
  }

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return bytes + ' B';
  }

  // Render a single file tree row + its children recursively
  function renderItem(item, depth) {
    var isDir = item.type === 'dir';
    var isExpanded = expandedDirs[item.path];
    var isLoading = loadingDirs[item.path];
    var isSelected = selectedFilePath === item.path;
    var children = dirCache[item.path] || [];

    return (
      <div key={item.path}>
        <div className={"file-item " + (isSelected ? 'active' : '')}
          style={{paddingLeft: (12 + depth * 20) + 'px'}}
          onClick={function() { if (isDir) toggleDir(item.path); else selectFile(item.path); }}>
          <span className="file-toggle" style={{width:'16px',display:'inline-block',textAlign:'center'}}>
            {isDir ? (isLoading ? '...' : isExpanded ? '▾' : '▸') : ''}
          </span>
          <span className="file-icon">{isDir ? '📁' : '📄'}</span>
          <span className="file-name">{item.name}</span>
          {item.size > 0 && !isDir && <span style={{fontSize:'10px',color:'var(--text-muted)',marginLeft:'auto'}}>{formatSize(item.size)}</span>}
        </div>
        {isDir && isExpanded && (
          children.length > 0 ? children.map(function(child) {
            return renderItem(child, depth + 1);
          }) : (
            isLoading ? null : <div style={{paddingLeft: (12 + (depth + 1) * 20) + 'px', fontSize:'12px',color:'var(--text-muted)',padding:'4px 0 4px ' + (12 + (depth + 1) * 20) + 'px'}}>(empty)</div>
          )
        )}
      </div>
    );
  }

  var displayItems = rootItems.filter(function(f) {
    if (!searchTerm) return true;
    return f.name.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1;
  });

  return (
    <div className="files-layout-mobile" style={{display:'flex',height:'100%',overflow:'hidden'}}>
      <div className="files-tree-panel-mobile" style={{width:'40%',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'16px',flex:1,overflowY:'auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}}>
            <input type="text" placeholder="Search files..." value={searchTerm}
              onChange={function(e) { setSearchTerm(e.target.value); }}
              style={{flex:1,background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-primary)',fontSize:'13px',outline:'none'}} />
            <button onClick={function() { setDirCache({}); setRootItems([]); fetchDir(''); }}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'14px'}} title="Refresh">{'↻'}</button>
          </div>
          <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'10px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.5px'}}>
            ~/.hermes/
          </div>
          <div className="file-tree">
            {rootItems.length === 0 && !loadingDirs[''] ? (
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>No files found</div>
            ) : loadingDirs[''] ? (
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading...</div>
            ) : displayItems.map(function(item) {
              return renderItem(item, 0);
            })}
          </div>
        </div>
      </div>
      <div className="files-content-panel-mobile" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {selectedFilePath ? (
          <React.Fragment>
            <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'12px'}}>
              <span style={{fontSize:'16px'}}>{fileType === 'image' ? '🖼' : '📄'}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'13px',fontWeight:'600',color:'var(--text-primary)'}}>{fileMetadata ? fileMetadata.name : ''}</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{'~/.hermes/' + (fileMetadata ? fileMetadata.path : '')}{fileMetadata && fileMetadata.size ? ' · ' + formatSize(fileMetadata.size) : ''}</div>
              </div>
              {fileType === 'text' && !isEditing && (
                <button onClick={startEdit}
                  style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Edit</button>
              )}
              {isEditing && (
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  {saveStatus === 'saved' && <span style={{fontSize:'11px',color:'var(--success)'}}>Saved!</span>}
                  {saveStatus === 'error' && <span style={{fontSize:'11px',color:'var(--danger)'}}>Error saving</span>}
                  <button onClick={saveFile} disabled={saving}
                    style={{background:'var(--accent)',border:'none',borderRadius:'6px',padding:'5px 12px',color:'white',cursor:saving ? 'not-allowed' : 'pointer',fontSize:'12px',fontWeight:'600',opacity:saving ? 0.6 : 1}}>{saving ? 'Saving...' : 'Save'}</button>
                  <button onClick={cancelEdit}
                    style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Cancel</button>
                </div>
              )}
            </div>
            <div style={{flex:1,overflow:'auto',background:'var(--bg-secondary)'}}>
              {loadingFile ? (
                <div style={{padding:'20px',color:'var(--text-muted)',fontSize:'13px'}}>Loading...</div>
              ) : fileType === 'image' ? (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',height:'100%'}}>
                  <img src={fileContent} alt={fileMetadata ? fileMetadata.name : ''} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:'4px'}} />
                </div>
              ) : isEditing ? (
                <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
                  style={{width:'100%',height:'100%',background:'var(--bg-primary)',color:'var(--text-secondary)',border:'none',
                    fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',padding:'12px 16px',margin:0,resize:'none',
                    lineHeight:'1.6',outline:'none',boxSizing:'border-box'}} />
              ) : (
                <pre style={{fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',color:'var(--text-secondary)',padding:'12px 16px',margin:0,whiteSpace:'pre-wrap',wordWrap:'break-word',lineHeight:'1.6'}}>{fileContent}</pre>
              )}
            </div>
          </React.Fragment>
        ) : (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',fontSize:'14px'}}>
            Select a file to view its contents
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Memory View ── */
function MemoryView() {
  var [selectedTarget, setSelectedTarget] = useState('memory');
  var [targets, setTargets] = useState([]);
  var [editing, setEditing] = useState(false);
  var [editContent, setEditContent] = useState('');
  var [providerStatus, setProviderStatus] = useState(null);
  var [showProviders, setShowProviders] = useState(false);
  var [expandedProvider, setExpandedProvider] = useState(null);

  useEffect(function() {
    var fetchMemory = async function() {
      try {
        var r = await fetch(API_BASE + '/api/memory');
        if (r.ok) {
          var data = await r.json();
          setTargets(data.targets || []);
        }
      } catch (e) {
        setTargets([]);
      }
    };
    var fetchProviderStatus = async function() {
      try {
        var r = await fetch('/memory/status');
        if (r.ok) {
          var data = await r.json();
          setProviderStatus(data);
        }
      } catch (e) { /* proxy not available */ }
    };
    fetchMemory();
    fetchProviderStatus();
  }, []);

  var selected = targets.find(function(t) { return t.target === selectedTarget; });
  var entries = selected ? (selected.entries || []) : [];
  var usage = selected ? (selected.usage || '') : '';
  var displayContent = entries.join('\n\n---\n\n');

  var memoryFiles = [
    { target: 'memory', name: 'MEMORY.md', desc: 'Agent memory' },
    { target: 'user', name: 'USER.md', desc: 'User profile' }
  ];

  function startEdit() {
    setEditContent(displayContent);
    setEditing(true);
  }

  async function saveEdit() {
    try {
      var body = {};
      if (selectedTarget === 'memory') body.memory = editContent;
      else body.user_profile = editContent;
      var r = await fetch(API_BASE + '/api/memory', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (r.ok) {
        var data = await r.json();
        setTargets(data.targets || targets);
      }
    } catch (e) { /* ignore */ }
    setEditing(false);
  }

  var activeProvider = providerStatus && providerStatus.provider;
  var providerConfig = activeProvider && activeProvider.config;
  var installedProviders = providerStatus ? (providerStatus.installed_providers || []) : [];

  return (
    <div className="view-memory">
      <div className="memory-sidebar">
        {/* Provider status card */}
        {providerStatus && (
          <div style={{marginBottom:'12px',padding:'10px',background:'var(--bg-secondary)',borderRadius:'6px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px'}}>Memory System</div>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}}>
              <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--success)'}}></div>
              <span style={{fontSize:'12px',color:'var(--text-primary)',fontWeight:'500'}}>Built-in</span>
              <span style={{fontSize:'10px',color:'var(--text-muted)'}}>always active</span>
            </div>
            {activeProvider ? (
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--accent)'}}></div>
                <span style={{fontSize:'12px',color:'var(--accent)',fontWeight:'600'}}>{activeProvider.name}</span>
                {providerConfig && providerConfig.mode && (
                  <span style={{fontSize:'10px',color:'var(--text-muted)',background:'var(--bg-tertiary)',padding:'1px 6px',borderRadius:'3px'}}>{providerConfig.mode}</span>
                )}
              </div>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--text-muted)',opacity:0.4}}></div>
                <span style={{fontSize:'11px',color:'var(--text-muted)',fontStyle:'italic'}}>No external provider</span>
              </div>
            )}
            {/* Provider config details */}
            {providerConfig && (
              <div style={{fontSize:'11px',color:'var(--text-secondary)',lineHeight:'1.5',borderTop:'1px solid var(--border)',paddingTop:'6px',marginTop:'2px'}}>
                {providerConfig.bank_id && <div>Bank: <span style={{color:'var(--text-primary)'}}>{providerConfig.bank_id}</span></div>}
                {providerConfig.budget && <div>Budget: <span style={{color:'var(--text-primary)'}}>{providerConfig.budget}</span></div>}
                {providerConfig.memory_mode && <div>Mode: <span style={{color:'var(--text-primary)'}}>{providerConfig.memory_mode}</span></div>}
                {providerConfig.prefetch_method && <div>Prefetch: <span style={{color:'var(--text-primary)'}}>{providerConfig.prefetch_method}</span></div>}
                {providerConfig.llm_provider && <div>LLM: <span style={{color:'var(--text-primary)'}}>{providerConfig.llm_provider}{providerConfig.llm_model ? ' / ' + providerConfig.llm_model : ''}</span></div>}
              </div>
            )}
            {/* Installed providers toggle */}
            {installedProviders.length > 0 && (
              <div style={{borderTop:'1px solid var(--border)',marginTop:'8px',paddingTop:'6px'}}>
                <div onClick={function() { setShowProviders(!showProviders); }}
                  style={{fontSize:'11px',color:'var(--accent)',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',userSelect:'none'}}>
                  <span style={{transform:showProviders ? 'rotate(90deg)' : 'rotate(0deg)',transition:'transform 0.15s',display:'inline-block'}}>{'\u25B6'}</span>
                  {installedProviders.length} provider{installedProviders.length !== 1 ? 's' : ''} installed
                </div>
                {showProviders && (
                  <div style={{marginTop:'6px',display:'flex',flexDirection:'column',gap:'4px'}}>
                    {installedProviders.map(function(p, i) {
                      var isActive = p.active;
                      var isExpanded = expandedProvider === p.name;
                      return (
                        <div key={i}>
                          <div onClick={function() { setExpandedProvider(isExpanded ? null : p.name); }}
                            style={{fontSize:'11px',padding:'4px 6px',borderRadius:'4px',cursor:'pointer',
                              background: isActive ? 'rgba(124,111,224,0.1)' : 'transparent',
                              border: '1px solid ' + (isActive ? 'rgba(124,111,224,0.3)' : 'transparent'),
                              display:'flex',alignItems:'center',gap:'6px',transition:'all 0.15s'}}>
                            <span style={{width:'5px',height:'5px',borderRadius:'50%',
                              background: isActive ? 'var(--accent)' : 'var(--text-muted)',opacity: isActive ? 1 : 0.4}}></span>
                            <span style={{color: isActive ? 'var(--accent)' : 'var(--text-secondary)',fontWeight: isActive ? '600' : '400'}}>{p.name}</span>
                            {p.hooks && p.hooks.length > 0 && (
                              <span style={{marginLeft:'auto',fontSize:'9px',color:'var(--text-muted)'}}>{p.hooks.length} hook{p.hooks.length !== 1 ? 's' : ''}</span>
                            )}
                          </div>
                          {isExpanded && (
                            <div style={{fontSize:'11px',color:'var(--text-secondary)',padding:'6px 6px 6px 17px',lineHeight:'1.5'}}>
                              {p.description && <div style={{marginBottom:'4px'}}>{p.description}</div>}
                              {p.hooks && p.hooks.length > 0 && (
                                <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginTop:'4px'}}>
                                  {p.hooks.map(function(h, j) {
                                    return <span key={j} style={{fontSize:'9px',background:'var(--bg-tertiary)',border:'1px solid var(--border)',padding:'1px 5px',borderRadius:'3px',color:'var(--text-muted)'}}>{h}</span>;
                                  })}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {/* Built-in memory files */}
        <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px',paddingLeft:'2px'}}>Built-in Memory</div>
        {memoryFiles.map(function(file, i) {
          return (
            <div key={i} className={"memory-file-item " + (selectedTarget === file.target ? 'active' : '')}
              onClick={function() { setSelectedTarget(file.target); setEditing(false); }}>
              <div style={{fontWeight:'500',marginBottom:'2px'}}>{file.name}</div>
              <div style={{fontSize:'10px',color:'var(--text-muted)'}}>{file.desc} {usage && selectedTarget === file.target ? '\u00b7 ' + usage : ''}</div>
            </div>
          );
        })}
      </div>
      <div className="memory-content">
        <div className="memory-header">
          <div>
            <div className="memory-title">{selectedTarget === 'memory' ? 'MEMORY.md' : 'USER.md'}</div>
            {usage && <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{usage}</div>}
          </div>
          {!editing ? (
            <button className="memory-edit-btn" onClick={startEdit}>Edit</button>
          ) : (
            <div style={{display:'flex',gap:'8px'}}>
              <button className="memory-edit-btn" onClick={saveEdit} style={{background:'var(--success)',color:'white'}}>Save</button>
              <button className="memory-edit-btn" onClick={function() { setEditing(false); }}>Cancel</button>
            </div>
          )}
        </div>
        <div className="memory-viewer">
          {editing ? (
            <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
              style={{width:'100%',height:'100%',background:'var(--bg-primary)',color:'var(--text-primary)',border:'none',fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',resize:'none',outline:'none',padding:'0',lineHeight:'1.6'}} />
          ) : (
            entries.length > 0 ? entries.map(function(entry, i) {
              return (
                <div key={i} style={{marginBottom:'16px',paddingBottom:'16px',borderBottom: i < entries.length - 1 ? '1px solid var(--border)' : 'none'}}>
                  <div style={{fontSize:'10px',color:'var(--text-muted)',marginBottom:'4px'}}>Entry {i + 1}</div>
                  <div style={{fontSize:'13px',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>{entry}</div>
                </div>
              );
            }) : <div style={{color:'var(--text-muted)'}}>No memory entries</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Skills View ── */
function SkillsView() {
  var [skills, setSkills] = useState([]);
  var [searchTerm, setSearchTerm] = useState('');
  var [activeTab, setActiveTab] = useState('installed');
  var [expandedSkillName, setExpandedSkillName] = useState(null);
  var [expandedSkillDetails, setExpandedSkillDetails] = useState(null);
  var [loadingDetails, setLoadingDetails] = useState(false);
  var [categoryFilter, setCategoryFilter] = useState(null);
  var [skillEnabledState, setSkillEnabledState] = useState({});
  var [skillDates, setSkillDates] = useState({});
  var [sortBy, setSortBy] = useState('newest');

  useEffect(function() {
    var fetchSkills = async function() {
      try {
        var r = await fetch(API_BASE + '/api/skills');
        if (r.ok) {
          var data = await r.json();
          setSkills(data.skills || []);
          var initialState = {};
          (data.skills || []).forEach(function(s) {
            initialState[s.name] = !s.disabled;
          });
          setSkillEnabledState(initialState);
        }
      } catch (e) { /* ignore */ }
    };
    var fetchDates = async function() {
      try {
        var r = await fetch('/skills/dates');
        if (r.ok) {
          var data = await r.json();
          setSkillDates(data.dates || {});
        }
      } catch (e) { /* ignore */ }
    };
    fetchSkills();
    fetchDates();
  }, []);

  var fetchSkillDetails = async function(skillName) {
    setLoadingDetails(true);
    setExpandedSkillDetails(null);
    try {
      var r = await fetch(API_BASE + '/api/skills/' + encodeURIComponent(skillName));
      if (r.ok) {
        var data = await r.json();
        if (data.success !== false && data.name) {
          setExpandedSkillDetails(data);
        } else {
          setExpandedSkillDetails({ error: 'Could not load skill details', name: skillName });
        }
      } else {
        setExpandedSkillDetails({ error: 'Skill details not available (HTTP ' + r.status + ')', name: skillName });
      }
    } catch (e) {
      setExpandedSkillDetails({ error: 'Failed to fetch skill details', name: skillName });
    }
    setLoadingDetails(false);
  };

  var handleDetailsClick = function(skillName) {
    if (expandedSkillName === skillName) {
      setExpandedSkillName(null);
      setExpandedSkillDetails(null);
    } else {
      setExpandedSkillName(skillName);
      fetchSkillDetails(skillName);
    }
  };

  var handleEnabledToggle = function(skillName) {
    setSkillEnabledState(function(prev) {
      var next = Object.assign({}, prev);
      next[skillName] = !next[skillName];
      return next;
    });
  };

  var filtered = skills.filter(function(s) {
    if (categoryFilter && (s.category || 'uncategorized') !== categoryFilter) return false;
    if (!searchTerm) return true;
    var term = searchTerm.toLowerCase();
    return (s.name || '').toLowerCase().indexOf(term) !== -1 ||
           (s.description || '').toLowerCase().indexOf(term) !== -1 ||
           (s.category || '').toLowerCase().indexOf(term) !== -1;
  });

  // Sort filtered results
  var formatSkillDate = function(ts) {
    if (!ts) return '';
    var d = new Date(ts * 1000);
    var now = new Date();
    var diff = now - d;
    var mins = Math.floor(diff / 60000);
    var hrs = Math.floor(diff / 3600000);
    var days = Math.floor(diff / 86400000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    if (hrs < 24) return hrs + 'h ago';
    if (days < 7) return days + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  };

  filtered.sort(function(a, b) {
    if (sortBy === 'newest') {
      return (skillDates[b.name] || 0) - (skillDates[a.name] || 0);
    } else if (sortBy === 'oldest') {
      return (skillDates[a.name] || 0) - (skillDates[b.name] || 0);
    } else {
      return (a.name || '').localeCompare(b.name || '');
    }
  });

  // Get unique categories
  var categories = {};
  skills.forEach(function(s) {
    var cat = s.category || 'uncategorized';
    categories[cat] = (categories[cat] || 0) + 1;
  });
  var categoryList = Object.keys(categories).sort();

  return (
    <div className="view-skills">
      <div className="skills-header">
        <div>
          <div className="skills-title">Skills Browser</div>
          <div className="skills-subtitle">{skills.length} skills installed</div>
        </div>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',alignItems:'center'}}>
        {['installed', 'marketplace', 'featured'].map(function(tab) {
          return (
            <button key={tab} onClick={function() { setActiveTab(tab); }}
              style={{
                background: activeTab === tab ? 'var(--accent)' : 'var(--bg-tertiary)',
                color: activeTab === tab ? 'white' : 'var(--text-secondary)',
                border: '1px solid ' + (activeTab === tab ? 'var(--accent)' : 'var(--border)'),
                borderRadius: '8px', padding: '8px 16px', fontSize: '13px', cursor: 'pointer',
                fontWeight: activeTab === tab ? '600' : '400', textTransform: 'capitalize'
              }}>
              {tab}
            </button>
          );
        })}
        {activeTab === 'installed' && (
          <React.Fragment>
            <select onChange={function(e) { setCategoryFilter(e.target.value ? e.target.value : null); }}
              style={{marginLeft:'auto',background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-secondary)',fontSize:'13px',cursor:'pointer'}}>
              <option value="">All categories</option>
              {categoryList.map(function(cat, i) {
                return <option key={i} value={cat}>{cat + ' (' + categories[cat] + ')'}</option>;
              })}
            </select>
            <select value={sortBy} onChange={function(e) { setSortBy(e.target.value); }}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-secondary)',fontSize:'13px',cursor:'pointer'}}>
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="name">Name A–Z</option>
            </select>
          </React.Fragment>
        )}
        <input type="text" className="skills-search" placeholder="Search..."
          value={searchTerm} onChange={function(e) { setSearchTerm(e.target.value); }}
          style={{width:'250px'}} />
      </div>
      {activeTab === 'installed' ? (
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          {filtered.map(function(skill, i) {
            var isExpanded = expandedSkillName === skill.name;
            var isEnabled = skillEnabledState[skill.name] !== false;
            return (
              <div key={i} style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',overflow:'hidden'}}>
                <div style={{padding:'12px',display:'flex',alignItems:'start',gap:'12px'}}>
                  <div style={{flex:1}}>
                    <div className="skill-name">{skill.name}</div>
                    <div className="skill-desc">{skill.description || 'No description available'}</div>
                    <div className="skill-tags">
                      {skill.category && <div className="skill-tag">{skill.category}</div>}
                      {skillDates[skill.name] && (
                        <div style={{fontSize:'11px',color:'var(--text-muted)',display:'flex',alignItems:'center',gap:'4px'}}>
                          <span style={{opacity:0.6}}>{'🕐'}</span>
                          {formatSkillDate(skillDates[skill.name])}
                        </div>
                      )}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'8px',minWidth:'120px'}}>
                    <button className="skill-btn" onClick={function() { handleDetailsClick(skill.name); }} style={{background:isExpanded ? 'var(--accent)' : 'var(--bg-secondary)',color:isExpanded ? 'white' : 'var(--text-secondary)',borderColor:isExpanded ? 'var(--accent)' : 'var(--border)'}}>Details</button>
                    <button className="skill-btn" onClick={function() { handleEnabledToggle(skill.name); }} style={{background:isEnabled ? 'var(--success)' : 'var(--bg-secondary)',color:isEnabled ? 'white' : 'var(--text-secondary)',borderColor:isEnabled ? 'var(--success)' : 'var(--border)'}}>{isEnabled ? 'Enabled' : 'Disabled'}</button>
                  </div>
                </div>
                {isExpanded && (
                  <div style={{borderTop:'1px solid var(--border)',padding:'12px',background:'var(--bg-secondary)'}}>
                    {loadingDetails ? (
                      <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading...</div>
                    ) : expandedSkillDetails && expandedSkillDetails.error ? (
                      <div style={{fontSize:'12px',color:'var(--warning)'}}>{expandedSkillDetails.error}</div>
                    ) : expandedSkillDetails ? (
                      <React.Fragment>
                        <div style={{marginBottom:'12px'}}>
                          <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Description</div>
                          <div style={{fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.5'}}>{expandedSkillDetails.description || skill.description || 'No description'}</div>
                        </div>
                        {expandedSkillDetails.tags && expandedSkillDetails.tags.length > 0 && (
                          <div style={{marginBottom:'12px'}}>
                            <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Tags</div>
                            <div className="skill-tags">
                              {expandedSkillDetails.tags.map(function(tag, j) {
                                return <div key={j} className="skill-tag">{tag}</div>;
                              })}
                            </div>
                          </div>
                        )}
                        {expandedSkillDetails.related_skills && expandedSkillDetails.related_skills.length > 0 && (
                          <div style={{marginBottom:'12px'}}>
                            <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Related Skills</div>
                            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                              {expandedSkillDetails.related_skills.map(function(rel, j) {
                                return <div key={j} style={{background:'var(--accent-dim)',color:'var(--accent)',padding:'3px 10px',borderRadius:'4px',fontSize:'11px'}}>{rel}</div>;
                              })}
                            </div>
                          </div>
                        )}
                        {expandedSkillDetails.content && (
                          <div style={{marginBottom:'0'}}>
                            <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Content</div>
                            <div style={{background:'var(--bg-primary)',border:'1px solid var(--border)',borderRadius:'4px',padding:'10px',maxHeight:'300px',overflow:'auto',fontSize:'12px',fontFamily:'Monaco, Menlo, monospace',color:'var(--text-secondary)',lineHeight:'1.4'}} dangerouslySetInnerHTML={{__html: marked.parse(expandedSkillDetails.content)}} />
                          </div>
                        )}
                      </React.Fragment>
                    ) : (
                      <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading details...</div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-muted)'}}>
          <div style={{fontSize:'48px',marginBottom:'16px'}}>{'🏪'}</div>
          <div style={{fontSize:'16px',fontWeight:'500',marginBottom:'8px',color:'var(--text-secondary)'}}>
            {activeTab === 'marketplace' ? 'Skills Marketplace' : 'Featured Skills'}
          </div>
          <div style={{fontSize:'13px'}}>
            {activeTab === 'marketplace' ? 'Browse and install community skills from the Hermes Skills Hub' : 'Curated selection of popular and recommended skills'}
          </div>
          <div style={{fontSize:'12px',marginTop:'16px',color:'var(--text-muted)'}}>Coming soon</div>
        </div>
      )}
    </div>
  );
}

function JobsView() {
  var [jobs, setJobs] = useState([]);
  var [loading, setLoading] = useState(true);

  var fetchJobs = async function() {
    try {
      var r = await fetch(API_BASE + '/api/sessions');
      if (r.ok) {
        var data = await r.json();
        var items = (data.items || []).slice(0, 25).map(function(s) {
          var isActive = !s.ended_at && s.last_active && (Date.now()/1000 - s.last_active < 300);
          return Object.assign({}, s, { isActive: isActive });
        });
        setJobs(items);
      }
    } catch(e) {}
    setLoading(false);
  };

  useEffect(function() {
    fetchJobs();
    var iv = setInterval(fetchJobs, 10000);
    return function() { clearInterval(iv); };
  }, []);

  function timeAgo(ts) {
    if (!ts) return '--';
    var diff = Date.now()/1000 - ts;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  function formatTokens(n) {
    if (!n) return '0';
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return String(n);
  }

  return (
    <div className="view-dashboard" style={{padding:'20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <div className="status-dot-live"></div>
          <span style={{fontSize:'12px',color:'var(--text-muted)'}}>Monitoring — auto-refresh every 10s</span>
        </div>
        <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{jobs.filter(function(j){return j.isActive;}).length} active</span>
      </div>

      {loading && <div style={{color:'var(--text-muted)',textAlign:'center',padding:'40px'}}>Loading jobs...</div>}

      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {jobs.map(function(job) {
          var title = job.title || job.preview || 'Untitled Session';
          if (title.length > 60) title = title.slice(0,60) + '...';
          var totalTokens = (job.input_tokens||0) + (job.output_tokens||0);

          return (
            <div key={job.id} className="info-card" style={{padding:'14px 18px',transition:'all 0.2s',borderLeft: job.isActive ? '2px solid var(--success)' : '2px solid transparent'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',flex:1,minWidth:0}}>
                  {job.isActive ? (
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--success)',boxShadow:'0 0 8px rgba(68,216,138,0.5)',animation:'pulse 2s ease infinite',flexShrink:0}}></div>
                  ) : (
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--text-muted)',opacity:0.3,flexShrink:0}}></div>
                  )}
                  <span style={{fontSize:'13px',fontWeight:600,color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{title}</span>
                </div>
                <span style={{fontSize:'11px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace',flexShrink:0,marginLeft:'12px'}}>{timeAgo(job.last_active || job.started_at)}</span>
              </div>
              <div style={{display:'flex',gap:'16px',fontSize:'11px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace'}}>
                <span title="Messages" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                  <span style={{color:'var(--accent)'}}>{'✉'}</span> {job.message_count || 0}
                </span>
                <span title="Tool calls" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                  <span style={{color:'#c088e0'}}>{'⚙'}</span> {job.tool_call_count || 0}
                </span>
                <span title="Tokens" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                  <span style={{color:'#e8b04a'}}>{'⚡'}</span> {formatTokens(totalTokens)}
                </span>
                <span title="Source" style={{display:'flex',alignItems:'center',gap:'4px',marginLeft:'auto'}}>
                  <span style={{background:'rgba(255,255,255,0.04)',padding:'1px 6px',borderRadius:'4px',fontSize:'10px'}}>{job.source || 'api'}</span>
                </span>
              </div>
            </div>
          );
        })}
      </div>

      {!loading && jobs.length === 0 && (
        <div style={{textAlign:'center',color:'var(--text-muted)',padding:'60px 0'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>{'⚡'}</div>
          <div style={{fontSize:'14px'}}>No jobs yet</div>
          <div style={{fontSize:'12px',marginTop:'4px'}}>Sessions will appear here as they run</div>
        </div>
      )}
    </div>
  );
}

function TerminalView() {
  var [activeMode, setActiveMode] = useState('shell'); // 'shell', 'hermes', 'claude'

  // === Shell state ===
  var [shellHistory, setShellHistory] = useState([]);
  var [shellInput, setShellInput] = useState('');
  var [shellRunning, setShellRunning] = useState(false);
  var [shellCwd, setShellCwd] = useState('~');
  var shellBodyRef = useRef(null);
  var shellInputRef = useRef(null);

  // === Hermes Terminal state ===
  var [hermesInput, setHermesInput] = useState('');
  var [hermesHistory, setHermesHistory] = useState([]);
  var [hermesStreaming, setHermesStreaming] = useState(false);
  var hermesSessionId = useRef(null);
  var hermesBodyRef = useRef(null);
  var hermesInputRef = useRef(null);

  // === Claude Code state ===
  var [claudeHistory, setClaudeHistory] = useState([]);
  var [claudeInput, setClaudeInput] = useState('');
  var [claudeRunning, setClaudeRunning] = useState(false);
  var claudeBodyRef = useRef(null);
  var claudeInputRef = useRef(null);
  var claudeHasSent = useRef(false);

  // Auto-scroll all panels
  useEffect(function() { if (shellBodyRef.current) shellBodyRef.current.scrollTop = shellBodyRef.current.scrollHeight; }, [shellHistory]);
  useEffect(function() { if (hermesBodyRef.current) hermesBodyRef.current.scrollTop = hermesBodyRef.current.scrollHeight; }, [hermesHistory]);
  useEffect(function() { if (claudeBodyRef.current) claudeBodyRef.current.scrollTop = claudeBodyRef.current.scrollHeight; }, [claudeHistory]);

  // Focus input on tab switch
  useEffect(function() {
    setTimeout(function() {
      if (activeMode === 'shell' && shellInputRef.current) shellInputRef.current.focus();
      if (activeMode === 'hermes' && hermesInputRef.current) hermesInputRef.current.focus();
      if (activeMode === 'claude' && claudeInputRef.current) claudeInputRef.current.focus();
    }, 100);
  }, [activeMode]);

  // ─── Shell: run command via /terminal/exec ───
  // Resolve cwd path (~ to full path for subprocess)
  var shellCwdFull = useRef(null);

  async function runShellCommand() {
    var cmd = shellInput.trim();
    if (!cmd || shellRunning) return;
    setShellInput('');
    setShellHistory(function(prev) { return prev.concat([{ type: 'input', text: cmd, id: Date.now(), cwd: shellCwd }]); });
    setShellRunning(true);

    try {
      // For cd commands, run "cd <target> && pwd" to get the new path
      var isCd = cmd.match(/^\s*cd\s*(.*)?$/);
      var actualCmd = cmd;
      var cwdParam = shellCwdFull.current || undefined;

      if (isCd) {
        var target = (isCd[1] || '').trim() || '~';
        actualCmd = 'cd ' + target + ' && pwd';
      }

      var r = await fetch(API_BASE + '/terminal/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: actualCmd, mode: 'shell', cwd: cwdParam })
      });

      if (!r.ok) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Server error: ' + r.status + '. Make sure serve.py is restarted.)', id: Date.now() + 1, exitCode: -1 }]); });
        setShellRunning(false);
        return;
      }

      var data = await r.json();
      if (data.error) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Error: ' + data.error + ')', id: Date.now() + 1, exitCode: -1 }]); });
        setShellRunning(false);
        return;
      }

      var output = data.output || '';
      var exitCode = data.exit_code != null ? data.exit_code : 0;
      if (exitCode !== 0 && !output) output = '(exit code ' + exitCode + ')';

      // If cd succeeded, update the cwd from pwd output
      if (isCd && exitCode === 0 && output.trim()) {
        var newPath = output.trim().split('\n').pop();
        shellCwdFull.current = newPath;
        setShellCwd(newPath.replace(/^\/Users\/[^/]+/, '~'));
        output = ''; // Don't show pwd output for cd
      }

      if (output || exitCode !== 0) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: output, id: Date.now() + 1, exitCode: exitCode }]); });
      }
    } catch(e) {
      setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Error: ' + e.message + '. Is serve.py running with the terminal endpoint?)', id: Date.now() + 1, exitCode: -1 }]); });
    }
    setShellRunning(false);
  }

  // ─── Hermes: send command to Hermes agent ───
  async function sendHermesCommand() {
    var cmd = hermesInput.trim();
    if (!cmd || hermesStreaming) return;
    setHermesInput('');
    var usrId = 'usr_' + Date.now() + '_' + Math.random();
    var responseId = 'res_' + Date.now() + '_' + Math.random();
    setHermesHistory(function(prev) { return prev.concat([
      { role: 'user', content: cmd, id: usrId },
      { role: 'assistant', content: '', id: responseId, streaming: true }
    ]); });
    setHermesStreaming(true);

    try {
      var sessionId = hermesSessionId.current;
      if (!sessionId) {
        var sessResp = await fetch(API_BASE + '/api/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source: 'webui' }) });
        var sessData = await sessResp.json();
        sessionId = (sessData.session && sessData.session.id) || sessData.id || sessData.session_id;
        if (!sessionId) throw new Error('Failed to create session');
        hermesSessionId.current = sessionId;
      }

      var response = await fetch(API_BASE + '/api/sessions/' + sessionId + '/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: cmd })
      });
      if (!response.ok) throw new Error('Chat request failed: ' + response.status);
      var chatData = await response.json();
      var fullText = chatData.final_response || '';
      if (!fullText && chatData.messages) {
        for (var mi = chatData.messages.length - 1; mi >= 0; mi--) {
          if (chatData.messages[mi].role === 'assistant') { fullText = chatData.messages[mi].content; break; }
        }
      }
      if (!fullText) fullText = '(No response from Hermes)';
      setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: fullText, streaming: false }) : h; }); });
    } catch(e) {
      setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: '(Error: ' + e.message + ')', streaming: false }) : h; }); });
    }
    setHermesStreaming(false);
  }

  // ─── Claude Code: run via claude CLI ───
  async function runClaudeCommand() {
    var cmd = claudeInput.trim();
    if (!cmd || claudeRunning) return;
    setClaudeInput('');
    setClaudeHistory(function(prev) { return prev.concat([{ type: 'input', text: cmd, id: Date.now() }]); });
    setClaudeRunning(true);

    setClaudeHistory(function(prev) { return prev.concat([{ type: 'thinking', id: Date.now() + 0.5 }]); });

    try {
      var shouldContinue = claudeHasSent.current;
      var r = await fetch(API_BASE + '/terminal/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd, mode: 'claude', continue_session: shouldContinue })
      });
      claudeHasSent.current = true;
      if (!r.ok) {
        setClaudeHistory(function(prev) {
          return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: '(Server error: ' + r.status + '. Make sure serve.py is restarted.)', id: Date.now() + 1 }]);
        });
        setClaudeRunning(false);
        return;
      }
      var data = await r.json();
      var output = data.output || data.error || '';
      var exitCode = data.exit_code != null ? data.exit_code : 0;
      if (exitCode !== 0 && !output) output = '(exit code ' + exitCode + ')';

      setClaudeHistory(function(prev) {
        return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: output, id: Date.now() + 1 }]);
      });
    } catch(e) {

function StatusBar({ connected, conversations }) {
  var [stats, setStats] = useState({ model: 'MiniMax-M2.7', memory: 0, sessions: 0, uptime: '' });

  useEffect(function() {
    var fetchStats = async function() {
      try {
        var [memR, sessR, healthR] = await Promise.all([
          fetch(API_BASE + '/api/memory').catch(function() { return null; }),
          fetch(API_BASE + '/api/sessions').catch(function() { return null; }),
          fetch(API_BASE + '/health').catch(function() { return null; })
        ]);
        var memCount = 0, model = 'MiniMax-M2.7', uptime = '';
        if (memR && memR.ok) {
          var md = await memR.json();
          if (md.targets) { for (var t = 0; t < md.targets.length; t++) { memCount += (md.targets[t].entries || []).length; } }
          else { memCount = (md.memories || md.items || []).length; }
        }
        if (healthR && healthR.ok) {
          var hd = await healthR.json();
          model = hd.model || hd.default_model || model;
          if (hd.uptime) { var hrs = Math.floor(hd.uptime / 3600); var mins = Math.floor((hd.uptime % 3600) / 60); uptime = hrs + 'h ' + mins + 'm'; }
        }
        var sessCount = conversations ? conversations.length : 0;
        if (sessR && sessR.ok) { var sd = await sessR.json(); sessCount = sd.total || (sd.items || []).length; }
        setStats({ model: model, memory: memCount, sessions: sessCount, uptime: uptime });
      } catch(e) {}
    };
    fetchStats();
    var iv = setInterval(fetchStats, 30000);
    return function() { clearInterval(iv); };
  }, []);

  return (
    <div className="status-bar">
      <div className="status-bar-item">
        <div className={connected === false ? 'status-dot-dead' : 'status-dot-live'}></div>
        <span>{connected === false ? 'Offline' : 'Connected'}</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Model">
        <span>{'🧠'}</span> <span>{stats.model}</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Memory entries">
        <span>{'💾'}</span> <span>{stats.memory} memories</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Total sessions">
        <span>{'💬'}</span> <span>{stats.sessions} sessions</span>
      </div>
      {stats.uptime && (
        <React.Fragment>
          <div className="status-bar-sep"></div>
          <div className="status-bar-item" title="Uptime">
            <span>{'⏱'}</span> <span>{stats.uptime}</span>
          </div>
        </React.Fragment>
      )}
      <div style={{flex:1}}></div>
      <div className="status-bar-item" style={{opacity:0.5}}>
        <span>Hermes v1.0</span>
      </div>
    </div>
  );
}

  const [editingContent, setEditingContent] = useState('');
  const [showMCPBrowser, setShowMCPBrowser] = useState(false);

  const [localLogs, setLocalLogs] = useState([]);
  var addLocalLog = function(text) {

    setLocalLogs(function(prev) {
      var next = prev.concat([{ id: Date.now() + Math.random(), line: '[' + ts + '] ' + text }]);
      if (next.length > 500) next = next.slice(next.length - 500);

    });

  const [mcpTools, setMcpTools] = useState([]);

  useEffect(() => {

  // Fetch MCP tools on mount
  useEffect(() => {
    const fetchMCPTools = async () => {
      try {
        const r = await fetch(API_BASE + '/api/config');
        if (r.ok) {
          const cfg = await r.json();
          if (cfg.mcp_tools) {
            setMcpTools(cfg.mcp_tools);
