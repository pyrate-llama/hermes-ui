                    </button>
                    <button className="attach-btn" onClick={() => fileInputRef2.current?.click()} title="Attach file">
                      <Icon name="paperclip" size={16}/>
                    </button>
                    <button className="attach-btn" onClick={() => fileInputRef.current?.click()} title="Attach image">
                      <Icon name="image" size={16}/>
                    </button>
                    {asideMode ? (
                      <button className="send-btn" onClick={function(){ if (input.trim().startsWith('/') && runSlashCommandFromComposer(showSlashCommandMenu)) return; sendAsideQuestion(input); }} disabled={!input.trim() || asideSending} title="Send side question">
                        <Icon name="send" size={16}/>
                      </button>
                    ) : isStreaming ? (
                      <React.Fragment>
                        <button className="send-btn pause-btn" onClick={pauseStreaming} title="Pause to interject">
                          <svg width="16" height="16" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
                        </button>
                        <button className="send-btn stop-btn" onClick={stopStreamingAction} title="Stop">
                          <svg width="16" height="16" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
                        </button>
                        <button className="send-btn" onClick={function(){ if (input.trim().startsWith('/') && runSlashCommandFromComposer(showSlashCommandMenu)) return; steer(input); }} disabled={!input.trim()} title="Steer (nudge without pausing — uses hermes-agent /steer)">
                          <Icon name="send" size={16}/>
                        </button>
                      </React.Fragment>
                    ) : isPaused ? (
                      <button className="send-btn" onClick={function(){ if (input.trim().startsWith('/') && runSlashCommandFromComposer(showSlashCommandMenu)) return; sendInterjection(input); }} disabled={!input.trim()} title="Send interjection">
                        <Icon name="send" size={16}/>
                      </button>
                    ) : (
                      <button className="send-btn" onClick={function(){ if (input.trim().startsWith('/') && runSlashCommandFromComposer(showSlashCommandMenu)) return; sendMessage(input); }} disabled={(!input.trim() && !pendingImages.length && !pendingFiles.length) || connected === false || anyAnalyzing} title="Send (⏎)">
                        <Icon name="send" size={16}/>
                      </button>
                    )}
                  </div>
                </div>
                <div className="input-hint">
                  {asideMode ? (
                    <span><kbd>⏎</kbd> ask aside · does not change the main thread</span>
                  ) : isStreaming ? (
                    <span><kbd>⏎</kbd> steer · Pause · Stop to cancel</span>
                  ) : isPaused ? (
                    <span><kbd>⏎</kbd> send interjection · Dismiss to keep partial</span>
                  ) : (
                    <React.Fragment>
                      <span><kbd>⏎</kbd> send</span>
                      <span className="input-hint-newline"><kbd>⇧</kbd><kbd>⏎</kbd> new line</span>
                      <span className="input-hint-secondary">Paste / drop images & files</span>
                      {!config.geminiKey && normalizeImageHelperMode(config.imageHelperMode) !== 'direct' && <span style={{opacity:0.6}}>· add Gemini key for helper images</span>}

                      <div className="input-hint-actions">
                        <div className="composer-chip-wrap">
                          <button
                            className={"composer-chip " + (selectedChatModel ? 'active' : '')}
                            onClick={function(){
                              setCustomModelDraft(selectedChatModel || currentModel || '');
                              setShowModelMenu(!showModelMenu);
                            }}
                            aria-label="Model for subsequent messages in this conversation"
                          >
                            <Icon name="cpu" size={13}/>
                            <span>{activeChatModel ? activeChatModel.split('/').pop() : 'Model'}</span>
                          </button>
                          {showModelMenu && (
                            <React.Fragment>
                              <div onClick={function(){ setShowModelMenu(false); }} style={{position:'fixed', inset:0, zIndex:10003}} />
                              <div className="composer-chip-menu" style={{minWidth:'260px', zIndex:10004}}>
                                <div className="composer-chip-menu-title">
                                  <Icon name="cpu" size={13}/>
                                  <span>Chat model</span>
                                </div>
                                <div className="composer-chip-menu-note">
                                  Changes apply to the next message. This keeps the same conversation context.
                                </div>
                                <button
                                  className={"composer-chip-option " + (!selectedChatModel ? 'active' : '')}
                                  onClick={function(){
                                    setSelectedChatModel('');
                                    setCustomModelDraft(currentModel || '');
                                    setShowModelMenu(false);
                                  }}
                                >
                                  <span>Auto default</span>
                                </button>
                                {modelOptions.concat(selectedChatModel && !modelOptions.some(function(m) { return m.id === selectedChatModel; }) ? [{ id: selectedChatModel, label: selectedChatModel.split('/').pop() }] : []).map(function(item) {
                                  var id = item.id || '';
                                  if (!id) return null;
                                  var active = selectedChatModel === id;
                                  return (
                                    <button
                                      key={id}
                                      className={"composer-chip-option " + (active ? 'active' : '')}
                                      title={id}
                                      onClick={function(){
                                        setSelectedChatModel(id);
                                        setCustomModelDraft(id);
                                        setShowModelMenu(false);
                                      }}
                                    >
                                      <span>{item.label || id}</span>
                                    </button>
                                  );
                                })}
                                <input
                                  className="composer-chip-input"
                                  value={customModelDraft}
                                  placeholder="provider/model or model id"
                                  onChange={function(e){ setCustomModelDraft(e.target.value); }}
                                  onKeyDown={function(e){
                                    if (e.key === 'Enter') {
                                      var next = customModelDraft.trim();
                                      if (next) setSelectedChatModel(next);
                                      setShowModelMenu(false);
                                    }
                                  }}
                                />
                                <button
                                  className="composer-chip-option"
                                  onClick={function(){
                                    var next = customModelDraft.trim();
                                    if (next) {
                                      setSelectedChatModel(next);
                                      setModelOptions(function(prev) {
                                        return prev.some(function(m) { return m.id === next; }) ? prev : prev.concat([{ id: next, label: next.split('/').pop() }]);
                                      });
                                    }
                                    setShowModelMenu(false);
                                  }}
                                >
                                  <span>Use custom model</span>
                                </button>
                              </div>
                            </React.Fragment>
                          )}
                        </div>
                        <div className="composer-chip-wrap">
                          <button
                            className={"composer-chip " + (reasoningEffort ? 'active' : '')}
                            onClick={function(){ setShowReasoningMenu(!showReasoningMenu); }}
                            aria-label="Reasoning effort for new messages"
                          >
                            <Icon name="brain" size={13}/>
                            <span>{reasoningEffortLabel(reasoningEffort)}</span>
                          </button>
                          {showReasoningMenu && (
                            <React.Fragment>
                              <div onClick={function(){ setShowReasoningMenu(false); }} style={{position:'fixed', inset:0, zIndex:10003}} />
                              <div className="composer-chip-menu" style={{zIndex:10004}}>
                                <div className="composer-chip-menu-title">
                                  <Icon name="brain" size={13}/>
                                  <span>Reasoning effort</span>
                                </div>
                                <div className="composer-chip-menu-note">
                                  Controls how much extra thinking supported models use for new replies.
                                </div>
                                {REASONING_EFFORTS.map(function(item) {
                                  var active = normalizeReasoningEffort(reasoningEffort) === item.value;
                                  return (
                                    <button
                                      key={item.value || 'auto'}
                                      className={"composer-chip-option " + (active ? 'active' : '')}
                                      title={item.title}
                                      onClick={function(){
                                        setReasoningEffort(item.value);
                                        setShowReasoningMenu(false);
                                      }}
                                    >
                                      <span>{item.label}</span>
                                    </button>
                                  );
                                })}
                              </div>
                            </React.Fragment>
                          )}
                        </div>
                        <button
                          className={"header-btn " + (showExportMenu ? 'active' : '')}
                          onClick={function(){ setShowExportMenu(!showExportMenu); }}
                          title="Export chat"
                          style={{padding:'4px 10px', fontSize:'12px', display:'inline-flex', alignItems:'center', gap:'6px', width:'auto', height:'26px'}}
                        >
                          <Icon name="file-text" size={14}/>
                          <span style={{fontSize:'12px'}}>Export</span>
                        </button>
                        {showExportMenu && (
                          <React.Fragment>
                            <div onClick={function(){ setShowExportMenu(false); }} style={{position:'fixed', inset:0, zIndex:9}} />
                            <div style={{position:'absolute', right:0, bottom:'calc(100% + 4px)', background:'var(--panel, var(--bg-panel, #1a1a1f))', border:'1px solid var(--border, rgba(255,255,255,0.1))', borderRadius:'8px', padding:'4px', minWidth:'200px', boxShadow:'0 4px 16px rgba(0,0,0,0.3)', zIndex:10}}>
                              <button
                                onClick={function(){ setShowExportMenu(false); exportChat(); }}
                                style={{display:'flex', alignItems:'center', gap:'10px', width:'100%', background:'none', border:'none', color:'var(--text, #fff)', padding:'8px 12px', borderRadius:'6px', cursor:'pointer', fontSize:'13px', textAlign:'left'}}
                                onMouseEnter={function(e){ e.currentTarget.style.background='rgba(255,255,255,0.06)'; }}
                                onMouseLeave={function(e){ e.currentTarget.style.background='none'; }}
                              >
                                <Icon name="file-text" size={14}/>
                                <span>Export as PDF/HTML</span>
                              </button>
                              <button
                                onClick={function(){ setShowExportMenu(false); if (messages.length > 0) { var t = activeConvId ? (conversations.find(function(c){return c.id===activeConvId;})||{}).title : 'Chat'; exportChatAsMarkdown(messages, t || 'Chat'); } }}
                                style={{display:'flex', alignItems:'center', gap:'10px', width:'100%', background:'none', border:'none', color:'var(--text, #fff)', padding:'8px 12px', borderRadius:'6px', cursor:'pointer', fontSize:'13px', textAlign:'left'}}
                                onMouseEnter={function(e){ e.currentTarget.style.background='rgba(255,255,255,0.06)'; }}
                                onMouseLeave={function(e){ e.currentTarget.style.background='none'; }}
                              >
                                <Icon name="file-pen" size={14}/>
                                <span>Export as Markdown</span>
                              </button>
                            </div>
                          </React.Fragment>
                        )}
                      </div>
                    </React.Fragment>
                  )}
                </div>
              </div>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className={"header " + (sidebarCollapsed ? 'sidebar-collapsed' : '')}>
              <div className="header-title">
                {currentView === 'dashboard' ? 'Dashboard' : currentView === 'files' ? 'Files' : currentView === 'spaces' ? 'Spaces' : currentView === 'terminal' ? 'Terminal' : currentView === 'jobs' ? 'Cron Jobs' : currentView === 'memory' ? 'Memory' : currentView === 'web-extract' ? 'Web Extract' : currentView === 'delegation' ? ('Ask ' + (delegationInfo.label || 'Delegation Model')) : 'Skills'}
              </div>
              <div className="header-controls">
                <ThemeMenu currentTheme={currentTheme} setCurrentTheme={setCurrentTheme} />
                <div className="toolbar-pill">
                  <button className={"header-btn " + (showSearchModal ? 'active' : '')} onClick={openSearchModal} title="Search (⌘K)"><Icon name="search"/></button>
                  <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings"><Icon name="settings"/></button>
                </div>
              </div>
            </div>
            {currentView === 'dashboard' && <DashboardView />}
            {currentView === 'files' && <FilesView activeWorkspace={activeWorkspace} />}
            {currentView === 'spaces' && <SpacesView workspaces={workspaces} activeWorkspace={activeWorkspace} onSwitch={switchWorkspace} onRefresh={refreshWorkspaces} />}
            {currentView === 'terminal' && <TerminalView />}
            {currentView === 'jobs' && <JobsView />}
            {currentView === 'memory' && <MemoryView />}
            {currentView === 'skills' && <SkillsView />}
            {currentView === 'web-extract' && <WebExtractView info={webExtractInfo} />}
            {currentView === 'delegation' && <DelegationChatView />}
          </React.Fragment>
        )}
      </div>

      {/* Right column: Session activity */}
      <div className={"right-column" + (artifactPanelWide ? ' wide' : '') + (rightColumnOpen ? '' : ' closed')} style={rightColumnStyle}>
        {isDesktopLayout && rightColumnOpen && showTerminal && (
          <div
            className={"layout-resize-handle right-column-resize-handle " + (resizingLayout === 'right' ? 'active' : '')}
            onPointerDown={function(e) {
              e.preventDefault();
              setResizingLayout('right');
            }}
            title="Resize right panel"
          />
        )}
	        {showTodosPanel && (
		          <SessionTodosPanel
		            todos={sessionTodos}
		            onClose={function() {
		              resetTodosForConversation(activeConvId, todoSourceUserId);
		            }}
	            sidePanel={true}
	          />
        )}
        <TerminalPanel isOpen={showTerminal} onClose={function(){setShowTerminal(false); setArtifactPanelWide(false);}} onClear={function(){ setLocalLogs([]); }} localLogs={localLogs} artifacts={artifacts} onArtifactTab={function(isWide){ setArtifactPanelWide(isWide); if(isWide && !showTerminal) setShowTerminal(true); if(isWide) setRightColumnWidth(function(w){ return Math.max(w, 560); }); }} onAddArtifact={function(art){ setArtifacts(function(prev){ return prev.concat([art]); }); }} onRemoveArtifact={function(idx){ setArtifacts(function(prev){ return prev.filter(function(_,i){ return i !== idx; }); }); }} />
      </div>

      {/* Modals */}
      {showSettings && <SettingsModal config={config} onSave={setConfig} onClose={() => setShowSettings(false)} mcpToolCount={mcpTools.length} />}
      {lightboxSrc && <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />}
      {showMCPBrowser && <MCPBrowserModal tools={mcpTools} webExtractInfo={webExtractInfo} onClose={() => setShowMCPBrowser(false)} />}
      {showShortcuts && <ShortcutsModal onClose={function(){ setShowShortcuts(false); }} />}
      <SearchModal open={showSearchModal} onClose={function(){ setShowSearchModal(false); }} conversations={conversations} onSelectConversation={function(id, options){ selectConversation(id, options); }} />
      {showWelcome && <WelcomePopup onClose={function(){ setShowWelcome(false); try { localStorage.setItem('hermes-ui-welcomed', '1'); } catch(e){} }} onOpenRemoteSetup={function(){ setShowSettings(true); }} />}

    </div>
    {/* Status Bar */}
    <StatusBar connected={connected} conversations={conversations} messages={messages} sessionTokens={sessionTokens} />

    {/* Mobile Bottom Navigation */}
    <div className="mobile-bottom-nav">
      {[
        { view: 'dashboard', icon: '📊', label: 'Home' },
        { view: 'chat', icon: '💬', label: 'Chat' },
        { view: 'skills', icon: '✨', label: 'Skills' },
        { view: 'memory', icon: '🧠', label: 'Memory' },
        { view: 'terminal', icon: '⚡', label: 'More' },
      ].map(function(item) {
        return (
          <button key={item.view} className={"mobile-nav-item " + (currentView === item.view ? 'active' : '')}
            onClick={function() { setCurrentView(item.view); setSidebarCollapsed(true); }}>
            <span className="mobile-nav-icon">{item.icon}</span>
            <span className="mobile-nav-label">{item.label}</span>
          </button>
        );
      })}
    </div>
    </div>
  );
}

function AuthGate({ children }) {
  const [checking, setChecking] = useState(true);
  const [requiresAuth, setRequiresAuth] = useState(false);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [busy, setBusy] = useState(false);

  useEffect(function() {
    fetch(API_BASE + '/api/auth/status')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        setRequiresAuth(!!(data.enabled && !data.authenticated));
        setChecking(false);
      })
      .catch(function() {
        setRequiresAuth(false);
        setChecking(false);
      });
  }, []);

  function submitLogin(e) {
    e.preventDefault();
    setBusy(true);
    setError('');
    fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: password })
    })
      .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
      .then(function(result) {
        if (result.ok && result.data.authenticated) {
          setRequiresAuth(false);
          setPassword('');
        } else {
          setError((result.data && result.data.error) || 'Could not sign in');
        }
        setBusy(false);
      })
      .catch(function() {
        setError('Could not reach Hermes UI');
        setBusy(false);
      });
  }

  if (checking) {
    return <div className="auth-gate"><div className="auth-card"><div className="auth-title">Hermes UI</div><div className="auth-copy">Checking access...</div></div></div>;
  }
  if (!requiresAuth) return children;
  return (
    <div className="auth-gate">
      <form className="auth-card" onSubmit={submitLogin}>
        <div className="auth-title">Hermes UI</div>
        <div className="auth-copy">This computer has password protection turned on. Enter the local Hermes UI password to continue.</div>
        <input className="modal-input" type="password" value={password} autoFocus placeholder="Password"
          onChange={function(e) { setPassword(e.target.value); }} />
        {error && <div className="auth-error">{error}</div>}
        <div className="modal-buttons">
          <button className="modal-btn primary" type="submit" disabled={busy || !password}>{busy ? 'Opening...' : 'Open Hermes'}</button>
        </div>
      </form>
    </div>
  );
}

/* ── Error Boundary ── */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:'40px',color:'#e05555',fontFamily:'monospace',background:'#0a0a0f',minHeight:'100vh'}}>
          <h2>Something went wrong</h2>
          <pre style={{whiteSpace:'pre-wrap',color:'#8888a0'}}>{this.state.error.message}{'\n'}{this.state.error.stack}</pre>
          <button onClick={() => { this.setState({error:null}); location.reload(); }} style={{marginTop:'20px',padding:'10px 20px',background:'#7c6fe0',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}}>Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><AuthGate><App /></AuthGate></ErrorBoundary>);
</script>
</body>
