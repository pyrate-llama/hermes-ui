/* ── Delegation Direct-Chat View ──
   Talks straight to the configured delegation model (whatever that is —
   Qwen, DeepSeek, GPT-4o, etc.) without going through the main MiniMax
   agent loop. Cheap, fast, useful when you want a second-opinion chat
   with no tool-discovery or base-system-prompt token overhead.
*/
function DelegationChatView() {
  var [messages, setMessages] = useState([]);
  var [input, setInput] = useState('');
  var [sending, setSending] = useState(false);
  var [info, setInfo] = useState({ configured: null, model: '', label: '', provider: '' });
  var bodyRef = useRef(null);
  var inputRef = useRef(null);

  useEffect(function() {
    fetch(API_BASE + '/api/delegation/info')
      .then(function(r) { return r.json(); })
      .then(function(d) { setInfo(d || {}); })
      .catch(function() { setInfo({ configured: false }); });
  }, []);

  useEffect(function() {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, sending]);

  useEffect(function() {
    setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 50);
  }, []);

  var send = async function() {
    var text = (input || '').trim();
    if (!text || sending) return;
    var userMsg = { role: 'user', content: text };
    var next = messages.concat([userMsg]);
    setMessages(next);
    setInput('');
    setSending(true);
    try {
      var resp = await fetch(API_BASE + '/api/delegation/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: next })
      });
      var data = await resp.json();
      if (data.error) {
        setMessages(next.concat([{ role: 'assistant', content: '⚠️ ' + data.error, error: true }]));
      } else {
        setMessages(next.concat([{ role: 'assistant', content: data.reply || '(empty response)' }]));
      }
    } catch (e) {
      setMessages(next.concat([{ role: 'assistant', content: '⚠️ Request failed: ' + e.message, error: true }]));
    } finally {
      setSending(false);
    }
  };

  var onKeyDown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  };

  var clearChat = function() {
    if (messages.length === 0) return;
    if (window.confirm('Clear this conversation? (Delegation chats are not saved.)')) {
      setMessages([]);
    }
  };

  if (info.configured === false) {
    return (
      <div style={{padding:'32px', maxWidth:'640px', margin:'0 auto', color:'var(--text-secondary)'}}>
        <h2 style={{color:'var(--text)', marginBottom:'12px'}}>Delegation model not configured</h2>
        <p style={{lineHeight:'1.6'}}>
          This view lets you chat directly with whatever model is set as your
          delegation target in <code>~/.hermes/config.yaml</code>, bypassing
          the main agent loop. Add a <code>delegation</code> block like:
        </p>
        <pre style={{background:'var(--bg-secondary)', padding:'12px', borderRadius:'6px', fontSize:'12px', marginTop:'12px'}}>{
`delegation:
  model: qwen/qwen3.6-plus
  provider: openrouter
  base_url: ''
  api_key: ''`
        }</pre>
        <p style={{marginTop:'12px', fontSize:'13px'}}>
          Restart the server after editing. Then refresh this page.
        </p>
      </div>
    );
  }

  var label = info.label || info.model || 'delegation model';

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', padding:'0'}}>
      <div style={{padding:'12px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0}}>
        <div style={{fontSize:'13px', color:'var(--text-secondary)'}}>
          Talking directly to <strong style={{color:'var(--text)'}}>{label}</strong>
          {info.provider && <span style={{opacity:0.6, marginLeft:'8px'}}>via {info.provider}</span>}
          <span style={{marginLeft:'12px', opacity:0.5}}>· no tools, no system prompt, no session</span>
        </div>
        <button onClick={clearChat} disabled={messages.length === 0}
          style={{background:'transparent', border:'1px solid var(--border)', color:'var(--text-secondary)', padding:'4px 10px', borderRadius:'4px', fontSize:'12px', cursor: messages.length === 0 ? 'default' : 'pointer', opacity: messages.length === 0 ? 0.4 : 1}}>
          Clear
        </button>
      </div>

      <div ref={bodyRef} style={{flex:1, overflowY:'auto', padding:'20px'}}>
        {messages.length === 0 && !sending && (
          <div style={{textAlign:'center', color:'var(--text-secondary)', opacity:0.6, marginTop:'60px', fontSize:'14px'}}>
            Ask {label} anything. You're the orchestrator here.
          </div>
        )}
        {messages.map(function(m, i) {
          return (
            <div key={i} style={{marginBottom:'16px', display:'flex', flexDirection:'column', alignItems: m.role === 'user' ? 'flex-end' : 'flex-start'}}>
              <div style={{fontSize:'11px', color:'var(--text-secondary)', marginBottom:'4px', opacity:0.7}}>
                {m.role === 'user' ? 'You' : label}
              </div>
              <div style={{
                maxWidth:'80%',
                padding:'10px 14px',
                borderRadius:'10px',
                background: m.role === 'user' ? 'var(--accent-bg, rgba(120,140,200,0.15))' : (m.error ? 'rgba(220,80,80,0.1)' : 'var(--bg-secondary)'),
                color: m.error ? '#e89090' : 'var(--text)',
                whiteSpace:'pre-wrap', wordBreak:'break-word', fontSize:'14px', lineHeight:'1.5'
              }}>
                {m.content}
              </div>
            </div>
          );
        })}
        {sending && (
          <div style={{fontSize:'12px', color:'var(--text-secondary)', opacity:0.7, marginTop:'8px'}}>
            {label} is thinking…
          </div>
        )}
      </div>

      <div style={{padding:'12px 20px', borderTop:'1px solid var(--border)', flexShrink:0}}>
        <div style={{display:'flex', gap:'8px'}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={function(e) { setInput(e.target.value); }}
            onKeyDown={onKeyDown}
            placeholder={'Message ' + label + '… (Enter to send, Shift+Enter for newline)'}
            disabled={sending}
            rows={2}
            style={{flex:1, resize:'none', background:'var(--bg-secondary)', border:'1px solid var(--border)', color:'var(--text)', padding:'10px 12px', borderRadius:'6px', fontSize:'14px', fontFamily:'inherit'}}
          />
          <button onClick={send} disabled={sending || !input.trim()}
            style={{padding:'0 18px', background:'var(--accent, #6fb3c2)', color:'white', border:'none', borderRadius:'6px', fontWeight:'600', cursor: (sending || !input.trim()) ? 'default' : 'pointer', opacity: (sending || !input.trim()) ? 0.5 : 1}}>
            {sending ? '…' : 'Send'}
          </button>
        </div>
      </div>
    </div>
  );
}

function StatusBar({ connected, conversations, messages, sessionTokens }) {
  var [stats, setStats] = useState({ model: '...', provider: '', capabilities: null, memory: 0, uptime: '' });
  var [feedbackOpen, setFeedbackOpen] = useState(false);
  var feedbackRef = useRef(null);
  // Derive sessions count reactively from props so it stays in sync as chats load.
  // (Previous version captured conversations in a stale closure inside useEffect[].)
  var sessionsCount = conversations ? conversations.length : 0;
  var contextPressure = getContextPressure(messages, sessionTokens);

  useEffect(function() {
    var fetchStats = async function() {
      try {
        var [memR, healthR] = await Promise.all([
          fetch(API_BASE + '/api/memory').catch(function() { return null; }),
          fetch(API_BASE + '/health').catch(function() { return null; })
        ]);
        var memCount = 0, model = '...', provider = '', capabilities = null, uptime = '';
        if (memR && memR.ok) {
          var md = await memR.json();
          // Entries can come as a flat list OR as a single string per target
          // containing multiple entries separated by '§'. Count the real chunks.
          var countEntries = function(arr) {
            var n = 0;
            for (var i = 0; i < arr.length; i++) {
              var v = arr[i];
              if (typeof v === 'string') {
                var pieces = v.split('§').map(function(x){ return x.trim(); }).filter(function(x){ return x.length > 0; });
                n += pieces.length || 1;
              } else {
                n += 1;
              }
            }
            return n;
          };
          if (md.targets) { for (var t = 0; t < md.targets.length; t++) { memCount += countEntries(md.targets[t].entries || []); } }
          else { memCount = countEntries(md.memories || md.items || []); }
        }
        if (healthR && healthR.ok) {
          var hd = await healthR.json();
          model = hd.model || hd.default_model || model;
          provider = hd.provider || '';
          capabilities = hd.capabilities || null;
          if (hd.uptime) { var hrs = Math.floor(hd.uptime / 3600); var mins = Math.floor((hd.uptime % 3600) / 60); uptime = hrs + 'h ' + mins + 'm'; }
        }
        setStats({ model: model, provider: provider, capabilities: capabilities, memory: memCount, uptime: uptime });
      } catch(e) {}
    };
    fetchStats();
    var iv = setInterval(fetchStats, 30000);
    return function() { clearInterval(iv); };
  }, []);

  useEffect(function() {
    if (!feedbackOpen) return;
    var closeOnOutsidePointer = function(e) {
      if (feedbackRef.current && feedbackRef.current.contains(e.target)) return;
      setFeedbackOpen(false);
    };
    var closeOnEscape = function(e) {
      if (e.key === 'Escape') setFeedbackOpen(false);
    };
    document.addEventListener('pointerdown', closeOnOutsidePointer, true);
    document.addEventListener('keydown', closeOnEscape);
    return function() {
      document.removeEventListener('pointerdown', closeOnOutsidePointer, true);
      document.removeEventListener('keydown', closeOnEscape);
    };
  }, [feedbackOpen]);

  return (
    <div className="status-bar">
      <div className="status-bar-item">
        <div className={connected === false ? 'status-dot-dead' : 'status-dot-live'}></div>
        <span>{connected === false ? 'Offline' : 'Connected'}</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Memory entries">
        <span>{'💾'}</span> <span>{stats.memory} memories</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Total sessions">
        <span>{'💬'}</span> <span>{sessionsCount} sessions</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className={'status-bar-item context-meter ' + contextPressure.level} title={contextPressure.title}>
        <Icon name="activity" size={13}/>
        <span className="context-meter-label">Context {contextPressure.label}</span>
        <span className="context-meter-track" aria-hidden="true">
          <span className="context-meter-fill" style={{width: Math.max(3, contextPressure.percent) + '%'}}></span>
        </span>
      </div>
      {stats.uptime && (
        <React.Fragment>
          <div className="status-bar-sep"></div>
          <div className="status-bar-item" title="Uptime">
            <span>{'⏱'}</span> <span>{stats.uptime}</span>
          </div>
        </React.Fragment>
      )}
      <div style={{flex:1}}></div>
      <div className="status-bar-item" style={{position:'relative'}} ref={feedbackRef}>
        <button
          className={"composer-chip status-icon-btn " + (feedbackOpen ? 'active' : '')}
          onClick={function(){ setFeedbackOpen(!feedbackOpen); }}
          aria-label="Report a bug or request a feature on GitHub"
          style={{height:'22px', fontSize:'11px'}}
        >
          <Icon name="message-square" size={12}/>
        </button>
        {feedbackOpen && (
          <div className="feedback-menu">
              <div className="composer-chip-menu-title">
                <Icon name="message-square" size={13}/>
                <span>GitHub feedback</span>
              </div>
              <div className="composer-chip-menu-note">
                Opens the Hermes UI issue tracker in a new tab.
              </div>
              <a
                className="feedback-link"
                href="https://github.com/pyrate-llama/hermes-ui/issues/new?template=bug_report.md&labels=bug"
                target="_blank"
                rel="noopener noreferrer"
                onClick={function(){ setFeedbackOpen(false); }}
              >
                <span>Report a bug</span>
                <span>↗</span>
              </a>
              <a
                className="feedback-link"
                href="https://github.com/pyrate-llama/hermes-ui/issues/new?template=feature_request.md&labels=enhancement"
                target="_blank"
                rel="noopener noreferrer"
                onClick={function(){ setFeedbackOpen(false); }}
              >
                <span>Request a feature</span>
                <span>↗</span>
              </a>
            </div>
        )}
      </div>
      <div className="status-bar-item status-bar-version" style={{opacity:0.5}}>
        <span>Hermes UI v3.1</span>
      </div>
    </div>
  );
}

function ThemeMenu({ currentTheme, setCurrentTheme }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({ top: 0, right: 0 });
  const wrapRef = useRef(null);
  const btnRef = useRef(null);
  const panelRef = useRef(null);

  const reposition = useCallback(function() {
    if (!btnRef.current) return;
    var r = btnRef.current.getBoundingClientRect();
    setPos({
      top: Math.round(r.bottom + 6),
      right: Math.round(window.innerWidth - r.right),
    });
  }, []);

  useEffect(function() {
    if (!open) return;
    reposition();
    function onDoc(e) {
      var t = e.target;
      var inBtn = wrapRef.current && wrapRef.current.contains(t);
      var inPanel = panelRef.current && panelRef.current.contains(t);
      if (!inBtn && !inPanel) setOpen(false);
    }
    function onEsc(e) { if (e.key === 'Escape') setOpen(false); }
    function onResize() { reposition(); }
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onEsc);
    window.addEventListener('resize', onResize);
    window.addEventListener('scroll', onResize, true);
    return function() {
      document.removeEventListener('mousedown', onDoc);
      document.removeEventListener('keydown', onEsc);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('scroll', onResize, true);
    };
  }, [open, reposition]);

  return (
    <div className="theme-menu" ref={wrapRef}>
      <button
        ref={btnRef}
        type="button"
        className={"theme-menu-btn " + (open ? 'open' : '')}
        onClick={function() { setOpen(function(v) { return !v; }); }}
        title="Theme"
        aria-label="Theme"
        aria-haspopup="menu"
        aria-expanded={open}
      >
        <Icon name="palette" size={16}/>
      </button>
      {open && ReactDOM.createPortal(
        <div
          className="theme-menu-panel"
          role="menu"
          ref={panelRef}
          style={{ top: pos.top + 'px', right: pos.right + 'px' }}
        >
          {Object.entries(THEMES).map(function([key, t]) {
            var active = currentTheme === key;
            return (
              <div
                key={key}
                role="menuitemradio"
                aria-checked={active}
                className={"theme-menu-item " + (active ? 'active' : '')}
                onClick={function() { setCurrentTheme(key); setOpen(false); }}
              >
                <span className={"theme-menu-item-swatch " + t.className}></span>
                <span className="theme-menu-item-label">{t.label}</span>
                <span className="theme-menu-item-check"><Icon name="check" size={14}/></span>
              </div>
            );
          })}
        </div>,
        document.body
      )}
    </div>

}

// ── Search modal (nesq-style command palette) ──
const SEARCH_SCOPES = [
  { value: 'all',    label: 'All' },
  { value: 'chats',  label: 'Chats' },
  { value: 'messages', label: 'Messages' },
  { value: 'files',  label: 'Files',  disabled: true },
  { value: 'agents', label: 'Agents', disabled: true },
  { value: 'skills', label: 'Skills', disabled: true },
  { value: 'actions',label: 'Actions',disabled: true },
];

function searchMessageText(content) {
  if (content == null) return '';
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    return content.map(function(part) {
      if (typeof part === 'string') return part;
      if (!part || typeof part !== 'object') return '';
      if (typeof part.text === 'string') return part.text;
      if (typeof part.content === 'string') return part.content;
      if (part.type === 'image_url') return '[image]';
      return '';
    }).join(' ');
  }
  if (typeof content === 'object') {
    if (typeof content.text === 'string') return content.text;
    if (typeof content.content === 'string') return content.content;
  }
  return String(content || '');
}

function searchSnippet(text, query, maxLen) {
  var clean = String(text || '').replace(/\s+/g, ' ').trim();
  if (!clean) return '';
  var q = String(query || '').toLowerCase();
  var idx = clean.toLowerCase().indexOf(q);
  var limit = maxLen || 150;
  if (idx < 0) return clean.length > limit ? clean.slice(0, limit - 1) + '…' : clean;
  var start = Math.max(0, idx - Math.floor(limit / 3));
  var end = Math.min(clean.length, start + limit);
  if (end - start < limit) start = Math.max(0, end - limit);
  return (start > 0 ? '…' : '') + clean.slice(start, end) + (end < clean.length ? '…' : '');
}

function SearchModal({ open, onClose, conversations, onSelectConversation }) {
  const [query, setQuery] = useState('');
  const [debouncedQuery, setDebouncedQuery] = useState('');
  const [scope, setScope] = useState('all');
  const [selectedIndex, setSelectedIndex] = useState(0);
  const inputRef = useRef(null);
  const modalRef = useRef(null);

  // Debounce
  useEffect(function() {
    var t = window.setTimeout(function() { setDebouncedQuery(query); }, 180);
    return function() { window.clearTimeout(t); };
  }, [query]);

  // Focus on open, reset on close
  useEffect(function() {
    if (!open) { setQuery(''); setDebouncedQuery(''); setScope('all'); setSelectedIndex(0); return; }
    var raf = window.requestAnimationFrame(function() {
      if (inputRef.current) { inputRef.current.focus(); inputRef.current.select(); }
    });
    return function() { window.cancelAnimationFrame(raf); };
  }, [open]);

  // Build result list
  var results = useMemo(function() {
    var q = (debouncedQuery || '').trim().toLowerCase();
    if (!q) return [];
    var items = [];
    if (scope === 'all' || scope === 'chats') {
      var matches = (conversations || []).filter(function(c) {
        var hay = ((c.title || '') + ' ' + (c.id || '')).toLowerCase();
        return hay.indexOf(q) !== -1;
      }).slice(0, scope === 'all' ? 15 : 40);
      for (var i = 0; i < matches.length; i++) {
        var c = matches[i];
        items.push({
          id: c.id,
          scope: 'chats',
          iconName: 'message-square',
          title: c.title || 'Untitled',
          snippet: (c.message_count ? (c.message_count + ' msgs') : '') + (c.created ? ' · ' + c.created : ''),
          meta: c.source === 'telegram' ? 'Telegram' : 'Chat',
          onSelect: function(conv) { return function() { onSelectConversation(conv.id); onClose(); }; }(c),
        });
      }
    }
    if (scope === 'all' || scope === 'messages') {
      var resultCount = 0;
      var maxResults = scope === 'all' ? 45 : 80;
      for (var ci = 0; ci < (conversations || []).length; ci++) {
        if (resultCount >= maxResults) break;
        var conv = conversations[ci];
        var msgs = conv.messages || [];
        for (var mi = 0; mi < msgs.length; mi++) {
          if (resultCount >= maxResults) break;
          var msg = msgs[mi] || {};
          if (!msg.role || msg.role === 'compaction') continue;
          var text = searchMessageText(msg.content);
          if (!text || text.toLowerCase().indexOf(q) === -1) continue;
          var roleLabel = msg.role === 'user' ? 'You' : msg.role === 'assistant' ? 'Hermes' : msg.role;
          resultCount++;
          items.push({
            id: conv.id + '-' + mi,
            scope: 'messages',
            iconName: msg.role === 'user' ? 'mail' : 'message-square',
            title: (conv.title || 'Untitled') + ' · ' + roleLabel,
            snippet: searchSnippet(text, q, 170),
            meta: 'Message',
            onSelect: function(sessionId, messageIndex) {
              return function() {
                onSelectConversation(sessionId, { messageIndex: messageIndex });
                onClose();
              };
            }(conv.id, mi),
          });
        }
      }
    }
    return items;
  }, [debouncedQuery, scope, conversations]);

  useEffect(function() { setSelectedIndex(0); }, [debouncedQuery, scope]);

  // Keyboard navigation
  useEffect(function() {
    if (!open) return;
    function onKey(e) {
      if (e.key === 'Escape') { e.preventDefault(); onClose(); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIndex(function(i) { return Math.min(results.length - 1, i + 1); }); return; }
      if (e.key === 'ArrowUp')   { e.preventDefault(); setSelectedIndex(function(i) { return Math.max(0, i - 1); }); return; }
      if (e.key === 'Enter') {
        if (results.length === 0) return;
        e.preventDefault();
        var item = results[selectedIndex];
        if (item) item.onSelect();
        return;
      }
      if (e.key === 'Tab' && !e.shiftKey) {
        var enabled = SEARCH_SCOPES.filter(function(s) { return !s.disabled; });
        var idx = enabled.findIndex(function(s) { return s.value === scope; });
        var next = enabled[(idx + 1) % enabled.length];
        if (next) { e.preventDefault(); setScope(next.value); }
      }
    }
    window.addEventListener('keydown', onKey);
    return function() { window.removeEventListener('keydown', onKey); };
  }, [open, results, selectedIndex, scope, onClose]);

  if (!open) return null;
  return ReactDOM.createPortal(
    <div className="search-modal-overlay" onMouseDown={function(e) { if (e.target === e.currentTarget) onClose(); }}>
      <div className="search-modal" ref={modalRef} role="dialog" aria-label="Search">
        <div className="search-modal-top">
          <div className="search-modal-input-row">
            <Icon name="search" size={16}/>
            <input
              ref={inputRef}
              type="text"
              className="search-modal-input"
              placeholder="Search chats and messages..."
              value={query}
              onChange={function(e) { setQuery(e.target.value); }}
              autoFocus
            />
            {query && (<button type="button" className="search-modal-clear" onClick={function() { setQuery(''); if (inputRef.current) inputRef.current.focus(); }}>Clear</button>)}
          </div>
          <div className="search-modal-scopes">
            {SEARCH_SCOPES.map(function(s) {
              var active = scope === s.value;
              return (
                <button
                  key={s.value}
                  type="button"
                  className={"search-modal-scope " + (active ? 'active ' : '') + (s.disabled ? 'disabled' : '')}
                  onClick={function() { if (!s.disabled) setScope(s.value); }}
                  disabled={s.disabled}
                  title={s.disabled ? 'Coming soon' : ''}
                >{s.label}</button>
              );
            })}
          </div>
        </div>
        <div className="search-modal-body">
          {(!debouncedQuery.trim()) ? (
            <div>
              <div className="search-modal-hint-label">Tips</div>
              <div className="search-modal-empty">Start typing to search across your chats. Use <span className="search-modal-kbd">↑</span><span className="search-modal-kbd">↓</span> to navigate, <span className="search-modal-kbd">↵</span> to open, <span className="search-modal-kbd">Tab</span> to switch scope.</div>
            </div>
          ) : results.length === 0 ? (
            <div className="search-modal-empty">No results for "{debouncedQuery}"</div>
          ) : (
            results.map(function(r, i) {
              return (
                <div
                  key={r.scope + '-' + r.id + '-' + i}
                  className={"search-modal-item " + (i === selectedIndex ? 'selected' : '')}
                  onMouseEnter={function() { setSelectedIndex(i); }}
                  onMouseDown={function(e) { e.preventDefault(); r.onSelect(); }}
                >
                  <div className="search-modal-item-icon"><Icon name={r.iconName} size={16}/></div>
                  <div className="search-modal-item-text">
                    <div className="search-modal-item-title">{r.title}</div>
                    {r.snippet && <div className="search-modal-item-snippet">{r.snippet}</div>}
                  </div>
                  {r.meta && <div className="search-modal-item-meta">{r.meta}</div>}
                </div>
              );
            })
          )}
        </div>
        <div className="search-modal-footer">
          <div>{results.length > 0 ? (results.length + ' result' + (results.length === 1 ? '' : 's')) : ''}</div>
          <div className="search-modal-footer-keys">
            <span><span className="search-modal-kbd">↑↓</span>navigate</span>
            <span><span className="search-modal-kbd">↵</span>open</span>
            <span><span className="search-modal-kbd">Tab</span>scope</span>
            <span><span className="search-modal-kbd">Esc</span>close</span>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

function App() {
  const [currentView, setCurrentView] = useState('chat');
  const [config, setConfig] = useState(() => {
    try {
      const saved = localStorage.getItem('hermes-config');
      return normalizeHermesConfig(saved ? JSON.parse(saved) : null);
    } catch(e) {
      return defaultConfig();
    }
  });

  const [conversations, _setConversations] = useState([]);
  const [showArchivedConversations, setShowArchivedConversations] = useState(false);
  const [workspaces, setWorkspaces] = useState(function() {
    try { return normalizeWorkspaceList(JSON.parse(localStorage.getItem('hermes-workspaces') || '[]'), ''); }
    catch(e) { return []; }
  });
  const [activeWorkspacePath, setActiveWorkspacePath] = useState(function() {
    try { return localStorage.getItem('hermes-active-workspace') || ''; }
    catch(e) { return ''; }
  });
  const activeWorkspace = workspaces.find(function(w) { return w.path === activeWorkspacePath; }) || workspaces[0] || { name: 'Default', path: activeWorkspacePath || '' };
  const setConversations = (val) => {
    if (typeof val === 'function') {
      _setConversations(prev => { const next = val(prev); conversationsRef.current = next; return next; });
    } else {
      conversationsRef.current = val;
      _setConversations(val);
    }
  };
  const [activeConvId, _setActiveConvId] = useState(() => {
    var saved = null;
    try { saved = localStorage.getItem('hermes-active-session') || null; } catch(e) {}
    return saved;
  });
  const setActiveConvId = (id) => {
    _setActiveConvId(id);
    activeConvRef.current = id;
    try { if (id) localStorage.setItem('hermes-active-session', id); else localStorage.removeItem('hermes-active-session'); } catch(e) {}
  };
  const [messages, _setMessages] = useState([]);
  const setMessages = (val) => {
    if (typeof val === 'function') {
      _setMessages(prev => { const next = val(prev); messagesRef.current = next; return next; });
    } else {
      messagesRef.current = val;
      _setMessages(val);
    }
  };

  // Helper: update messages for a specific session, even if the user has switched away.
  // If the session is still active, updates messages state (fast, visible immediately).
  // If the user switched to a different chat, writes to the conversations array instead
  // so the data is preserved and visible when they switch back.
  const updateStreamMessages = (sessionId, updater) => {
    var isActiveSession = activeConvRef.current === sessionId;
    var nowIso = new Date().toISOString();
    if (activeConvRef.current === sessionId) {
      // Still viewing this conversation — update messages state normally
      setMessages(updater);
    }
    // Always persist to conversations array so switching back loads the latest
    setConversations(prev =>
      prev.map(c => {
        if (c.id !== sessionId) return c;
        const updated = updater(c.messages || []);
        const userMsgs = updated.filter(m => m.role === 'user').length;
        const tcCount = updated.reduce((sum, m) => sum + (m.toolCalls ? m.toolCalls.length : 0), 0);
        return {
          ...c,
          messages: updated,
          message_count: updated.length,
          user_prompt_count: userMsgs,
          tool_call_count: tcCount,
          last_active_at: nowIso,
          unread_count: isActiveSession ? 0 : (c.unread_count || 1),
        };
      })
    );
  };

  const [input, setInput] = useState('');

  const applyWorkspaceList = function(items, lastPath) {
    var list = normalizeWorkspaceList(items, lastPath || activeWorkspacePath);
    var nextPath = lastPath || activeWorkspacePath || (list[0] && list[0].path) || '';
    if (list.length && !list.some(function(w) { return w.path === nextPath; })) {
      nextPath = list[0].path;
    }
    setWorkspaces(list);
    setActiveWorkspacePath(nextPath);
    try {
      localStorage.setItem('hermes-workspaces', JSON.stringify(list));
      if (nextPath) localStorage.setItem('hermes-active-workspace', nextPath);
      else localStorage.removeItem('hermes-active-workspace');
    } catch(e) {}
  };

  const refreshWorkspaces = function(items, lastPath) {
    applyWorkspaceList(items, lastPath);
  };

  const switchWorkspace = function(path, options) {
    var cleanPath = String(path || '').trim();
    var opts = options || {};
    setActiveWorkspacePath(cleanPath);
    try {
      if (cleanPath) localStorage.setItem('hermes-active-workspace', cleanPath);
      else localStorage.removeItem('hermes-active-workspace');
    } catch(e) {}
    if (!opts.skipConversationUpdate && activeConvRef.current) {
      var sessionId = activeConvRef.current;
      setConversations(function(prev) {
        return prev.map(function(c) { return c.id === sessionId ? Object.assign({}, c, { workspace: cleanPath }) : c; });
      });
    }
    if (cleanPath) {
      try {
        fetch(API_BASE + '/api/workspaces/switch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: cleanPath }),
        }).then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) { if (data && data.workspaces) applyWorkspaceList(data.workspaces, data.last || cleanPath); })
          .catch(function() {});
      } catch(e) {}
    }
  };

  useEffect(function() {
    fetch(API_BASE + '/api/workspaces')
      .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)); })
      .then(function(data) { applyWorkspaceList(data.workspaces, data.last); })
      .catch(function() {
        if (!workspaces.length) applyWorkspaceList([], activeWorkspacePath);
      });
  }, []);

  // Per-conversation streaming state: Map<sessionId, { abortController, paused }>
  const streamingMap = useRef({});
  const [streamingSessionIds, setStreamingSessionIds] = useState([]);
  // Derived: is the CURRENT conversation streaming/paused?
  // We OR two signals because streamingSessionIds can desync from reality in edge cases
  // (SSE reconnect paths, session-id rotation timing, browser tab-visibility buffering).
  // The message-level flags (.streaming / .thinking on the last assistant msg) are the
  // most faithful "is content still arriving" signal, so we fall back to them.
  const _lastMsg = messages.length > 0 ? messages[messages.length - 1] : null;
  const _lastMsgActive = !!(_lastMsg && _lastMsg.role === 'assistant' && (_lastMsg.streaming || _lastMsg.thinking));
  const isStreaming = streamingSessionIds.includes(activeConvId) || _lastMsgActive;
  const [agentStateBySession, setAgentStateBySession] = useState({});
  const agentStateTimersRef = useRef({});
  const setAgentStateForSession = (sessionId, status, ttlMs) => {
    if (!sessionId) return;
    var next = makeAgentState(status && status.kind, status && status.label, status && status.detail);
    if (agentStateTimersRef.current[sessionId]) {
      clearTimeout(agentStateTimersRef.current[sessionId]);
      delete agentStateTimersRef.current[sessionId];
    }
    setAgentStateBySession(function(prev) {
      return Object.assign({}, prev, { [sessionId]: next });
    });
    if (ttlMs) {
      agentStateTimersRef.current[sessionId] = setTimeout(function() {
        setAgentStateBySession(function(prev) {
          if (!prev[sessionId]) return prev;
          var copy = Object.assign({}, prev);
          delete copy[sessionId];
          return copy;
        });
        delete agentStateTimersRef.current[sessionId];
      }, ttlMs);
    }
  };
  const clearAgentStateForSession = (sessionId, delayMs) => {
    if (!sessionId) return;
    if (agentStateTimersRef.current[sessionId]) clearTimeout(agentStateTimersRef.current[sessionId]);
    agentStateTimersRef.current[sessionId] = setTimeout(function() {
      setAgentStateBySession(function(prev) {
        if (!prev[sessionId]) return prev;
        var copy = Object.assign({}, prev);
        delete copy[sessionId];
        return copy;
      });
      delete agentStateTimersRef.current[sessionId];
    }, delayMs || 0);
  };
  // isPaused is now derived from pausedSessionIds (defined later with pause/stop functions)

  const startStreaming = (sessionId, abortCtrl) => {
    streamingMap.current[sessionId] = { abortController: abortCtrl, paused: false, streamId: null };
    setStreamingSessionIds(prev => prev.includes(sessionId) ? prev : [...prev, sessionId]);
    setAgentStateForSession(sessionId, { kind: 'thinking', label: 'Thinking', detail: 'Starting turn' });
  };
  // Attach backend stream_id to the per-session streaming entry so Stop/Pause
  // can call /api/chat/cancel directly (mirrors nesq cancelStream() pattern).
  // Without this, cancel relied on the EventSource abort listener firing —
  // which is racy: if the abort arrives before the listener attaches, or the
  // stream has already closed, the backend agent keeps running tools to
  // completion. Nesq's webui calls the cancel endpoint from the stop button
  // directly and doesn't depend on the abort listener.
  const attachStreamId = (sessionId, streamId) => {
    var entry = streamingMap.current[sessionId];
    if (entry) entry.streamId = streamId;
  };
  const stopStreaming = (sessionId) => {
    delete streamingMap.current[sessionId];
    setStreamingSessionIds(prev => prev.filter(id => id !== sessionId));
  };
  const getStreamAbort = (sessionId) => {
    return streamingMap.current[sessionId] && streamingMap.current[sessionId].abortController;
  };
  const [connected, setConnected] = useState(null);
  // Active model name (from /health). Used by the composer to decide whether
  // to send pasted/dropped images via the native multimodal path (vision-
  // capable) or route through the Gemini-describe fallback (e.g. MiniMax).
  const [currentModel, setCurrentModel] = useState('');
  const [selectedChatModel, setSelectedChatModel] = useState(function() {

  });
  const [modelOptions, setModelOptions] = useState([]);
  const [showModelMenu, setShowModelMenu] = useState(false);
  const [customModelDraft, setCustomModelDraft] = useState('');
  const activeChatModel = selectedChatModel || currentModel;
  const [showSettings, setShowSettings] = useState(false);
  const [pendingImages, setPendingImages] = useState([]);
  const [pendingFiles, setPendingFiles] = useState([]);
  const [isDraggingFiles, setIsDraggingFiles] = useState(false);
  const fileInputRef2 = useRef(null);
  const [lightboxSrc, setLightboxSrc] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => window.innerWidth <= 768);
  const [isDesktopLayout, setIsDesktopLayout] = useState(() => window.innerWidth > 768);
  const [sidebarWidth, setSidebarWidth] = useState(() => readStoredNumber('hermes-sidebar-width', 280, 180, 440));
  const [rightColumnWidth, setRightColumnWidth] = useState(() => readStoredNumber('hermes-right-column-width', 320, 180, 680));
  const [resizingLayout, setResizingLayout] = useState(null);
  const wasDesktopLayoutRef = useRef(window.innerWidth > 768);
  const sidebarCollapsedBeforeMobileRef = useRef(sidebarCollapsed);
  // Auto-collapse sidebar when window shrinks below 768px. Without this the
  // CSS flips the sidebar into a fixed overlay (+ 50% dark backdrop) while
  // `sidebarCollapsed` stays false, so the chat gets hidden behind the open
  // sidebar on resize. Keeps chat visible at every window size.
  useEffect(function() {
    var onResize = function() {
      var desktop = window.innerWidth > 768;

      setIsDesktopLayout(desktop);

    onResize();
    window.addEventListener('resize', onResize);
    return function() { window.removeEventListener('resize', onResize); };
  }, [sidebarCollapsed]);
  useEffect(function() {
    try { localStorage.setItem('hermes-sidebar-width', String(sidebarWidth)); } catch(e) {}
  }, [sidebarWidth]);
  useEffect(function() {
    try { localStorage.setItem('hermes-right-column-width', String(rightColumnWidth)); } catch(e) {}

  useEffect(function() {

        setRightColumnWidth(clampNumber(window.innerWidth - e.clientX, 180, Math.max(180, maxRight)));
      }

    document.body.style.cursor = 'col-resize';

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);

      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      window.removeEventListener('pointermove', onMove);

  const [mcpTools, setMcpTools] = useState([]);
  const [webExtractInfo, setWebExtractInfo] = useState(null);
  // Delegation model info — drives the "Ask <Model>" nav item label
  const [delegationInfo, setDelegationInfo] = useState({ configured: null, label: '' });
