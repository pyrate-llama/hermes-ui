  var [searchTerm, setSearchTerm] = useState('');
  var [selectedFilePath, setSelectedFilePath] = useState(null);
  var [fileContent, setFileContent] = useState('');
  var [fileMetadata, setFileMetadata] = useState(null);
  var [fileType, setFileType] = useState('text'); // 'text', 'image', 'binary'
  var [loadingFile, setLoadingFile] = useState(false);
  var [isEditing, setIsEditing] = useState(false);
  var [editContent, setEditContent] = useState('');
  var [saving, setSaving] = useState(false);
  var [saveStatus, setSaveStatus] = useState(null);

  // Fetch root directory on mount
  useEffect(function() {
    setDirCache({});
    setExpandedDirs({});
    setSelectedFilePath(null);
    setFileContent('');
    setFileMetadata(null);
    fetchDir('', true);
  }, [activeWorkspace && activeWorkspace.path]);

  function fetchDir(path, force) {
    if (!force && dirCache[path]) return; // already cached
    setLoadingDirs(function(prev) { var n = Object.assign({}, prev); n[path] = true; return n; });
    fetch(API_BASE + '/browse?path=' + encodeURIComponent(path) + '&workspace=' + encodeURIComponent(activeWorkspace && activeWorkspace.path || ''))
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .then(function(data) {
        var raw = data.items || [];
        // /browse returns {name,type,size} only; synthesize item.path from parent
        var items = raw.map(function(it) {
          var childPath = path ? (path.replace(/\/+$/, '') + '/' + it.name) : it.name;
          return Object.assign({}, it, { path: it.path || childPath });
        });
        if (path === '') {
          setRootItems(items);
        }
        setDirCache(function(prev) { var n = Object.assign({}, prev); n[path] = items; return n; });
        setLoadingDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
      })
      .catch(function() {
        setDirCache(function(prev) { var n = Object.assign({}, prev); n[path] = []; return n; });
        setLoadingDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
      });
  }

  function toggleDir(path) {
    if (expandedDirs[path]) {
      setExpandedDirs(function(prev) { var n = Object.assign({}, prev); delete n[path]; return n; });
    } else {
      setExpandedDirs(function(prev) { var n = Object.assign({}, prev); n[path] = true; return n; });
      if (!dirCache[path]) fetchDir(path);
    }
  }

  function selectFile(path) {
    setSelectedFilePath(path);
    setLoadingFile(true);
    setIsEditing(false);
    setSaveStatus(null);
    fetch(API_BASE + '/readfile?path=' + encodeURIComponent(path) + '&workspace=' + encodeURIComponent(activeWorkspace && activeWorkspace.path || ''))
      .then(function(r) { return r.ok ? r.json() : { content: '(Could not load file)', name: path.split('/').pop(), path: path, size: 0, type: 'text' }; })
      .then(function(data) {
        setFileContent(data.content || '');
        setFileMetadata({ path: data.path, name: data.name, size: data.size });
        setFileType(data.type || 'text');
        setLoadingFile(false);
      })
      .catch(function() {
        setFileContent('(Error loading file)');
        setFileMetadata({ path: path, name: path.split('/').pop(), size: 0 });
        setFileType('text');
        setLoadingFile(false);
      });
  }

  function startEdit() {
    setEditContent(fileContent);
    setIsEditing(true);
    setSaveStatus(null);
  }

  function cancelEdit() {
    setIsEditing(false);
    setSaveStatus(null);
  }

  function saveFile() {
    if (!fileMetadata) return;
    setSaving(true);
    setSaveStatus(null);
    fetch(API_BASE + '/writefile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: fileMetadata.path, content: editContent, workspace: activeWorkspace && activeWorkspace.path || '' })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          setFileContent(editContent);
          setIsEditing(false);
          setSaveStatus('saved');
          setTimeout(function() { setSaveStatus(null); }, 2000);
        } else {
          setSaveStatus('error');
        }
        setSaving(false);
      })
      .catch(function() {
        setSaveStatus('error');
        setSaving(false);
      });
  }

  function refreshFiles() {
    setDirCache({});
    setRootItems([]);
    fetchDir('', true);
  }

  function fileParent(path) {
    var parts = String(path || '').split('/').filter(Boolean);
    parts.pop();
    return parts.join('/');
  }

  function runFileOp(endpoint, payload) {
    return fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ workspace: activeWorkspace && activeWorkspace.path || '' }, payload))
    }).then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok || data.ok === false) throw new Error(data.error || 'File action failed');
        return data;
      });
    });
  }

  function createFile() {
    var path = window.prompt('New file path inside this Space');
    if (!path) return;
    runFileOp('/api/files/create', { path: path, content: '' })
      .then(function(data) { refreshFiles(); selectFile(data.path || path); })
      .catch(function(e) { window.alert(e.message || e); });
  }

  function createFolder() {
    var path = window.prompt('New folder path inside this Space');
    if (!path) return;
    runFileOp('/api/files/mkdir', { path: path })
      .then(function() { refreshFiles(); })
      .catch(function(e) { window.alert(e.message || e); });
  }

  function renamePath(defaultPath) {
    var path = defaultPath || (fileMetadata && fileMetadata.path) || '';
    path = window.prompt('Path to rename inside this Space', path);
    if (!path) return;
    var nextPath = window.prompt('New path inside this Space', path);
    if (!nextPath || nextPath === path) return;
    runFileOp('/api/files/rename', { path: path, new_path: nextPath })
      .then(function(data) {
        refreshFiles();
        if (selectedFilePath === path) selectFile(data.path || nextPath);
      })
      .catch(function(e) { window.alert(e.message || e); });
  }

  function deletePath(defaultPath) {
    var path = defaultPath || (fileMetadata && fileMetadata.path) || '';
    path = window.prompt('Path to delete inside this Space', path);
    if (!path) return;
    if (!window.confirm('Delete "' + path + '" from this Space?')) return;
    runFileOp('/api/files/delete', { path: path })
      .then(function() {
        if (selectedFilePath === path) {
          setSelectedFilePath(null);
          setFileContent('');
          setFileMetadata(null);
          setIsEditing(false);
        }
        refreshFiles();
      })
      .catch(function(e) { window.alert(e.message || e); });
  }

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return bytes + ' B';
  }

  // Render a single file tree row + its children recursively
  function renderItem(item, depth) {
    var isDir = item.type === 'dir';
    var isExpanded = expandedDirs[item.path];
    var isLoading = loadingDirs[item.path];
    var isSelected = selectedFilePath === item.path;
    var children = dirCache[item.path] || [];

    return (
      <div key={item.path}>
        <div className={"file-item " + (isSelected ? 'active' : '')}
          style={{paddingLeft: (12 + depth * 20) + 'px'}}
          onClick={function() { if (isDir) toggleDir(item.path); else selectFile(item.path); }}>
          <span className="file-toggle" style={{width:'16px',display:'inline-block',textAlign:'center'}}>
            {isDir ? (isLoading ? '...' : isExpanded ? '▾' : '▸') : ''}
          </span>
          <span className="file-icon">{isDir ? '📁' : '📄'}</span>
          <span className="file-name">{item.name}</span>
          {item.size > 0 && !isDir && <span style={{fontSize:'10px',color:'var(--text-muted)',marginLeft:'auto'}}>{formatSize(item.size)}</span>}
        </div>
        {isDir && isExpanded && (
          children.length > 0 ? children.map(function(child) {
            return renderItem(child, depth + 1);
          }) : (
            isLoading ? null : <div style={{paddingLeft: (12 + (depth + 1) * 20) + 'px', fontSize:'12px',color:'var(--text-muted)',padding:'4px 0 4px ' + (12 + (depth + 1) * 20) + 'px'}}>(empty)</div>
          )
        )}
      </div>
    );
  }

  var displayItems = rootItems.filter(function(f) {
    if (!searchTerm) return true;
    return f.name.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1;
  });

  return (
    <div className="files-layout-mobile" style={{display:'flex',height:'100%',overflow:'hidden'}}>
      <div className="files-tree-panel-mobile" style={{width:'40%',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'16px',flex:1,overflowY:'auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
            <input type="text" placeholder="Search files..." value={searchTerm}
              onChange={function(e) { setSearchTerm(e.target.value); }}
              style={{flex:'1 1 160px',background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-primary)',fontSize:'13px',outline:'none'}} />
            <button onClick={createFile}
              style={{background:'var(--accent)',border:'none',borderRadius:'6px',padding:'6px 10px',color:'white',cursor:'pointer',fontSize:'12px',fontWeight:'700'}} title="Create file">File</button>
            <button onClick={createFolder}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}} title="Create folder">Folder</button>
            <button onClick={function() { renamePath(); }}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}} title="Rename any path">Rename</button>
            <button onClick={function() { deletePath(); }}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',color:'var(--danger)',cursor:'pointer',fontSize:'12px'}} title="Delete any path">Delete</button>
            <button onClick={refreshFiles}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'14px'}} title="Refresh">{'↻'}</button>
          </div>
          <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'10px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.5px'}}>
            {activeWorkspace && activeWorkspace.path ? shortWorkspacePath(activeWorkspace.path) : 'Server default'}
          </div>
          <div className="file-tree">
            {rootItems.length === 0 && !loadingDirs[''] ? (
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>No files found</div>
            ) : loadingDirs[''] ? (
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading...</div>
            ) : displayItems.map(function(item) {
              return renderItem(item, 0);
            })}
          </div>
        </div>
      </div>
      <div className="files-content-panel-mobile" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {selectedFilePath ? (
          <React.Fragment>
            <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
              <span style={{fontSize:'16px'}}>{fileType === 'image' ? '🖼' : '📄'}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'13px',fontWeight:'600',color:'var(--text-primary)'}}>{fileMetadata ? fileMetadata.name : ''}</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{(activeWorkspace && activeWorkspace.path ? shortWorkspacePath(activeWorkspace.path) : 'Server default') + '/' + (fileMetadata ? fileMetadata.path : '')}{fileMetadata && fileMetadata.size ? ' · ' + formatSize(fileMetadata.size) : ''}</div>
              </div>
              {fileType === 'text' && !isEditing && (
                <button onClick={startEdit}
                  style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Edit</button>
              )}
              {!isEditing && (
                <button onClick={function() { renamePath(fileMetadata && fileMetadata.path); }}
                  style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Rename</button>
              )}
              {!isEditing && (
                <button onClick={function() { deletePath(fileMetadata && fileMetadata.path); }}
                  style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--danger)',cursor:'pointer',fontSize:'12px'}}>Delete</button>
              )}
              {isEditing && (
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  {saveStatus === 'saved' && <span style={{fontSize:'11px',color:'var(--success)'}}>Saved!</span>}
                  {saveStatus === 'error' && <span style={{fontSize:'11px',color:'var(--danger)'}}>Error saving</span>}
                  <button onClick={saveFile} disabled={saving}
                    style={{background:'var(--accent)',border:'none',borderRadius:'6px',padding:'5px 12px',color:'white',cursor:saving ? 'not-allowed' : 'pointer',fontSize:'12px',fontWeight:'600',opacity:saving ? 0.6 : 1}}>{saving ? 'Saving...' : 'Save'}</button>
                  <button onClick={cancelEdit}
                    style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 12px',color:'var(--text-secondary)',cursor:'pointer',fontSize:'12px'}}>Cancel</button>
                </div>
              )}
            </div>
            <div style={{flex:1,overflow:'auto',background:'var(--bg-secondary)'}}>
              {loadingFile ? (
                <div style={{padding:'20px',color:'var(--text-muted)',fontSize:'13px'}}>Loading...</div>
              ) : fileType === 'image' ? (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',height:'100%'}}>
                  <img src={fileContent} alt={fileMetadata ? fileMetadata.name : ''} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:'4px'}} />
                </div>
              ) : isEditing ? (
                <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
                  style={{width:'100%',height:'100%',background:'var(--bg-primary)',color:'var(--text-secondary)',border:'none',
                    fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',padding:'12px 16px',margin:0,resize:'none',
                    lineHeight:'1.6',outline:'none',boxSizing:'border-box'}} />
              ) : (
                <pre style={{fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',color:'var(--text-secondary)',padding:'12px 16px',margin:0,whiteSpace:'pre-wrap',wordWrap:'break-word',lineHeight:'1.6'}}>{fileContent}</pre>
              )}
            </div>
          </React.Fragment>
        ) : (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',fontSize:'14px'}}>
            Select a file to view its contents
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Memory View ── */
function MemoryView() {
  var [selectedTarget, setSelectedTarget] = useState('memory');
  var [targets, setTargets] = useState([]);
  var [editing, setEditing] = useState(false);
  var [editContent, setEditContent] = useState('');
  var [providerStatus, setProviderStatus] = useState(null);
  var [showProviders, setShowProviders] = useState(false);
  var [expandedProvider, setExpandedProvider] = useState(null);

  useEffect(function() {
    var fetchMemory = async function() {
      try {
        var r = await fetch(API_BASE + '/api/memory');
        if (r.ok) {
          var data = await r.json();
          setTargets(data.targets || []);
        }
      } catch (e) {
        setTargets([]);
      }
    };
    var fetchProviderStatus = async function() {
      try {
        var r = await fetch('/memory/status');
        if (r.ok) {
          var data = await r.json();
          setProviderStatus(data);
        }
      } catch (e) { /* proxy not available */ }
    };
    fetchMemory();
    fetchProviderStatus();
  }, []);

  var selected = targets.find(function(t) { return t.target === selectedTarget; });
  var entries = selected ? (selected.entries || []) : [];
  var usage = selected ? (selected.usage || '') : '';
  var displayContent = entries.join('\n\n---\n\n');

  var memoryFiles = [
    { target: 'memory', name: 'MEMORY.md', desc: 'Agent memory' },
    { target: 'user', name: 'USER.md', desc: 'User profile' }
  ];

  function startEdit() {
    setEditContent(displayContent);
    setEditing(true);
  }

  async function saveEdit() {
    try {
      var body = {};
      if (selectedTarget === 'memory') body.memory = editContent;
      else body.user_profile = editContent;
      var r = await fetch(API_BASE + '/api/memory', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (r.ok) {
        var data = await r.json();
        setTargets(data.targets || targets);
      }
    } catch (e) { /* ignore */ }
    setEditing(false);
  }

  var activeProvider = providerStatus && providerStatus.provider;
  var providerConfig = activeProvider && activeProvider.config;
  var installedProviders = providerStatus ? (providerStatus.installed_providers || []) : [];

  return (
    <div className="view-memory">
      <div className="memory-sidebar">
        {/* Provider status card */}
        {providerStatus && (
          <div style={{marginBottom:'12px',padding:'10px',background:'var(--bg-secondary)',borderRadius:'6px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px'}}>Memory System</div>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}}>
              <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--success)'}}></div>
              <span style={{fontSize:'12px',color:'var(--text-primary)',fontWeight:'500'}}>Built-in</span>
              <span style={{fontSize:'10px',color:'var(--text-muted)'}}>always active</span>
            </div>
            {activeProvider ? (
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--accent)'}}></div>
                <span style={{fontSize:'12px',color:'var(--accent)',fontWeight:'600'}}>{activeProvider.name}</span>
                {providerConfig && providerConfig.mode && (
                  <span style={{fontSize:'10px',color:'var(--text-muted)',background:'var(--bg-tertiary)',padding:'1px 6px',borderRadius:'3px'}}>{providerConfig.mode}</span>
                )}
              </div>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--text-muted)',opacity:0.4}}></div>
                <span style={{fontSize:'11px',color:'var(--text-muted)',fontStyle:'italic'}}>No external provider</span>
              </div>
            )}
            {/* Provider config details */}
            {providerConfig && (
              <div style={{fontSize:'11px',color:'var(--text-secondary)',lineHeight:'1.5',borderTop:'1px solid var(--border)',paddingTop:'6px',marginTop:'2px'}}>
                {providerConfig.bank_id && <div>Bank: <span style={{color:'var(--text-primary)'}}>{providerConfig.bank_id}</span></div>}
                {providerConfig.budget && <div>Budget: <span style={{color:'var(--text-primary)'}}>{providerConfig.budget}</span></div>}
                {providerConfig.memory_mode && <div>Mode: <span style={{color:'var(--text-primary)'}}>{providerConfig.memory_mode}</span></div>}
                {providerConfig.prefetch_method && <div>Prefetch: <span style={{color:'var(--text-primary)'}}>{providerConfig.prefetch_method}</span></div>}
                {providerConfig.llm_provider && <div>LLM: <span style={{color:'var(--text-primary)'}}>{providerConfig.llm_provider}{providerConfig.llm_model ? ' / ' + providerConfig.llm_model : ''}</span></div>}
              </div>
            )}
            {/* Installed providers toggle */}
            {installedProviders.length > 0 && (
              <div style={{borderTop:'1px solid var(--border)',marginTop:'8px',paddingTop:'6px'}}>
                <div onClick={function() { setShowProviders(!showProviders); }}
                  style={{fontSize:'11px',color:'var(--accent)',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',userSelect:'none'}}>
                  <span style={{transform:showProviders ? 'rotate(90deg)' : 'rotate(0deg)',transition:'transform 0.15s',display:'inline-block'}}>{'\u25B6'}</span>
                  {installedProviders.length} provider{installedProviders.length !== 1 ? 's' : ''} installed
                </div>
                {showProviders && (
                  <div style={{marginTop:'6px',display:'flex',flexDirection:'column',gap:'4px'}}>
                    {installedProviders.map(function(p, i) {
                      var isActive = p.active;
                      var isExpanded = expandedProvider === p.name;
                      return (
                        <div key={i}>
                          <div onClick={function() { setExpandedProvider(isExpanded ? null : p.name); }}
                            style={{fontSize:'11px',padding:'4px 6px',borderRadius:'4px',cursor:'pointer',
                              background: isActive ? 'rgba(124,111,224,0.1)' : 'transparent',
                              border: '1px solid ' + (isActive ? 'rgba(124,111,224,0.3)' : 'transparent'),
                              display:'flex',alignItems:'center',gap:'6px',transition:'all 0.15s'}}>
                            <span style={{width:'5px',height:'5px',borderRadius:'50%',
                              background: isActive ? 'var(--accent)' : 'var(--text-muted)',opacity: isActive ? 1 : 0.4}}></span>
                            <span style={{color: isActive ? 'var(--accent)' : 'var(--text-secondary)',fontWeight: isActive ? '600' : '400'}}>{p.name}</span>
                            {p.hooks && p.hooks.length > 0 && (
                              <span style={{marginLeft:'auto',fontSize:'9px',color:'var(--text-muted)'}}>{p.hooks.length} hook{p.hooks.length !== 1 ? 's' : ''}</span>
                            )}
                          </div>
                          {isExpanded && (
                            <div style={{fontSize:'11px',color:'var(--text-secondary)',padding:'6px 6px 6px 17px',lineHeight:'1.5'}}>
                              {p.description && <div style={{marginBottom:'4px'}}>{p.description}</div>}
                              {p.hooks && p.hooks.length > 0 && (
                                <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginTop:'4px'}}>
                                  {p.hooks.map(function(h, j) {
                                    return <span key={j} style={{fontSize:'9px',background:'var(--bg-tertiary)',border:'1px solid var(--border)',padding:'1px 5px',borderRadius:'3px',color:'var(--text-muted)'}}>{h}</span>;
                                  })}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {/* Built-in memory files */}
        <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px',paddingLeft:'2px'}}>Built-in Memory</div>
        {memoryFiles.map(function(file, i) {
          return (
            <div key={i} className={"memory-file-item " + (selectedTarget === file.target ? 'active' : '')}
              onClick={function() { setSelectedTarget(file.target); setEditing(false); }}>
              <div style={{fontWeight:'500',marginBottom:'2px'}}>{file.name}</div>
              <div style={{fontSize:'10px',color:'var(--text-muted)'}}>{file.desc} {usage && selectedTarget === file.target ? '\u00b7 ' + usage : ''}</div>
            </div>
          );
        })}
      </div>
      <div className="memory-content">
        <div className="memory-header">
          <div>
            <div className="memory-title">{selectedTarget === 'memory' ? 'MEMORY.md' : 'USER.md'}</div>
            {usage && <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{usage}</div>}
          </div>
          {!editing ? (
            <button className="memory-edit-btn" onClick={startEdit}>Edit</button>
          ) : (
            <div style={{display:'flex',gap:'8px'}}>
              <button className="memory-edit-btn" onClick={saveEdit} style={{background:'var(--success)',color:'white'}}>Save</button>
              <button className="memory-edit-btn" onClick={function() { setEditing(false); }}>Cancel</button>
            </div>
          )}
        </div>
        <div className="memory-viewer">
          {editing ? (
            <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
              style={{width:'100%',height:'100%',background:'var(--bg-primary)',color:'var(--text-primary)',border:'none',fontFamily:'Monaco, Menlo, monospace',fontSize:'12px',resize:'none',outline:'none',padding:'0',lineHeight:'1.6'}} />
          ) : (
            entries.length > 0 ? entries.map(function(entry, i) {
              return (
                <div key={i} style={{marginBottom:'16px',paddingBottom:'16px',borderBottom: i < entries.length - 1 ? '1px solid var(--border)' : 'none'}}>
                  <div style={{fontSize:'10px',color:'var(--text-muted)',marginBottom:'4px'}}>Entry {i + 1}</div>
                  <div style={{fontSize:'13px',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>{entry}</div>
                </div>
              );
            }) : <div style={{color:'var(--text-muted)'}}>No memory entries</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Skills View ── */
function SkillsView() {
  var [skills, setSkills] = useState([]);
  var [searchTerm, setSearchTerm] = useState('');
  var [activeTab, setActiveTab] = useState('installed');
  var [expandedSkillName, setExpandedSkillName] = useState(null);
  var [expandedSkillDetails, setExpandedSkillDetails] = useState(null);
  var [loadingDetails, setLoadingDetails] = useState(false);
  var [categoryFilter, setCategoryFilter] = useState(null);
  var [skillEnabledState, setSkillEnabledState] = useState({});
  var [skillDates, setSkillDates] = useState({});
  var [sortBy, setSortBy] = useState('newest');
  var [editingSkill, setEditingSkill] = useState(null);
  var [editContent, setEditContent] = useState('');
  var [saving, setSaving] = useState(false);

  useEffect(function() {
    var fetchSkills = async function() {
      try {
        var r = await fetch(API_BASE + '/api/skills');
        if (r.ok) {
          var data = await r.json();
          setSkills(data.skills || []);
          var initialState = {};
          (data.skills || []).forEach(function(s) {
            initialState[s.name] = !s.disabled;
          });
          setSkillEnabledState(initialState);
        }
      } catch (e) { /* ignore */ }
    };
    var fetchDates = async function() {
      try {
        var r = await fetch('/skills/dates');
        if (r.ok) {
          var data = await r.json();
          setSkillDates(data.dates || {});
        }
      } catch (e) { /* ignore */ }
    };
    fetchSkills();
    fetchDates();
  }, []);

  var fetchSkillDetails = async function(skillName) {
    setLoadingDetails(true);
    setExpandedSkillDetails(null);
    try {
      var r = await fetch(API_BASE + '/api/skills/content?name=' + encodeURIComponent(skillName));
      if (r.ok) {
        var data = await r.json();
        if (data.success !== false && data.name) {
          setExpandedSkillDetails(data);
        } else {
          setExpandedSkillDetails({ error: 'Could not load skill details', name: skillName });
        }
      } else {
        setExpandedSkillDetails({ error: 'Skill details not available (HTTP ' + r.status + ')', name: skillName });
      }
    } catch (e) {
      setExpandedSkillDetails({ error: 'Failed to fetch skill details', name: skillName });
    }
    setLoadingDetails(false);
  };

  var handleDetailsClick = function(skillName) {
    if (expandedSkillName === skillName) {
      setExpandedSkillName(null);
      setExpandedSkillDetails(null);
    } else {
      setExpandedSkillName(skillName);
      fetchSkillDetails(skillName);
    }
  };

  var handleEnabledToggle = function(skillName) {
    setSkillEnabledState(function(prev) {
      var next = Object.assign({}, prev);
      next[skillName] = !next[skillName];
      return next;
    });
  };

  var handleDeleteClick = async function(skillName) {
    if (!window.confirm('Delete skill "' + skillName + '"? This permanently removes the skill directory and cannot be undone.')) return;
    try {
      var r = await fetch(API_BASE + '/api/skills/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: skillName }),
      });
      var data = {};
      try { data = await r.json(); } catch (e) {}
      if (r.ok && data.success) {
        setSkills(function(prev) { return prev.filter(function(s) { return s.name !== skillName; }); });
        if (expandedSkillName === skillName) { setExpandedSkillName(null); setExpandedSkillDetails(null); }
        if (editingSkill === skillName) { setEditingSkill(null); setEditContent(''); }
      } else {
        alert('Delete failed: ' + (data.error || 'HTTP ' + r.status));
      }
    } catch (e) {
      alert('Delete error: ' + e.message);
    }
  };

  var handleEditClick = function(skillName) {
    if (editingSkill === skillName) {
      setEditingSkill(null);
      setEditContent('');
    } else {
      setEditingSkill(skillName);
      setEditContent('');
      // Load the skill content for editing (matches webui /api/skills/content?name=X)
      fetch(API_BASE + '/api/skills/content?name=' + encodeURIComponent(skillName))
        .then(function(r) { return r.json(); })
        .then(function(data) { setEditContent(data.content || ''); })
        .catch(function() { setEditContent('(Error loading skill content)'); });
    }
  };

  var handleSaveSkill = async function() {
    if (!editingSkill) return;
    setSaving(true);
    try {
      var r = await fetch(API_BASE + '/api/skills/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: editingSkill, content: editContent }),
      });
      var responseText = await r.text();
      var data;
      try { data = JSON.parse(responseText); } catch (parseErr) {
        alert('Server returned invalid JSON (HTTP ' + r.status + '): ' + responseText.slice(0, 200));
        setSaving(false);
        return;
      }
      if (data.success) {
        setEditingSkill(null);
        setEditContent('');
        if (expandedSkillName === editingSkill) {
          fetchSkillDetails(editingSkill);
        }
      } else {
        alert('Save failed: ' + (data.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Save error: ' + e.message);
    }
    setSaving(false);
  };

  var filtered = skills.filter(function(s) {
    if (categoryFilter && (s.category || 'uncategorized') !== categoryFilter) return false;
    if (!searchTerm) return true;
    var term = searchTerm.toLowerCase();
    return (s.name || '').toLowerCase().indexOf(term) !== -1 ||
           (s.description || '').toLowerCase().indexOf(term) !== -1 ||
           (s.category || '').toLowerCase().indexOf(term) !== -1;
  });

  // Sort filtered results
  var formatSkillDate = function(ts) {
    if (!ts) return '';
    var d = new Date(ts * 1000);
    var now = new Date();
    var diff = now - d;
    var mins = Math.floor(diff / 60000);
    var hrs = Math.floor(diff / 3600000);
    var days = Math.floor(diff / 86400000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    if (hrs < 24) return hrs + 'h ago';
    if (days < 7) return days + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  };

  filtered.sort(function(a, b) {
    if (sortBy === 'newest') {
      return (skillDates[b.name] || 0) - (skillDates[a.name] || 0);
    } else if (sortBy === 'oldest') {
      return (skillDates[a.name] || 0) - (skillDates[b.name] || 0);
    } else {
      return (a.name || '').localeCompare(b.name || '');
    }
  });

  // Get unique categories
  var categories = {};
  skills.forEach(function(s) {
    var cat = s.category || 'uncategorized';
    categories[cat] = (categories[cat] || 0) + 1;
  });
  var categoryList = Object.keys(categories).sort();

  return (
    <div className="view-skills">
      <div className="skills-header">
        <div>
          <div className="skills-title">Skills Browser</div>
          <div className="skills-subtitle">{skills.length} skills installed</div>
        </div>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',alignItems:'center',flexWrap:'wrap'}}>
        {['installed', 'marketplace', 'featured'].map(function(tab) {
          return (
            <button key={tab} onClick={function() { setActiveTab(tab); }}
              style={{
                background: activeTab === tab ? 'var(--accent)' : 'var(--bg-tertiary)',
                color: activeTab === tab ? 'white' : 'var(--text-secondary)',
                border: '1px solid ' + (activeTab === tab ? 'var(--accent)' : 'var(--border)'),
                borderRadius: '8px', padding: '8px 16px', fontSize: '13px', cursor: 'pointer',
                fontWeight: activeTab === tab ? '600' : '400', textTransform: 'capitalize'
              }}>
              {tab}
            </button>
          );
        })}
        {activeTab === 'installed' && (
          <React.Fragment>
            <select onChange={function(e) { setCategoryFilter(e.target.value ? e.target.value : null); }}
              style={{marginLeft:'auto',background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-secondary)',fontSize:'13px',cursor:'pointer'}}>
              <option value="">All categories</option>
              {categoryList.map(function(cat, i) {
                return <option key={i} value={cat}>{cat + ' (' + categories[cat] + ')'}</option>;
              })}
            </select>
            <select value={sortBy} onChange={function(e) { setSortBy(e.target.value); }}
              style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',color:'var(--text-secondary)',fontSize:'13px',cursor:'pointer'}}>
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="name">Name A–Z</option>
            </select>
          </React.Fragment>
        )}
        <input type="text" className="skills-search" placeholder="Search..."
          value={searchTerm} onChange={function(e) { setSearchTerm(e.target.value); }}
          style={{flex:'1 1 200px',minWidth:'140px',maxWidth:'320px'}} />
      </div>
      {activeTab === 'installed' ? (
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          {filtered.map(function(skill, i) {
            var isExpanded = expandedSkillName === skill.name;
            var isEnabled = skillEnabledState[skill.name] !== false;
            return (
              <div key={i} style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'8px',overflow:'hidden'}}>
                <div style={{padding:'12px',display:'flex',alignItems:'start',gap:'12px'}}>
                  <div style={{flex:1}}>
                    <div className="skill-name">{skill.name}</div>
                    <div className="skill-desc">{skill.description || 'No description available'}</div>
                    <div className="skill-tags">
                      {skill.category && <div className="skill-tag">{skill.category}</div>}
                      {skillDates[skill.name] && (
                        <div style={{fontSize:'11px',color:'var(--text-muted)',display:'flex',alignItems:'center',gap:'4px'}}>
                          <span style={{opacity:0.6}}>{'🕐'}</span>
                          {formatSkillDate(skillDates[skill.name])}
                        </div>
                      )}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'8px',minWidth:'120px'}}>
                    <button className="skill-btn" onClick={function() { handleDetailsClick(skill.name); }} style={{background:isExpanded ? 'var(--accent)' : 'var(--bg-secondary)',color:isExpanded ? 'white' : 'var(--text-secondary)',borderColor:isExpanded ? 'var(--accent)' : 'var(--border)'}}>Details</button>
                    <button className="skill-btn" onClick={function() { handleEditClick(skill.name); }} style={{background:editingSkill === skill.name ? 'var(--warning)' : 'var(--bg-secondary)',color:editingSkill === skill.name ? 'white' : 'var(--text-secondary)',borderColor:editingSkill === skill.name ? 'var(--warning)' : 'var(--border)'}}>Edit</button>
                    <button className="skill-btn" onClick={function() { handleEnabledToggle(skill.name); }} style={{background:isEnabled ? 'var(--success)' : 'var(--bg-secondary)',color:isEnabled ? 'white' : 'var(--text-secondary)',borderColor:isEnabled ? 'var(--success)' : 'var(--border)'}}>{isEnabled ? 'Enabled' : 'Disabled'}</button>
                    <button className="skill-btn" onClick={function() { handleDeleteClick(skill.name); }} title={'Delete ' + skill.name} style={{background:'var(--bg-secondary)',color:'var(--danger, #dc2626)',borderColor:'var(--border)',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'6px'}}><Icon name="trash" size={13} />Delete</button>
                  </div>
                </div>
                {isExpanded && (
                  <div style={{borderTop:'1px solid var(--border)',padding:'12px',background:'var(--bg-secondary)'}}>
                    {loadingDetails ? (
                      <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading...</div>
                    ) : expandedSkillDetails && expandedSkillDetails.error ? (
                      <div style={{fontSize:'12px',color:'var(--warning)'}}>{expandedSkillDetails.error}</div>
                    ) : expandedSkillDetails ? (
                      <React.Fragment>
                        <div style={{marginBottom:'12px'}}>
                          <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Description</div>
                          <div style={{fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.5'}}>{expandedSkillDetails.description || skill.description || 'No description'}</div>
                        </div>
                        {expandedSkillDetails.tags && expandedSkillDetails.tags.length > 0 && (
                          <div style={{marginBottom:'12px'}}>
                            <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Tags</div>
                            <div className="skill-tags">
                              {expandedSkillDetails.tags.map(function(tag, j) {
                                return <div key={j} className="skill-tag">{tag}</div>;
                              })}
                            </div>
                          </div>
                        )}
                        {expandedSkillDetails.related_skills && expandedSkillDetails.related_skills.length > 0 && (
                          <div style={{marginBottom:'12px'}}>
                            <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Related Skills</div>
                            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                              {expandedSkillDetails.related_skills.map(function(rel, j) {
                                return <div key={j} style={{background:'var(--accent-dim)',color:'var(--accent)',padding:'3px 10px',borderRadius:'4px',fontSize:'11px'}}>{rel}</div>;
                              })}
                            </div>
                          </div>
                        )}
                        {expandedSkillDetails.content && (
                          <div style={{marginBottom:'0'}}>
                            <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'6px'}}>Content</div>
                            <div style={{background:'var(--bg-primary)',border:'1px solid var(--border)',borderRadius:'4px',padding:'10px',maxHeight:'300px',overflow:'auto',fontSize:'12px',fontFamily:'Monaco, Menlo, monospace',color:'var(--text-secondary)',lineHeight:'1.4'}} dangerouslySetInnerHTML={{__html: marked.parse(expandedSkillDetails.content)}} />
                          </div>
                        )}
                      </React.Fragment>
                    ) : (
                      <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Loading details...</div>
                    )}
                  </div>
                )}
                {editingSkill === skill.name && (
                  <div style={{borderTop:'1px solid var(--border)',padding:'12px',background:'var(--bg-secondary)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                      <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-primary)'}}>Edit SKILL.md</div>
                      <div style={{display:'flex',gap:'8px'}}>
                        <button onClick={handleSaveSkill} disabled={saving}
                          style={{background:'var(--accent)',color:'white',border:'none',borderRadius:'6px',padding:'6px 16px',fontSize:'12px',fontWeight:'600',cursor:saving?'wait':'pointer',opacity:saving?0.6:1}}>
                          {saving ? 'Saving...' : 'Save'}
                        </button>
                        <button onClick={function() { setEditingSkill(null); setEditContent(''); }}
                          style={{background:'var(--bg-tertiary)',color:'var(--text-secondary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 16px',fontSize:'12px',cursor:'pointer'}}>
                          Cancel
                        </button>
                      </div>
                    </div>
                    <textarea value={editContent} onChange={function(e) { setEditContent(e.target.value); }}
                      style={{width:'100%',minHeight:'300px',background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'10px',fontSize:'12px',fontFamily:'Monaco, Menlo, monospace',lineHeight:'1.5',resize:'vertical',boxSizing:'border-box'}} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-muted)'}}>
          <div style={{fontSize:'48px',marginBottom:'16px'}}>{'🏪'}</div>
          <div style={{fontSize:'16px',fontWeight:'500',marginBottom:'8px',color:'var(--text-secondary)'}}>
            {activeTab === 'marketplace' ? 'Skills Marketplace' : 'Featured Skills'}
          </div>
          <div style={{fontSize:'13px'}}>
            {activeTab === 'marketplace' ? 'Browse and install community skills from the Hermes Skills Hub' : 'Curated selection of popular and recommended skills'}
          </div>
          <div style={{fontSize:'12px',marginTop:'16px',color:'var(--text-muted)'}}>Coming soon</div>
        </div>
      )}
    </div>
  );
}

/* ── Terminal View (Shell + Hermes Terminal + Claude Code) ── */
/* ── Cron Jobs View ── */
function JobsView() {
  var [jobs, setJobs] = useState([]);
  var [loading, setLoading] = useState(true);
  var [error, setError] = useState(null);
  var [editingJob, setEditingJob] = useState(null);
  var [editFields, setEditFields] = useState({});
  var [actionLoading, setActionLoading] = useState(null);

  function parseCronOutput(text) {
    var lines = text.split('\n');
    var results = [];
    var current = null;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var headerMatch = line.match(/^\s+([a-f0-9]{12})\s+\[(\w+)\]/);
      if (headerMatch) {
        if (current) results.push(current);
        current = { id: headerMatch[1], status: headerMatch[2] };
        continue;
      }
      if (current) {
        var kvMatch = line.match(/^\s+(Name|Schedule|Repeat|Next run|Deliver|Skills|Script|Last run|Runs):\s+(.+)/);
        if (kvMatch) {
          var key = kvMatch[1].toLowerCase().replace(/ /g, '_');
          current[key] = kvMatch[2].trim();
        }
      }
    }
    if (current) results.push(current);
    return results;
  }

  function describeCron(schedule) {
    if (!schedule) return '';
    var s = (typeof schedule === 'string') ? schedule : (schedule.display || schedule.expr || schedule.expression || '');
    if (!s) return '';
    var parts = s.split(' ');
    if (parts.length !== 5) return s;
    var min = parts[0], hour = parts[1], dom = parts[2], mon = parts[3], dow = parts[4];
    var h = parseInt(hour, 10);
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    var timeStr = h12 + ':' + (min === '0' ? '00' : min.padStart(2, '0')) + ' ' + ampm;
    if (dom === '*' && mon === '*' && dow === '*') return 'Daily at ' + timeStr;
    if (dom === '*' && mon === '*' && dow !== '*') {
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var dayNames = dow.split(',').map(function(d) { return days[parseInt(d,10)] || d; }).join(', ');
      return dayNames + ' at ' + timeStr;
    }
    return s + ' (' + timeStr + ')';
  }

  function formatNextRun(nextRun) {
    if (!nextRun) return '--';
    try {
      var d = new Date(nextRun);
      var now = new Date();
      var diffMs = d - now;
      if (diffMs < 0) return 'overdue';
      var diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 60) return 'in ' + diffMin + 'm';
      var diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return 'in ' + diffHr + 'h ' + (diffMin % 60) + 'm';
      return 'in ' + Math.floor(diffHr / 24) + 'd ' + (diffHr % 24) + 'h';
    } catch(e) { return nextRun; }
  }

  var fetchJobs = async function() {
    try {
      var r = await fetch(API_BASE + '/cron/list');
      if (r.ok) {
        var data = await r.json();
        setJobs(data.jobs || []);
        setError(null);
      }
    } catch(e) { setError('Failed to fetch cron jobs'); }
    setLoading(false);
  };

  var runCronCmd = async function(cmd) {
    var r = await fetch(API_BASE + '/terminal/exec', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({command: cmd})
    });
    return r.ok ? await r.json() : { error: 'HTTP ' + r.status };
  };

  var handleToggle = async function(job) {
    setActionLoading(job.id + '-toggle');
    var _isActive = job.enabled !== false && job.state !== 'paused';
    var cmd = _isActive ? 'hermes cron pause ' + job.id : 'hermes cron resume ' + job.id;
    await runCronCmd(cmd);
    await fetchJobs();
    setActionLoading(null);
  };

  var handleRunNow = async function(job) {
    setActionLoading(job.id + '-run');
    await runCronCmd('hermes cron run ' + job.id);
    await fetchJobs();
    setActionLoading(null);
  };

  var handleDelete = async function(job) {
    if (!confirm('Delete cron job "' + (job.name || job.id) + '"? This cannot be undone.')) return;
    setActionLoading(job.id + '-delete');
    await runCronCmd('hermes cron remove ' + job.id);
    await fetchJobs();
    setActionLoading(null);
  };

  var handleEditStart = function(job) {
    if (editingJob === job.id) { setEditingJob(null); return; }
    setEditingJob(job.id);
    setEditFields({
      name: job.name || '',
      schedule: job.schedule_display || (job.schedule && job.schedule.display) || job.schedule || '',
      prompt: job.prompt || '',
      deliver: job.deliver || '',
      skills: job.skills || '',
      script: job.script || '',
      repeat: job.repeat || '',
      last_status: job.last_status || '',
    });
  };

  var handleEditSave = async function() {
    if (!editingJob) return;
    setActionLoading(editingJob + '-save');
    var parts = ['hermes cron edit', editingJob];
    if (editFields.name) parts.push('--name "' + editFields.name.replace(/"/g, '\\"') + '"');
    if (editFields.schedule) parts.push('--schedule "' + editFields.schedule.replace(/"/g, '\\"') + '"');
    if (editFields.prompt) parts.push('--prompt "' + editFields.prompt.replace(/"/g, '\\"') + '"');
    if (editFields.deliver) parts.push('--deliver "' + editFields.deliver.replace(/"/g, '\\"') + '"');
    if (editFields.repeat) parts.push('--repeat "' + editFields.repeat.replace(/"/g, '\\"') + '"');
    if (editFields.script) parts.push('--script "' + editFields.script.replace(/"/g, '\\"') + '"');
    var result = await runCronCmd(parts.join(' '));
    if (result.error) {
      alert('Edit failed: ' + (result.error || result.output));
    } else {
      setEditingJob(null);
      await fetchJobs();
    }
    setActionLoading(null);
  };

  useEffect(function() {
    fetchJobs();
    var iv = setInterval(fetchJobs, 30000);
    return function() { clearInterval(iv); };
  }, []);

  return (
    <div className="view-dashboard" style={{padding:'20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{fontSize:'20px'}}>{'🕐'}</span>
          <span style={{fontSize:'14px',fontWeight:600,color:'var(--text-primary)'}}>Scheduled Cron Jobs</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{jobs.filter(function(j){return j.enabled !== false && j.state !== 'paused';}).length} active</span>
          <button onClick={function(){setLoading(true);fetchJobs();}} style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 10px',fontSize:'11px',color:'var(--text-secondary)',cursor:'pointer'}}>Refresh</button>
        </div>
      </div>

      {loading && <div style={{color:'var(--text-muted)',textAlign:'center',padding:'40px'}}>Loading cron jobs...</div>}
      {error && <div style={{color:'var(--error)',textAlign:'center',padding:'20px',fontSize:'13px'}}>{error}</div>}

      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {jobs.map(function(job) {
          var isActive = job.enabled !== false && job.state !== 'paused';
          return (
            <div key={job.id} className="info-card" style={{padding:'16px 20px',transition:'all 0.2s',borderLeft: isActive ? '2px solid var(--success)' : '2px solid var(--error)',opacity: isActive ? 1 : 0.6}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',flex:1,minWidth:0}}>
                  {isActive ? (
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--success)',boxShadow:'0 0 8px rgba(68,216,138,0.5)',animation:'pulse 2s ease infinite',flexShrink:0}}></div>
                  ) : (
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--error)',opacity:0.5,flexShrink:0}}></div>
                  )}
                  <span style={{fontSize:'14px',fontWeight:600,color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{job.name || 'Unnamed Job'}</span>
                </div>
                <span style={{fontSize:'10px',fontFamily:'JetBrains Mono, monospace',color:'var(--text-muted)',background:'var(--bg-tertiary)',padding:'2px 8px',borderRadius:'4px',flexShrink:0,marginLeft:'12px'}}>{job.state || (job.enabled === false ? 'disabled' : 'active')}</span>
              </div>

              <div style={{fontSize:'12px',color:'var(--accent)',marginBottom:'8px',fontFamily:'JetBrains Mono, monospace'}}>{describeCron(job.schedule)}</div>

              <div style={{display:'flex',flexWrap:'wrap',gap:'14px',fontSize:'11px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace'}}>
                <span title="Cron schedule" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                  <span style={{color:'#c088e0'}}>{'🕐'}</span> {job.schedule_display || (job.schedule && (job.schedule.display || (job.schedule.kind === 'interval' && job.schedule.minutes ? 'every ' + job.schedule.minutes + ' min' : ''))) || (typeof job.schedule === 'string' ? job.schedule : '--')}
                </span>
                {job.next_run && (
                  <span title={'Next run: ' + job.next_run} style={{display:'flex',alignItems:'center',gap:'4px'}}>
                    <span style={{color:'var(--success)'}}>{'▶'}</span> {formatNextRun(job.next_run)}
                  </span>
                )}
                {job.skills && (
                  <span title="Skills" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                    <span style={{color:'#e8b04a'}}>{'🧩'}</span> {job.skills}
                  </span>
                )}
                {job.deliver && (
                  <span title="Delivery" style={{display:'flex',alignItems:'center',gap:'4px',marginLeft:'auto'}}>
                    <span style={{color:'#29b6f6'}}>{'📤'}</span> {job.deliver}
                  </span>
                )}
              </div>

              {job.script && (
                <div style={{marginTop:'8px',fontSize:'10px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace',opacity:0.7}}>
                  Script: {job.script}
                </div>
              )}

              {job.prompt && (
                <details style={{marginTop:'8px'}}>
                  <summary style={{fontSize:'11px',color:'var(--accent)',cursor:'pointer',userSelect:'none',fontWeight:500}}>
                    {'📝'} Prompt ({job.prompt.length > 200 ? Math.round(job.prompt.length / 100) * 100 + '+ chars' : job.prompt.length + ' chars'})
                  </summary>
                  <pre style={{marginTop:'6px',fontSize:'11px',color:'var(--text-secondary)',fontFamily:'JetBrains Mono, monospace',background:'var(--bg-primary)',padding:'10px 12px',borderRadius:'6px',whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:'300px',overflowY:'auto',border:'1px solid var(--border)',lineHeight:1.5}}>{job.prompt}</pre>
                </details>
              )}

              {job.last_error && (
                <div style={{marginTop:'8px',fontSize:'11px',color:'var(--error)',fontFamily:'JetBrains Mono, monospace',background:'rgba(248,81,73,0.08)',padding:'6px 10px',borderRadius:'6px',border:'1px solid rgba(248,81,73,0.2)'}}>
                  {'⚠️'} {job.last_error}
                </div>
              )}

              <div style={{marginTop:'10px',display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}}>
                <button onClick={function(){handleEditStart(job);}} style={{background:editingJob===job.id?'var(--warning)':'var(--bg-secondary)',color:editingJob===job.id?'white':'var(--text-secondary)',border:'1px solid '+(editingJob===job.id?'var(--warning)':'var(--border)'),borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500}}>Edit</button>
                <button onClick={function(){handleToggle(job);}} disabled={actionLoading===job.id+'-toggle'} style={{background:isActive?'var(--bg-secondary)':'var(--success)',color:isActive?'var(--text-secondary)':'white',border:'1px solid '+(isActive?'var(--border)':'var(--success)'),borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500,opacity:actionLoading===job.id+'-toggle'?0.5:1}}>{actionLoading===job.id+'-toggle'?'...':(isActive?'Pause':'Resume')}</button>
                <button onClick={function(){handleRunNow(job);}} disabled={actionLoading===job.id+'-run'} style={{background:'var(--bg-secondary)',color:'var(--accent)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500,opacity:actionLoading===job.id+'-run'?0.5:1}}>{actionLoading===job.id+'-run'?'Running...':'Run Now'}</button>
                <button onClick={function(){handleDelete(job);}} disabled={actionLoading===job.id+'-delete'} style={{background:'var(--bg-secondary)',color:'var(--error)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500,marginLeft:'auto',opacity:actionLoading===job.id+'-delete'?0.5:1}}>Delete</button>
                <span style={{fontSize:'10px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace',opacity:0.5}}>ID: {job.id}</span>
              </div>

              {editingJob === job.id && (
                <div style={{marginTop:'12px',borderTop:'1px solid var(--border)',paddingTop:'12px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'100px 1fr',gap:'8px',alignItems:'center',fontSize:'12px'}}>
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Name</label>
                    <input value={editFields.name||''} onChange={function(e){setEditFields(function(p){return{...p,name:e.target.value};});}} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Schedule</label>
                    <input value={editFields.schedule||''} onChange={function(e){setEditFields(function(p){return{...p,schedule:e.target.value};});}} placeholder="e.g. 0 9 * * *" style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Deliver</label>
                    <input value={editFields.deliver||''} onChange={function(e){setEditFields(function(p){return{...p,deliver:e.target.value};});}} placeholder="e.g. email, slack" style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Skills</label>
                    <input value={editFields.skills||''} onChange={function(e){setEditFields(function(p){return{...p,skills:e.target.value};});}} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Script</label>
                    <input value={editFields.script||''} onChange={function(e){setEditFields(function(p){return{...p,script:e.target.value};});}} placeholder="Path to script" style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Repeat</label>
                    <input value={editFields.repeat||''} onChange={function(e){setEditFields(function(p){return{...p,repeat:e.target.value};});}} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Prompt</label>
                    <textarea value={editFields.prompt||''} onChange={function(e){setEditFields(function(p){return{...p,prompt:e.target.value};});}} rows={12} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'10px 12px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace',resize:'vertical',minHeight:'200px',lineHeight:1.5}} />
                  </div>
                  <div style={{display:'flex',gap:'8px',marginTop:'10px',justifyContent:'flex-end'}}>
                    <button onClick={handleEditSave} disabled={actionLoading===editingJob+'-save'} style={{background:'var(--accent)',color:'white',border:'none',borderRadius:'6px',padding:'6px 16px',fontSize:'12px',fontWeight:600,cursor:'pointer',opacity:actionLoading===editingJob+'-save'?0.5:1}}>{actionLoading===editingJob+'-save'?'Saving...':'Save'}</button>
                    <button onClick={function(){setEditingJob(null);}} style={{background:'var(--bg-tertiary)',color:'var(--text-secondary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 16px',fontSize:'12px',cursor:'pointer'}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {!loading && !error && jobs.length === 0 && (
        <div style={{textAlign:'center',color:'var(--text-muted)',padding:'60px 0'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>{'🕐'}</div>
          <div style={{fontSize:'14px'}}>No cron jobs configured</div>
          <div style={{fontSize:'12px',marginTop:'4px'}}>Use <span style={{fontFamily:'JetBrains Mono, monospace',background:'var(--bg-tertiary)',padding:'2px 6px',borderRadius:'4px'}}>hermes cron add</span> to schedule jobs</div>
        </div>
      )}
    </div>
  );
}

function TerminalView() {
  var [activeMode, setActiveMode] = useState('shell'); // 'shell', 'hermes', 'claude'

  // === Shell state ===
  var [shellHistory, setShellHistory] = useState([]);
  var [shellInput, setShellInput] = useState('');
  var [shellRunning, setShellRunning] = useState(false);
  var [shellCwd, setShellCwd] = useState('~');
  var shellBodyRef = useRef(null);
  var shellInputRef = useRef(null);

  // === Hermes Terminal state ===
  var [hermesInput, setHermesInput] = useState('');
  var [hermesHistory, setHermesHistory] = useState([]);
  var [hermesStreaming, setHermesStreaming] = useState(false);
  var hermesSessionId = useRef((() => { try { return localStorage.getItem('hermes-terminal-session') || null; } catch(e) { return null; } })());
  var hermesBodyRef = useRef(null);
  var hermesInputRef = useRef(null);

  // === Claude Code state ===
  var [claudeHistory, setClaudeHistory] = useState([]);
  var [claudeInput, setClaudeInput] = useState('');
  var [claudeRunning, setClaudeRunning] = useState(false);
  var claudeBodyRef = useRef(null);
  var claudeInputRef = useRef(null);
  var claudeHasSent = useRef(false);

  // Auto-scroll all panels
  useEffect(function() { if (shellBodyRef.current) shellBodyRef.current.scrollTop = shellBodyRef.current.scrollHeight; }, [shellHistory]);
  useEffect(function() { if (hermesBodyRef.current) hermesBodyRef.current.scrollTop = hermesBodyRef.current.scrollHeight; }, [hermesHistory]);
  useEffect(function() { if (claudeBodyRef.current) claudeBodyRef.current.scrollTop = claudeBodyRef.current.scrollHeight; }, [claudeHistory]);

  // Focus input on tab switch
  useEffect(function() {
    setTimeout(function() {
      if (activeMode === 'shell' && shellInputRef.current) shellInputRef.current.focus();
      if (activeMode === 'hermes' && hermesInputRef.current) hermesInputRef.current.focus();
      if (activeMode === 'claude' && claudeInputRef.current) claudeInputRef.current.focus();
    }, 100);
  }, [activeMode]);

  // ─── Shell: run command via /terminal/exec ───
  // Resolve cwd path (~ to full path for subprocess)
  var shellCwdFull = useRef(null);

  async function runShellCommand() {
    var cmd = shellInput.trim();
    if (!cmd || shellRunning) return;
    setShellInput('');
    setShellHistory(function(prev) { return prev.concat([{ type: 'input', text: cmd, id: Date.now(), cwd: shellCwd }]); });
    setShellRunning(true);

    try {
      // For cd commands, run "cd <target> && pwd" to get the new path
      var isCd = cmd.match(/^\s*cd\s*(.*)?$/);
      var actualCmd = cmd;
      var cwdParam = shellCwdFull.current || undefined;

      if (isCd) {
        var target = (isCd[1] || '').trim() || '~';
        actualCmd = 'cd ' + target + ' && pwd';
      }

      var r = await fetch(API_BASE + '/terminal/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: actualCmd, mode: 'shell', cwd: cwdParam })
      });

      if (!r.ok) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Server error: ' + r.status + '. Make sure serve_lite.py is restarted.)', id: Date.now() + 1, exitCode: -1 }]); });
        setShellRunning(false);
        return;
      }

      var data = await r.json();
      if (data.error) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Error: ' + data.error + ')', id: Date.now() + 1, exitCode: -1 }]); });
        setShellRunning(false);
        return;
      }

      var output = data.output || '';
      var exitCode = data.exit_code != null ? data.exit_code : 0;
      if (exitCode !== 0 && !output) output = '(exit code ' + exitCode + ')';

      // If cd succeeded, update the cwd from pwd output
      if (isCd && exitCode === 0 && output.trim()) {
        var newPath = output.trim().split('\n').pop();
        shellCwdFull.current = newPath;
        setShellCwd(shortWorkspacePath(newPath));
        output = ''; // Don't show pwd output for cd
      }

      if (output || exitCode !== 0) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: output, id: Date.now() + 1, exitCode: exitCode }]); });
      }
    } catch(e) {
      setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Error: ' + e.message + '. Is serve_lite.py running with the terminal endpoint?)', id: Date.now() + 1, exitCode: -1 }]); });
    }
    setShellRunning(false);
  }

  // ─── Hermes: send command to Hermes agent ───
  async function sendHermesCommand() {
    var cmd = hermesInput.trim();
    if (!cmd || hermesStreaming) return;
    setHermesInput('');
    var usrId = 'usr_' + Date.now() + '_' + Math.random();
    var responseId = 'res_' + Date.now() + '_' + Math.random();
    setHermesHistory(function(prev) { return prev.concat([
      { role: 'user', content: cmd, id: usrId },
      { role: 'assistant', content: '', id: responseId, streaming: true }
    ]); });
    setHermesStreaming(true);

    try {
      var sessionId = hermesSessionId.current;
      if (!sessionId) {
        sessionId = 'term_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        hermesSessionId.current = sessionId;
        try { localStorage.setItem('hermes-terminal-session', sessionId); } catch(e) {}
      }

      // Two-step flow: POST to start, then EventSource for stream
      var startResp = await fetch(API_BASE + '/api/chat/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          messages: [{ role: 'user', content: cmd }],
        }),
      });
      if (!startResp.ok) throw new Error('Chat start failed: ' + startResp.status);
      var startData = await startResp.json();
      var termStreamId = startData.stream_id;

      var fullText = '';
      await new Promise(function(resolve) {
        var src = new EventSource(API_BASE + '/api/chat/stream?stream_id=' + encodeURIComponent(termStreamId));
        src.addEventListener('token', function(e) {
          var d = JSON.parse(e.data);
          if (d.text) {
            fullText += d.text;
            setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: fullText }) : h; }); });
          }
        });
        src.addEventListener('done', function() { src.close(); resolve(); });
        src.addEventListener('error', function() {
          // Network/HTTP error on the SSE. Probe the status endpoint so we
          // can tell transient drops apart from "proxy is 404-ing us" and
          // surface the latter clearly instead of an empty bubble.
          src.close();
          fetch(API_BASE + '/api/chat/stream/status?stream_id=' + encodeURIComponent(termStreamId))
            .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error('status ' + r.status)); })
            .then(function(st) {
              if (!st.active && !fullText) {
                fullText = '(Stream ended without a response — check serve_lite.py and the Hermes agent on port 8642.)';
              }
              resolve();
            })
            .catch(function(err) {
              if (!fullText) {
                fullText = '(Stream error: ' + (err && err.message || 'unknown') + ' — if you see 404, update your launcher to run serve_lite.py.)';
              }
              resolve();
            });
        });
        src.addEventListener('apperror', function(e) {
          var d = JSON.parse(e.data);
          fullText = '(Error: ' + (d.message || 'Unknown') + ')';
          src.close(); resolve();
        });
        src.addEventListener('cancel', function() { src.close(); resolve(); });
      });
      if (!fullText) fullText = '(No response from Hermes)';
      setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: fullText, streaming: false }) : h; }); });
    } catch(e) {
      setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: '(Error: ' + e.message + ')', streaming: false }) : h; }); });
    }
    setHermesStreaming(false);
  }

  // ─── Claude Code: run via claude CLI ───
  async function runClaudeCommand() {
    var cmd = claudeInput.trim();
    if (!cmd || claudeRunning) return;
    setClaudeInput('');
    setClaudeHistory(function(prev) { return prev.concat([{ type: 'input', text: cmd, id: Date.now() }]); });
    setClaudeRunning(true);

    setClaudeHistory(function(prev) { return prev.concat([{ type: 'thinking', id: Date.now() + 0.5 }]); });

    try {
      var shouldContinue = claudeHasSent.current;
      var r = await fetch(API_BASE + '/terminal/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd, mode: 'claude', continue_session: shouldContinue })
      });
      claudeHasSent.current = true;
      if (!r.ok) {
        setClaudeHistory(function(prev) {
          return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: '(Server error: ' + r.status + '. Make sure serve_lite.py is restarted.)', id: Date.now() + 1 }]);
        });
        setClaudeRunning(false);
        return;
      }
      var data = await r.json();
      var output = data.output || data.error || '';
      var exitCode = data.exit_code != null ? data.exit_code : 0;
      if (exitCode !== 0 && !output) output = '(exit code ' + exitCode + ')';

      setClaudeHistory(function(prev) {
        return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: output, id: Date.now() + 1 }]);
      });
    } catch(e) {
      setClaudeHistory(function(prev) {
        return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: '(Error: ' + e.message + '. Is serve_lite.py running with the terminal endpoint?)', id: Date.now() + 1 }]);
      });
    }
    setClaudeRunning(false);
  }

  // Key handlers
  function handleShellKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runShellCommand(); } }
  function handleHermesKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendHermesCommand(); } }
  function handleClaudeKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runClaudeCommand(); } }

  // Tab button style helper
  function tabStyle(mode) {
    return {
      flex:1, padding:'8px 12px',
      background: activeMode === mode ? 'var(--bg-primary)' : 'transparent',
      color: activeMode === mode ? 'var(--accent)' : 'var(--text-secondary)',
      border:'none', borderBottom: activeMode === mode ? '2px solid var(--accent)' : '2px solid transparent',
      fontSize:'12px', fontWeight:'600', cursor:'pointer', fontFamily:'inherit',
    };
  }

  // Shared input bar style
  var inputBarStyle = {borderTop:'1px solid var(--border)',background:'var(--bg-secondary)',padding:'10px 16px',display:'flex',gap:'8px',alignItems:'center'};
  var inputStyle = {flex:1,background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'9px 14px',color:'var(--text-primary)',fontSize:'13px',fontFamily:'Monaco, Menlo, Consolas, monospace',outline:'none'};
  var promptStyle = {color:'var(--accent)',fontFamily:'Monaco, Menlo, monospace',fontSize:'13px',fontWeight:'700'};

  function runBtn(onClick, disabled, running) {
    return (
      <button onClick={onClick} disabled={disabled}
        style={{background:running ? 'var(--bg-tertiary)' : 'var(--accent)',color:'white',border:'none',borderRadius:'6px',
          padding:'9px 14px',fontSize:'12px',cursor:running ? 'not-allowed' : 'pointer',fontWeight:'600',opacity:running ? 0.5 : 1}}>
        {running ? '...' : 'Run'}
      </button>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* 3-tab bar */}
      <div style={{display:'flex',gap:'0',borderBottom:'1px solid var(--border)',background:'var(--bg-secondary)'}}>
        <button onClick={function() { setActiveMode('shell'); }} style={tabStyle('shell')}>{'>'}_  Shell</button>
        <button onClick={function() { setActiveMode('hermes'); }} style={tabStyle('hermes')}>{'⚡'} Hermes</button>
        <button onClick={function() { setActiveMode('claude'); }} style={tabStyle('claude')}>{'◆'} Claude Code</button>
      </div>

      {/* ═══ Shell Tab ═══ */}
      {activeMode === 'shell' && (
        <React.Fragment>
          <div ref={shellBodyRef} style={{flex:1,overflow:'auto',background:'#0a0a0f',padding:'12px 16px',fontFamily:'Monaco, Menlo, Consolas, monospace',fontSize:'13px',lineHeight:'1.6'}}>
            {shellHistory.length === 0 && (
              <div style={{color:'var(--text-muted)',padding:'40px 0',textAlign:'center'}}>
                <div style={{fontSize:'28px',marginBottom:'12px'}}>{'>'}_</div>
                <div style={{fontSize:'14px',marginBottom:'8px',color:'var(--text-secondary)',fontFamily:'-apple-system, sans-serif'}}>Shell Terminal</div>
                <div style={{fontSize:'12px',color:'var(--text-muted)',fontFamily:'-apple-system, sans-serif'}}>Run shell commands on your Mac</div>
              </div>
            )}
            {shellHistory.map(function(entry) {
              if (entry.type === 'input') {
                return (
                  <div key={entry.id} style={{marginBottom:'2px'}}>
                    <span style={{color:'var(--success)'}}>{(entry.cwd || '~') + ' $ '}</span>
                    <span style={{color:'var(--text-primary)'}}>{entry.text}</span>
                  </div>
                );
              } else {
                return (
                  <div key={entry.id} style={{marginBottom:'12px',color: entry.exitCode !== 0 ? 'var(--danger)' : 'var(--text-secondary)',whiteSpace:'pre-wrap',wordWrap:'break-word'}}>
                    {entry.text}
                  </div>
                );
              }
            })}
            {shellRunning && <div style={{color:'var(--text-muted)'}}>Running...</div>}
          </div>
          <div style={inputBarStyle}>
            <span style={promptStyle}>{shellCwd + ' $'}</span>
            <input ref={shellInputRef} type="text" value={shellInput} onChange={function(e) { setShellInput(e.target.value); }}
              onKeyDown={handleShellKey} placeholder={shellRunning ? 'Running...' : 'Enter command...'} disabled={shellRunning} style={inputStyle} />
            {runBtn(runShellCommand, shellRunning || !shellInput.trim(), shellRunning)}
          </div>
        </React.Fragment>
      )}

      {/* ═══ Hermes Tab ═══ */}
