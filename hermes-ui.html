  }, [messages, activeConvId, conversations]);

  // ── API methods (v0.7.0 — OpenAI-compatible /v1/chat/completions) ──
  const api = {
    // Session IDs are generated client-side; Hermes uses X-Hermes-Session-Id
    // header to load/store conversation history in state.db automatically.
    createSession() {
      return 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    },

    // Sessions are managed client-side (localStorage + React state).
    // The old /api/sessions listing endpoint no longer exists in v0.7.0.
    async listSessions() { return []; },

    async deleteSession(sessionId) { /* client-side only */ },

    async getSessionMessages(sessionId) { return []; },

    async chatStream(sessionId, message, onChunk, onDone, onToolEvent, onThinking, signal) {
      var _streamStart = Date.now();
      const r = await fetch(API_BASE + '/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Hermes-Session-Id': sessionId,
        },
        body: JSON.stringify({
          model: 'hermes-agent',
          messages: [{ role: 'user', content: message }],
          stream: true,
          stream_options: { include_usage: true },
        }),
        signal: signal,
      });
      var _httpMs = Date.now() - _streamStart;
      console.log('[stream] HTTP response in ' + _httpMs + 'ms (status ' + r.status + ')');
      if (onThinking) onThinking('[timing] HTTP connected in ' + (_httpMs < 1000 ? _httpMs + 'ms' : Math.round(_httpMs/1000) + 's'));
      if (!r.ok) {
        const err = await r.text();
        throw new Error('Chat error ' + r.status + ': ' + err);
      }

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      var _firstDataLogged = false;
      var buffer = '';
      var fullContent = '';
      var streamUsage = null;  // Capture token usage from SSE stream

      // Reasoning tag parser state
      var rawContent = '';
      var inReasoning = false;
      var reasoningBuffer = '';
      var _OPEN_TAGS = ['<REASONING_SCRATCHPAD>', '<think>', '<reasoning>', '<THINKING>', '<thinking>'];
      var _CLOSE_TAGS = ['</REASONING_SCRATCHPAD>', '</think>', '</reasoning>', '</THINKING>', '</thinking>'];

      function stripReasoningTags(text) {
        var result = text;
        result = result.replace(/<REASONING_SCRATCHPAD>[\s\S]*?<\/REASONING_SCRATCHPAD>/g, '');
        result = result.replace(/<think>[\s\S]*?<\/think>/gi, '');
        result = result.replace(/<reasoning>[\s\S]*?<\/reasoning>/gi, '');
        result = result.replace(/<THINKING>[\s\S]*?<\/THINKING>/g, '');
        result = result.replace(/<REASONING_SCRATCHPAD>[\s\S]*/g, '');
        result = result.replace(/<think>[\s\S]*/gi, '');
        result = result.replace(/<reasoning>[\s\S]*/gi, '');
        result = result.replace(/<THINKING>[\s\S]*/g, '');
        return result.replace(/^\s+/, '');
      }

      function processReasoningDelta(delta) {
        rawContent += delta;
        if (!inReasoning) {
          for (var oi = 0; oi < _OPEN_TAGS.length; oi++) {
            var openIdx = rawContent.lastIndexOf(_OPEN_TAGS[oi]);
            if (openIdx !== -1) {
              var closeTag = _CLOSE_TAGS[oi];
              var closeIdx = rawContent.indexOf(closeTag, openIdx + _OPEN_TAGS[oi].length);
              if (closeIdx !== -1) {
                var reasoningText = rawContent.slice(openIdx + _OPEN_TAGS[oi].length, closeIdx).trim();
                if (reasoningText && onThinking) {
                  var lines = reasoningText.split('\n');
                  for (var li = 0; li < lines.length; li++) {
                    if (lines[li].trim()) onThinking('[reasoning] ' + lines[li].trim().slice(0, 300));
                  }
                }
              } else {
                inReasoning = true;
                var newReasoning = rawContent.slice(openIdx + _OPEN_TAGS[oi].length);
                if (newReasoning.trim() && onThinking) {
                  onThinking('[reasoning] ' + newReasoning.replace(/\n/g, ' ').trim().slice(0, 300));
                }
                reasoningBuffer = newReasoning;
              }
              break;
            }
          }
        } else {
          reasoningBuffer += delta;
          for (var ci = 0; ci < _CLOSE_TAGS.length; ci++) {
            if (reasoningBuffer.indexOf(_CLOSE_TAGS[ci]) !== -1) {
              var beforeClose = reasoningBuffer.split(_CLOSE_TAGS[ci])[0];
              if (beforeClose.trim() && onThinking) {
                onThinking('[reasoning] ' + beforeClose.replace(/\n/g, ' ').trim().slice(0, 300));
              }
              inReasoning = false;
              reasoningBuffer = '';
              break;
            }
          }
          if (inReasoning && delta.trim() && onThinking) {
            onThinking('[reasoning] ' + delta.replace(/\n/g, ' ').trim().slice(0, 300));
          }
        }
        return stripReasoningTags(rawContent);
      }

      // Tool progress detection: v0.7.0 injects tool markers as markdown
      // text deltas like "\n`⚙️ tool_name`\n" or "\n`🔍 search_query`\n"
      var toolMarkerRegex = /^`[\p{Emoji}\uFE0F\u200D]*\s*(.+?)`$/u;
      var pendingToolDelta = '';

      function detectToolProgress(delta) {
        // Check if this delta contains a tool marker injected by Hermes
        var trimmed = delta.trim();
        if (!trimmed) return false;
        // Tool markers are wrapped in backticks with an emoji prefix
        var match = trimmed.match(toolMarkerRegex);
        if (match) {
          var toolLabel = match[1].trim();
          if (onToolEvent) {
            onToolEvent({ type: 'started', toolName: toolLabel, label: toolLabel });
          }
          if (onThinking) {
            onThinking('[tool] ' + toolLabel);
          }
          return true;
        }
        return false;
      }

      var onDoneFired = false;
      var wrappedOnDone = function(content) {
        if (onDoneFired) return;
        onDoneFired = true;
        if (typeof onDone === 'function') onDone(content);
      };

      // Parse OpenAI SSE format: "data: {json}\n\n" lines, ending with "data: [DONE]\n\n"
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        if (!_firstDataLogged) {
          _firstDataLogged = true;
          var _firstDataMs = Date.now() - _streamStart;
          console.log('[stream] First SSE data after ' + _firstDataMs + 'ms (' + Math.round(_firstDataMs/1000) + 's)');
          if (onThinking) onThinking('[timing] First data after ' + (_firstDataMs < 1000 ? _firstDataMs + 'ms' : Math.round(_firstDataMs/1000) + 's'));
        }
        buffer += decoder.decode(value, { stream: true });

        // Split on double-newline (SSE event boundary)
        var parts = buffer.split('\n\n');
        buffer = parts.pop() || '';

        for (var pi = 0; pi < parts.length; pi++) {
          var block = parts[pi].trim();
          if (!block) continue;

          // Each block may have multiple "data:" lines (OpenAI format uses only data:, no event:)
          var dataLines = block.split('\n');
          for (var di = 0; di < dataLines.length; di++) {
            var line = dataLines[di];
            if (line.startsWith(':')) continue; // SSE comment / keepalive
            if (!line.startsWith('data: ') && !line.startsWith('data:')) continue;
            var dataStr = line.startsWith('data: ') ? line.slice(6) : line.slice(5);
            dataStr = dataStr.trim();

            if (dataStr === '[DONE]') {
              wrappedOnDone(fullContent);
              return { content: fullContent, usage: streamUsage };
            }

            try {
              var parsed = JSON.parse(dataStr);
              var choice = (parsed.choices && parsed.choices[0]) || {};
              var delta = choice.delta || {};
              var finishReason = choice.finish_reason;

              // Capture token usage if present (OpenAI sends it in final chunk)
              if (parsed.usage) {
                streamUsage = parsed.usage;
                console.log('[stream] Token usage:', JSON.stringify(parsed.usage));
              }

              if (delta.content) {
                // Check for tool progress markers before adding to content
                if (detectToolProgress(delta.content)) {
                  // Tool marker — don't add to visible content
                  continue;
                }
                fullContent = processReasoningDelta(delta.content);
                onChunk(fullContent);
              }

              // finish_reason "stop" means agent is done (but wait for [DONE])
            } catch (e) { /* ignore JSON parse errors */ }
          }
        }
      }

      // Stream ended without [DONE] — still fire onDone with what we have
      wrappedOnDone(fullContent);
      return { content: fullContent, usage: streamUsage };
    }
  };

  // ── Image processing ──
  const processImages = async (files) => {
    if (!config.geminiKey) {
      alert('Add your Gemini API key in Settings to analyze images.\n\nSince MiniMax cannot see images directly, Gemini is used to describe images before sending to Hermes.');
      return;
    }
    for (const file of files) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const dataUrl = e.target.result;
        const imgId = Date.now() + Math.random();
        // Detect mime type from the data URL
        var mimeType = 'image/jpeg';
        var mimeMatch = dataUrl.match(/^data:(image\/[a-zA-Z+]+);/);
        if (mimeMatch) mimeType = mimeMatch[1];
        setPendingImages(prev => [...prev, { id: imgId, dataUrl: dataUrl, analyzing: true, status: 'Analyzing with Gemini...' }]);
        try {
          const base64 = dataUrl.split(',')[1];
          const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + config.geminiKey, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [
                { text: 'Describe this image in detail. Include: what type of image it is, all visible text/labels, colors, layout, any UI elements, diagrams, or notable features. Be thorough — your description is the only way the recipient will understand this image.' },
                { inlineData: { mimeType: mimeType, data: base64 } },
              ]}],
            }),
          });
          if (!r.ok) {
            var errText = await r.text();
            throw new Error('Gemini API ' + r.status + ': ' + errText.slice(0, 200));
          }
          const data = await r.json();
          const description = data.candidates?.[0]?.content?.parts?.[0]?.text || null;
          if (!description) {
            throw new Error('Gemini returned no description');
          }
          setPendingImages(prev => prev.map(img => img.id === imgId ? { ...img, analyzing: false, description: description, status: 'Ready' } : img));
        } catch (err) {
          console.error('Gemini image analysis failed:', err);
          addLocalLog('ERROR Gemini image analysis failed: ' + err.message);
          setPendingImages(prev => prev.map(img => img.id === imgId ? { ...img, analyzing: false, description: null, status: 'Failed: ' + err.message } : img));
        }
      };
      reader.readAsDataURL(file);
    }
  };

  const removeImage = (imgId) => {
    setPendingImages(prev => prev.filter(img => img.id !== imgId));
  };

  // ── Conversation management ──
  const newConversation = () => {
    const sessionId = api.createSession();
    const conv = { id: sessionId, title: 'New Chat', created: new Date().toLocaleString(), messages: [] };
    setConversations(prev => [conv, ...prev]);
    setActiveConvId(sessionId);
    setMessages([]);
    setInput('');
  };

  const selectConversation = (convId) => {
    // 1. Save current messages to the old conversation —
    //    BUT skip if it's currently streaming, because updateStreamMessages
    //    already keeps it in sync and our snapshot may be stale due to React 18 batching.
    const prevConvId = activeConvRef.current;
    const snapshot = messagesRef.current;
    var prevIsStreaming = !!(prevConvId && streamingMap.current[prevConvId]);
    if (prevConvId && snapshot.length > 0 && !prevIsStreaming) {
      setConversations(prev =>
        prev.map(c => {
          if (c.id !== prevConvId) return c;
          var userMsgs = snapshot.filter(m => m.role === 'user').length;
          var tcCount = snapshot.reduce((sum, m) => sum + (m.toolCalls ? m.toolCalls.length : 0), 0);
          return { ...c, messages: snapshot, message_count: snapshot.length, user_prompt_count: userMsgs, tool_call_count: tcCount };
        })
      );
    }
    // 2. Load target conversation's messages from the ref (always fresh)
    const targetConv = conversationsRef.current.find(c => c.id === convId);
    setMessages((targetConv && targetConv.messages) || []);
    setActiveConvId(convId);
    setInput('');
  };

  const deleteConversation = (convId) => {
    api.deleteSession(convId);
    setConversations(prev => prev.filter(c => c.id !== convId));
    if (activeConvId === convId) {
      setActiveConvId(null);
      setMessages([]);
    }
  };

  const [editingConvId, setEditingConvId] = useState(null);
  const [editingTitle, setEditingTitle] = useState('');
  const startRenameConv = function(convId, currentTitle) {
    setEditingConvId(convId);
    setEditingTitle(currentTitle || '');
  };
  const saveRenameConv = function() {
    if (editingConvId && editingTitle.trim()) {
      var newTitle = editingTitle.trim();
      var convId = editingConvId;
      setConversations(function(prev) {
        return prev.map(function(c) {
          return c.id === convId ? Object.assign({}, c, { title: newTitle }) : c;
        });
      });
      // Titles are persisted client-side only (v0.7.0 has no session rename API)
    }
    setEditingConvId(null);
    setEditingTitle('');
  };

  // Load conversations on mount — localStorage first, server as fallback/sync
  useEffect(() => {
    async function loadConversations() {
      var localConvs = [];
      try {
        const saved = localStorage.getItem('hermes-conversations');
        if (saved) localConvs = JSON.parse(saved);
      } catch(e) {}

      // Always fetch from server — use whichever has more conversations
      var serverConvs = [];
      try {
        const res = await fetch('/api/ui-conversations');
        if (res.ok) serverConvs = await res.json();
      } catch(e) {}

      // Prefer server if it has data (survives browser data wipe)
      const convs = serverConvs.length >= localConvs.length ? serverConvs : localConvs;

      // Clean up any messages that were saved mid-stream (streaming/thinking stuck true).
      // This happens when Hermes hangs and the user refreshes — without this, the UI
      // loads right back into a permanently-stuck streaming state.
      const cleanConvs = convs.map(function(c) {
        if (!c.messages || !c.messages.length) return c;
        var cleaned = c.messages.map(function(m) {
          if (!m.streaming && !m.thinking) return m;
          // Drop empty thinking-only messages; convert partial streaming ones to complete
          if (m.thinking && !m.content) return null;
          return { ...m, streaming: false, thinking: false };
        }).filter(Boolean);
        // Recalculate message counts from actual data
        var totalMsgs = cleaned.length;
        var userMsgs = cleaned.filter(function(m) { return m.role === 'user'; }).length;
        var toolCalls = cleaned.reduce(function(sum, m) { return sum + (m.toolCalls ? m.toolCalls.length : 0); }, 0);
        return { ...c, messages: cleaned, message_count: totalMsgs, user_prompt_count: userMsgs, tool_call_count: toolCalls };
      });

      if (cleanConvs.length > 0) {
        setConversations(cleanConvs);
        const savedId = localStorage.getItem('hermes-active-session');
        if (savedId) {
          const conv = cleanConvs.find(c => c.id === savedId);
          if (conv) {
            _setActiveConvId(savedId);
            activeConvRef.current = savedId;
            setMessages(conv.messages || []);
          }
        }
      }
    }
    loadConversations().catch(e => console.warn('[hermes-ui] Failed to restore conversations:', e));
  }, []);

  // Persist conversations to localStorage + server whenever they change
  useEffect(() => {
    if (conversations.length === 0) return;
    const toSave = conversations.slice(0, 50);
    // Save to localStorage
    try {
      localStorage.setItem('hermes-conversations', JSON.stringify(toSave));
    } catch(e) {}
    // Save to server (disk) so it survives browser data wipe
    try {
      fetch('/api/ui-conversations', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(toSave),
      }).catch(() => {});
    } catch(e) {}
  }, [conversations]);

  // ── Export chat ──
  const exportChat = () => {
    const visibleMessages = messages.filter(m => m.role === 'user' || m.role === 'assistant');
    const conv = conversations.find(c => c.id === activeConvId);
    const title = (conv && conv.title) || 'Chat Export';
    generatePDF(visibleMessages, title);
  };

  // ── Send message ──
  const sendMessage = async (text) => {
    if ((!text.trim() && !pendingImages.length)) return;
    // Block only if THIS conversation is already streaming
    var sessionId = activeConvId;
    if (sessionId && streamingMap.current[sessionId]) return;

    // Safety net: if React state lost activeConvId, try recovering from localStorage
    if (!sessionId) {
      try { sessionId = localStorage.getItem('hermes-active-session'); } catch(e) {}
      if (sessionId) {
        console.warn('[hermes-ui] Recovered activeConvId from localStorage:', sessionId);
        _setActiveConvId(sessionId);
        activeConvRef.current = sessionId;
      }
    }

    if (!sessionId) {
      sessionId = api.createSession();
      const conv = { id: sessionId, title: text.slice(0, 50) || 'New Chat', created: new Date().toLocaleString(), messages: [] };
      setConversations(prev => [conv, ...prev]);
      setActiveConvId(sessionId);
      setMessages([]);  // Clear stale messages so user sees fresh session
    }

    const userMsg = {
      id: Date.now().toString(),
      role: 'user',
      content: text,
      images: pendingImages.map(img => ({ dataUrl: img.dataUrl, description: img.description })),
      toolCalls: [],
    };

    const thinkingMsg = {
      id: 'thinking-' + Date.now(),
      role: 'assistant',
      content: '',
      thinking: true,
      streaming: true,
      toolCalls: [],
    };
    const newMessages = [...messages, userMsg, thinkingMsg];
    setMessages(newMessages);
    setInput('');
    setPendingImages([]);

    setConversations(prev =>
      prev.map(c => c.id === sessionId ? { ...c, messages: newMessages, message_count: (c.message_count || 0) + 1, title: (c.title && c.title !== 'New Chat') ? c.title : (text.slice(0, 50) || c.title) } : c)
    );

    const abortCtrl = new AbortController();
    startStreaming(sessionId, abortCtrl);
    setActivityLog([]);
    addLocalLog('INFO  Sending message to session ' + sessionId);
    var fetchStart = Date.now();
    addLocalLog('INFO  Connecting to Hermes...');

    var thinkingStart = Date.now();
    var thinkingGotResponse = false;
    var lastChunkTime = Date.now();
    var NO_RESPONSE_TIMEOUT_S = 120;  // abort if Hermes never responds within 2 min
    var healthCheckPending = false;
    var stallWarningShown = false;
    var thinkingInterval = setInterval(function() {
      if (thinkingGotResponse) {
        var stallSecs = Math.round((Date.now() - lastChunkTime) / 1000);
        var totalSecs  = Math.round((Date.now() - thinkingStart) / 1000);
        // Heartbeat log every 30s
        if (totalSecs > 0 && totalSecs % 30 < 5) {
          var stallNote = stallSecs > 5 ? ', quiet ' + stallSecs + 's' : '';
          addLocalLog('INFO  Hermes working... (' + totalSecs + 's elapsed, ' + fullContent.length + ' chars' + stallNote + ')');
        }
        // After 45s quiet, check health every 60s — only abort if Hermes is DOWN
        if (stallSecs >= 45 && !healthCheckPending) {
          healthCheckPending = true;
          if (!stallWarningShown && stallSecs >= 60) {
            stallWarningShown = true;
            addLocalLog('INFO  Stream quiet for ' + stallSecs + 's — Hermes may be running tools. Click Stop to cancel.');
          }
          fetch('/health', { signal: AbortSignal.timeout(5000) })
            .then(function(r) { return r.ok; })
            .catch(function() { return false; })
            .then(function(alive) {
              healthCheckPending = false;
              if (!alive && getStreamAbort(sessionId)) {
                addLocalLog('WARN  Hermes health check FAILED — aborting');
                updateStreamMessages(sessionId, function(prev) {
                  var updated = [...prev];
                  var last = updated[updated.length - 1];
                  if (last && last.role === 'assistant') {
                    updated[updated.length - 1] = { ...last, streaming: false, thinking: false, content: (last.content || '') + '\n\n_(Hermes appears to be down. Check that it\'s running and try again.)_' };
                  }
                  return updated;
                });
                var ac = getStreamAbort(sessionId); if (ac) ac.abort();
                clearInterval(thinkingInterval);
              } else {
                // Hermes is alive — DON'T abort, just keep waiting
                addLocalLog('INFO  Health OK — Hermes alive, still waiting for stream data');
              }
            });
        }
        // No auto-abort on stall! Hermes may be doing long tool calls.
        // User can always click Stop manually.
        return;
      }
      var elapsed = Math.round((Date.now() - thinkingStart) / 1000);
      addLocalLog('INFO  ... thinking (' + elapsed + 's elapsed)');
      if (elapsed >= NO_RESPONSE_TIMEOUT_S && getStreamAbort(sessionId)) {
        addLocalLog('WARN  No response after ' + NO_RESPONSE_TIMEOUT_S + 's — aborting. Try stopping and resending.');
        updateStreamMessages(sessionId, function(prev) {
          var updated = [...prev];
          var last = updated[updated.length - 1];
          if (last && (last.thinking || last.streaming)) {
            updated[updated.length - 1] = { ...last, streaming: false, thinking: false, content: '_(Hermes did not respond after ' + NO_RESPONSE_TIMEOUT_S + 's — it may be processing something else. Try resending your message.)_' };
          }
          return updated;
        });
        var ac2 = getStreamAbort(sessionId); if (ac2) ac2.abort();
        clearInterval(thinkingInterval);
      }
    }, 5000);

    var fullContent = '';
    var toolCalls = [];

    try {
      var messageText = text;
      if (pendingImages.length) {
        var describedImages = pendingImages.filter(function(img) { return img.description; });
        var failedImages = pendingImages.filter(function(img) { return !img.description; });
        if (describedImages.length > 0) {
          var imageDesc = describedImages.map(function(img, i) {
            return '[Image ' + (i + 1) + ' description from Gemini Vision]:\n' + img.description;
          }).join('\n\n');
          messageText = text + '\n\n---\n' + imageDesc;
        }
        if (failedImages.length > 0) {
          messageText = messageText + '\n\n(Note: ' + failedImages.length + ' image(s) could not be analyzed by Gemini — the user sent them but no description is available)';
        }
      }

      var streamResult = await api.chatStream(
        sessionId,
        messageText,
        function(content) {
          if (!thinkingGotResponse) { thinkingGotResponse = true; addLocalLog('INFO  First response received'); }
          lastChunkTime = Date.now();
          fullContent = content;
          updateStreamMessages(sessionId, function(prev) {
            const updated = [...prev];
            var last = updated[updated.length - 1];
            if (last?.role === 'user') {
              updated.push({
                id: Date.now().toString(),
                role: 'assistant',
                content: fullContent,
                streaming: true,
                thinking: false,
                toolCalls: toolCalls,
              });
            } else {
              updated[updated.length - 1] = {
                ...last,
                role: 'assistant',
                thinking: false,
                content: fullContent,
                streaming: true,
                toolCalls: toolCalls,
              };
            }
            return updated;
          });
        },
        function(finalContent) {
          fullContent = finalContent;

          // ── Artifact auto-detection ──
          (function detectArtifacts(text) {
            if (!text) return;
            console.log('[Artifacts] Scanning response (' + text.length + ' chars) for artifacts...');
            var newArtifacts = [];
            // Detect full HTML documents (```html ... ```)
            var htmlFenceRe = /```html\s*\n([\s\S]*?)```/gi;
            var m;
            while ((m = htmlFenceRe.exec(text)) !== null) {
              var code = m[1].trim();
              if (code.length > 10) {
                newArtifacts.push({ type: 'html', content: code, timestamp: Date.now() });
              }
            }
            // Detect SVG blocks (```svg ... ``` or inline <svg...)
            var svgFenceRe = /```svg\s*\n([\s\S]*?)```/gi;
            while ((m = svgFenceRe.exec(text)) !== null) {
              newArtifacts.push({ type: 'svg', content: m[1].trim(), timestamp: Date.now() });
            }
            var inlineSvgRe = /<svg[\s\S]*?<\/svg>/gi;
            while ((m = inlineSvgRe.exec(text)) !== null) {
              if (m[0].length > 10) newArtifacts.push({ type: 'svg', content: m[0], timestamp: Date.now() });
            }
            // Detect other code fences (python, javascript, css, etc.)
            // Only grab substantial code blocks (5+ lines) — short snippets stay in chat
            var codeFenceRe = /```(\w+)\s*\n([\s\S]*?)```/gi;
            while ((m = codeFenceRe.exec(text)) !== null) {
              var lang = m[1].toLowerCase();
              if (lang === 'html' || lang === 'svg') continue; // already handled
              var codeContent = m[2].trim();
              var lineCount = codeContent.split('\n').length;
              if (codeContent.length > 200 && lineCount >= 5) {
                newArtifacts.push({ type: 'code', language: lang, content: codeContent, timestamp: Date.now() });
              }
            }

            // Detect file paths saved by Hermes (~/path/to/file.html, /Users/.../file.svg, etc.)
            // Auto-load renderable files into artifact panel: HTML, SVG, PDF, CSV
            var filePathRe = /(~\/[^\s`"'<>]+\.(?:html|htm|svg|pdf|csv|tsv))|((\/(?:Users|tmp|home|var)[^\s`"'<>]+\.(?:html|htm|svg|pdf|csv|tsv)))/gi;
            var detectedFiles = [];
            while ((m = filePathRe.exec(text)) !== null) {
              var filePath = m[0];
              if (detectedFiles.indexOf(filePath) === -1) detectedFiles.push(filePath);
            }
            // Fetch each detected file from the local file endpoint
            detectedFiles.forEach(function(fp) {
              console.log('[Artifacts] Auto-loading file: ' + fp);
              var ext = fp.split('.').pop().toLowerCase();

              // PDFs are binary — create artifact with URL reference, not content
              if (ext === 'pdf') {
                var art = { type: 'pdf', url: API_BASE + '/api/image?path=' + encodeURIComponent(fp), timestamp: Date.now(), fileName: fp.split('/').pop(), filePath: fp };
                setArtifacts(function(prev) { return prev.concat([art]); });
                setShowTerminal(true);
                setArtifactPanelWide(true);
                addLocalLog('INFO  Loaded PDF artifact: ' + art.fileName);
                return;
              }

              // CSV/TSV — fetch as text and parse into table data
              if (ext === 'csv' || ext === 'tsv') {
                fetch('/api/localfile?path=' + encodeURIComponent(fp))
                  .then(function(r) { return r.json(); })
                  .then(function(data) {
                    if (data.error) { console.warn('[Artifacts] Failed to load ' + fp + ': ' + data.error); return; }
                    var art = { type: 'csv', content: data.content, timestamp: Date.now(), fileName: data.name, filePath: fp };
                    setArtifacts(function(prev) { return prev.concat([art]); });
                    setShowTerminal(true);
                    setArtifactPanelWide(true);
                    addLocalLog('INFO  Loaded CSV artifact: ' + data.name);
                  })
                  .catch(function(err) { console.warn('[Artifacts] Error loading ' + fp, err); });
                return;
              }

              // HTML/SVG — existing behavior
              fetch('/api/localfile?path=' + encodeURIComponent(fp))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                  if (data.error) { console.warn('[Artifacts] Failed to load ' + fp + ': ' + data.error); return; }
                  var art = { type: data.type, content: data.content, timestamp: Date.now(), fileName: data.name, filePath: fp };
                  if (data.type === 'code') art.language = data.extension.replace('.', '');
                  setArtifacts(function(prev) { return prev.concat([art]); });
                  setShowTerminal(true);
                  setArtifactPanelWide(true);
                  addLocalLog('INFO  Loaded file artifact: ' + data.name);
                })
                .catch(function(err) { console.warn('[Artifacts] Error loading ' + fp, err); });
            });

            console.log('[Artifacts] Found ' + newArtifacts.length + ' inline artifact(s), ' + detectedFiles.length + ' file artifact(s)');
            if (newArtifacts.length > 0) {
              setArtifacts(function(prev) { return prev.concat(newArtifacts); });
              setShowTerminal(true);
              setArtifactPanelWide(true);
              addLocalLog('INFO  Detected ' + newArtifacts.length + ' artifact(s) in response');
            } else if (detectedFiles.length === 0) {
              addLocalLog('INFO  No artifacts detected in response');
            }
          })(finalContent);

          // If Hermes ran tools but sent no text, show a placeholder
          var displayContent = finalContent;
          if (!finalContent.trim() && toolCalls.length > 0) {
            displayContent = '_Hermes completed ' + toolCalls.length + ' tool call' + (toolCalls.length > 1 ? 's' : '') + ' but didn\'t provide a summary. Try asking "what did you do?" for details._';
          }
          updateStreamMessages(sessionId, function(prev) {
            const updated = [...prev];
            updated[updated.length - 1] = {
              ...updated[updated.length - 1],
              role: 'assistant',
              content: displayContent,
              streaming: false,
              toolCalls: toolCalls.map(tc => ({ ...tc, done: true })),
            };
            return updated;
          });
        },
        function(toolEvent) {
          if (toolEvent.type === 'started') {
            if (!thinkingGotResponse) { thinkingGotResponse = true; }
            lastChunkTime = Date.now();  // Reset stall timer — tools count as activity
            addLocalLog('INFO  [tool] ' + (toolEvent.label || toolEvent.toolName) + ' started');
            toolCalls.push({
              toolName: toolEvent.toolName,
              label: toolEvent.label,
              timestamp: new Date(),
              done: false,
            });
            // Update the thinking/streaming message with tool calls
            updateStreamMessages(sessionId, function(prev) {
              var updated = [...prev];
              var last = updated[updated.length - 1];
              if (last && last.role === 'assistant') {
                updated[updated.length - 1] = { ...last, thinking: false, toolCalls: toolCalls.slice() };
              }
              return updated;
            });
            setActivityLog(function(prev) { return [...prev, {
              id: Date.now() + Math.random(),
              emoji: '\u2699\uFE0F',
              label: toolEvent.label || toolEvent.toolName,
              timestamp: new Date(),
              done: false,
            }]; });
          } else if (toolEvent.type === 'completed') {
            var resultPreview = '';
            if (toolEvent.result) {
              var rs = typeof toolEvent.result === 'string' ? toolEvent.result : JSON.stringify(toolEvent.result);
              rs = rs.replace(/\\n/g, ' ').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
              if (rs.length > 200) rs = rs.slice(0, 200) + '...';
              resultPreview = ' => ' + rs;
            }
            addLocalLog('INFO  [tool] ' + (toolEvent.toolName || 'tool') + ' completed' + resultPreview);
            var lastTc = toolCalls[toolCalls.length - 1];
            if (lastTc) {
              lastTc.result = toolEvent.result;
              lastTc.done = true;
            }
            setActivityLog(function(prev) {
              const updated = [...prev];
              const lastEntry = updated[updated.length - 1];
              if (lastEntry) lastEntry.done = true;
              return updated;
            });
          }
        },
        function(thinkingText) {
          if (!thinkingGotResponse) { thinkingGotResponse = true; clearInterval(thinkingInterval); }
          if (thinkingText) {
            // Only log reasoning events — tool events are already logged by onToolEvent
            if (!thinkingText.startsWith('[tool] ') && !thinkingText.startsWith('[timing] ')) {
              addLocalLog('INFO  [thinking] ' + thinkingText.replace(/\n/g, ' ').slice(0, 300));
            }
            ThinkingBubble._latestThought = thinkingText.replace(/^\[(?:reasoning|tool|timing)\] /, '');
          }
        },
        abortCtrl.signal
      );
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('Stream error:', err);
        addLocalLog('ERROR Stream error: ' + err.message);
      }
    } finally {
      clearInterval(thinkingInterval);
      ThinkingBubble._latestThought = '';
      var totalTime = Math.round((Date.now() - thinkingStart) / 1000);
      addLocalLog('INFO  Response complete (' + toolCalls.length + ' tool calls, ' + fullContent.length + ' chars, ' + totalTime + 's total)');
      stopStreaming(sessionId);
      // Capture token usage from stream result
      var usage = streamResult && streamResult.usage;
      // If API didn't provide usage, don't estimate — show nothing rather than wrong numbers
      if (!usage) {
        console.log('[tokens] No usage data from API for this response');
      }
      // Final sync: persist messages and token usage into conversation for localStorage save.
      // updateStreamMessages already keeps conversations in sync during streaming,
      // but do one final write from messagesRef to be safe.
      if (activeConvRef.current === sessionId) {
        // Still viewing this conversation — sync from current messages state
        setConversations(function(prev) {
          return prev.map(function(c) {
            if (c.id !== sessionId) return c;
            var update = { messages: messagesRef.current };
            if (usage) {
              update.input_tokens = (c.input_tokens || 0) + (usage.prompt_tokens || 0);
              update.output_tokens = (c.output_tokens || 0) + (usage.completion_tokens || 0);
              console.log('[tokens] Updated conversation tokens:', update.input_tokens, 'in /', update.output_tokens, 'out');
            }
            return Object.assign({}, c, update);
          });
        });
      } else {
        // User switched away — still update token counts
        if (usage) {
          setConversations(function(prev) {
            return prev.map(function(c) {
              if (c.id !== sessionId) return c;
              return Object.assign({}, c, {
                input_tokens: (c.input_tokens || 0) + (usage.prompt_tokens || 0),
                output_tokens: (c.output_tokens || 0) + (usage.completion_tokens || 0),
              });
            });
          });
        }
      }
      // If user switched away, conversations array is already up-to-date
      // from updateStreamMessages calls during streaming.
    }
  };

  // ── Pause / Stop / Interject ──
  const sendInterjection = async (text) => {
    if (!text.trim()) return;
    setPausedSessionIds(prev => prev.filter(id => id !== activeConvId));
    await sendMessage(text);
  };

  const [pausedSessionIds, setPausedSessionIds] = useState([]);
  // Override isPaused to use dedicated state
  const isPaused = pausedSessionIds.includes(activeConvId);

  const pauseStreaming = () => {
    const sid = activeConvId;
    if (!sid) return;
    var entry = streamingMap.current[sid];
    if (entry) {
      entry.abortController.abort();
    }
    stopStreaming(sid);
    setPausedSessionIds(prev => prev.includes(sid) ? prev : [...prev, sid]);
  };

  const stopStreamingAction = () => {
    const sid = activeConvId;
    if (!sid) return;
    var entry = streamingMap.current[sid];
    if (entry) {
      entry.abortController.abort();
    }
    stopStreaming(sid);
    setPausedSessionIds(prev => prev.filter(id => id !== sid));
  };

  const cancelPause = () => {
    setPausedSessionIds(prev => prev.filter(id => id !== activeConvId));
  };

  // ── Message editing ──
  const startEditMessage = (messageId, currentContent) => {
    setEditingMessageId(messageId);
    setEditingContent(currentContent);
  };

  const cancelEdit = () => {
    setEditingMessageId(null);
    setEditingContent('');
  };

  const saveEditedMessage = async (messageId, newContent) => {
    if (!activeConvId || !newContent.trim()) return;
    try {
      const forkResp = await fetch(API_BASE + '/api/sessions/' + activeConvId + '/fork', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message_id: messageId })
      });
      if (!forkResp.ok) throw new Error('Fork failed');
      const forkedSession = await forkResp.json();
      setActiveConvId(forkedSession.id);
      await selectConversation(forkedSession.id);
      await sendMessage(newContent);
      setEditingMessageId(null);
    } catch (e) {
      console.error('Message edit failed:', e);
      // Fallback: just send as new message
      setEditingMessageId(null);
      await sendMessage(newContent);
    }
  };

  // ── Search / filter ──
  const filteredConvs = conversations.filter(c => (c.title || '').toLowerCase().includes(searchQuery.toLowerCase()));

  const handleSessionSearch = async (query) => {
    if (query.trim() && searchMode) {
      try {
        const r = await fetch(API_BASE + '/api/sessions/search?q=' + encodeURIComponent(query));
        if (r.ok) {
          const results = await r.json();
          setConversations(results.items || []);
        }
      } catch (e) {
        console.error('Session search failed:', e);
      }
    }
  };

  const toggleSearchMode = () => {
    if (searchMode) {
      setSearchMode(false);
      // Reload normal conversations
      (async () => {
        try {
          const r = await fetch(API_BASE + '/api/sessions');
          if (r.ok) {
            const result = await r.json();
            setConversations((result.items || []).slice(0, 30));
          }
        } catch (e) { /* ignore */ }
      })();
    } else {
      setSearchMode(true);
    }
  };

  const anyAnalyzing = pendingImages.some(img => img.analyzing);

  // ── Clipboard paste handler ──
  useEffect(() => {
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imageFiles = [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          const file = items[i].getAsFile();
          if (file) imageFiles.push(file);
        }
      }
      if (imageFiles.length > 0) {
        e.preventDefault();
        processImages(imageFiles);
      }
    };
    document.addEventListener('paste', handlePaste);
    return () => document.removeEventListener('paste', handlePaste);
  }, [config.geminiKey]);

  // ── Render ──
  return (
    <div className="app-wrapper">
    <div className="app">
      {/* Sidebar backdrop overlay (mobile) */}
      {!sidebarCollapsed && (
        <div className="sidebar-backdrop" onClick={() => setSidebarCollapsed(true)} />
      )}

      {/* Sidebar */}
      {/* Floating sidebar toggle when collapsed */}
      {sidebarCollapsed && (
        <button onClick={() => setSidebarCollapsed(false)} title="Show sidebar"
          style={{position:'absolute',left:'8px',top:'12px',zIndex:10,background:'var(--glass)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',border:'1px solid var(--glass-border)',color:'var(--text-secondary)',borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'16px',transition:'all 0.2s',boxShadow:'0 2px 12px rgba(0,0,0,0.3)'}}>
          {'☰'}
        </button>
      )}

      <div className={"sidebar " + (sidebarCollapsed ? 'collapsed' : '')}>
        <div className="sidebar-header">
          <h1>Hermes</h1>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <button className="new-chat-btn" onClick={newConversation}>New</button>
            <button className="sidebar-close-btn" onClick={() => setSidebarCollapsed(true)} title="Hide sidebar"
              style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'6px 8px',borderRadius:'6px',fontSize:'14px',transition:'color 0.2s',minWidth:'32px',minHeight:'32px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {'✕'}
            </button>
          </div>
        </div>

        {/* Navigation */}
        <div className="sidebar-nav">
          {/* section labels removed for density */}
          <div className={"nav-item " + (currentView === 'dashboard' ? 'active' : '')} onClick={function() { setCurrentView('dashboard'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'📊'}</span>
            <span className="nav-item-label">Dashboard</span>
          </div>
          <div className={"nav-item " + (currentView === 'chat' ? 'active' : '')} onClick={function() { setCurrentView('chat'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'💬'}</span>
            <span className="nav-item-label">Chat</span>
          </div>
          <div className={"nav-item " + (currentView === 'files' ? 'active' : '')} onClick={function() { setCurrentView('files'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'📁'}</span>
            <span className="nav-item-label">Files</span>
          </div>
          <div className={"nav-item " + (currentView === 'terminal' ? 'active' : '')} onClick={function() { setCurrentView('terminal'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon" style={{fontFamily:'Monaco, Menlo, monospace',fontSize:'14px',fontWeight:'700'}}>{'>'}</span>
            <span className="nav-item-label">Terminal</span>
          </div>
          <div className={"nav-item " + (currentView === 'jobs' ? 'active' : '')} onClick={function() { setCurrentView('jobs'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'🕐'}</span>
            <span className="nav-item-label">Cron Jobs</span>
          </div>

          <div style={{borderTop:'1px solid var(--border)',margin:'4px 8px'}} />
          <div className={"nav-item " + (currentView === 'memory' ? 'active' : '')} onClick={function() { setCurrentView('memory'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'🧠'}</span>
            <span className="nav-item-label">Memory</span>
          </div>
          <div className={"nav-item " + (currentView === 'skills' ? 'active' : '')} onClick={function() { setCurrentView('skills'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'✨'}</span>
            <span className="nav-item-label">Skills</span>
          </div>

          <div style={{borderTop:'1px solid var(--border)',margin:'4px 8px'}} />
        </div>

        <div className="sidebar-search" style={{display: currentView === 'chat' ? 'block' : 'none'}}>
          <input type="text" placeholder={searchMode ? "Search content..." : "Search chats..."} value={searchQuery} onChange={e => { setSearchQuery(e.target.value); if (searchMode) handleSessionSearch(e.target.value); }} />
        </div>
        <div className="conversation-list" style={{display: currentView === 'chat' ? 'block' : 'none'}}>
          {filteredConvs.map(conv => (
            <div key={conv.id} className={"conv-item " + (conv.id === activeConvId ? 'active' : '')} onClick={() => selectConversation(conv.id)}>
              <div className="conv-item-icon">{streamingSessionIds.includes(conv.id) ? '⚡' : conv.source === 'telegram' ? '✈️' : '💬'}</div>
              <div className="conv-item-text">
                {editingConvId === conv.id ? (
                  <input className="conv-rename-input" value={editingTitle} autoFocus
                    onChange={function(e) { setEditingTitle(e.target.value); }}
                    onKeyDown={function(e) { if (e.key === 'Enter') saveRenameConv(); if (e.key === 'Escape') { setEditingConvId(null); } }}
                    onBlur={saveRenameConv}
                    onClick={function(e) { e.stopPropagation(); }}
                  />
                ) : (
                  <div className="conv-item-title" style={conv.source === 'telegram' ? {color:'#29b6f6'} : {}} onDoubleClick={function(e) { e.stopPropagation(); startRenameConv(conv.id, conv.title); }}>{conv.title}</div>
                )}
                <div className="conv-item-date">
                  {conv.message_count > 0 && <span style={{color:'var(--accent)',fontWeight:'600',marginRight:'4px'}} title={conv.message_count + ' messages, ' + (conv.tool_call_count || 0) + ' tool calls'}>{conv.user_prompt_count != null ? (conv.user_prompt_count + (conv.user_prompt_count === 1 ? ' prompt' : ' prompts')) : (conv.message_count + ' msgs')}</span>}
                  {conv.has_compaction && <span style={{color:'var(--text-secondary)',fontSize:'9px',marginRight:'4px'}} title="This chat was compacted">{'🔄'}</span>}
                  {conv.created}
                </div>
              </div>
              <button className="conv-item-rename" onClick={function(e) { e.stopPropagation(); startRenameConv(conv.id, conv.title); }} title="Rename">{'✏'}</button>
              <button className="conv-item-delete" onClick={e => { e.stopPropagation(); deleteConversation(conv.id); }}>{'×'}</button>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <select className="personality-select" value={personality} onChange={e => setPersonality(e.target.value)}>
            {Object.entries(PERSONALITY_LABELS).map(([k, v]) => (<option key={k} value={k}>{v}</option>))}
          </select>
        </div>
      </div>

      {/* Main panel */}
      <div className={"main " + (currentView !== 'chat' ? 'non-chat-view' : '')}>
        {currentView === 'chat' ? (
          <React.Fragment>
            <div className="header">
              <div className="header-title">{activeConvId ? (conversations.find(c => c.id === activeConvId)?.title || 'Hermes') : 'Hermes'}</div>
              <div className="header-status">
                <div className={"status-dot " + (connected === false ? 'disconnected' : '')}></div>
                {connected === null ? 'Checking...' : connected ? 'Connected' : 'Offline'}
              </div>

              <div className="header-controls">
                <div className="theme-switcher">
                  {Object.entries(THEMES).map(function([key, t]) {
                    return <div key={key} className={"theme-dot " + t.className + (currentTheme === key ? ' active' : '')} title={t.label} onClick={function() { setCurrentTheme(key); }} />;
                  })}
                </div>
                <button className="header-btn hide-mobile" onClick={exportChat} title="Export as PDF/HTML">{'📄'}</button>
                <button className="header-btn hide-mobile" onClick={function() { if (messages.length > 0) { var t = activeConvId ? (conversations.find(function(c){return c.id===activeConvId;})||{}).title : 'Chat'; exportChatAsMarkdown(messages, t || 'Chat'); } }} title="Export as Markdown">{'📝'}</button>
                <button className={"header-btn hide-mobile " + (showTerminal ? 'active' : '')} onClick={function(){ setShowTerminal(!showTerminal); }} title="Live terminal logs">{'>_'}</button>
                <button className="header-btn hide-mobile" onClick={() => setShowMCPBrowser(true)} title="MCP Tools">{'🔧'}</button>
                <button className="header-btn" onClick={toggleSearchMode} title="Search content">{'🔍'}</button>
                <button className="header-btn hide-mobile" onClick={function(){ setShowShortcuts(true); }} title="Keyboard shortcuts (?)">{'⌨'}</button>
                <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings">{'⚙'}</button>
                <button className="header-btn" onClick={() => setSidebarCollapsed(!sidebarCollapsed)} title="Toggle sidebar">{'☰'}</button>
              </div>
            </div>

            {/* Messages area */}
            <div className="messages">
              {messages.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-state-icon">{'💬'}</div>
                  <div className="empty-state-text">Start a conversation with Hermes</div>
                </div>
              ) : (
                <div className="messages-container">
                  {messages.map(msg => (
                    msg.role === 'compaction' ? (
                      <div key={msg.id} className="compaction-marker">
                        <div className="compaction-line" />
                        <span className="compaction-label">{'🔄'} {msg.content}</span>
                        <div className="compaction-line" />
                      </div>
                    ) : editingMessageId === msg.id ? (
                      <div key={msg.id} className="message user">
                        <div className="message-header">
                          <div className="message-avatar user">U</div>
                          <span className="message-role">You (editing)</span>
                        </div>
                        <div className="message-edit-area">
                          <textarea
                            className="edit-textarea"
                            value={editingContent}
                            onChange={e => setEditingContent(e.target.value)}
                            autoFocus
                          />
                          <div className="edit-buttons">
                            <button className="edit-btn save" onClick={() => saveEditedMessage(msg.id, editingContent)}>Save</button>
                            <button className="edit-btn cancel" onClick={cancelEdit}>Cancel</button>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <MessageBubble key={msg.id} message={msg} onImageClick={setLightboxSrc} onEdit={startEditMessage} />
                    )
                  ))}
                  <div ref={messagesEndRef} />
                </div>
              )}
            </div>

            {/* Input area */}
            <div className="input-area">
              <div className="input-container">
                {pendingImages.length > 0 && (
                  <div className="image-preview-strip">
                    {pendingImages.map(img => (
                      <div key={img.id} className="image-preview-item">
                        <img src={img.dataUrl} alt="Preview" onClick={function(e) { e.stopPropagation(); setLightboxSrc(img.dataUrl); }} />
                        <button className="image-preview-remove" onClick={() => removeImage(img.id)}>x</button>
                        {img.analyzing && <div className="analyzing-badge">{'Analyzing with Gemini...'}</div>}
                        {!img.analyzing && img.description && <div className="analyzing-badge" style={{background:'rgba(85,192,136,0.85)'}}>{'Ready'}</div>}
                        {!img.analyzing && !img.description && <div className="analyzing-badge" style={{background:'rgba(224,85,85,0.85)'}} title={img.status || 'Analysis failed'}>{'Failed'}</div>}
                      </div>
                    ))}
                  </div>
                )}

                {isPaused && (
                  <div className="paused-banner">
                    <span className="paused-banner-text">{'⏸ Paused — type an interjection or resume'}</span>
                    <button className="cancel-resume" onClick={() => {
                      var lastMsg = messagesRef.current.filter(m => m.role === 'assistant').pop();
                      var tail = lastMsg && lastMsg.content ? lastMsg.content.trim().slice(-300) : '';
                      var resumePrompt = tail
                        ? '[I paused your response. Here is the last part you wrote before I paused:]\n\n"...' + tail + '"\n\nPlease continue exactly where you left off.'
                        : 'I paused your response — please continue exactly where you left off.';
                      cancelPause(); sendMessage(resumePrompt);
                    }} style={{background:'var(--accent)',color:'white',border:'none',borderRadius:'6px',padding:'4px 12px',fontSize:'12px',cursor:'pointer',fontWeight:600}}>Resume</button>
                    <button className="cancel-resume" onClick={cancelPause}>Dismiss</button>
                  </div>
                )}

                <div className="input-wrapper">
                  <textarea
                    ref={textareaRef}
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        isPaused ? sendInterjection(input) : sendMessage(input);
                      }
                    }}
                    placeholder={connected === false ? 'Hermes API not connected...' : isPaused ? 'Type your interjection...' : anyAnalyzing ? 'Waiting for image analysis...' : 'Message Hermes... (paste or drop images)'}
                    rows={1}
                    disabled={connected === false}
                  />
                  <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={e => { if (e.target.files.length) processImages(e.target.files); e.target.value = ''; }} />
                  <div className="input-btn-group">
                    <button className="attach-btn" onClick={() => fileInputRef.current?.click()} title="Attach image">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    {isStreaming ? (
                      <React.Fragment>
                        <button className="send-btn pause-btn" onClick={pauseStreaming} title="Pause to interject">
                          <svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
                        </button>
                        <button className="send-btn stop-btn" onClick={stopStreamingAction} title="Stop">
                          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
                        </button>
                      </React.Fragment>
                    ) : isPaused ? (
                      <button className="send-btn" onClick={() => sendInterjection(input)} disabled={!input.trim()}>
                        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z" fill="currentColor"/></svg>
                      </button>
                    ) : (
                      <button className="send-btn" onClick={() => sendMessage(input)} disabled={(!input.trim() && !pendingImages.length) || connected === false || anyAnalyzing}>
                        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z" fill="currentColor"/></svg>
                      </button>
                    )}
                  </div>
                </div>
                <div className="input-hint">
                  {isStreaming ? 'Pause to interject \u00B7 Stop to cancel' : isPaused ? 'Enter to send interjection \u00B7 Dismiss to keep partial response' : 'Shift+Enter for new line \u00B7 Paste/drop images \u00B7 ' + (PERSONALITY_LABELS[personality] || 'Default') + ' mode' + (!config.geminiKey ? ' \u00B7 Add Gemini key in Settings for image analysis' : '')}
                </div>
              </div>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="header">
              <div className="header-title">
                {currentView === 'dashboard' ? 'Dashboard' : currentView === 'files' ? 'Files' : currentView === 'terminal' ? 'Terminal' : currentView === 'jobs' ? 'Cron Jobs' : currentView === 'memory' ? 'Memory' : 'Skills'}
              </div>
              <div className="header-controls">
                <div className="theme-switcher">
                  {Object.entries(THEMES).map(function([key, t]) {
                    return <div key={key} className={"theme-dot " + t.className + (currentTheme === key ? ' active' : '')} title={t.label} onClick={function() { setCurrentTheme(key); }} />;
                  })}
                </div>
                <button className="header-btn hide-mobile" onClick={function(){ setShowShortcuts(true); }} title="Keyboard shortcuts (?)">{'⌨'}</button>
                <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings">{'⚙'}</button>
                <button className="header-btn" onClick={() => setSidebarCollapsed(!sidebarCollapsed)} title="Toggle sidebar">{'☰'}</button>
              </div>
            </div>
            {currentView === 'dashboard' && <DashboardView />}
            {currentView === 'files' && <FilesView />}
            {currentView === 'terminal' && <TerminalView />}
            {currentView === 'jobs' && <JobsView />}
            {currentView === 'memory' && <MemoryView />}
            {currentView === 'skills' && <SkillsView />}
          </React.Fragment>
        )}
      </div>

      {/* Right column: Live Terminal */}
      <div className={"right-column" + (artifactPanelWide ? ' wide' : '') + (showTerminal ? '' : ' closed')}>
        <TerminalPanel isOpen={showTerminal} onClose={function(){setShowTerminal(false); setArtifactPanelWide(false);}} localLogs={localLogs} artifacts={artifacts} onArtifactTab={function(isWide){ setArtifactPanelWide(isWide); if(isWide && !showTerminal) setShowTerminal(true); }} onAddArtifact={function(art){ setArtifacts(function(prev){ return prev.concat([art]); }); }} onRemoveArtifact={function(idx){ setArtifacts(function(prev){ return prev.filter(function(_,i){ return i !== idx; }); }); }} />
      </div>

      {/* Modals */}
      {showSettings && <SettingsModal config={config} onSave={setConfig} onClose={() => setShowSettings(false)} mcpToolCount={mcpTools.length} />}
      {lightboxSrc && <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />}
      {showMCPBrowser && <MCPBrowserModal tools={mcpTools} onClose={() => setShowMCPBrowser(false)} />}
      {showShortcuts && <ShortcutsModal onClose={function(){ setShowShortcuts(false); }} />}
      {showWelcome && <WelcomePopup onClose={function(){ setShowWelcome(false); try { localStorage.setItem('hermes-ui-welcomed', '1'); } catch(e){} }} onOpenRemoteSetup={function(){ setShowSettings(true); }} />}

    </div>
    {/* Status Bar */}
    <StatusBar connected={connected} conversations={conversations} />

    {/* Mobile Bottom Navigation */}
    <div className="mobile-bottom-nav">
      {[
        { view: 'dashboard', icon: '📊', label: 'Home' },
        { view: 'chat', icon: '💬', label: 'Chat' },
        { view: 'skills', icon: '✨', label: 'Skills' },
        { view: 'memory', icon: '🧠', label: 'Memory' },
        { view: 'terminal', icon: '⚡', label: 'More' },
      ].map(function(item) {
        return (
          <button key={item.view} className={"mobile-nav-item " + (currentView === item.view ? 'active' : '')}
            onClick={function() { setCurrentView(item.view); setSidebarCollapsed(true); }}>
            <span className="mobile-nav-icon">{item.icon}</span>
            <span className="mobile-nav-label">{item.label}</span>
          </button>
        );
      })}
    </div>
    </div>
  );
}

/* ── Error Boundary ── */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:'40px',color:'#e05555',fontFamily:'monospace',background:'#0a0a0f',minHeight:'100vh'}}>
          <h2>Something went wrong</h2>
          <pre style={{whiteSpace:'pre-wrap',color:'#8888a0'}}>{this.state.error.message}{'\n'}{this.state.error.stack}</pre>
          <button onClick={() => { this.setState({error:null}); location.reload(); }} style={{marginTop:'20px',padding:'10px 20px',background:'#7c6fe0',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}}>Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
