        console.error('MCP tools fetch failed:', e);
      }
    };
    fetchMCPTools();
  }, []);

  // Apply theme on mount and changes
  useEffect(() => {
    applyTheme(currentTheme);
  }, [currentTheme]);

  // Global keyboard shortcuts
  useEffect(() => {
    var isMac = navigator.platform.indexOf('Mac') > -1;
    var handleKeyboard = function(e) {
      var mod = isMac ? e.metaKey : e.ctrlKey;
      // ? key — show shortcuts (only if not typing in input)
      if (e.key === '?' && !e.target.matches('input, textarea, [contenteditable]')) {
        e.preventDefault();
        setShowShortcuts(function(v) { return !v; });
        return;
      }
      // Escape — close modals
      if (e.key === 'Escape') {
        setShowShortcuts(false);
        setShowSettings(false);
        setLightboxSrc(null);
        setShowMCPBrowser(false);
        return;
      }
      // Cmd/Ctrl+K — focus search
      if (mod && e.key === 'k') {
        e.preventDefault();
        setCurrentView('chat');
        setTimeout(function() {
          var searchInput = document.querySelector('.sidebar-search input');
          if (searchInput) searchInput.focus();
        }, 100);
        return;
      }
      // Cmd/Ctrl+N — new chat
      if (mod && e.key === 'n') {
        e.preventDefault();
        newConversation();
        return;
      }
      // Cmd/Ctrl+\ — toggle sidebar
      if (mod && e.key === '\\') {
        e.preventDefault();
        setSidebarCollapsed(function(v) { return !v; });
        return;
      }
      // Cmd/Ctrl+E — export as markdown
      if (mod && e.key === 'e') {
        e.preventDefault();
        if (messages.length > 0) {
          var convTitle = activeConvId ? (conversations.find(function(c) { return c.id === activeConvId; }) || {}).title : 'Chat';
          exportChatAsMarkdown(messages, convTitle || 'Chat');
        }
        return;
      }
    };
    document.addEventListener('keydown', handleKeyboard);
    return function() { document.removeEventListener('keydown', handleKeyboard); };
  }, [messages, activeConvId, conversations]);

  // ── API methods ──
  const api = {
    async createSession() {
      const r = await fetch(API_BASE + '/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: 'webui' }),
      });
      if (!r.ok) {
        const err = await r.text();
        throw new Error('Failed to create session: ' + r.status + ' ' + err);
      }
      const data = await r.json();
      return data.session.id;
    },

    async listSessions() {
      const r = await fetch(API_BASE + '/api/sessions');
      if (!r.ok) {
        const err = await r.text();
        throw new Error('Failed to list sessions: ' + r.status + ' ' + err);
      }
      const data = await r.json();
      return data.items || data.sessions || [];
    },

    async deleteSession(sessionId) {
      try {
        await fetch(API_BASE + '/api/sessions/' + sessionId, { method: 'DELETE' });
      } catch (e) { /* ignore - still remove from UI */ }
    },

    async getSessionMessages(sessionId) {
      const r = await fetch(API_BASE + '/api/sessions/' + sessionId + '/messages');
      if (!r.ok) {
        const err = await r.text();
        throw new Error('Failed to get messages: ' + r.status + ' ' + err);
      }
      const data = await r.json();
      return data.items || data.messages || [];
    },

    async chatStream(sessionId, message, onChunk, onDone, onToolEvent, onThinking, signal) {
      const r = await fetch(API_BASE + '/api/sessions/' + sessionId + '/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message }),
        signal: signal,
      });
      if (!r.ok) {
        const err = await r.text();
        throw new Error('Chat error ' + r.status + ': ' + err);
      }

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      var buffer = '';
      var fullContent = '';

      // Reasoning tag parser state
      var rawContent = '';  // accumulates raw content including reasoning tags
      var inReasoning = false;
      var reasoningBuffer = '';
      var _OPEN_TAGS = ['<REASONING_SCRATCHPAD>', '<think>', '<reasoning>', '<THINKING>', '<thinking>'];
      var _CLOSE_TAGS = ['</REASONING_SCRATCHPAD>', '</think>', '</reasoning>', '</THINKING>', '</thinking>'];

      function stripReasoningTags(text) {
        // Remove all reasoning tag pairs and their content from visible text
        var result = text;
        result = result.replace(/<REASONING_SCRATCHPAD>[\s\S]*?<\/REASONING_SCRATCHPAD>/g, '');
        result = result.replace(/<think>[\s\S]*?<\/think>/gi, '');
        result = result.replace(/<reasoning>[\s\S]*?<\/reasoning>/gi, '');
        result = result.replace(/<THINKING>[\s\S]*?<\/THINKING>/g, '');
        // Remove any unclosed reasoning tags (still streaming)
        result = result.replace(/<REASONING_SCRATCHPAD>[\s\S]*/g, '');
        result = result.replace(/<think>[\s\S]*/gi, '');
        result = result.replace(/<reasoning>[\s\S]*/gi, '');
        result = result.replace(/<THINKING>[\s\S]*/g, '');
        return result.replace(/^\s+/, '');
      }

      function processReasoningDelta(delta) {
        // Accumulate raw content and extract reasoning
        rawContent += delta;
        // Check for reasoning tags in the raw content and emit to onThinking
        if (!inReasoning) {
          for (var oi = 0; oi < _OPEN_TAGS.length; oi++) {
            var openIdx = rawContent.lastIndexOf(_OPEN_TAGS[oi]);
            if (openIdx !== -1) {
              // Check if there's a matching close after this open
              var closeTag = _CLOSE_TAGS[oi];
              var closeIdx = rawContent.indexOf(closeTag, openIdx + _OPEN_TAGS[oi].length);
              if (closeIdx !== -1) {
                // Complete reasoning block — extract and emit
                var reasoningText = rawContent.slice(openIdx + _OPEN_TAGS[oi].length, closeIdx).trim();
                if (reasoningText && onThinking) {
                  var lines = reasoningText.split('\n');
                  for (var li = 0; li < lines.length; li++) {
                    if (lines[li].trim()) onThinking('[reasoning] ' + lines[li].trim().slice(0, 300));
                  }
                }
              } else {
                // Open tag found but no close yet — we're inside reasoning
                inReasoning = true;
                var newReasoning = rawContent.slice(openIdx + _OPEN_TAGS[oi].length);
                if (newReasoning.trim() && onThinking) {
                  onThinking('[reasoning] ' + newReasoning.replace(/\n/g, ' ').trim().slice(0, 300));
                }
                reasoningBuffer = newReasoning;
              }
              break;
            }
          }
        } else {
          // Already inside reasoning — check for close tag
          reasoningBuffer += delta;
          for (var ci = 0; ci < _CLOSE_TAGS.length; ci++) {
            if (reasoningBuffer.indexOf(_CLOSE_TAGS[ci]) !== -1) {
              var beforeClose = reasoningBuffer.split(_CLOSE_TAGS[ci])[0];
              if (beforeClose.trim() && onThinking) {
                onThinking('[reasoning] ' + beforeClose.replace(/\n/g, ' ').trim().slice(0, 300));
              }
              inReasoning = false;
              reasoningBuffer = '';
              break;
            }
          }
          // Emit incremental reasoning while still inside block
          if (inReasoning && delta.trim() && onThinking) {
            onThinking('[reasoning] ' + delta.replace(/\n/g, ' ').trim().slice(0, 300));
          }
        }
        // Return visible content with reasoning stripped
        return stripReasoningTags(rawContent);
      }

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const events = buffer.split('\n\n');
        buffer = events.pop() || '';

        for (const eventBlock of events) {
          if (!eventBlock.trim()) continue;
          const lines = eventBlock.split('\n');
          var eventType = '';
          var eventData = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
            else if (line.startsWith('data: ')) eventData = line.slice(6).trim();
          }
          if (!eventType || !eventData) continue;
          try {
            const data = JSON.parse(eventData);
            if (eventType === 'assistant.delta' && data.delta) {
              fullContent = processReasoningDelta(data.delta);
              onChunk(fullContent);
            } else if (eventType === 'assistant.completed') {
              fullContent = data.content || fullContent;
              onDone(fullContent);
            } else if (eventType === 'tool.progress') {
              if (onThinking) onThinking(data.delta || '');
            } else if (eventType === 'tool.started') {
              onToolEvent({ type: 'started', toolName: data.tool_name, label: data.preview || data.tool_name, args: data.args });
            } else if (eventType === 'tool.pending') {
              onToolEvent({ type: 'pending', toolName: data.tool_name, label: data.preview || data.tool_name });
            } else if (eventType === 'tool.completed' || eventType === 'tool.failed') {
              onToolEvent({ type: 'completed', toolName: data.tool_name, result: data.result_preview || data.result, failed: eventType === 'tool.failed' });
            } else if (eventType === 'artifact.created') {
              onToolEvent({ type: 'artifact', toolName: data.tool_name, path: data.path });
            } else if (eventType === 'error') {
              var errMsg = data.message || data.error || 'Unknown error from Hermes';
              onDone('⚠️ **Error:** ' + errMsg);
            }
          } catch (e) { /* ignore parse errors */ }
        }
      }

      // Process remaining buffer
      if (buffer.trim()) {
        const lines = buffer.split('\n');
        var eventType2 = '';
        var eventData2 = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) eventType2 = line.slice(7).trim();
          else if (line.startsWith('data: ')) eventData2 = line.slice(6).trim();
        }
        if (eventType2 && eventData2) {
          try {
            const data = JSON.parse(eventData2);
            if (eventType2 === 'assistant.delta' && data.delta) {
              fullContent = processReasoningDelta(data.delta);
              onChunk(fullContent);
            } else if (eventType2 === 'assistant.completed') {
              fullContent = data.content || fullContent;
              onDone(fullContent);
            }
          } catch (e) { /* ignore */ }
        }
      }
      return fullContent;
    }
  };

  // ── Image processing ──
  const processImages = async (files) => {
    if (!config.geminiKey) {
      alert('Add your Gemini API key in Settings to analyze images.\n\nSince MiniMax cannot see images directly, Gemini is used to describe images before sending to Hermes.');
      return;
    }
    for (const file of files) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const dataUrl = e.target.result;
        const imgId = Date.now() + Math.random();
        // Detect mime type from the data URL
        var mimeType = 'image/jpeg';
        var mimeMatch = dataUrl.match(/^data:(image\/[a-zA-Z+]+);/);
        if (mimeMatch) mimeType = mimeMatch[1];
        setPendingImages(prev => [...prev, { id: imgId, dataUrl: dataUrl, analyzing: true, status: 'Analyzing with Gemini...' }]);
        try {
          const base64 = dataUrl.split(',')[1];
          const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + config.geminiKey, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [
                { text: 'Describe this image in detail. Include: what type of image it is, all visible text/labels, colors, layout, any UI elements, diagrams, or notable features. Be thorough — your description is the only way the recipient will understand this image.' },
                { inlineData: { mimeType: mimeType, data: base64 } },
              ]}],
            }),
          });
          if (!r.ok) {
            var errText = await r.text();
            throw new Error('Gemini API ' + r.status + ': ' + errText.slice(0, 200));
          }
          const data = await r.json();
          const description = data.candidates?.[0]?.content?.parts?.[0]?.text || null;
          if (!description) {
            throw new Error('Gemini returned no description');
          }
          setPendingImages(prev => prev.map(img => img.id === imgId ? { ...img, analyzing: false, description: description, status: 'Ready' } : img));
        } catch (err) {
          console.error('Gemini image analysis failed:', err);
          addLocalLog('ERROR Gemini image analysis failed: ' + err.message);
          setPendingImages(prev => prev.map(img => img.id === imgId ? { ...img, analyzing: false, description: null, status: 'Failed: ' + err.message } : img));
        }
      };
      reader.readAsDataURL(file);
    }
  };

  const removeImage = (imgId) => {
    setPendingImages(prev => prev.filter(img => img.id !== imgId));
  };

  // ── Conversation management ──
  const newConversation = async () => {
    try {
      const sessionId = await api.createSession();
      const conv = { id: sessionId, title: 'New Chat', created: new Date().toLocaleString(), messages: [] };
      setConversations(prev => [conv, ...prev]);
      setActiveConvId(sessionId);
      setMessages([]);
      setInput('');
    } catch (err) {
      console.error('Failed to create session:', err);
    }
  };

  const selectConversation = async (convId) => {
    try {
      setActiveConvId(convId);
      const msgs = await api.getSessionMessages(convId);

      // Count actual user prompts and detect compaction
      const userPromptCount = msgs.filter(m => m.role === 'user').length;
      const hasCompaction = msgs.some(m => (m.role === 'system' && m.content && /compaction|compacted|summary of prior|conversation summary|context.{0,20}(compacted|compressed|trimmed)/i.test(m.content)) || (m.type && /compaction/i.test(m.type)));

      // Update the conversation with real user prompt count
      setConversations(prev => prev.map(c => c.id === convId ? { ...c, user_prompt_count: userPromptCount, has_compaction: hasCompaction } : c));

      // Build UI messages, inserting compaction markers for system compaction messages
      const uiMessages = [];
      msgs.forEach(function(msg) {
        if ((msg.role === 'system' && msg.content && /compaction|compacted|summary of prior|conversation summary|context.{0,20}(compacted|compressed|trimmed)/i.test(msg.content)) || (msg.type && /compaction/i.test(msg.type))) {
          uiMessages.push({
            id: 'compaction-' + msg.id,
            role: 'compaction',
            content: 'Context compacted — earlier messages were summarized',
            images: [],
            toolCalls: [],
          });
        } else if ((msg.role === 'user' || msg.role === 'assistant') && (msg.role === 'user' || (msg.content && msg.content.trim()))) {
          uiMessages.push({
            id: String(msg.id),
            role: msg.role,
            content: msg.content || '',
            images: [],
            toolCalls: [],
          });
        }
      });
      setMessages(uiMessages);
      setInput('');
    } catch (err) {
      console.error('Failed to load session messages:', err);
    }
  };

  const deleteConversation = (convId) => {
    api.deleteSession(convId);
    setConversations(prev => prev.filter(c => c.id !== convId));
    if (activeConvId === convId) {
      setActiveConvId(null);
      setMessages([]);
    }
  };

  const [editingConvId, setEditingConvId] = useState(null);
  const [editingTitle, setEditingTitle] = useState('');
  const startRenameConv = function(convId, currentTitle) {
    setEditingConvId(convId);
    setEditingTitle(currentTitle || '');
  };
  const saveRenameConv = function() {
    if (editingConvId && editingTitle.trim()) {
      var newTitle = editingTitle.trim();
      var convId = editingConvId;
      setConversations(function(prev) {
        return prev.map(function(c) {
          return c.id === convId ? Object.assign({}, c, { title: newTitle }) : c;
        });
      });
      // Persist rename to Hermes API
      try {
        fetch(API_BASE + '/api/sessions/' + convId, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: newTitle }),
        });
      } catch (e) { /* ignore */ }
    }
    setEditingConvId(null);
    setEditingTitle('');
  };

  // Load sessions on mount, then fetch real prompt counts
  useEffect(() => {
    const loadSessions = async () => {
      try {
        const sessions = await api.listSessions();
        const convs = sessions.filter(sess => sess.preview || (sess.title && !/^New Chat(?: #\d+)?$/.test(sess.title))).slice(0, 30).map(sess => ({
          id: sess.id,
          title: (sess.title && sess.title !== 'null' && !/^New Chat(?: #\d+)?$/.test(sess.title)) ? sess.title : (sess.preview ? sess.preview.slice(0, 60) : (sess.title || 'Chat')),
          created: sess.started_at ? new Date(sess.started_at * 1000).toLocaleString() : '',
          messages: [],
          input_tokens: sess.input_tokens,
          output_tokens: sess.output_tokens,
          message_count: sess.message_count || 0,
          tool_call_count: sess.tool_call_count || 0,
          source: sess.source || 'webui',
        }));
        setConversations(convs);

        // Fetch real user prompt counts for all visible sessions in parallel
        const countPromises = convs.map(async (conv) => {
          try {
            const msgs = await api.getSessionMessages(conv.id);
            const userPromptCount = msgs.filter(m => m.role === 'user').length;
            const compactionRegex = /compaction|compacted|summary of prior|conversation summary|context.{0,20}(compacted|compressed|trimmed)/i;
            const hasCompaction = msgs.some(m => (m.role === 'system' && m.content && compactionRegex.test(m.content)) || (m.type && /compaction/i.test(m.type)));
            return { id: conv.id, user_prompt_count: userPromptCount, has_compaction: hasCompaction };
          } catch (e) { return null; }
        });
        const counts = await Promise.all(countPromises);
        setConversations(prev => prev.map(c => {
          const found = counts.find(x => x && x.id === c.id);
          return found ? { ...c, user_prompt_count: found.user_prompt_count, has_compaction: found.has_compaction } : c;
        }));
      } catch (err) {
        console.error('Failed to load sessions:', err);
      }
    };
    loadSessions();
  }, []);

  // ── Export chat ──
  const exportChat = () => {
    const visibleMessages = messages.filter(m => m.role === 'user' || m.role === 'assistant');
    const conv = conversations.find(c => c.id === activeConvId);
    const title = (conv && conv.title) || 'Chat Export';
    generatePDF(visibleMessages, title);
  };

  // ── Send message ──
  const sendMessage = async (text) => {
    if ((!text.trim() && !pendingImages.length) || isStreaming) return;

    var sessionId = activeConvId;

    if (!sessionId) {
      try {
        sessionId = await api.createSession();
        const conv = { id: sessionId, title: text.slice(0, 50) || 'New Chat', created: new Date().toLocaleString(), messages: [] };
        setConversations(prev => [conv, ...prev]);
        setActiveConvId(sessionId);
      } catch (err) {
        console.error('Failed to create session:', err);
        return;
      }
    }

    const userMsg = {
      id: Date.now().toString(),
      role: 'user',
      content: text,
      images: pendingImages.map(img => ({ dataUrl: img.dataUrl, description: img.description })),
      toolCalls: [],
    };

    const thinkingMsg = {
      id: 'thinking-' + Date.now(),
      role: 'assistant',
      content: '',
      thinking: true,
      streaming: true,
      toolCalls: [],
    };
    const newMessages = [...messages, userMsg, thinkingMsg];
    setMessages(newMessages);
    setInput('');
    setPendingImages([]);

    setConversations(prev =>
      prev.map(c => c.id === sessionId ? { ...c, messages: newMessages, message_count: (c.message_count || 0) + 1, title: (c.title && c.title !== 'New Chat') ? c.title : (text.slice(0, 50) || c.title) } : c)
    );

    const abortCtrl = new AbortController();
    abortControllerRef.current = abortCtrl;
    setIsStreaming(true);
    setActivityLog([]);
    addLocalLog('INFO  Sending message to session ' + sessionId);
    addLocalLog('INFO  Waiting for Hermes to respond...');

    var thinkingStart = Date.now();
    var thinkingGotResponse = false;
    var thinkingInterval = setInterval(function() {
      if (thinkingGotResponse) { clearInterval(thinkingInterval); return; }
      var elapsed = Math.round((Date.now() - thinkingStart) / 1000);
      addLocalLog('INFO  ... thinking (' + elapsed + 's elapsed)');
    }, 5000);

    var fullContent = '';
    var toolCalls = [];

    try {
      var messageText = text;
      if (pendingImages.length) {
        var describedImages = pendingImages.filter(function(img) { return img.description; });
        var failedImages = pendingImages.filter(function(img) { return !img.description; });
        if (describedImages.length > 0) {
          var imageDesc = describedImages.map(function(img, i) {
            return '[Image ' + (i + 1) + ' description from Gemini Vision]:\n' + img.description;
          }).join('\n\n');
          messageText = text + '\n\n---\n' + imageDesc;
        }
        if (failedImages.length > 0) {
          messageText = messageText + '\n\n(Note: ' + failedImages.length + ' image(s) could not be analyzed by Gemini — the user sent them but no description is available)';
        }
      }

      await api.chatStream(
        sessionId,
        messageText,
        function(content) {
          if (!thinkingGotResponse) { thinkingGotResponse = true; clearInterval(thinkingInterval); addLocalLog('INFO  First response received'); }
          fullContent = content;
          setMessages(function(prev) {
            const updated = [...prev];
            var last = updated[updated.length - 1];
            if (last?.role === 'user') {
              updated.push({
                id: Date.now().toString(),
                role: 'assistant',
                content: fullContent,
                streaming: true,
                thinking: false,
                toolCalls: toolCalls,
              });
            } else {
              updated[updated.length - 1] = {
                ...last,
                role: 'assistant',
                thinking: false,
                content: fullContent,
                streaming: true,
                toolCalls: toolCalls,
              };
            }
            return updated;
          });
        },
        function(finalContent) {
          fullContent = finalContent;
          setMessages(function(prev) {
            const updated = [...prev];
            updated[updated.length - 1] = {
              ...updated[updated.length - 1],
              role: 'assistant',
              content: finalContent,
              streaming: false,
              toolCalls: toolCalls.map(tc => ({ ...tc, done: true })),
            };
            return updated;
          });
        },
        function(toolEvent) {
          if (toolEvent.type === 'started') {
            if (!thinkingGotResponse) { thinkingGotResponse = true; clearInterval(thinkingInterval); }
            addLocalLog('INFO  [tool] ' + (toolEvent.label || toolEvent.toolName) + ' started');
            toolCalls.push({
              toolName: toolEvent.toolName,
              label: toolEvent.label,
              timestamp: new Date(),
              done: false,
            });
            // Update the thinking/streaming message with tool calls
            setMessages(function(prev) {
              var updated = [...prev];
              var last = updated[updated.length - 1];
              if (last && last.role === 'assistant') {
                updated[updated.length - 1] = { ...last, thinking: false, toolCalls: toolCalls.slice() };
              }
              return updated;
            });
            setActivityLog(function(prev) { return [...prev, {
              id: Date.now() + Math.random(),
              emoji: '\u2699\uFE0F',
              label: toolEvent.label || toolEvent.toolName,
              timestamp: new Date(),
              done: false,
            }]; });
          } else if (toolEvent.type === 'completed') {
            var resultPreview = '';
            if (toolEvent.result) {
              var rs = typeof toolEvent.result === 'string' ? toolEvent.result : JSON.stringify(toolEvent.result);
              rs = rs.replace(/\\n/g, ' ').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
              if (rs.length > 200) rs = rs.slice(0, 200) + '...';
              resultPreview = ' => ' + rs;
            }
            addLocalLog('INFO  [tool] ' + (toolEvent.toolName || 'tool') + ' completed' + resultPreview);
            var lastTc = toolCalls[toolCalls.length - 1];
            if (lastTc) {
              lastTc.result = toolEvent.result;
              lastTc.done = true;
            }
            setActivityLog(function(prev) {
              const updated = [...prev];
              const lastEntry = updated[updated.length - 1];
              if (lastEntry) lastEntry.done = true;
              return updated;
            });
          }
        },
        function(thinkingText) {
          if (!thinkingGotResponse) { thinkingGotResponse = true; clearInterval(thinkingInterval); }
          if (thinkingText) addLocalLog('INFO  [thinking] ' + thinkingText.replace(/\n/g, ' ').slice(0, 300));
        },
        abortCtrl.signal
      );
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('Stream error:', err);
        addLocalLog('ERROR Stream error: ' + err.message);
      }
    } finally {
      clearInterval(thinkingInterval);
      var totalTime = Math.round((Date.now() - thinkingStart) / 1000);
      addLocalLog('INFO  Response complete (' + toolCalls.length + ' tool calls, ' + fullContent.length + ' chars, ' + totalTime + 's total)');
      setIsStreaming(false);
      abortControllerRef.current = null;
    }
  };

  // ── Pause / Stop / Interject ──
  const sendInterjection = async (text) => {
    if (!text.trim()) return;
    setIsPaused(false);
    await sendMessage(text);
  };

  const pauseStreaming = () => {
    setIsPaused(true);
    if (abortControllerRef.current) {
      abortControllerRef.current.abort();
      setIsStreaming(false);
    }
  };

  const stopStreaming = () => {
    setIsPaused(false);
    if (abortControllerRef.current) {
      abortControllerRef.current.abort();
      setIsStreaming(false);
    }
  };

  const cancelPause = () => { setIsPaused(false); };

  // ── Message editing ──
  const startEditMessage = (messageId, currentContent) => {
    setEditingMessageId(messageId);
    setEditingContent(currentContent);
  };

  const cancelEdit = () => {
    setEditingMessageId(null);
    setEditingContent('');
  };

  const saveEditedMessage = async (messageId, newContent) => {
    if (!activeConvId || !newContent.trim()) return;
    try {
      const forkResp = await fetch(API_BASE + '/api/sessions/' + activeConvId + '/fork', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message_id: messageId })
      });
      if (!forkResp.ok) throw new Error('Fork failed');
      const forkedSession = await forkResp.json();
      setActiveConvId(forkedSession.id);
      await selectConversation(forkedSession.id);
      await sendMessage(newContent);
      setEditingMessageId(null);
    } catch (e) {
      console.error('Message edit failed:', e);
      // Fallback: just send as new message
      setEditingMessageId(null);
      await sendMessage(newContent);
    }
  };

  // ── Search / filter ──
  const filteredConvs = conversations.filter(c => (c.title || '').toLowerCase().includes(searchQuery.toLowerCase()));

  const handleSessionSearch = async (query) => {
    if (query.trim() && searchMode) {
      try {
        const r = await fetch(API_BASE + '/api/sessions/search?q=' + encodeURIComponent(query));
        if (r.ok) {
          const results = await r.json();
          setConversations(results.items || []);
        }
      } catch (e) {
        console.error('Session search failed:', e);
      }
    }
  };

  const toggleSearchMode = () => {
    if (searchMode) {
      setSearchMode(false);
      // Reload normal conversations
      (async () => {
        try {
          const r = await fetch(API_BASE + '/api/sessions');
          if (r.ok) {
            const result = await r.json();
            setConversations((result.items || []).slice(0, 30));
          }
        } catch (e) { /* ignore */ }
      })();
    } else {
      setSearchMode(true);
    }
  };

  const anyAnalyzing = pendingImages.some(img => img.analyzing);

  // ── Clipboard paste handler ──
  useEffect(() => {
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imageFiles = [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          const file = items[i].getAsFile();
          if (file) imageFiles.push(file);
        }
      }
      if (imageFiles.length > 0) {
        e.preventDefault();
        processImages(imageFiles);
      }
    };
    document.addEventListener('paste', handlePaste);
    return () => document.removeEventListener('paste', handlePaste);
  }, [config.geminiKey]);

  // ── Render ──
  return (
    <div className="app-wrapper">
    <div className="app">
      {/* Sidebar backdrop overlay (mobile) */}
      {!sidebarCollapsed && (
        <div className="sidebar-backdrop" onClick={() => setSidebarCollapsed(true)} />
      )}

      {/* Sidebar */}
      {/* Floating sidebar toggle when collapsed */}
      {sidebarCollapsed && (
        <button onClick={() => setSidebarCollapsed(false)} title="Show sidebar"
          style={{position:'absolute',left:'8px',top:'12px',zIndex:10,background:'var(--glass)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',border:'1px solid var(--glass-border)',color:'var(--text-secondary)',borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'16px',transition:'all 0.2s',boxShadow:'0 2px 12px rgba(0,0,0,0.3)'}}>
          {'☰'}
        </button>
      )}

      <div className={"sidebar " + (sidebarCollapsed ? 'collapsed' : '')}>
        <div className="sidebar-header">
          <h1>Hermes</h1>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <button className="new-chat-btn" onClick={newConversation}>New</button>
            <button className="sidebar-close-btn" onClick={() => setSidebarCollapsed(true)} title="Hide sidebar"
              style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'6px 8px',borderRadius:'6px',fontSize:'14px',transition:'color 0.2s',minWidth:'32px',minHeight:'32px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {'✕'}
            </button>
          </div>
        </div>

        {/* Navigation */}
        <div className="sidebar-nav">
          {/* section labels removed for density */}
          <div className={"nav-item " + (currentView === 'dashboard' ? 'active' : '')} onClick={function() { setCurrentView('dashboard'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'📊'}</span>
            <span className="nav-item-label">Dashboard</span>
          </div>
          <div className={"nav-item " + (currentView === 'chat' ? 'active' : '')} onClick={function() { setCurrentView('chat'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'💬'}</span>
            <span className="nav-item-label">Chat</span>
          </div>
          <div className={"nav-item " + (currentView === 'files' ? 'active' : '')} onClick={function() { setCurrentView('files'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'📁'}</span>
            <span className="nav-item-label">Files</span>
          </div>
          <div className={"nav-item " + (currentView === 'terminal' ? 'active' : '')} onClick={function() { setCurrentView('terminal'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon" style={{fontFamily:'Monaco, Menlo, monospace',fontSize:'14px',fontWeight:'700'}}>{'>'}</span>
            <span className="nav-item-label">Terminal</span>
          </div>
          <div className={"nav-item " + (currentView === 'jobs' ? 'active' : '')} onClick={function() { setCurrentView('jobs'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'⚡'}</span>
            <span className="nav-item-label">Jobs</span>
          </div>

          <div style={{borderTop:'1px solid var(--border)',margin:'4px 8px'}} />
          <div className={"nav-item " + (currentView === 'memory' ? 'active' : '')} onClick={function() { setCurrentView('memory'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'🧠'}</span>
            <span className="nav-item-label">Memory</span>
          </div>
          <div className={"nav-item " + (currentView === 'skills' ? 'active' : '')} onClick={function() { setCurrentView('skills'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon">{'✨'}</span>
            <span className="nav-item-label">Skills</span>
          </div>

          <div style={{borderTop:'1px solid var(--border)',margin:'4px 8px'}} />
        </div>

        <div className="sidebar-search" style={{display: currentView === 'chat' ? 'block' : 'none'}}>
          <input type="text" placeholder={searchMode ? "Search content..." : "Search chats..."} value={searchQuery} onChange={e => { setSearchQuery(e.target.value); if (searchMode) handleSessionSearch(e.target.value); }} />
        </div>
        <div className="conversation-list" style={{display: currentView === 'chat' ? 'block' : 'none'}}>
          {filteredConvs.map(conv => (
            <div key={conv.id} className={"conv-item " + (conv.id === activeConvId ? 'active' : '')} onClick={() => selectConversation(conv.id)}>
              <div className="conv-item-icon">{conv.source === 'telegram' ? '✈️' : '💬'}</div>
              <div className="conv-item-text">
                {editingConvId === conv.id ? (
                  <input className="conv-rename-input" value={editingTitle} autoFocus
                    onChange={function(e) { setEditingTitle(e.target.value); }}
                    onKeyDown={function(e) { if (e.key === 'Enter') saveRenameConv(); if (e.key === 'Escape') { setEditingConvId(null); } }}
                    onBlur={saveRenameConv}
                    onClick={function(e) { e.stopPropagation(); }}
                  />
                ) : (
                  <div className="conv-item-title" style={conv.source === 'telegram' ? {color:'#29b6f6'} : {}} onDoubleClick={function(e) { e.stopPropagation(); startRenameConv(conv.id, conv.title); }}>{conv.title}</div>
                )}
                <div className="conv-item-date">
                  {conv.message_count > 0 && <span style={{color:'var(--accent)',fontWeight:'600',marginRight:'4px'}} title={conv.message_count + ' messages, ' + (conv.tool_call_count || 0) + ' tool calls'}>{conv.user_prompt_count != null ? (conv.user_prompt_count + (conv.user_prompt_count === 1 ? ' prompt' : ' prompts')) : (conv.message_count + ' msgs')}</span>}
                  {conv.has_compaction && <span style={{color:'var(--text-secondary)',fontSize:'9px',marginRight:'4px'}} title="This chat was compacted">{'🔄'}</span>}
                  {conv.created}
                </div>
              </div>
              <button className="conv-item-rename" onClick={function(e) { e.stopPropagation(); startRenameConv(conv.id, conv.title); }} title="Rename">{'✏'}</button>
              <button className="conv-item-delete" onClick={e => { e.stopPropagation(); deleteConversation(conv.id); }}>{'×'}</button>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <select className="personality-select" value={personality} onChange={e => setPersonality(e.target.value)}>
            {Object.entries(PERSONALITY_LABELS).map(([k, v]) => (<option key={k} value={k}>{v}</option>))}
          </select>
        </div>
      </div>

      {/* Main panel */}
      <div className={"main " + (currentView !== 'chat' ? 'non-chat-view' : '')}>
        {currentView === 'chat' ? (
          <React.Fragment>
            <div className="header">
              <div className="header-title">{activeConvId ? (conversations.find(c => c.id === activeConvId)?.title || 'Hermes') : 'Hermes'}</div>
              <div className="header-status">
                <div className={"status-dot " + (connected === false ? 'disconnected' : '')}></div>
                {connected === null ? 'Checking...' : connected ? 'Connected' : 'Offline'}
              </div>
              <div className="token-counter">
                <span>{formatTokens(sessionTokens.input, sessionTokens.output)}</span>
              </div>
              <div className="header-controls">
                <div className="theme-switcher">
                  {Object.entries(THEMES).map(function([key, t]) {
                    return <div key={key} className={"theme-dot " + t.className + (currentTheme === key ? ' active' : '')} title={t.label} onClick={function() { setCurrentTheme(key); }} />;
                  })}
                </div>
                <button className="header-btn hide-mobile" onClick={exportChat} title="Export as PDF/HTML">{'📄'}</button>
                <button className="header-btn hide-mobile" onClick={function() { if (messages.length > 0) { var t = activeConvId ? (conversations.find(function(c){return c.id===activeConvId;})||{}).title : 'Chat'; exportChatAsMarkdown(messages, t || 'Chat'); } }} title="Export as Markdown">{'📝'}</button>
                <button className={"header-btn hide-mobile " + (showTerminal ? 'active' : '')} onClick={function(){ setShowTerminal(!showTerminal); }} title="Live terminal logs">{'>_'}</button>
                <button className="header-btn hide-mobile" onClick={() => setShowMCPBrowser(true)} title="MCP Tools">{'🔧'}</button>
                <button className="header-btn" onClick={toggleSearchMode} title="Search content">{'🔍'}</button>
                <button className="header-btn hide-mobile" onClick={function(){ setShowShortcuts(true); }} title="Keyboard shortcuts (?)">{'⌨'}</button>
                <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings">{'⚙'}</button>
                <button className="header-btn" onClick={() => setSidebarCollapsed(!sidebarCollapsed)} title="Toggle sidebar">{'☰'}</button>
              </div>
            </div>

            {/* Messages area */}
            <div className="messages">
              {messages.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-state-icon">{'💬'}</div>
                  <div className="empty-state-text">Start a conversation with Hermes</div>
                </div>
              ) : (
                <div className="messages-container">
                  {messages.map(msg => (
                    msg.role === 'compaction' ? (
                      <div key={msg.id} className="compaction-marker">
                        <div className="compaction-line" />
                        <span className="compaction-label">{'🔄'} {msg.content}</span>
                        <div className="compaction-line" />
                      </div>
                    ) : editingMessageId === msg.id ? (
                      <div key={msg.id} className="message user">
                        <div className="message-header">
                          <div className="message-avatar user">U</div>
                          <span className="message-role">You (editing)</span>
                        </div>
                        <div className="message-edit-area">
                          <textarea
                            className="edit-textarea"
                            value={editingContent}
                            onChange={e => setEditingContent(e.target.value)}
                            autoFocus
                          />
                          <div className="edit-buttons">
                            <button className="edit-btn save" onClick={() => saveEditedMessage(msg.id, editingContent)}>Save</button>
                            <button className="edit-btn cancel" onClick={cancelEdit}>Cancel</button>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <MessageBubble key={msg.id} message={msg} onImageClick={setLightboxSrc} onEdit={startEditMessage} />
                    )
                  ))}
                  <div ref={messagesEndRef} />
                </div>
              )}
            </div>

            {/* Input area */}
            <div className="input-area">
              <div className="input-container">
                {pendingImages.length > 0 && (
                  <div className="image-preview-strip">
                    {pendingImages.map(img => (
                      <div key={img.id} className="image-preview-item">
                        <img src={img.dataUrl} alt="Preview" onClick={function(e) { e.stopPropagation(); setLightboxSrc(img.dataUrl); }} />
                        <button className="image-preview-remove" onClick={() => removeImage(img.id)}>x</button>
                        {img.analyzing && <div className="analyzing-badge">{'Analyzing with Gemini...'}</div>}
                        {!img.analyzing && img.description && <div className="analyzing-badge" style={{background:'rgba(85,192,136,0.85)'}}>{'Ready'}</div>}
                        {!img.analyzing && !img.description && <div className="analyzing-badge" style={{background:'rgba(224,85,85,0.85)'}} title={img.status || 'Analysis failed'}>{'Failed'}</div>}
                      </div>
                    ))}
                  </div>
                )}

                {isPaused && (
                  <div className="paused-banner">
                    <span className="paused-banner-text">{'⏸ Paused — type your interjection and send'}</span>
                    <button className="cancel-resume" onClick={cancelPause}>Dismiss</button>
                  </div>
                )}

                <div className="input-wrapper">
                  <textarea
                    ref={textareaRef}
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        isPaused ? sendInterjection(input) : sendMessage(input);
                      }
                    }}
                    placeholder={connected === false ? 'Hermes API not connected...' : isPaused ? 'Type your interjection...' : anyAnalyzing ? 'Waiting for image analysis...' : 'Message Hermes... (paste or drop images)'}
                    rows={1}
                    disabled={connected === false}
                  />
                  <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={e => { if (e.target.files.length) processImages(e.target.files); e.target.value = ''; }} />
                  <div className="input-btn-group">
                    <button className="attach-btn" onClick={() => fileInputRef.current?.click()} title="Attach image">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    {isStreaming ? (
                      <React.Fragment>
                        <button className="send-btn pause-btn" onClick={pauseStreaming} title="Pause to interject">
                          <svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
                        </button>
                        <button className="send-btn stop-btn" onClick={stopStreaming} title="Stop">
                          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
                        </button>
                      </React.Fragment>
                    ) : isPaused ? (
                      <button className="send-btn" onClick={() => sendInterjection(input)} disabled={!input.trim()}>
                        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z" fill="currentColor"/></svg>
                      </button>
                    ) : (
                      <button className="send-btn" onClick={() => sendMessage(input)} disabled={(!input.trim() && !pendingImages.length) || connected === false || anyAnalyzing}>
                        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z" fill="currentColor"/></svg>
                      </button>
                    )}
                  </div>
                </div>
                <div className="input-hint">
                  {isStreaming ? 'Pause to interject \u00B7 Stop to cancel' : isPaused ? 'Enter to send interjection \u00B7 Dismiss to keep partial response' : 'Shift+Enter for new line \u00B7 Paste/drop images \u00B7 ' + (PERSONALITY_LABELS[personality] || 'Default') + ' mode' + (!config.geminiKey ? ' \u00B7 Add Gemini key in Settings for image analysis' : '')}
                </div>
              </div>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="header">
              <div className="header-title">
                {currentView === 'dashboard' ? 'Dashboard' : currentView === 'files' ? 'Files' : currentView === 'terminal' ? 'Terminal' : currentView === 'jobs' ? 'Jobs' : currentView === 'memory' ? 'Memory' : 'Skills'}
              </div>
              <div className="header-controls">
                <div className="theme-switcher">
                  {Object.entries(THEMES).map(function([key, t]) {
                    return <div key={key} className={"theme-dot " + t.className + (currentTheme === key ? ' active' : '')} title={t.label} onClick={function() { setCurrentTheme(key); }} />;
                  })}
                </div>
                <button className="header-btn hide-mobile" onClick={function(){ setShowShortcuts(true); }} title="Keyboard shortcuts (?)">{'⌨'}</button>
                <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings">{'⚙'}</button>
                <button className="header-btn" onClick={() => setSidebarCollapsed(!sidebarCollapsed)} title="Toggle sidebar">{'☰'}</button>
              </div>
            </div>
            {currentView === 'dashboard' && <DashboardView />}
            {currentView === 'files' && <FilesView />}
            {currentView === 'terminal' && <TerminalView />}
            {currentView === 'jobs' && <JobsView />}
            {currentView === 'memory' && <MemoryView />}
            {currentView === 'skills' && <SkillsView />}
          </React.Fragment>
        )}
      </div>

      {/* Right column: Live Terminal */}
      <div className={"right-column " + (showTerminal ? '' : 'closed')}>
        <TerminalPanel isOpen={showTerminal} onClose={function(){setShowTerminal(false)}} localLogs={localLogs} />
      </div>

      {/* Modals */}
      {showSettings && <SettingsModal config={config} onSave={setConfig} onClose={() => setShowSettings(false)} mcpToolCount={mcpTools.length} />}
      {lightboxSrc && <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />}
      {showMCPBrowser && <MCPBrowserModal tools={mcpTools} onClose={() => setShowMCPBrowser(false)} />}
      {showShortcuts && <ShortcutsModal onClose={function(){ setShowShortcuts(false); }} />}
      {showWelcome && <WelcomePopup onClose={function(){ setShowWelcome(false); try { localStorage.setItem('hermes-ui-welcomed', '1'); } catch(e){} }} onOpenRemoteSetup={function(){ setShowSettings(true); }} />}

    </div>
    {/* Status Bar */}
    <StatusBar connected={connected} conversations={conversations} />

    {/* Mobile Bottom Navigation */}
    <div className="mobile-bottom-nav">
      {[
        { view: 'dashboard', icon: '📊', label: 'Home' },
        { view: 'chat', icon: '💬', label: 'Chat' },
        { view: 'skills', icon: '✨', label: 'Skills' },
        { view: 'memory', icon: '🧠', label: 'Memory' },
        { view: 'terminal', icon: '⚡', label: 'More' },
      ].map(function(item) {
        return (
          <button key={item.view} className={"mobile-nav-item " + (currentView === item.view ? 'active' : '')}
            onClick={function() { setCurrentView(item.view); setSidebarCollapsed(true); }}>
            <span className="mobile-nav-icon">{item.icon}</span>
            <span className="mobile-nav-label">{item.label}</span>
          </button>
        );
      })}
    </div>
    </div>
  );
}

/* ── Error Boundary ── */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:'40px',color:'#e05555',fontFamily:'monospace',background:'#0a0a0f',minHeight:'100vh'}}>
          <h2>Something went wrong</h2>
          <pre style={{whiteSpace:'pre-wrap',color:'#8888a0'}}>{this.state.error.message}{'\n'}{this.state.error.stack}</pre>
          <button onClick={() => { this.setState({error:null}); location.reload(); }} style={{marginTop:'20px',padding:'10px 20px',background:'#7c6fe0',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}}>Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
