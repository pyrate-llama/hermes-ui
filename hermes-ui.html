/* ── Cron Jobs View ── */
function JobsView() {
  var [jobs, setJobs] = useState([]);
  var [loading, setLoading] = useState(true);
  var [error, setError] = useState(null);
  var [editingJob, setEditingJob] = useState(null);
  var [editFields, setEditFields] = useState({});
  var [actionLoading, setActionLoading] = useState(null);

  function parseCronOutput(text) {
    var lines = text.split('\n');
    var results = [];
    var current = null;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var headerMatch = line.match(/^\s+([a-f0-9]{12})\s+\[(\w+)\]/);
      if (headerMatch) {
        if (current) results.push(current);
        current = { id: headerMatch[1], status: headerMatch[2] };
        continue;
      }
      if (current) {
        var kvMatch = line.match(/^\s+(Name|Schedule|Repeat|Next run|Deliver|Skills|Script|Last run|Runs):\s+(.+)/);
        if (kvMatch) {
          var key = kvMatch[1].toLowerCase().replace(/ /g, '_');
          current[key] = kvMatch[2].trim();
        }
      }
    }
    if (current) results.push(current);
    return results;
  }

  function describeCron(schedule) {
    if (!schedule) return '';
    var parts = schedule.split(' ');
    if (parts.length !== 5) return schedule;
    var min = parts[0], hour = parts[1], dom = parts[2], mon = parts[3], dow = parts[4];
    var h = parseInt(hour, 10);
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    var timeStr = h12 + ':' + (min === '0' ? '00' : min.padStart(2, '0')) + ' ' + ampm;
    if (dom === '*' && mon === '*' && dow === '*') return 'Daily at ' + timeStr;
    if (dom === '*' && mon === '*' && dow !== '*') {
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var dayNames = dow.split(',').map(function(d) { return days[parseInt(d,10)] || d; }).join(', ');
      return dayNames + ' at ' + timeStr;
    }
    return schedule + ' (' + timeStr + ')';
  }

  function formatNextRun(nextRun) {
    if (!nextRun) return '--';
    try {
      var d = new Date(nextRun);
      var now = new Date();
      var diffMs = d - now;
      if (diffMs < 0) return 'overdue';
      var diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 60) return 'in ' + diffMin + 'm';
      var diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return 'in ' + diffHr + 'h ' + (diffMin % 60) + 'm';
      return 'in ' + Math.floor(diffHr / 24) + 'd ' + (diffHr % 24) + 'h';
    } catch(e) { return nextRun; }
  }

  var fetchJobs = async function() {
    try {
      var r = await fetch(API_BASE + '/cron/list');
      if (r.ok) {
        var data = await r.json();
        setJobs(data.jobs || []);
        setError(null);
      }
    } catch(e) { setError('Failed to fetch cron jobs'); }
    setLoading(false);
  };

  var runCronCmd = async function(cmd) {
    var r = await fetch(API_BASE + '/terminal/exec', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({command: cmd})
    });
    return r.ok ? await r.json() : { error: 'HTTP ' + r.status };
  };

  var handleToggle = async function(job) {
    setActionLoading(job.id + '-toggle');
    var cmd = job.status === 'active' ? 'hermes cron pause ' + job.id : 'hermes cron resume ' + job.id;
    await runCronCmd(cmd);
    await fetchJobs();
    setActionLoading(null);
  };

  var handleRunNow = async function(job) {
    setActionLoading(job.id + '-run');
    await runCronCmd('hermes cron run ' + job.id);
    await fetchJobs();
    setActionLoading(null);
  };

  var handleDelete = async function(job) {
    if (!confirm('Delete cron job "' + (job.name || job.id) + '"? This cannot be undone.')) return;
    setActionLoading(job.id + '-delete');
    await runCronCmd('hermes cron remove ' + job.id);
    await fetchJobs();
    setActionLoading(null);
  };

  var handleEditStart = function(job) {
    if (editingJob === job.id) { setEditingJob(null); return; }
    setEditingJob(job.id);
    setEditFields({
      name: job.name || '',
      schedule: job.schedule || '',
      prompt: job.prompt || '',
      deliver: job.deliver || '',
      skills: job.skills || '',
      script: job.script || '',
      repeat: job.repeat || '',
      last_status: job.last_status || '',
    });
  };

  var handleEditSave = async function() {
    if (!editingJob) return;
    setActionLoading(editingJob + '-save');
    var parts = ['hermes cron edit', editingJob];
    if (editFields.name) parts.push('--name "' + editFields.name.replace(/"/g, '\\"') + '"');
    if (editFields.schedule) parts.push('--schedule "' + editFields.schedule.replace(/"/g, '\\"') + '"');
    if (editFields.prompt) parts.push('--prompt "' + editFields.prompt.replace(/"/g, '\\"') + '"');
    if (editFields.deliver) parts.push('--deliver "' + editFields.deliver.replace(/"/g, '\\"') + '"');
    if (editFields.repeat) parts.push('--repeat "' + editFields.repeat.replace(/"/g, '\\"') + '"');
    if (editFields.script) parts.push('--script "' + editFields.script.replace(/"/g, '\\"') + '"');
    var result = await runCronCmd(parts.join(' '));
    if (result.error) {
      alert('Edit failed: ' + (result.error || result.output));
    } else {
      setEditingJob(null);
      await fetchJobs();
    }
    setActionLoading(null);
  };

  useEffect(function() {
    fetchJobs();
    var iv = setInterval(fetchJobs, 30000);
    return function() { clearInterval(iv); };
  }, []);

  return (
    <div className="view-dashboard" style={{padding:'20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{fontSize:'20px'}}>{'🕐'}</span>
          <span style={{fontSize:'14px',fontWeight:600,color:'var(--text-primary)'}}>Scheduled Cron Jobs</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{jobs.filter(function(j){return j.status==='active';}).length} active</span>
          <button onClick={function(){setLoading(true);fetchJobs();}} style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 10px',fontSize:'11px',color:'var(--text-secondary)',cursor:'pointer'}}>Refresh</button>
        </div>
      </div>

      {loading && <div style={{color:'var(--text-muted)',textAlign:'center',padding:'40px'}}>Loading cron jobs...</div>}
      {error && <div style={{color:'var(--error)',textAlign:'center',padding:'20px',fontSize:'13px'}}>{error}</div>}

      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {jobs.map(function(job) {
          var isActive = job.status === 'active';
          return (
            <div key={job.id} className="info-card" style={{padding:'16px 20px',transition:'all 0.2s',borderLeft: isActive ? '2px solid var(--success)' : '2px solid var(--error)',opacity: isActive ? 1 : 0.6}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',flex:1,minWidth:0}}>
                  {isActive ? (
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--success)',boxShadow:'0 0 8px rgba(68,216,138,0.5)',animation:'pulse 2s ease infinite',flexShrink:0}}></div>
                  ) : (
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--error)',opacity:0.5,flexShrink:0}}></div>
                  )}
                  <span style={{fontSize:'14px',fontWeight:600,color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{job.name || 'Unnamed Job'}</span>
                </div>
                <span style={{fontSize:'10px',fontFamily:'JetBrains Mono, monospace',color:'var(--text-muted)',background:'var(--bg-tertiary)',padding:'2px 8px',borderRadius:'4px',flexShrink:0,marginLeft:'12px'}}>{job.status}</span>
              </div>

              <div style={{fontSize:'12px',color:'var(--accent)',marginBottom:'8px',fontFamily:'JetBrains Mono, monospace'}}>{describeCron(job.schedule)}</div>

              <div style={{display:'flex',flexWrap:'wrap',gap:'14px',fontSize:'11px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace'}}>
                <span title="Cron schedule" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                  <span style={{color:'#c088e0'}}>{'🕐'}</span> {job.schedule || '--'}
                </span>
                {job.next_run && (
                  <span title={'Next run: ' + job.next_run} style={{display:'flex',alignItems:'center',gap:'4px'}}>
                    <span style={{color:'var(--success)'}}>{'▶'}</span> {formatNextRun(job.next_run)}
                  </span>
                )}
                {job.skills && (
                  <span title="Skills" style={{display:'flex',alignItems:'center',gap:'4px'}}>
                    <span style={{color:'#e8b04a'}}>{'🧩'}</span> {job.skills}
                  </span>
                )}
                {job.deliver && (
                  <span title="Delivery" style={{display:'flex',alignItems:'center',gap:'4px',marginLeft:'auto'}}>
                    <span style={{color:'#29b6f6'}}>{'📤'}</span> {job.deliver}
                  </span>
                )}
              </div>

              {job.script && (
                <div style={{marginTop:'8px',fontSize:'10px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace',opacity:0.7}}>
                  Script: {job.script}
                </div>
              )}

              {job.prompt && (
                <details style={{marginTop:'8px'}}>
                  <summary style={{fontSize:'11px',color:'var(--accent)',cursor:'pointer',userSelect:'none',fontWeight:500}}>
                    {'📝'} Prompt ({job.prompt.length > 200 ? Math.round(job.prompt.length / 100) * 100 + '+ chars' : job.prompt.length + ' chars'})
                  </summary>
                  <pre style={{marginTop:'6px',fontSize:'11px',color:'var(--text-secondary)',fontFamily:'JetBrains Mono, monospace',background:'var(--bg-primary)',padding:'10px 12px',borderRadius:'6px',whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:'300px',overflowY:'auto',border:'1px solid var(--border)',lineHeight:1.5}}>{job.prompt}</pre>
                </details>
              )}

              {job.last_error && (
                <div style={{marginTop:'8px',fontSize:'11px',color:'var(--error)',fontFamily:'JetBrains Mono, monospace',background:'rgba(248,81,73,0.08)',padding:'6px 10px',borderRadius:'6px',border:'1px solid rgba(248,81,73,0.2)'}}>
                  {'⚠️'} {job.last_error}
                </div>
              )}

              <div style={{marginTop:'10px',display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}}>
                <button onClick={function(){handleEditStart(job);}} style={{background:editingJob===job.id?'var(--warning)':'var(--bg-secondary)',color:editingJob===job.id?'white':'var(--text-secondary)',border:'1px solid '+(editingJob===job.id?'var(--warning)':'var(--border)'),borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500}}>Edit</button>
                <button onClick={function(){handleToggle(job);}} disabled={actionLoading===job.id+'-toggle'} style={{background:isActive?'var(--bg-secondary)':'var(--success)',color:isActive?'var(--text-secondary)':'white',border:'1px solid '+(isActive?'var(--border)':'var(--success)'),borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500,opacity:actionLoading===job.id+'-toggle'?0.5:1}}>{actionLoading===job.id+'-toggle'?'...':(isActive?'Pause':'Resume')}</button>
                <button onClick={function(){handleRunNow(job);}} disabled={actionLoading===job.id+'-run'} style={{background:'var(--bg-secondary)',color:'var(--accent)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500,opacity:actionLoading===job.id+'-run'?0.5:1}}>{actionLoading===job.id+'-run'?'Running...':'Run Now'}</button>
                <button onClick={function(){handleDelete(job);}} disabled={actionLoading===job.id+'-delete'} style={{background:'var(--bg-secondary)',color:'var(--error)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 12px',fontSize:'11px',cursor:'pointer',fontWeight:500,marginLeft:'auto',opacity:actionLoading===job.id+'-delete'?0.5:1}}>Delete</button>
                <span style={{fontSize:'10px',color:'var(--text-muted)',fontFamily:'JetBrains Mono, monospace',opacity:0.5}}>ID: {job.id}</span>
              </div>

              {editingJob === job.id && (
                <div style={{marginTop:'12px',borderTop:'1px solid var(--border)',paddingTop:'12px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'100px 1fr',gap:'8px',alignItems:'center',fontSize:'12px'}}>
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Name</label>
                    <input value={editFields.name||''} onChange={function(e){setEditFields(function(p){return{...p,name:e.target.value};});}} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Schedule</label>
                    <input value={editFields.schedule||''} onChange={function(e){setEditFields(function(p){return{...p,schedule:e.target.value};});}} placeholder="e.g. 0 9 * * *" style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Deliver</label>
                    <input value={editFields.deliver||''} onChange={function(e){setEditFields(function(p){return{...p,deliver:e.target.value};});}} placeholder="e.g. email, slack" style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Skills</label>
                    <input value={editFields.skills||''} onChange={function(e){setEditFields(function(p){return{...p,skills:e.target.value};});}} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Script</label>
                    <input value={editFields.script||''} onChange={function(e){setEditFields(function(p){return{...p,script:e.target.value};});}} placeholder="Path to script" style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Repeat</label>
                    <input value={editFields.repeat||''} onChange={function(e){setEditFields(function(p){return{...p,repeat:e.target.value};});}} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace'}} />
                    <label style={{color:'var(--text-muted)',fontWeight:500}}>Prompt</label>
                    <textarea value={editFields.prompt||''} onChange={function(e){setEditFields(function(p){return{...p,prompt:e.target.value};});}} rows={12} style={{background:'var(--bg-primary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'10px 12px',fontSize:'12px',fontFamily:'JetBrains Mono, monospace',resize:'vertical',minHeight:'200px',lineHeight:1.5}} />
                  </div>
                  <div style={{display:'flex',gap:'8px',marginTop:'10px',justifyContent:'flex-end'}}>
                    <button onClick={handleEditSave} disabled={actionLoading===editingJob+'-save'} style={{background:'var(--accent)',color:'white',border:'none',borderRadius:'6px',padding:'6px 16px',fontSize:'12px',fontWeight:600,cursor:'pointer',opacity:actionLoading===editingJob+'-save'?0.5:1}}>{actionLoading===editingJob+'-save'?'Saving...':'Save'}</button>
                    <button onClick={function(){setEditingJob(null);}} style={{background:'var(--bg-tertiary)',color:'var(--text-secondary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'6px 16px',fontSize:'12px',cursor:'pointer'}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {!loading && !error && jobs.length === 0 && (
        <div style={{textAlign:'center',color:'var(--text-muted)',padding:'60px 0'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>{'🕐'}</div>
          <div style={{fontSize:'14px'}}>No cron jobs configured</div>
          <div style={{fontSize:'12px',marginTop:'4px'}}>Use <span style={{fontFamily:'JetBrains Mono, monospace',background:'var(--bg-tertiary)',padding:'2px 6px',borderRadius:'4px'}}>hermes cron add</span> to schedule jobs</div>
        </div>
      )}
    </div>
  );
}

function TerminalView() {
  var [activeMode, setActiveMode] = useState('shell'); // 'shell', 'hermes', 'claude'

  // === Shell state ===
  var [shellHistory, setShellHistory] = useState([]);
  var [shellInput, setShellInput] = useState('');
  var [shellRunning, setShellRunning] = useState(false);
  var [shellCwd, setShellCwd] = useState('~');
  var shellBodyRef = useRef(null);
  var shellInputRef = useRef(null);

  // === Hermes Terminal state ===
  var [hermesInput, setHermesInput] = useState('');
  var [hermesHistory, setHermesHistory] = useState([]);
  var [hermesStreaming, setHermesStreaming] = useState(false);
  var hermesSessionId = useRef((() => { try { return localStorage.getItem('hermes-terminal-session') || null; } catch(e) { return null; } })());
  var hermesBodyRef = useRef(null);
  var hermesInputRef = useRef(null);

  // === Claude Code state ===
  var [claudeHistory, setClaudeHistory] = useState([]);
  var [claudeInput, setClaudeInput] = useState('');
  var [claudeRunning, setClaudeRunning] = useState(false);
  var claudeBodyRef = useRef(null);
  var claudeInputRef = useRef(null);
  var claudeHasSent = useRef(false);

  // Auto-scroll all panels
  useEffect(function() { if (shellBodyRef.current) shellBodyRef.current.scrollTop = shellBodyRef.current.scrollHeight; }, [shellHistory]);
  useEffect(function() { if (hermesBodyRef.current) hermesBodyRef.current.scrollTop = hermesBodyRef.current.scrollHeight; }, [hermesHistory]);
  useEffect(function() { if (claudeBodyRef.current) claudeBodyRef.current.scrollTop = claudeBodyRef.current.scrollHeight; }, [claudeHistory]);

  // Focus input on tab switch
  useEffect(function() {
    setTimeout(function() {
      if (activeMode === 'shell' && shellInputRef.current) shellInputRef.current.focus();
      if (activeMode === 'hermes' && hermesInputRef.current) hermesInputRef.current.focus();
      if (activeMode === 'claude' && claudeInputRef.current) claudeInputRef.current.focus();
    }, 100);
  }, [activeMode]);

  // ─── Shell: run command via /terminal/exec ───
  // Resolve cwd path (~ to full path for subprocess)
  var shellCwdFull = useRef(null);

  async function runShellCommand() {
    var cmd = shellInput.trim();
    if (!cmd || shellRunning) return;
    setShellInput('');
    setShellHistory(function(prev) { return prev.concat([{ type: 'input', text: cmd, id: Date.now(), cwd: shellCwd }]); });
    setShellRunning(true);

    try {
      // For cd commands, run "cd <target> && pwd" to get the new path
      var isCd = cmd.match(/^\s*cd\s*(.*)?$/);
      var actualCmd = cmd;
      var cwdParam = shellCwdFull.current || undefined;

      if (isCd) {
        var target = (isCd[1] || '').trim() || '~';
        actualCmd = 'cd ' + target + ' && pwd';
      }

      var r = await fetch(API_BASE + '/terminal/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: actualCmd, mode: 'shell', cwd: cwdParam })
      });

      if (!r.ok) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Server error: ' + r.status + '. Make sure serve.py is restarted.)', id: Date.now() + 1, exitCode: -1 }]); });
        setShellRunning(false);
        return;
      }

      var data = await r.json();
      if (data.error) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Error: ' + data.error + ')', id: Date.now() + 1, exitCode: -1 }]); });
        setShellRunning(false);
        return;
      }

      var output = data.output || '';
      var exitCode = data.exit_code != null ? data.exit_code : 0;
      if (exitCode !== 0 && !output) output = '(exit code ' + exitCode + ')';

      // If cd succeeded, update the cwd from pwd output
      if (isCd && exitCode === 0 && output.trim()) {
        var newPath = output.trim().split('\n').pop();
        shellCwdFull.current = newPath;
        setShellCwd(newPath.replace(/^\/Users\/[^/]+/, '~'));
        output = ''; // Don't show pwd output for cd
      }

      if (output || exitCode !== 0) {
        setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: output, id: Date.now() + 1, exitCode: exitCode }]); });
      }
    } catch(e) {
      setShellHistory(function(prev) { return prev.concat([{ type: 'output', text: '(Error: ' + e.message + '. Is serve.py running with the terminal endpoint?)', id: Date.now() + 1, exitCode: -1 }]); });
    }
    setShellRunning(false);
  }

  // ─── Hermes: send command to Hermes agent ───
  async function sendHermesCommand() {
    var cmd = hermesInput.trim();
    if (!cmd || hermesStreaming) return;
    setHermesInput('');
    var usrId = 'usr_' + Date.now() + '_' + Math.random();
    var responseId = 'res_' + Date.now() + '_' + Math.random();
    setHermesHistory(function(prev) { return prev.concat([
      { role: 'user', content: cmd, id: usrId },
      { role: 'assistant', content: '', id: responseId, streaming: true }
    ]); });
    setHermesStreaming(true);

    try {
      var sessionId = hermesSessionId.current;
      if (!sessionId) {
        sessionId = 'term_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        hermesSessionId.current = sessionId;
        try { localStorage.setItem('hermes-terminal-session', sessionId); } catch(e) {}
      }

      var response = await fetch(API_BASE + '/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Hermes-Session-Id': sessionId,
        },
        body: JSON.stringify({
          model: 'hermes-agent',
          messages: [{ role: 'user', content: cmd }],
          stream: false,
        }),
      });
      if (!response.ok) throw new Error('Chat request failed: ' + response.status);
      var chatData = await response.json();
      var fullText = '';
      var choices = chatData.choices || [];
      if (choices.length > 0) {
        fullText = (choices[0].message && choices[0].message.content) || '';
      }
      if (!fullText) fullText = '(No response from Hermes)';
      setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: fullText, streaming: false }) : h; }); });
    } catch(e) {
      setHermesHistory(function(prev) { return prev.map(function(h) { return h.id === responseId ? Object.assign({}, h, { content: '(Error: ' + e.message + ')', streaming: false }) : h; }); });
    }
    setHermesStreaming(false);
  }

  // ─── Claude Code: run via claude CLI ───
  async function runClaudeCommand() {
    var cmd = claudeInput.trim();
    if (!cmd || claudeRunning) return;
    setClaudeInput('');
    setClaudeHistory(function(prev) { return prev.concat([{ type: 'input', text: cmd, id: Date.now() }]); });
    setClaudeRunning(true);

    setClaudeHistory(function(prev) { return prev.concat([{ type: 'thinking', id: Date.now() + 0.5 }]); });

    try {
      var shouldContinue = claudeHasSent.current;
      var r = await fetch(API_BASE + '/terminal/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd, mode: 'claude', continue_session: shouldContinue })
      });
      claudeHasSent.current = true;
      if (!r.ok) {
        setClaudeHistory(function(prev) {
          return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: '(Server error: ' + r.status + '. Make sure serve.py is restarted.)', id: Date.now() + 1 }]);
        });
        setClaudeRunning(false);
        return;
      }
      var data = await r.json();
      var output = data.output || data.error || '';
      var exitCode = data.exit_code != null ? data.exit_code : 0;
      if (exitCode !== 0 && !output) output = '(exit code ' + exitCode + ')';

      setClaudeHistory(function(prev) {
        return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: output, id: Date.now() + 1 }]);
      });
    } catch(e) {
      setClaudeHistory(function(prev) {
        return prev.filter(function(h) { return h.type !== 'thinking'; }).concat([{ type: 'output', text: '(Error: ' + e.message + '. Is serve.py running with the terminal endpoint?)', id: Date.now() + 1 }]);
      });
    }
    setClaudeRunning(false);
  }

  // Key handlers
  function handleShellKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runShellCommand(); } }
  function handleHermesKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendHermesCommand(); } }
  function handleClaudeKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runClaudeCommand(); } }

  // Tab button style helper
  function tabStyle(mode) {
    return {
      flex:1, padding:'8px 12px',
      background: activeMode === mode ? 'var(--bg-primary)' : 'transparent',
      color: activeMode === mode ? 'var(--accent)' : 'var(--text-secondary)',
      border:'none', borderBottom: activeMode === mode ? '2px solid var(--accent)' : '2px solid transparent',
      fontSize:'12px', fontWeight:'600', cursor:'pointer', fontFamily:'inherit',
    };
  }

  // Shared input bar style
  var inputBarStyle = {borderTop:'1px solid var(--border)',background:'var(--bg-secondary)',padding:'10px 16px',display:'flex',gap:'8px',alignItems:'center'};
  var inputStyle = {flex:1,background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'6px',padding:'9px 14px',color:'var(--text-primary)',fontSize:'13px',fontFamily:'Monaco, Menlo, Consolas, monospace',outline:'none'};
  var promptStyle = {color:'var(--accent)',fontFamily:'Monaco, Menlo, monospace',fontSize:'13px',fontWeight:'700'};

  function runBtn(onClick, disabled, running) {
    return (
      <button onClick={onClick} disabled={disabled}
        style={{background:running ? 'var(--bg-tertiary)' : 'var(--accent)',color:'white',border:'none',borderRadius:'6px',
          padding:'9px 14px',fontSize:'12px',cursor:running ? 'not-allowed' : 'pointer',fontWeight:'600',opacity:running ? 0.5 : 1}}>
        {running ? '...' : 'Run'}
      </button>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* 3-tab bar */}
      <div style={{display:'flex',gap:'0',borderBottom:'1px solid var(--border)',background:'var(--bg-secondary)'}}>
        <button onClick={function() { setActiveMode('shell'); }} style={tabStyle('shell')}>{'>'}_  Shell</button>
        <button onClick={function() { setActiveMode('hermes'); }} style={tabStyle('hermes')}>{'⚡'} Hermes</button>
        <button onClick={function() { setActiveMode('claude'); }} style={tabStyle('claude')}>{'◆'} Claude Code</button>
      </div>

      {/* ═══ Shell Tab ═══ */}
      {activeMode === 'shell' && (
        <React.Fragment>
          <div ref={shellBodyRef} style={{flex:1,overflow:'auto',background:'#0a0a0f',padding:'12px 16px',fontFamily:'Monaco, Menlo, Consolas, monospace',fontSize:'13px',lineHeight:'1.6'}}>
            {shellHistory.length === 0 && (
              <div style={{color:'var(--text-muted)',padding:'40px 0',textAlign:'center'}}>
                <div style={{fontSize:'28px',marginBottom:'12px'}}>{'>'}_</div>
                <div style={{fontSize:'14px',marginBottom:'8px',color:'var(--text-secondary)',fontFamily:'-apple-system, sans-serif'}}>Shell Terminal</div>
                <div style={{fontSize:'12px',color:'var(--text-muted)',fontFamily:'-apple-system, sans-serif'}}>Run shell commands on your Mac</div>
              </div>
            )}
            {shellHistory.map(function(entry) {
              if (entry.type === 'input') {
                return (
                  <div key={entry.id} style={{marginBottom:'2px'}}>
                    <span style={{color:'var(--success)'}}>{(entry.cwd || '~') + ' $ '}</span>
                    <span style={{color:'var(--text-primary)'}}>{entry.text}</span>
                  </div>
                );
              } else {
                return (
                  <div key={entry.id} style={{marginBottom:'12px',color: entry.exitCode !== 0 ? 'var(--danger)' : 'var(--text-secondary)',whiteSpace:'pre-wrap',wordWrap:'break-word'}}>
                    {entry.text}
                  </div>
                );
              }
            })}
            {shellRunning && <div style={{color:'var(--text-muted)'}}>Running...</div>}
          </div>
          <div style={inputBarStyle}>
            <span style={promptStyle}>{shellCwd + ' $'}</span>
            <input ref={shellInputRef} type="text" value={shellInput} onChange={function(e) { setShellInput(e.target.value); }}
              onKeyDown={handleShellKey} placeholder={shellRunning ? 'Running...' : 'Enter command...'} disabled={shellRunning} style={inputStyle} />
            {runBtn(runShellCommand, shellRunning || !shellInput.trim(), shellRunning)}
          </div>
        </React.Fragment>
      )}

      {/* ═══ Hermes Tab ═══ */}
      {activeMode === 'hermes' && (
        <React.Fragment>
          <div ref={hermesBodyRef} style={{flex:1,overflow:'auto',background:'#0a0a0f',padding:'12px 16px',fontFamily:'Monaco, Menlo, Consolas, monospace',fontSize:'13px',lineHeight:'1.6'}}>
            {hermesHistory.length === 0 && (
              <div style={{color:'var(--text-muted)',padding:'40px 0',textAlign:'center'}}>
                <div style={{fontSize:'28px',marginBottom:'12px',fontFamily:'-apple-system, sans-serif'}}>{'⚡'}</div>
                <div style={{fontSize:'14px',marginBottom:'8px',color:'var(--text-secondary)',fontFamily:'-apple-system, sans-serif'}}>Hermes Terminal</div>
                <div style={{fontSize:'12px',color:'var(--text-muted)',fontFamily:'-apple-system, sans-serif',maxWidth:'400px',margin:'0 auto'}}>
                  Chat with Hermes AI agent. Conversation persists across messages.
                </div>
                <div style={{marginTop:'20px',textAlign:'left',display:'inline-block'}}>
                  <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'6px'}}>Try:</div>
                  {['list all skills', 'show memory', 'what tools are available?'].map(function(ex) {
                    return (
                      <div key={ex} style={{color:'var(--accent)',cursor:'pointer',padding:'3px 0',fontSize:'12px'}}
                        onClick={function() { setHermesInput(ex); if (hermesInputRef.current) hermesInputRef.current.focus(); }}>
                        {'$ '}{ex}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {hermesHistory.map(function(entry) {
              if (entry.role === 'user') {
                return (<div key={entry.id} style={{marginBottom:'12px'}}><span style={{color:'var(--accent)'}}>{'$ '}</span><span style={{color:'var(--text-primary)'}}>{entry.content}</span></div>);
              } else if (entry.role === 'system') {
                return (<div key={entry.id} style={{color:'var(--warning)',fontSize:'11px',marginBottom:'4px',paddingLeft:'16px'}}>{entry.content}</div>);
              } else {
                return (
                  <div key={entry.id} style={{marginBottom:'16px',paddingLeft:'16px',borderLeft:'2px solid var(--border)',color:'var(--text-secondary)'}}>
                    <div className="hermes-response" style={{wordWrap:'break-word'}} dangerouslySetInnerHTML={{__html: entry.content ? marked.parse(entry.content) : (entry.streaming ? '<span style="color:var(--text-muted)">thinking...</span>' : '')}} />
                    {entry.streaming && <span style={{display:'inline-block',width:'7px',height:'14px',background:'var(--accent)',animation:'blink 1s step-end infinite'}}></span>}
                  </div>
                );
              }
            })}
          </div>
          <div style={inputBarStyle}>
            <span style={promptStyle}>{'$'}</span>
            <input ref={hermesInputRef} type="text" value={hermesInput} onChange={function(e) { setHermesInput(e.target.value); }}
              onKeyDown={handleHermesKey} placeholder={hermesStreaming ? 'Running...' : 'Ask Hermes...'} disabled={hermesStreaming} style={inputStyle} />
            {runBtn(sendHermesCommand, hermesStreaming || !hermesInput.trim(), hermesStreaming)}
          </div>
        </React.Fragment>
      )}

      {/* ═══ Claude Code Tab ═══ */}
      {activeMode === 'claude' && (
        <React.Fragment>
          <div ref={claudeBodyRef} style={{flex:1,overflow:'auto',background:'#0a0a0f',padding:'12px 16px',fontFamily:'Monaco, Menlo, Consolas, monospace',fontSize:'13px',lineHeight:'1.6'}}>
            {claudeHistory.length === 0 && (
              <div style={{color:'var(--text-muted)',padding:'40px 0',textAlign:'center'}}>
                <div style={{fontSize:'28px',marginBottom:'12px'}}>{'◆'}</div>
                <div style={{fontSize:'14px',marginBottom:'8px',color:'var(--text-secondary)',fontFamily:'-apple-system, sans-serif'}}>Claude Code</div>
                <div style={{fontSize:'12px',color:'var(--text-muted)',fontFamily:'-apple-system, sans-serif',maxWidth:'400px',margin:'0 auto'}}>
                  Runs prompts through the Claude Code CLI (<code style={{color:'var(--accent)'}}>claude -p</code>). Requires Claude Code installed on your Mac.
                </div>
                <div style={{marginTop:'20px',textAlign:'left',display:'inline-block'}}>
                  <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'6px'}}>Try:</div>
                  {['explain this codebase', 'find all TODO comments', 'what does serve.py do?'].map(function(ex) {
                    return (
                      <div key={ex} style={{color:'var(--accent)',cursor:'pointer',padding:'3px 0',fontSize:'12px'}}
                        onClick={function() { setClaudeInput(ex); if (claudeInputRef.current) claudeInputRef.current.focus(); }}>
                        {'claude> '}{ex}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {claudeHistory.map(function(entry) {
              if (entry.type === 'input') {
                return (<div key={entry.id} style={{marginBottom:'2px'}}><span style={{color:'#c4a0f5'}}>{'claude> '}</span><span style={{color:'var(--text-primary)'}}>{entry.text}</span></div>);
              } else if (entry.type === 'thinking') {
                return (<div key={entry.id} style={{color:'var(--text-muted)',padding:'8px 0'}}>{'Claude is thinking... (this may take a minute)'}</div>);
              } else {
                return (
                  <div key={entry.id} style={{marginBottom:'16px',paddingLeft:'16px',borderLeft:'2px solid #c4a0f540',color:'var(--text-secondary)',whiteSpace:'pre-wrap',wordWrap:'break-word'}}>
                    <div dangerouslySetInnerHTML={{__html: entry.text ? marked.parse(entry.text) : ''}} />
                  </div>
                );
              }
            })}
          </div>
          <div style={inputBarStyle}>
            <span style={Object.assign({}, promptStyle, {color:'#c4a0f5'})}>{'claude>'}</span>
            <input ref={claudeInputRef} type="text" value={claudeInput} onChange={function(e) { setClaudeInput(e.target.value); }}
              onKeyDown={handleClaudeKey} placeholder={claudeRunning ? 'Claude is working...' : 'Ask Claude Code...'} disabled={claudeRunning} style={inputStyle} />
            {runBtn(runClaudeCommand, claudeRunning || !claudeInput.trim(), claudeRunning)}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* ── Welcome / First Run Popup ── */
function WelcomePopup({ onClose, onOpenRemoteSetup }) {

    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={function(e){ e.stopPropagation(); }} style={{maxWidth:'480px',textAlign:'center'}}>

        <div className="modal-title" style={{marginBottom:'4px'}}>Welcome to Hermes UI</div>

        <div style={{display:'flex',flexDirection:'column',gap:'10px',textAlign:'left',marginBottom:'24px'}}>
          <div style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px',display:'flex',gap:'12px',alignItems:'center'}}>
            <span style={{fontSize:'24px'}}>{'📱'}</span>
            <div>
              <div style={{fontSize:'13px',fontWeight:'600',color:'var(--text-primary)'}}>Access from any device</div>

            </div>

            <div>
              <div style={{fontSize:'13px',fontWeight:'600',color:'var(--text-primary)'}}>Image analysis</div>

}

function StatusBar({ connected, conversations }) {
  var [stats, setStats] = useState({ model: '...', memory: 0, sessions: 0, uptime: '' });

  useEffect(function() {
    var fetchStats = async function() {
      try {
        var [memR, healthR] = await Promise.all([
          fetch(API_BASE + '/api/memory').catch(function() { return null; }),
          fetch(API_BASE + '/health').catch(function() { return null; })
        ]);
        var memCount = 0, model = '...', uptime = '';
        if (memR && memR.ok) {
          var md = await memR.json();
          if (md.targets) { for (var t = 0; t < md.targets.length; t++) { memCount += (md.targets[t].entries || []).length; } }
          else { memCount = (md.memories || md.items || []).length; }
        }
        if (healthR && healthR.ok) {
          var hd = await healthR.json();
          model = hd.model || hd.default_model || model;
          if (hd.uptime) { var hrs = Math.floor(hd.uptime / 3600); var mins = Math.floor((hd.uptime % 3600) / 60); uptime = hrs + 'h ' + mins + 'm'; }
        }
        var sessCount = conversations ? conversations.length : 0;
        setStats({ model: model, memory: memCount, sessions: sessCount, uptime: uptime });
      } catch(e) {}
    };
    fetchStats();
    var iv = setInterval(fetchStats, 30000);
    return function() { clearInterval(iv); };
  }, []);

  return (
    <div className="status-bar">
      <div className="status-bar-item">
        <div className={connected === false ? 'status-dot-dead' : 'status-dot-live'}></div>
        <span>{connected === false ? 'Offline' : 'Connected'}</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Model">
        <span>{'🧠'}</span> <span>{stats.model}</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Memory entries">
        <span>{'💾'}</span> <span>{stats.memory} memories</span>
      </div>
      <div className="status-bar-sep"></div>
      <div className="status-bar-item" title="Total sessions">
        <span>{'💬'}</span> <span>{stats.sessions} sessions</span>
      </div>
      {stats.uptime && (
        <React.Fragment>
          <div className="status-bar-sep"></div>
          <div className="status-bar-item" title="Uptime">
            <span>{'⏱'}</span> <span>{stats.uptime}</span>
          </div>
        </React.Fragment>
      )}
      <div style={{flex:1}}></div>
      <div className="status-bar-item" style={{opacity:0.5}}>
        <span>Hermes v1.0</span>
      </div>
    </div>
  );
}

  const [conversations, _setConversations] = useState([]);
  const setConversations = (val) => {

    } else {
      conversationsRef.current = val;

  const [activeConvId, _setActiveConvId] = useState(() => {

  const [messages, _setMessages] = useState([]);
