  // ── API methods (v0.7.0 — two-step SSE flow matching hermes-webui) ──
  const api = {
    // Session IDs are generated client-side; Hermes uses X-Hermes-Session-Id
    // header to load/store conversation history in state.db automatically.
    createSession() {
      return 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    },

    // Sessions are managed client-side (localStorage + React state).
    // The old /api/sessions listing endpoint no longer exists in v0.7.0.
    async listSessions() { return []; },

    async deleteSession(sessionId) { /* client-side only */ },

    async getSessionMessages(sessionId) { return []; },

    async chatStream(sessionId, message, onChunk, onDone, onToolEvent, onThinking, signal, messageHistory, options) {
      // Two-step flow matching hermes-webui:
      // 1. POST /api/chat/start → {stream_id}
      // 2. EventSource /api/chat/stream?stream_id=X → named SSE events
      // options: { baseSystemPrompt?: string, applyBehavioralGuidelines?: boolean,
      //            reasoningEffort?: string, onSteerEvent?: function, onStatusEvent?: function }
      var opts = options || {};
      var emitStatus = function(status) {
        if (typeof opts.onStatusEvent === 'function') {
          try { opts.onStatusEvent(status || {}); } catch(e) {}
        }
      };
      // Build messages array for the API
      var apiMessages = [];
      if (messageHistory && messageHistory.length > 0) {
        for (var mi = 0; mi < messageHistory.length; mi++) {
          var m = messageHistory[mi];
          if ((m.role === 'user' || m.role === 'assistant') && m.content) {
            apiMessages.push({ role: m.role, content: m.content });
          }
        }
      }
      if (apiMessages.length === 0 || apiMessages[apiMessages.length - 1].content !== message) {
        apiMessages.push({ role: 'user', content: message });
      }
      // Attach native-multimodal images to the last user message. serve_lite
      // pulls them off the final user turn and builds OpenAI-style content
      // blocks for run_conversation. Empty when model isn't vision-capable.
      var _imgs = (opts.images && opts.images.length) ? opts.images : null;
      if (_imgs && apiMessages.length > 0) {
        var _lastIdx = apiMessages.length - 1;
        if (apiMessages[_lastIdx].role === 'user') {
          apiMessages[_lastIdx] = Object.assign({}, apiMessages[_lastIdx], { images: _imgs });
        }
      }
      // Step 1: POST to /api/chat/start to get stream_id
      emitStatus({ kind: 'thinking', label: 'Starting', detail: 'Opening stream' });
      var _streamStart = Date.now();
      const startResp = await fetch(API_BASE + '/api/chat/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          messages: apiMessages,
          base_system_prompt: opts.baseSystemPrompt || '',
          apply_behavioral_guidelines: !!opts.applyBehavioralGuidelines,
          profile: normalizePersonality(opts.profile || 'default'),
          reasoning_effort: normalizeReasoningEffort(opts.reasoningEffort || ''),
          model: opts.model || '',
          workspace: opts.workspace || '',
        }),
        signal: signal,
      });
      if (!startResp.ok) {
        const err = await startResp.text();
        throw new Error('Chat start error ' + startResp.status + ': ' + err);
      }
      const startData = await startResp.json();
      const streamId = startData.stream_id;
      // Register streamId so Stop/Pause can call /api/chat/cancel directly
      // without relying on the AbortController listener race.
      try { attachStreamId(sessionId, streamId); } catch(e) {}
      var _httpMs = Date.now() - _streamStart;
      console.log('[stream] chat/start returned stream_id in ' + _httpMs + 'ms');
      if (onThinking) onThinking('[timing] Stream started in ' + (_httpMs < 1000 ? _httpMs + 'ms' : Math.round(_httpMs/1000) + 's'));
      emitStatus({ kind: 'thinking', label: 'Thinking', detail: 'Waiting for Hermes' });

      // Step 2: Open EventSource for named SSE events (matches hermes-webui)
      var fullContent = '';
      var streamUsage = null;

      // Reasoning tag parser state
      var rawContent = '';
      var inReasoning = false;
      var reasoningBuffer = '';
      var _OPEN_TAGS = ['<REASONING_SCRATCHPAD>', '<think>', '<reasoning>', '<THINKING>', '<thinking>'];
      var _CLOSE_TAGS = ['</REASONING_SCRATCHPAD>', '</think>', '</reasoning>', '</THINKING>', '</thinking>'];

      function stripReasoningTags(text) {
        var result = text;
        result = result.replace(/<REASONING_SCRATCHPAD>[\s\S]*?<\/REASONING_SCRATCHPAD>/g, '');
        result = result.replace(/<think>[\s\S]*?<\/think>/gi, '');
        result = result.replace(/<reasoning>[\s\S]*?<\/reasoning>/gi, '');
        result = result.replace(/<THINKING>[\s\S]*?<\/THINKING>/g, '');
        result = result.replace(/<REASONING_SCRATCHPAD>[\s\S]*/g, '');
        result = result.replace(/<think>[\s\S]*/gi, '');
        result = result.replace(/<reasoning>[\s\S]*/gi, '');
        result = result.replace(/<THINKING>[\s\S]*/g, '');
        return result.replace(/^\s+/, '');
      }

      function processReasoningDelta(delta) {
        rawContent += delta;
        if (!inReasoning) {
          for (var oi = 0; oi < _OPEN_TAGS.length; oi++) {
            var openIdx = rawContent.lastIndexOf(_OPEN_TAGS[oi]);
            if (openIdx !== -1) {
              var closeTag = _CLOSE_TAGS[oi];
              var closeIdx = rawContent.indexOf(closeTag, openIdx + _OPEN_TAGS[oi].length);
              if (closeIdx !== -1) {
                var reasoningText = rawContent.slice(openIdx + _OPEN_TAGS[oi].length, closeIdx).trim();
                if (reasoningText && onThinking) {
                  var lines = reasoningText.split('\n');
                  for (var li = 0; li < lines.length; li++) {
                    if (lines[li].trim()) onThinking('[reasoning] ' + lines[li].trim().slice(0, 300));
                  }
                }
              } else {
                inReasoning = true;
                var newReasoning = rawContent.slice(openIdx + _OPEN_TAGS[oi].length);
                if (newReasoning.trim() && onThinking) {
                  onThinking('[reasoning] ' + newReasoning.replace(/\n/g, ' ').trim().slice(0, 300));
                }
                reasoningBuffer = newReasoning;
              }
              break;
            }
          }
        } else {
          reasoningBuffer += delta;
          for (var ci = 0; ci < _CLOSE_TAGS.length; ci++) {
            if (reasoningBuffer.indexOf(_CLOSE_TAGS[ci]) !== -1) {
              var beforeClose = reasoningBuffer.split(_CLOSE_TAGS[ci])[0];
              if (beforeClose.trim() && onThinking) {
                onThinking('[reasoning] ' + beforeClose.replace(/\n/g, ' ').trim().slice(0, 300));
              }
              inReasoning = false;
              reasoningBuffer = '';
              break;
            }
          }
          if (inReasoning && delta.trim() && onThinking) {
            onThinking('[reasoning] ' + delta.replace(/\n/g, ' ').trim().slice(0, 300));
          }
        }
        return stripReasoningTags(rawContent);
      }

      // Tool progress detection: v0.7.0 injects tool markers as markdown
      // text deltas like "\n`⚙️ tool_name`\n" or "\n`🔍 search_query`\n"
      var toolMarkerRegex = /^`[\p{Emoji}\uFE0F\u200D]*\s*(.+?)`$/u;
      var pendingToolDelta = '';

      function detectToolProgress(delta) {
        // Check if this delta contains a tool marker injected by Hermes
        var trimmed = delta.trim();
        if (!trimmed) return false;
        // Tool markers are wrapped in backticks with an emoji prefix
        var match = trimmed.match(toolMarkerRegex);
        if (match) {
          var toolLabel = match[1].trim();
          if (onToolEvent) {
            onToolEvent({ type: 'started', toolName: toolLabel, label: toolLabel });
          }
          if (onThinking) {
            onThinking('[tool] ' + toolLabel);
          }
          return true;
        }
        return false;
      }

      var onDoneFired = false;
      var wrappedOnDone = function(content) {
        if (onDoneFired) return;
        onDoneFired = true;
        if (typeof onDone === 'function') onDone(content);
      };

      // EventSource with named events (matches hermes-webui _wireSSE)
      return new Promise(function(resolve, reject) {
        var source = new EventSource(API_BASE + '/api/chat/stream?stream_id=' + encodeURIComponent(streamId));

        // Cancel via abort signal
        if (signal) {
          signal.addEventListener('abort', function() {
            source.close();
            // Also tell backend to cancel
            fetch(API_BASE + '/api/chat/cancel?stream_id=' + encodeURIComponent(streamId)).catch(function(){});
            wrappedOnDone(fullContent);
            resolve({ content: fullContent, usage: streamUsage });
          });
        }

        source.addEventListener('token', function(e) {
          var d = JSON.parse(e.data);
          if (d.text) {
            fullContent = processReasoningDelta(d.text);
            emitStatus({ kind: 'writing', label: 'Writing', detail: 'Streaming reply' });
            onChunk(fullContent);
          }
        });

        source.addEventListener('reasoning', function(e) {
          var d = JSON.parse(e.data);
          if (d.text && onThinking) {
            emitStatus({ kind: 'thinking', label: 'Thinking', detail: d.text });
            onThinking('[reasoning] ' + d.text.replace(/\n/g, ' ').trim().slice(0, 300));
          }
        });

        source.addEventListener('tool', function(e) {
          var d = JSON.parse(e.data);
          if (onToolEvent) onToolEvent({ type: 'started', toolName: d.name, label: d.preview || d.name, args: d.args });
          if (onThinking) onThinking('[tool] ' + (d.name || 'tool'));
        });

        source.addEventListener('tool_complete', function(e) {
          var d = JSON.parse(e.data);
          emitStatus({ kind: 'thinking', label: 'Thinking', detail: 'Tool finished' });
          if (onToolEvent) onToolEvent({ type: 'completed', toolName: d.name, label: d.preview || d.name, args: d.args, result: d.result, duration: d.duration });
        });

        source.addEventListener('approval', function(e) {
          var d = JSON.parse(e.data);
          // Auto-approve for now (proper approval UI can be added later)
          console.log('[stream] Approval requested:', d);
          emitStatus({ kind: 'waiting', label: 'Waiting for approval', detail: d.description || d.command || 'Tool approval needed' });
          if (onThinking) onThinking('[approval] ' + (d.description || d.command || 'Tool approval needed'));
          fetch(API_BASE + '/api/approval/respond', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId, approved: true }),
          }).catch(function(err) { console.warn('[stream] Auto-approve failed:', err); });
        });

        source.addEventListener('compressed', function(e) {
          // Mirrors nesquena/hermes-webui messages.js lines 481-490: context
          // auto-compression notification. When this fires, the backend has
          // rotated session_id and compacted history. We insert a visible
          // divider into the transcript AND set has_compaction on the
          // conversation so the sidebar 🔄 icon appears. Caller wires the
          // React setters via opts.onCompressed(msg, newSessionId).
          var d = {};
          try { d = JSON.parse(e.data); } catch(err) {}
          var msg = d.message || 'Context auto-compressed to continue the conversation';
          console.log('[stream] ' + msg);
          emitStatus({ kind: 'compressed', label: 'Context compressed', detail: msg });
          if (onThinking) onThinking('[compressed] ' + msg);
          if (opts.onCompressed) {
            try { opts.onCompressed(msg, d.session_id || null); } catch(err) { console.warn('[compressed] onCompressed threw:', err); }
          }
        });

        source.addEventListener('steer_applied', function(e) {
          var d = {};
          try { d = JSON.parse(e.data); } catch(err) {}
          if (opts.onSteerEvent) {
            emitStatus({ kind: 'steer', label: 'Steer applied', detail: (d.items && d.items[0] && d.items[0].preview) || '' });
            opts.onSteerEvent({
              type: 'applied',
              items: d.items || [],
              count: d.count || 0,
            });
          }
        });

        source.addEventListener('steer_late', function(e) {
          var d = {};
          try { d = JSON.parse(e.data); } catch(err) {}
          if (opts.onSteerEvent) {
            emitStatus({ kind: 'steer', label: 'Steer saved', detail: d.text || ((d.items && d.items[0] && d.items[0].preview) || '') });
            opts.onSteerEvent({
              type: 'late',
              text: d.text || '',
              items: d.items || [],
              count: d.count || 0,
            });
          }
        });

        source.addEventListener('done', function(e) {
          source.close();
          var d = JSON.parse(e.data);
          emitStatus({ kind: 'finished', label: 'Finished', detail: 'Reply complete' });
          if (d.usage) streamUsage = d.usage;
          // Use server's authoritative messages (matches webui: S.messages = d.session.messages)
          if (d.session && d.session.messages && d.session.messages.length) {
            var lastAssistant = null;
            for (var i = d.session.messages.length - 1; i >= 0; i--) {
              if (d.session.messages[i].role === 'assistant') {
                var c = d.session.messages[i].content || '';
                if (typeof c === 'string') lastAssistant = c;
                else if (Array.isArray(c)) lastAssistant = c.filter(function(p){return p&&p.type==='text';}).map(function(p){return p.text||'';}).join('\n');
                break;
              }
            }
            if (lastAssistant && lastAssistant.trim()) fullContent = lastAssistant;
          }
          wrappedOnDone(fullContent);
          resolve({ content: fullContent, usage: streamUsage, session: d.session });
        });

        source.addEventListener('apperror', function(e) {
          source.close();
          var d = JSON.parse(e.data);
          var errMsg = d.message || 'Agent error';
          console.error('[stream] apperror:', errMsg);
          emitStatus({ kind: 'error', label: 'Agent error', detail: errMsg });
          // Show the error as content so user sees it
          fullContent = '**Error:** ' + errMsg;
          onChunk(fullContent);
          wrappedOnDone(fullContent);
          resolve({ content: fullContent, usage: streamUsage });
        });

        source.addEventListener('cancel', function(e) {
          source.close();
          emitStatus({ kind: 'paused', label: 'Paused', detail: 'Stopped the running turn' });
          // Pull the preserved _partial message off the session so Stop
          // doesn't lose what the model already generated (nesq #893/#882).
          var cancelSession = null;
          try { cancelSession = JSON.parse(e.data || '{}').session || null; } catch(_e) {}
          if (cancelSession && Array.isArray(cancelSession.messages) && cancelSession.messages.length) {
            for (var i = cancelSession.messages.length - 1; i >= 0; i--) {
              var m = cancelSession.messages[i];
              if (m && m.role === 'assistant' && m._partial) {
                var pc = m.content || '';
                if (typeof pc === 'string' && pc.trim()) fullContent = pc;
                break;
              }
            }
          }
          wrappedOnDone(fullContent);
          resolve({ content: fullContent, usage: streamUsage, session: cancelSession, cancelled: true });
        });

        source.addEventListener('error', function(e) {
          // EventSource network error — probe the stream-status endpoint
          // so we can tell "server is alive, stream still running, just
          // reconnect" apart from "server returned a real HTTP error".
          //
          // This mirrors hermes-webui's streamChat pattern: any non-OK
          // response is surfaced as a visible chat error rather than
          // silently resolving (which used to look like a stuck "thinking"
          // state forever).
          source.close();
          console.warn('[stream] EventSource error, checking stream status...');
          emitStatus({ kind: 'reconnecting', label: 'Reconnecting', detail: 'Checking stream status' });
          fetch(API_BASE + '/api/chat/stream/status?stream_id=' + encodeURIComponent(streamId))
            .then(function(r) {
              if (!r.ok) {
                // e.g. 404 if the proxy is missing this route (running
                // the old serve.py, or serve_lite.py isn't up). Pull the
                // body for context and throw so the catch branch can
                // surface it in the chat.
                return r.text().then(function(body) {
                  var hint = (r.status === 404)
                    ? ' — this usually means you are running the old serve.py; use serve_lite.py'
                    : '';
                  throw new Error('stream status ' + r.status + hint + (body ? ': ' + body.slice(0, 200) : ''));
                });
              }
              return r.json();
            })
            .then(function(st) {
              if (st.active) {
                console.log('[stream] Stream still active, reconnecting...');
                emitStatus({ kind: 'reconnecting', label: 'Reconnecting', detail: 'Stream is still active' });
                if (onThinking) onThinking('[info] Reconnecting...');
                var source2 = new EventSource(API_BASE + '/api/chat/stream?stream_id=' + encodeURIComponent(streamId));
                // Re-wire all the same listeners (simplified — just forward to resolve)
                source2.addEventListener('done', function(e2) {
                  source2.close();
                  var d2 = JSON.parse(e2.data);
                  emitStatus({ kind: 'finished', label: 'Finished', detail: 'Reply complete' });
                  if (d2.usage) streamUsage = d2.usage;
                  wrappedOnDone(fullContent);
                  resolve({ content: fullContent, usage: streamUsage, session: d2.session });
                });
                source2.addEventListener('token', function(e2) {
                  var d2 = JSON.parse(e2.data);
                  if (d2.text) { fullContent = processReasoningDelta(d2.text); emitStatus({ kind: 'writing', label: 'Writing', detail: 'Streaming reply' }); onChunk(fullContent); }
                });
                source2.addEventListener('steer_applied', function(e2) {
                  var d2 = {};
                  try { d2 = JSON.parse(e2.data); } catch(err) {}
                  if (opts.onSteerEvent) {
                    opts.onSteerEvent({
                      type: 'applied',
                      items: d2.items || [],
                      count: d2.count || 0,
                    });
                  }
                });
                source2.addEventListener('steer_late', function(e2) {
                  var d2 = {};
                  try { d2 = JSON.parse(e2.data); } catch(err) {}
                  if (opts.onSteerEvent) {
                    opts.onSteerEvent({
                      type: 'late',
                      text: d2.text || '',
                      items: d2.items || [],
                      count: d2.count || 0,
                    });
                  }
                });
                source2.addEventListener('error', function() {
                  source2.close();
                  // Reconnect also failed — show a real error instead of
                  // resolving silently with whatever partial content we had.
                  if (!fullContent) {
                    fullContent = '**Error:** Stream reconnect failed. ' +
                      'Check that serve_lite.py is running on port 3333 and the Hermes agent is reachable on 8642.';
                    onChunk(fullContent);
                  }
                  emitStatus({ kind: 'error', label: 'Reconnect failed', detail: 'Stream connection dropped' });
                  wrappedOnDone(fullContent);
                  resolve({ content: fullContent, usage: streamUsage });
                });
              } else {
                // Stream ended before we saw a 'done' event. If we have
                // no content at all, treat it as an error so the user
                // sees something actionable instead of an empty bubble.
                if (!fullContent) {
                  fullContent = '**Error:** Stream ended without a completion event. ' +
                    'The agent may have crashed or the connection dropped. Check the Hermes agent logs on port 8642.';
                  onChunk(fullContent);
                }
                emitStatus({ kind: 'error', label: 'Stream ended', detail: 'No completion event received' });
                wrappedOnDone(fullContent);
                resolve({ content: fullContent, usage: streamUsage });
              }
            })
            .catch(function(err) {
              // Either the status endpoint returned non-OK (e.g. 404 from
              // old serve.py) or the fetch itself failed (proxy down).
              // Either way: surface it so the user isn't staring at a
              // silent timeout.
              var errMsg = (err && err.message) || 'stream error';
              console.error('[stream] ' + errMsg);
              fullContent = '**Error:** ' + errMsg;
              emitStatus({ kind: 'error', label: 'Stream error', detail: errMsg });
              onChunk(fullContent);
              wrappedOnDone(fullContent);
              resolve({ content: fullContent, usage: streamUsage });
            });
        });
      }); // end Promise
    }
  };

  // ── Image processing ──
  // Whitelist-based vision-model detection. When the active model can see
  // images natively, we skip the Gemini-describe round-trip and ship raw
  // base64 data URLs straight to the agent via /api/chat/start's multimodal
  // content blocks. MiniMax + GLM + most text-only models stay on the
  // Gemini fallback path.
  const isVisionModel = (name) => {
    return !!inferModelCapabilities(name, null, null).vision;
  };

  const processImages = async (files) => {
    var imageHelperMode = normalizeImageHelperMode(config && config.imageHelperMode);
    var imageHelperModel = normalizeImageHelperModel(config && config.imageHelperModel);
    var canSeeDirectly = imageHelperMode === 'direct' || (imageHelperMode === 'auto' && isVisionModel(activeChatModel));
    // Native fast-path — skip Gemini entirely when the active model can
    // see the image itself. dataUrl gets forwarded as-is in sendMessage.
    if (canSeeDirectly) {
      for (const file of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          const imgId = Date.now() + Math.random();
          setPendingImages(prev => [...prev, {
            id: imgId, dataUrl: dataUrl, native: true,
            analyzing: false, description: null,
            status: imageHelperMode === 'direct' ? 'Ready - direct image mode' : 'Ready - sent to model directly',
          }]);
        };
        reader.readAsDataURL(file);
      }
      return;
    }
    if (!config.geminiKey) {
      alert('Add your Gemini API key in Settings > Helpers to analyze images.\n\nYour current image helper mode uses Gemini to describe images before sending them to Hermes.');
      return;
    }
    for (const file of files) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const dataUrl = e.target.result;
        const imgId = Date.now() + Math.random();
        // Detect mime type from the data URL
        var mimeType = 'image/jpeg';
        var mimeMatch = dataUrl.match(/^data:(image\/[a-zA-Z+]+);/);
        if (mimeMatch) mimeType = mimeMatch[1];
        setPendingImages(prev => [...prev, { id: imgId, dataUrl: dataUrl, analyzing: true, status: 'Analyzing with ' + imageHelperModel + '...' }]);
        try {
          const base64 = dataUrl.split(',')[1];
          const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(imageHelperModel) + ':generateContent?key=' + config.geminiKey, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [
                { text: 'Describe this image in detail. Include: what type of image it is, all visible text/labels, colors, layout, any UI elements, diagrams, or notable features. Be thorough — your description is the only way the recipient will understand this image.' },
                { inlineData: { mimeType: mimeType, data: base64 } },
              ]}],
            }),
          });
          if (!r.ok) {
            var errText = await r.text();
            throw new Error('Gemini API ' + r.status + ': ' + errText.slice(0, 200));
          }
          const data = await r.json();
          const description = data.candidates?.[0]?.content?.parts?.[0]?.text || null;
          if (!description) {
            throw new Error('Gemini returned no description');
          }
          setPendingImages(prev => prev.map(img => img.id === imgId ? { ...img, analyzing: false, description: description, status: 'Ready' } : img));
        } catch (err) {
          console.error('Gemini image analysis failed:', err);
          addLocalLog('ERROR Gemini image analysis failed: ' + err.message);
          setPendingImages(prev => prev.map(img => img.id === imgId ? { ...img, analyzing: false, description: null, status: 'Failed: ' + err.message } : img));
        }
      };
      reader.readAsDataURL(file);
    }
  };

  const removeImage = (imgId) => {
    setPendingImages(prev => prev.filter(img => img.id !== imgId));
  };

  // ── File attachment helpers (matching webui pattern) ──
  var TEXT_EXTENSIONS = { md: 'text/markdown', txt: 'text/plain', json: 'application/json', csv: 'text/csv', ts: 'text/plain', tsx: 'text/plain', js: 'text/plain', py: 'text/plain', pdf: 'application/pdf', rtf: 'application/rtf' };
  function isTextFile(file) {
    var mime = (file.type || '').toLowerCase();
    if (mime.startsWith('text/') || mime === 'application/json') return true;
    var ext = (file.name || '').split('.').pop().toLowerCase();
    return !!TEXT_EXTENSIONS[ext];
  }
  function formatFileSize(bytes) {
    if (!bytes || bytes <= 0) return '';
    var units = ['B', 'KB', 'MB', 'GB'];
    var v = bytes, u = 0;
    while (v >= 1024 && u < units.length - 1) { v /= 1024; u++; }
    return (u === 0 ? v : v.toFixed(1)) + ' ' + units[u];
  }
  var MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

  const addFiles = async (fileList) => {
    var files = Array.from(fileList).filter(function(f) { return isTextFile(f); });
    if (!files.length) return;
    var results = [];
    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      if (file.size > MAX_FILE_SIZE) { continue; }
      var ext = (file.name || '').split('.').pop().toLowerCase();
      try {
        var content, displayName = file.name, displaySize = file.size;
        if (ext === 'rtf') {
          // Convert RTF → plain text via server (macOS textutil).
          // Rename to .txt so Hermes reads it as plain text.
          var resp = await fetch('/api/convert/rtf-to-txt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/rtf' },
            body: file,
          });
          if (!resp.ok) {
            console.error('RTF conversion failed:', resp.status, await resp.text());
            continue;
          }
          var data = await resp.json();
          if (!data || !data.ok) {
            console.error('RTF conversion error:', data && data.error);
            continue;
          }
          content = data.text || '';
          displayName = file.name.replace(/\.rtf$/i, '') + '.txt';
          displaySize = content.length;
        } else {
          content = await new Promise(function(resolve, reject) {
            var reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.onerror = function() { reject(reader.error); };
            reader.readAsText(file);
          });
        }
        results.push({ id: Date.now() + '-' + i, name: displayName, size: displaySize, content: content });
      } catch (e) { console.error('Failed to read file:', file.name, e); }
    }
    if (results.length) setPendingFiles(function(prev) { return prev.concat(results); });
  };
  const removeFile = (fileId) => {
    setPendingFiles(function(prev) { return prev.filter(function(f) { return f.id !== fileId; }); });
  };

  // Drag-drop handlers for file attachments
  var dragCounter = useRef(0);
  const handleDragEnter = (e) => { e.preventDefault(); e.stopPropagation(); dragCounter.current++; setIsDraggingFiles(true); };
  const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); dragCounter.current--; if (dragCounter.current <= 0) { dragCounter.current = 0; setIsDraggingFiles(false); } };
  const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };
  const handleFileDrop = (e) => {
    e.preventDefault(); e.stopPropagation();
    dragCounter.current = 0; setIsDraggingFiles(false);
    if (e.dataTransfer && e.dataTransfer.files.length) {
      var imageFiles = [];
      var textFiles = [];
      Array.from(e.dataTransfer.files).forEach(function(f) {
        if (f.type.startsWith('image/')) imageFiles.push(f);
        else if (isTextFile(f)) textFiles.push(f);
      });
      if (imageFiles.length) processImages(imageFiles);
      if (textFiles.length) addFiles(textFiles);
    }
  };

  // ── Conversation management ──
  const newConversation = () => {
    const sessionId = api.createSession();
    var nowIso = new Date().toISOString();
    const conv = { id: sessionId, title: 'New Chat', created: new Date().toLocaleString(), last_active_at: nowIso, unread_count: 0, workspace: activeWorkspace.path || '', messages: [] };
    setConversations(prev => [conv, ...prev]);
    setActiveConvId(sessionId);
    setMessages([]);
    setInput('');
  };

  const selectConversation = (convId, options) => {
    var searchJump = options && Number.isInteger(options.messageIndex)
      ? { messageIndex: options.messageIndex }
      : null;
    pendingSearchJumpRef.current = searchJump;
    if (searchJump) {
      setHighlightedMessageIndex(null);
      setSearchJumpNonce(function(n) { return n + 1; });
    } else {
      autoScrollMessagesRef.current = true;
      setShowJumpToLive(false);
    }
    // 1. Save current messages to the old conversation —
    //    BUT skip if it's currently streaming, because updateStreamMessages
    //    already keeps it in sync and our snapshot may be stale due to React 18 batching.
    const prevConvId = activeConvRef.current;
    const snapshot = messagesRef.current;
    var prevIsStreaming = !!(prevConvId && streamingMap.current[prevConvId]);
    if (prevConvId && snapshot.length > 0 && !prevIsStreaming) {
      setConversations(prev =>
        prev.map(c => {
          if (c.id !== prevConvId) return c;
          var userMsgs = snapshot.filter(m => m.role === 'user').length;
          var tcCount = snapshot.reduce((sum, m) => sum + (m.toolCalls ? m.toolCalls.length : 0), 0);
          return { ...c, messages: snapshot, message_count: snapshot.length, user_prompt_count: userMsgs, tool_call_count: tcCount };
        })
      );
    }
    // 2. Load target conversation's messages from the ref (always fresh)
    const targetConv = conversationsRef.current.find(c => c.id === convId);
    setMessages((targetConv && targetConv.messages) || []);
    setActiveConvId(convId);
    if (targetConv && targetConv.workspace) switchWorkspace(targetConv.workspace, { skipConversationUpdate: true });
    setConversations(prev => prev.map(c => c.id === convId ? Object.assign({}, c, { unread_count: 0 }) : c));
    setInput('');
    // Jump back to chat view if currently on Memory/Skills/etc
    setCurrentView('chat');
  };

  const deleteConversation = (convId) => {
    api.deleteSession(convId);
    setConversations(prev => prev.filter(c => c.id !== convId));
    if (activeConvId === convId) {
      setActiveConvId(null);
      setMessages([]);
    }
  };

  const togglePinConversation = (convId) => {
    setConversations(function(prev) {
      return prev.map(function(c) {
        return c.id === convId ? Object.assign({}, c, { pinned: !c.pinned }) : c;
      });
    });
  };

  const toggleArchiveConversation = (convId) => {
    setConversations(function(prev) {
      return prev.map(function(c) {
        return c.id === convId ? Object.assign({}, c, { archived: !c.archived, pinned: c.archived ? c.pinned : false }) : c;
      });
    });
    if (activeConvId === convId && !showArchivedConversations) {
      setActiveConvId(null);
      setMessages([]);
    }
  };

  const [editingConvId, setEditingConvId] = useState(null);
  const [editingTitle, setEditingTitle] = useState('');
  const startRenameConv = function(convId, currentTitle) {
    setEditingConvId(convId);
    setEditingTitle(currentTitle || '');
  };
  const saveRenameConv = function() {
    if (editingConvId && editingTitle.trim()) {
      var newTitle = editingTitle.trim();
      var convId = editingConvId;
      setConversations(function(prev) {
        return prev.map(function(c) {
          return c.id === convId ? Object.assign({}, c, { title: newTitle }) : c;
        });
      });
      // Titles are persisted client-side only (v0.7.0 has no session rename API)
    }
    setEditingConvId(null);
    setEditingTitle('');
  };

  // Load conversations on mount — localStorage first, server as fallback/sync
  useEffect(() => {
    async function loadConversations() {
      var localConvs = [];
      try {
        const saved = localStorage.getItem('hermes-conversations');
        if (saved) localConvs = JSON.parse(saved);
      } catch(e) {}

      // Always fetch from server — use whichever has more conversations
      var serverConvs = [];
      try {
        const res = await fetch('/api/ui-conversations');
        if (res.ok) serverConvs = await res.json();
      } catch(e) {}

      // Prefer server if it has data (survives browser data wipe)
      const convs = serverConvs.length >= localConvs.length ? serverConvs : localConvs;

      // Clean up any messages that were saved mid-stream (streaming/thinking stuck true).
      // This happens when Hermes hangs and the user refreshes — without this, the UI
      // loads right back into a permanently-stuck streaming state.
      const cleanConvs = convs.map(function(c) {
        if (!c.messages || !c.messages.length) return c;
        var cleaned = c.messages.map(function(m) {
          if (!m.streaming && !m.thinking) return m;
          // Drop empty thinking-only messages; convert partial streaming ones to complete
          if (m.thinking && !m.content) return null;
          return { ...m, streaming: false, thinking: false };
        }).filter(Boolean);
        // Recalculate message counts from actual data
        var totalMsgs = cleaned.length;
        var userMsgs = cleaned.filter(function(m) { return m.role === 'user'; }).length;
        var toolCalls = cleaned.reduce(function(sum, m) { return sum + (m.toolCalls ? m.toolCalls.length : 0); }, 0);
        return { ...c, messages: cleaned, message_count: totalMsgs, user_prompt_count: userMsgs, tool_call_count: toolCalls };
      });

      if (cleanConvs.length > 0) {
        setConversations(cleanConvs);
        const savedId = localStorage.getItem('hermes-active-session');
        if (savedId) {
          const conv = cleanConvs.find(c => c.id === savedId);
          if (conv) {
            _setActiveConvId(savedId);
            activeConvRef.current = savedId;
            setMessages(conv.messages || []);
            if (conv.workspace) switchWorkspace(conv.workspace, { skipConversationUpdate: true });
          }
        }
      }
    }
    loadConversations().catch(e => console.warn('[hermes-ui] Failed to restore conversations:', e));
  }, []);

  // Persist conversations to localStorage + server whenever they change
  useEffect(() => {
    if (conversations.length === 0) return;
    const toSave = conversations.slice(0, 50);
    // Save to localStorage
    try {
      localStorage.setItem('hermes-conversations', JSON.stringify(toSave));
    } catch(e) {}
    // Save to server (disk) so it survives browser data wipe
    try {
      fetch('/api/ui-conversations', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(toSave),
      }).catch(() => {});
    } catch(e) {}
  }, [conversations]);

  // ── Export chat ──
  const exportChat = () => {
    const visibleMessages = messages.filter(m => m.role === 'user' || m.role === 'assistant');
    const conv = conversations.find(c => c.id === activeConvId);
    const title = (conv && conv.title) || 'Chat Export';
    generatePDF(visibleMessages, title);
  };

  const buildAsideMessages = (question, sourceMessages) => {
    var context = (sourceMessages || [])
      .filter(function(m) { return m && (m.role === 'user' || m.role === 'assistant') && !m.streaming && !m.thinking; })
      .slice(-8)
      .map(function(m) {
        var who = m.role === 'user' ? 'User' : 'Hermes';
        var text = searchMessageText(m.content).replace(/\s+/g, ' ').trim();
        if (text.length > 900) text = text.slice(0, 897) + '...';
        return who + ': ' + text;
      })
      .filter(Boolean)
      .join('\n');
    return [
      {
        role: 'system',
        content: 'You answer lightweight side questions inside Hermes UI. Use the provided chat excerpt only as context. Be concise, do not continue the main task, do not propose tool calls, and say when the excerpt is not enough.',
      },
      {
        role: 'user',
        content: (context ? ('Current chat excerpt:\n' + context + '\n\n') : '') + 'Side question:\n' + question,
      },
    ];
  };

  const sendAsideQuestion = async (text) => {
    var question = (text || '').trim();
    if (!question || asideSending) return;
    var sessionId = activeConvId;
    var baseMessages = messagesRef.current || [];
    var isNewSession = false;
    var createdIso = '';
    if (!sessionId) {
      sessionId = api.createSession();
      createdIso = new Date().toISOString();
      setActiveConvId(sessionId);
      baseMessages = [];
      isNewSession = true;
    }

    var asideId = 'aside-' + Date.now();
    var asideMsg = {
      id: asideId,
      role: 'aside',
      question: question,
      answer: '',
      pending: true,
      error: false,
      timestamp: new Date().toISOString(),
    };
    var appendAside = function(prev) { return (prev || []).concat([asideMsg]); };
    if (isNewSession) {
      var conv = { id: sessionId, title: question.slice(0, 50) || 'Side question', created: new Date().toLocaleString(), last_active_at: createdIso, unread_count: 0, workspace: activeWorkspace.path || '', messages: [asideMsg], message_count: 1, user_prompt_count: 0, tool_call_count: 0 };
      setConversations(function(prev) { return [conv].concat(prev); });
      setMessages([asideMsg]);
    } else {
      updateStreamMessages(sessionId, appendAside);
    }
    setInput('');
    setAsideMode(false);
    setAsideSending(true);
    addLocalLog('INFO  Sending side question to delegation model');

    try {
      var resp = await fetch(API_BASE + '/api/delegation/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: buildAsideMessages(question, baseMessages) }),
      });
      var data = await resp.json().catch(function() { return {}; });
      var answer = data.reply || '';
      var error = data.error || (!resp.ok ? ('HTTP ' + resp.status) : '');
      updateStreamMessages(sessionId, function(prev) {
        return (prev || []).map(function(m) {
          if (m.id !== asideId) return m;
          return Object.assign({}, m, {
            answer: error ? error : (answer || '(empty response)'),
            pending: false,
            error: !!error,
          });
        });
      });
      addLocalLog(error ? ('WARN  Side question failed: ' + error) : 'INFO  Side question answered');
    } catch (e) {
      updateStreamMessages(sessionId, function(prev) {
        return (prev || []).map(function(m) {
          if (m.id !== asideId) return m;
          return Object.assign({}, m, {
            answer: 'Request failed: ' + (e && e.message ? e.message : e),
            pending: false,
            error: true,
          });
        });
      });
      addLocalLog('ERROR Side question failed: ' + (e && e.message ? e.message : e));
    } finally {
      setAsideSending(false);
    }
  };

  // ── Send message ──
  const sendMessage = async (text, _retryCount, sendOptions) => {
    _retryCount = _retryCount || 0;
    var opts = sendOptions || {};

      // but do one final write from messagesRef to be safe.
      if (activeConvRef.current === sessionId) {
        // Still viewing this conversation — sync from current messages state
        setConversations(function(prev) {
          return prev.map(function(c) {
            if (c.id !== sessionId) return c;
            var update = { messages: messagesRef.current };
            if (usage) {
              update.input_tokens = (c.input_tokens || 0) + usageInput;
              update.output_tokens = (c.output_tokens || 0) + usageOutput;
              console.log('[tokens] Updated conversation tokens:', update.input_tokens, 'in /', update.output_tokens, 'out');
            }
            update.last_active_at = new Date().toISOString();
            update.unread_count = 0;
            return Object.assign({}, c, update);
          });
        });
      } else {
        // User switched away — still update token counts
        if (usage) {
          setConversations(function(prev) {
            return prev.map(function(c) {
              if (c.id !== sessionId) return c;
              return Object.assign({}, c, {
                input_tokens: (c.input_tokens || 0) + usageInput,
                output_tokens: (c.output_tokens || 0) + usageOutput,
                last_active_at: new Date().toISOString(),
                unread_count: c.unread_count || 1,
              });
            });
          });
        }
      }
      // If user switched away, conversations array is already up-to-date
      // from updateStreamMessages calls during streaming.
    }
  };

  const retryFromMessage = async (messageIndex) => {
    if (!activeConvId || isStreaming) return;
    var current = messagesRef.current || [];
    if (!Number.isInteger(messageIndex) || messageIndex < 0 || messageIndex >= current.length) return;

    var userIndex = messageIndex;
    if (!current[userIndex] || current[userIndex].role !== 'user') {
      userIndex = -1;
      for (var i = messageIndex - 1; i >= 0; i--) {
        if (current[i] && current[i].role === 'user') {
          userIndex = i;
          break;
        }
      }
    }
    if (userIndex < 0) return;

    var userMsg = current[userIndex];
    var retryText = typeof userMsg.content === 'string' ? userMsg.content : searchMessageText(userMsg.content);
    if (!retryText.trim() && !(userMsg.images && userMsg.images.length)) return;

    var retryImages = (userMsg.images || []).map(function(img) {
      return {
        id: 'retry-' + Date.now() + '-' + Math.random(),
        dataUrl: img.dataUrl,
        description: img.description || null,
        native: !!(img.dataUrl && isVisionModel(activeChatModel)),
        analyzing: false,
      };
    });
    addLocalLog('INFO  Retrying from message ' + (userIndex + 1));
    await sendMessage(retryText, 0, {
      baseMessages: current,
      images: retryImages,
      files: [],
    });
  };

  // ── Pause / Stop / Interject / Steer ──
  const sendInterjection = async (text) => {
    if (!text.trim()) return;
    setPausedSessionIds(prev => prev.filter(id => id !== activeConvId));
    await sendMessage(text);
  };

  // Steer: no-pause nudge. Uses hermes-agent v0.11.0's AIAgent.steer() via
  // /api/chat/steer — the text is queued onto the active agent's
  // _pending_steer buffer and gets appended to the last tool result before
  // the next LLM call, without interrupting the current turn. Unlike
  // sendInterjection (which cancels + resends), steer preserves the agent's
  // in-flight LLM call and delivers the nudge inline.
  const [steerFlash, setSteerFlash] = useState(null);  // transient UI: queued/applied/late steer status
  const steerFlashTimerRef = useRef(null);
  const showSteerFlash = (kind, text) => {
    var preview = text || '';
    if (preview.length > 60) preview = preview.slice(0, 57) + '...';
    if (steerFlashTimerRef.current) clearTimeout(steerFlashTimerRef.current);
    setSteerFlash({ kind: kind, preview: preview });
    steerFlashTimerRef.current = setTimeout(function() {
      setSteerFlash(null);
      steerFlashTimerRef.current = null;
    }, kind === 'late' ? 4200 : 2500);
  };
  const steer = async (text) => {
    if (!text || !text.trim()) return;
    var sid = activeConvId;
    var entry = sid ? streamingMap.current[sid] : null;
    if (!entry || !entry.streamId) {
      // Not streaming — fall back to a normal send so Enter still works.
      await sendMessage(text);
      return;
    }
    try {
      var r = await fetch(API_BASE + '/api/chat/steer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stream_id: entry.streamId, text: text }),
      });
      var data = await r.json().catch(function(){ return {}; });
      if (!r.ok || !data.ok) {
        // Older hermes-agent without .steer(), or stream already finished.
        // Graceful fallback: treat as the classic "auto-pause + interject"
        // flow so the user's typed message isn't lost.
        if (data && (data.code === 'unsupported' || data.code === 'not_active')) {
          addLocalLog('WARN  /steer unavailable (' + data.code + ') — falling back to pause+interject');
          pauseStreaming();
          await sendInterjection(text);
          return;
        }
        throw new Error((data && data.error) || ('HTTP ' + r.status));
      }
      setInput('');
      addLocalLog('INFO  [steer] queued (' + text.length + ' chars)');
      setAgentStateForSession(sid, { kind: 'steer', label: 'Steer queued', detail: text });
      showSteerFlash('queued', text);
    } catch (e) {
      console.error('Steer failed:', e);
      addLocalLog('ERROR /steer failed: ' + (e && e.message));
    }
  };

  const [pausedSessionIds, setPausedSessionIds] = useState([]);
  // Override isPaused to use dedicated state
  const isPaused = pausedSessionIds.includes(activeConvId);
  const activeAgentState = agentStateBySession[activeConvId] || null;
  const visibleAgentState = isPaused
    ? makeAgentState('paused', 'Paused', 'Ready for an interjection')
    : activeAgentState;
  const showAgentBanner = shouldShowAgentBanner(visibleAgentState, isStreaming, isPaused);
  const sessionTodos = useMemo(function() {
    return getSessionTodos(messages);
  }, [messages]);

  // Defensive helper: clears stuck .streaming / .thinking flags on the last assistant
  // message for a given session. Used by pause/stop so the UI always unsticks, even
  // when streamingSessionIds has desynced from actual SSE activity.
  const _clearStuckMessageFlags = (sid) => {
    const flip = (prev) => {
      if (!prev || !prev.length) return prev;
      var last = prev[prev.length - 1];
      if (last && last.role === 'assistant' && (last.streaming || last.thinking)) {
        var updated = prev.slice();
        updated[updated.length - 1] = Object.assign({}, last, { streaming: false, thinking: false });
        return updated;
      }
      return prev;
    };
    if (activeConvRef.current === sid) {
      setMessages(flip);
    }
    setConversations(prev => prev.map(c => c.id === sid ? Object.assign({}, c, { messages: flip(c.messages || []) }) : c));
  };

  const pauseStreaming = () => {
    const sid = activeConvId;
    if (!sid) return;
    var entry = streamingMap.current[sid];
    // Cancel backend stream directly, same as stopStreamingAction —
    // without this, pause only aborts the client fetch while the agent
    // keeps running tools/LLM calls until done.
    if (entry && entry.streamId) {
      fetch(API_BASE + '/api/chat/cancel?stream_id=' + encodeURIComponent(entry.streamId))
        .catch(function(){});
    }
    if (entry) {
      entry.abortController.abort();
    }
    stopStreaming(sid);
    _clearStuckMessageFlags(sid);
    setAgentStateForSession(sid, { kind: 'paused', label: 'Paused', detail: 'Ready for an interjection' });
    setPausedSessionIds(prev => prev.includes(sid) ? prev : [...prev, sid]);
  };

  const stopStreamingAction = () => {
    const sid = activeConvId;
    if (!sid) return;
    var entry = streamingMap.current[sid];
    // Fire the backend cancel FIRST, directly — mirrors nesq cancelStream().
    // Relying on the EventSource abort listener was racy: if the stream had
    // already closed (e.g. agent was mid-tool), the listener never fired and
    // the agent kept running to completion.
    if (entry && entry.streamId) {
      fetch(API_BASE + '/api/chat/cancel?stream_id=' + encodeURIComponent(entry.streamId))
        .catch(function(){});
    }
    if (entry) {
      entry.abortController.abort();
    }
    stopStreaming(sid);
    _clearStuckMessageFlags(sid);
    setAgentStateForSession(sid, { kind: 'paused', label: 'Stopped', detail: 'Turn cancelled' }, 3600);
    setPausedSessionIds(prev => prev.filter(id => id !== sid));
  };

  const cancelPause = () => {
    setPausedSessionIds(prev => prev.filter(id => id !== activeConvId));
  };

  // ── Message editing ──
  const startEditMessage = (messageId, currentContent) => {
    setEditingMessageId(messageId);
    setEditingContent(currentContent);
  };

  const cancelEdit = () => {
    setEditingMessageId(null);
    setEditingContent('');
  };

  const saveEditedMessage = async (messageId, newContent) => {
    if (!activeConvId || !newContent.trim()) return;
    try {
      const forkResp = await fetch(API_BASE + '/api/sessions/' + activeConvId + '/fork', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message_id: messageId })
      });
      if (!forkResp.ok) throw new Error('Fork failed');
      const forkedSession = await forkResp.json();
      setActiveConvId(forkedSession.id);
      await selectConversation(forkedSession.id);
      await sendMessage(newContent);
      setEditingMessageId(null);
    } catch (e) {
      console.error('Message edit failed:', e);
      // Fallback: just send as new message
      setEditingMessageId(null);
      await sendMessage(newContent);
    }
  };

  // ── Search / filter ──
  const filteredConvs = conversations
    .filter(function(c) { return showArchivedConversations ? !!c.archived : !c.archived; })
    .filter(function(c) { return (c.title || '').toLowerCase().includes(searchQuery.toLowerCase()); })
    .slice()
    .sort(function(a, b) {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return String(b.last_active_at || b.created || '').localeCompare(String(a.last_active_at || a.created || ''));
    });

  // v0.7.x: Global search uses a command-palette modal (see SearchModal component)
  // — opened via the header search button or Cmd/Ctrl+K. The old searchMode
  // placeholder toggle was removed in favour of the nesq-style modal.
  const openSearchModal = () => setShowSearchModal(true);

  const setActiveProfile = function(value) {
    var next = normalizePersonality(value);
    setPersonality(next);
    return next;
  };

  const pushLocalAssistantMessage = function(content) {
    var sessionId = activeConvRef.current || activeConvId;
    var msg = {
      id: 'local-' + Date.now() + '-' + Math.random(),
      role: 'assistant',
      content: content,
      timestamp: new Date().toISOString(),
    };
    if (!sessionId) {
      sessionId = api.createSession();
      setActiveConvId(sessionId);
      var conv = {
        id: sessionId,
        title: 'Command help',
        created: new Date().toLocaleString(),
        last_active_at: new Date().toISOString(),
        unread_count: 0,
        workspace: activeWorkspace.path || '',
        messages: [msg],
        message_count: 1,
        user_prompt_count: 0,
        tool_call_count: 0,
      };
      setConversations(function(prev) { return [conv].concat(prev); });
      setMessages([msg]);
      setCurrentView('chat');
      return;
    }
    updateStreamMessages(sessionId, function(prev) { return (prev || []).concat([msg]); });
    setCurrentView('chat');
  };

  const slashCommands = [
    {
      name: 'help', icon: 'circle-help', summary: 'Show available commands',
      run: function() {
        var lines = slashCommands.map(function(c) {
          return '/' + c.name + (c.usage ? ' ' + c.usage : '') + ' - ' + c.summary;
        });
        pushLocalAssistantMessage('**Slash commands**\n\n' + lines.join('\n'));
      },
    },
    { name: 'new', icon: 'plus', summary: 'Start a new chat', run: function() { newConversation(); setCurrentView('chat'); } },
    { name: 'search', icon: 'search', summary: 'Search chats and messages', run: function() { setShowSearchModal(true); } },
    { name: 'settings', icon: 'settings', summary: 'Open settings', run: function() { setShowSettings(true); } },
    { name: 'retry', icon: 'rotate-ccw', summary: 'Retry the last user message', disabled: isStreaming || messages.length === 0, run: function() { retryFromMessage((messagesRef.current || []).length - 1); } },
    { name: 'aside', icon: 'circle-help', usage: '[question]', summary: 'Ask a side question without changing the main thread', run: function(args) { if (args) sendAsideQuestion(args); else setAsideMode(true); } },
    { name: 'steer', icon: 'send', usage: '<message>', summary: 'Nudge the active turn', disabled: !isStreaming, run: function(args) { if (args) steer(args); else setInput('/steer '); } },
    { name: 'pause', icon: 'pause', summary: 'Pause the active turn', disabled: !isStreaming, run: pauseStreaming },
    { name: 'stop', icon: 'square', summary: 'Stop the active turn', disabled: !isStreaming, run: stopStreamingAction },
    { name: 'chat', icon: 'message-square', summary: 'Open chat', run: function() { setCurrentView('chat'); } },
    { name: 'dashboard', icon: 'layout-dashboard', summary: 'Open dashboard', run: function() { setCurrentView('dashboard'); } },
    { name: 'files', icon: 'folder', summary: 'Open files', run: function() { setCurrentView('files'); } },
    { name: 'spaces', icon: 'folder', summary: 'Open Spaces', run: function() { setCurrentView('spaces'); } },
    { name: 'workspace', icon: 'folder', usage: '[name or path]', summary: 'Switch active space', run: function(args) {
      var query = String(args || '').trim().toLowerCase();
      if (!query) { setCurrentView('spaces'); return; }
      var match = (workspaces || []).find(function(w) {
        return String(w.name || '').toLowerCase() === query || String(w.path || '').toLowerCase() === query;
      }) || (workspaces || []).find(function(w) {
        return String(w.name || '').toLowerCase().indexOf(query) !== -1 || String(w.path || '').toLowerCase().indexOf(query) !== -1;
      });
      if (match) {
        switchWorkspace(match.path);
      } else {
        setCurrentView('spaces');
      }
    } },
    { name: 'terminal', icon: 'terminal', summary: 'Open terminal', run: function() { setCurrentView('terminal'); } },
    { name: 'jobs', icon: 'clock', summary: 'Open cron jobs', run: function() { setCurrentView('jobs'); } },
    { name: 'memory', icon: 'brain', summary: 'Open memory', run: function() { setCurrentView('memory'); } },
    { name: 'skills', icon: 'sparkles', summary: 'Open skills', run: function() { setCurrentView('skills'); } },
    { name: 'delegation', icon: 'message-circle', summary: 'Open delegation chat', run: function() { setCurrentView('delegation'); } },
    { name: 'export', icon: 'file-text', summary: 'Export this chat as Markdown', disabled: messages.length === 0, run: function() {
      var title = activeConvId ? (conversations.find(function(c) { return c.id === activeConvId; }) || {}).title : 'Chat';
      exportChatAsMarkdown(messages, title || 'Chat');
    } },
    { name: 'profile', icon: 'brain', usage: '<default|claude|technical|creative|academic>', summary: 'Switch response profile for new messages', run: function(args) {
      if (!args) { setInput('/profile '); return; }
      setActiveProfile(args);
    } },
    { name: 'reasoning', icon: 'brain', usage: '<auto|low|medium|high|xhigh>', summary: 'Set reasoning effort for new messages', run: function(args) {
      var value = normalizeReasoningEffort(args || '');
      setReasoningEffort(value);
    } },
  ];

  const parseSlashInput = function(value) {
    if (!value || value[0] !== '/' || value.indexOf('\n') !== -1) return null;
    var raw = value.slice(1);
    var parts = raw.split(/\s+/);
    var name = (parts[0] || '').toLowerCase();
    var hasArgs = /\s/.test(raw);
    var args = hasArgs ? raw.slice(parts[0].length).replace(/^\s+/, '') : '';
    return { raw: raw, name: name, args: args, hasArgs: hasArgs };
  };

  const slashInput = parseSlashInput(input);
  const slashCommandMatches = slashInput && !slashMenuDismissed
    ? slashCommands.filter(function(cmd) {
        var q = slashInput.name;
        return !q || cmd.name.indexOf(q) === 0 || cmd.summary.toLowerCase().indexOf(q) !== -1;
      }).slice(0, 9)
    : [];
  const showSlashCommandMenu = !!(slashInput && !slashMenuDismissed && slashCommandMatches.length);
  const activeSlashCommand = slashCommandMatches[Math.min(slashCommandIndex, Math.max(0, slashCommandMatches.length - 1))] || null;

  const executeSlashCommand = function(command, args) {
    if (!command) return true;
    if (command.disabled) {
      addLocalLog('INFO  [command] /' + command.name + ' unavailable right now');
      setSlashMenuDismissed(true);
      return true;
    }
    var value = args || '';
    setInput('');
    setSlashMenuDismissed(true);
    addLocalLog('INFO  [command] /' + command.name + (value ? ' ' + value.slice(0, 80) : ''));
    Promise.resolve(command.run(value)).catch(function(e) {
      addLocalLog('ERROR Slash command failed: ' + (e && e.message ? e.message : e));
    });
    return true;
  };

  const runSlashCommandFromComposer = function(preferHighlighted) {
    var parsed = parseSlashInput(input);
    if (!parsed) return false;
    var exact = slashCommands.find(function(cmd) { return cmd.name === parsed.name; });
    var command = (preferHighlighted && activeSlashCommand) || exact;
    if (!command) return false;
    if (preferHighlighted && activeSlashCommand && !parsed.hasArgs && activeSlashCommand.name !== parsed.name) {
      if (activeSlashCommand.usage && activeSlashCommand.name !== 'aside') {
        setInput('/' + activeSlashCommand.name + ' ');
        setSlashMenuDismissed(false);
        setTimeout(function() { if (textareaRef.current) textareaRef.current.focus(); }, 0);
        return true;
      }
      return executeSlashCommand(activeSlashCommand, '');
    }
    return executeSlashCommand(command, parsed.args);
  };

  const anyAnalyzing = pendingImages.some(img => img.analyzing);

  useEffect(() => {
    return function() {
      if (steerFlashTimerRef.current) clearTimeout(steerFlashTimerRef.current);
    };
  }, []);

  // ── Clipboard paste handler ──
  useEffect(() => {
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imageFiles = [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          const file = items[i].getAsFile();
          if (file) imageFiles.push(file);
        }
      }
      if (imageFiles.length > 0) {
        e.preventDefault();
        processImages(imageFiles);
      }
    };
    document.addEventListener('paste', handlePaste);
    return () => document.removeEventListener('paste', handlePaste);
  }, [config.geminiKey, config.imageHelperMode, config.imageHelperModel, activeChatModel]);

  // ── Render ──
  var latestUserForTodos = null;
  var latestTodoSourceForTodos = null;
  for (var todoMsgIndex = messages.length - 1; todoMsgIndex >= 0; todoMsgIndex--) {
    var todoMsg = messages[todoMsgIndex];
    if (todoMsg && todoMsg.role === 'user') {
      if (!latestUserForTodos) latestUserForTodos = todoMsg;
      if (!latestTodoSourceForTodos && extractTodoListFromText(todoMsg.content).length) {
        latestTodoSourceForTodos = todoMsg;
      }
      if (latestUserForTodos && latestTodoSourceForTodos) {
        break;
      }
    }
  }
  if (!latestTodoSourceForTodos) {
    for (var toolTodoMsgIndex = messages.length - 1; toolTodoMsgIndex >= 0; toolTodoMsgIndex--) {
      var possibleToolTodoMsg = messages[toolTodoMsgIndex];
      if (possibleToolTodoMsg && possibleToolTodoMsg.role === 'user') {
        latestTodoSourceForTodos = possibleToolTodoMsg;
        break;
      }
    }
  }
  var todoSourceUserId = latestTodoSourceForTodos && latestTodoSourceForTodos.id ? String(latestTodoSourceForTodos.id) : 'no-user';
  var todoSessionKey = (activeConvId || 'active-chat') + ':' + todoSourceUserId;
  var todoResetKey = (activeConvId || 'active-chat') + ':reset:';
  var latestTodoReset = null;
  dismissedTodoSessions.forEach(function(key) {
    if (key.indexOf(todoResetKey) === 0) latestTodoReset = key.slice(todoResetKey.length);
  });
  var todosDismissed = dismissedTodoSessions.indexOf(todoSessionKey) !== -1 || (latestTodoReset && latestTodoReset === todoSourceUserId);
  var showTodosPanel = currentView === 'chat' && sessionTodos.length > 0 && !todosDismissed;
  var rightColumnOpen = showTerminal || showTodosPanel;
  var todoOnlyPanel = showTodosPanel && !showTerminal;
  var rightColumnRenderWidth = todoOnlyPanel ? 340 : rightColumnWidth;
  var sidebarStyle = isDesktopLayout
    ? {
        width: sidebarWidth + 'px',
        minWidth: sidebarWidth + 'px',
        marginLeft: sidebarCollapsed ? ('-' + sidebarWidth + 'px') : undefined,
      }
    : undefined;
  var rightColumnStyle = isDesktopLayout
    ? {
        width: rightColumnRenderWidth + 'px',
        minWidth: rightColumnRenderWidth + 'px',
        marginRight: rightColumnOpen ? undefined : ('-' + rightColumnRenderWidth + 'px'),
      }
    : undefined;

  return (
    <div className="app-wrapper">
    {/* Depth layers — rendered outside .app because .app > * forces position:relative */}
    <div className="app-filler-bg" aria-hidden="true"><img src="/filler-bg.png" alt="" fetchpriority="low" /></div>
    <div className="ambient-glow-3" aria-hidden="true"></div>
    <div className="app-vignette" aria-hidden="true"></div>
    <div className="app-noise" aria-hidden="true"></div>
    <div className={"app " + (resizingLayout ? 'layout-resizing' : '')}>
      {/* Sidebar backdrop overlay (mobile) */}
      {!sidebarCollapsed && (
        <div className="sidebar-backdrop" onClick={() => setSidebarCollapsed(true)} />
      )}

      {/* Sidebar */}
      {/* Floating sidebar toggle when collapsed */}
      {sidebarCollapsed && (
        <button className="floating-sidebar-btn" onClick={() => setSidebarCollapsed(false)} title="Show sidebar">
          <Icon name="menu"/>
        </button>
      )}

      <div className={"sidebar " + (sidebarCollapsed ? 'collapsed' : '')} style={sidebarStyle}>
        {isDesktopLayout && !sidebarCollapsed && (
          <div
            className={"layout-resize-handle sidebar-resize-handle " + (resizingLayout === 'sidebar' ? 'active' : '')}
            onPointerDown={function(e) {
              e.preventDefault();
              setResizingLayout('sidebar');
            }}
            title="Resize sidebar"
          />
        )}
        <div className="sidebar-header">
          <h1>Hermes</h1>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <button className="new-chat-btn" onClick={newConversation}>New</button>
            <button className="sidebar-close-btn" onClick={() => setSidebarCollapsed(true)} title="Hide sidebar"
              style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'6px 8px',borderRadius:'6px',fontSize:'14px',transition:'color 0.2s',minWidth:'32px',minHeight:'32px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {'✕'}
            </button>
          </div>
        </div>

        {/* Navigation */}
        <div className="sidebar-nav">
          {/* section labels removed for density */}
          <div className={"nav-item " + (currentView === 'dashboard' ? 'active' : '')} onClick={function() { setCurrentView('dashboard'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon" style={{color:'#6fb3c2'}}><Icon name="layout-dashboard" size={15}/></span>
            <span className="nav-item-label">Dashboard</span>
          </div>
          <div className={"nav-item " + (currentView === 'chat' ? 'active' : '')} onClick={function() { setCurrentView('chat'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>
            <span className="nav-item-icon" style={{color:'#7a9cc4'}}><Icon name="message-square" size={15}/></span>
            <span className="nav-item-label">Chat</span>
          </div>
          {delegationInfo.configured !== false && (
            <div className={"nav-item " + (currentView === 'delegation' ? 'active' : '')} onClick={function() { setCurrentView('delegation'); if(window.innerWidth<=768) setSidebarCollapsed(true); }} title="Chat directly with the delegation model (bypasses main agent loop)">
              <span className="nav-item-icon" style={{color:'#d48aa8'}}><Icon name="message-circle" size={15}/></span>
              <span className="nav-item-label">Ask {delegationInfo.label || '…'}</span>
            </div>
          )}
          <div className={"nav-item " + (currentView === 'files' ? 'active' : '')} onClick={function() { setCurrentView('files'); if(window.innerWidth<=768) setSidebarCollapsed(true); }}>

                    <div className="conv-item-title" style={conv.source === 'telegram' ? {color:'#29b6f6'} : {}} onDoubleClick={function(e) { e.stopPropagation(); startRenameConv(conv.id, conv.title); }}>{conv.title}</div>

            </span>
          </div>

                <span>{activeWorkspace.name || workspaceNameFromPath(activeWorkspace.path) || 'Default'}</span>

              )}
              <div className="header-controls">
                <ThemeMenu currentTheme={currentTheme} setCurrentTheme={setCurrentTheme} />
                <div className="toolbar-pill">
                  <button className={"header-btn hide-mobile " + (showTerminal ? 'active' : '')} onClick={function(){ setShowTerminal(!showTerminal); }} title="Live terminal logs"><Icon name="terminal"/></button>
                  <button className={"header-btn " + (showSearchModal ? 'active' : '')} onClick={openSearchModal} title="Search (⌘K)"><Icon name="search"/></button>
                  <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings"><Icon name="settings"/></button>
                </div>
              </div>

            {/* Messages area */}

                  {messages.map((msg, idx) => (
                    msg.role === 'compaction' ? (
                      <div key={msg.id} className="compaction-marker" data-message-index={idx}>
                        <div className="compaction-line" />
                        <span className="compaction-label">{'🔄'} {msg.content}</span>
                        <div className="compaction-line" />
                      </div>
                    ) : msg.role === 'aside' ? (
                      <AsideBubble key={msg.id} message={msg} index={idx} />

                      <div key={msg.id} className="message user" data-message-index={idx}>

                          <div className="message-avatar user">U</div>
                          <span className="message-role">You (editing)</span>
                        </div>

                            value={editingContent}
                            onChange={e => setEditingContent(e.target.value)}

                            <button className="edit-btn save" onClick={() => saveEditedMessage(msg.id, editingContent)}>Save</button>
                            <button className="edit-btn cancel" onClick={cancelEdit}>Cancel</button>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <MessageBubble
                        key={msg.id}
                        message={msg}
                        index={idx}
                        highlighted={highlightedMessageIndex === idx}
                        onImageClick={setLightboxSrc}
                        onEdit={startEditMessage}
                        onRetry={retryFromMessage}
                      />
                    )
                  ))}
                  <div ref={messagesEndRef} />
                </div>
              )}
            </div>
            {showJumpToLive && (
              <button className="jump-to-live-btn" onClick={jumpToLiveOutput} title="Jump to live output">
                <Icon name="arrow-down" size={16}/>

            {/* Input area */}
            <div className="input-area">
              <div className="input-container">
                {pendingImages.length > 0 && (

                        <button className="image-preview-remove" onClick={() => removeImage(img.id)}>x</button>
                        {img.analyzing && <div className="analyzing-badge">{img.status || 'Analyzing...'}</div>}
                        {!img.analyzing && img.native && <div className="analyzing-badge" style={{background:'rgba(69,136,224,0.85)'}} title="Will be sent to the model directly (vision-capable)">{'Vision'}</div>}
                        {!img.analyzing && !img.native && img.description && <div className="analyzing-badge" style={{background:'rgba(85,192,136,0.85)'}}>{'Ready'}</div>}
                        {!img.analyzing && !img.native && !img.description && <div className="analyzing-badge" style={{background:'rgba(224,85,85,0.85)'}} title={img.status || 'Analysis failed'}>{'Failed'}</div>}
                      </div>
                    ))}
                  </div>
                )}

                {pendingFiles.length > 0 && (
                  <div className="file-chips-strip">
                    {pendingFiles.map(function(f) { return (
                      <div key={f.id} className="file-chip">
                        <span className="file-chip-icon">{'\uD83D\uDCC4'}</span>
                        <span className="file-chip-name">{f.name}</span>
                        <span className="file-chip-size">{formatFileSize(f.size)}</span>
                        <button className="file-chip-remove" onClick={function() { removeFile(f.id); }}>{'×'}</button>
                      </div>
                    ); })}
                  </div>
                )}
                {steerFlash && (

                    </span>

                  </div>
                )}
                {showAgentBanner && (
                  <AgentStatePill state={visibleAgentState} />

                {isPaused && (
                  <div className="paused-banner">
                    <span className="paused-banner-text">{'⏸ Paused — type an interjection or resume'}</span>
                    <button className="cancel-resume" onClick={() => {
                      var lastMsg = messagesRef.current.filter(m => m.role === 'assistant').pop();
                      var tail = lastMsg && lastMsg.content ? lastMsg.content.trim().slice(-300) : '';
                      var resumePrompt = tail
                        ? '[I paused your response. Here is the last part you wrote before I paused:]\n\n"...' + tail + '"\n\nPlease continue exactly where you left off.'
                        : 'I paused your response — please continue exactly where you left off.';
                      cancelPause(); sendMessage(resumePrompt);
                    }} style={{background:'var(--accent)',color:'white',border:'none',borderRadius:'6px',padding:'4px 12px',fontSize:'12px',cursor:'pointer',fontWeight:600}}>Resume</button>
                    <button className="cancel-resume" onClick={cancelPause}>Dismiss</button>
                  </div>
                )}

                <div className="input-wrapper" style={{position:'relative'}} onDragEnter={handleDragEnter} onDragLeave={handleDragLeave} onDragOver={handleDragOver} onDrop={handleFileDrop}>
                  {isDraggingFiles && <div className="drop-overlay">Drop files to attach</div>}
                  <textarea
                    ref={textareaRef}
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => {
                      if (showSlashCommandMenu && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
                        e.preventDefault();
                        setSlashCommandIndex(function(i) {
                          var count = slashCommandMatches.length || 1;
                          return e.key === 'ArrowDown' ? (i + 1) % count : (i - 1 + count) % count;
                        });
                        return;
                      }
                      if (showSlashCommandMenu && e.key === 'Tab') {
                        e.preventDefault();
                        runSlashCommandFromComposer(true);
                        return;
                      }
                      if (showSlashCommandMenu && e.key === 'Escape') {
                        e.preventDefault();
                        setSlashMenuDismissed(true);
                        return;
                      }
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (input.trim().startsWith('/') && runSlashCommandFromComposer(showSlashCommandMenu)) {
                          return;
                        }
                        if (asideMode && input.trim()) {
                          sendAsideQuestion(input);
                        } else if (isStreaming && !isPaused && input.trim()) {
                          // Steer: no-pause nudge. Hands the text to the
                          // live agent via /api/chat/steer — the agent
                          // appends it to the next tool result without
                          // interrupting the LLM call. Replaces the old
                          // auto-pause-then-interject flow.
                          steer(input);
                        } else {
                          isPaused ? sendInterjection(input) : sendMessage(input);
                        }
                      }
                    }}
                    placeholder={connected === false ? 'Hermes API not connected...' : asideMode ? 'Ask a side question...' : isPaused ? 'Type your interjection...' : isStreaming ? 'Type + ⏎ to steer (no pause)...' : anyAnalyzing ? 'Waiting for image analysis...' : 'Message Hermes... (paste/drop images or files)'}
                    rows={1}
                    disabled={connected === false || asideSending}
                  />
                  {showSlashCommandMenu && (
                    <div className="slash-command-menu">
                      <div className="slash-command-list">
                        {slashCommandMatches.map(function(cmd, i) {
                          var active = i === Math.min(slashCommandIndex, slashCommandMatches.length - 1);
                          return (
                            <button
                              key={cmd.name}
                              type="button"
                              className={"slash-command-item " + (active ? 'active ' : '') + (cmd.disabled ? 'disabled' : '')}
                              onMouseEnter={function() { setSlashCommandIndex(i); }}
                              onMouseDown={function(e) {
                                e.preventDefault();
                                if (cmd.disabled) return;
                                var typedArgs = slashInput && slashInput.name === cmd.name ? slashInput.args : '';
                                if (typedArgs) {
                                  executeSlashCommand(cmd, typedArgs);
                                  return;
                                }
                                if (cmd.usage && cmd.name !== 'aside') {
                                  setInput('/' + cmd.name + ' ');
                                  setSlashMenuDismissed(false);
                                  setTimeout(function() { if (textareaRef.current) textareaRef.current.focus(); }, 0);
                                  return;
                                }
                                executeSlashCommand(cmd, '');
                              }}
                            >
                              <span className="slash-command-icon"><Icon name={cmd.icon} size={15}/></span>
                              <span className="slash-command-main">
                                <span className="slash-command-title">
                                  <span className="slash-command-name">/{cmd.name}</span>
                                  {cmd.usage && <span className="slash-command-usage">{cmd.usage}</span>}
                                </span>
                                <span className="slash-command-summary">{cmd.summary}</span>
                              </span>
                              <span className="slash-command-chip">{cmd.disabled ? 'Unavailable' : (cmd.usage ? 'Tab' : 'Enter')}</span>
                            </button>
                          );
                        })}
                      </div>
                      <div className="slash-command-footer">
                        <span>Slash commands</span>
                        <span>↑↓ navigate · Tab pick · Enter run · Esc close</span>
                      </div>
                    </div>
                  )}
                  <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={e => { if (e.target.files.length) processImages(e.target.files); e.target.value = ''; }} />

                  <div className="input-btn-group">
                    <button className={"attach-btn " + (asideMode ? 'active' : '')} onClick={function(){ setAsideMode(function(v) { return !v; }); }} title="Ask aside">
