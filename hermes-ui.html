var THEMES = {
  midnight: { label: 'Midnight', className: 'midnight' },
  twilight: { label: 'Twilight', className: 'twilight' },
  dawn: { label: 'Dawn', className: 'dawn' },
};

function applyTheme(themeName) {
  if (themeName === 'midnight') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', themeName);
  }
  // Swap highlight.js stylesheet so code blocks stay readable on light themes
  var hljsLink = document.getElementById('hljs-theme');
  if (hljsLink) {
    var targetHref = (themeName === 'dawn')
      ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css'
      : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
    if (hljsLink.getAttribute('href') !== targetHref) hljsLink.setAttribute('href', targetHref);
  }
  if (mermaidScriptReady && typeof mermaid !== 'undefined') initializeMermaid();
  try { localStorage.setItem('hermes-theme', themeName); } catch(e) {}
}

function getStoredTheme() {
  try { return localStorage.getItem('hermes-theme') || 'midnight'; } catch(e) { return 'midnight'; }
}

/* ── Export chat as Markdown ── */
function exportChatAsMarkdown(msgs, sessionTitle) {
  var title = sessionTitle || 'Chat Export';
  var lines = ['# ' + title, '', '*Exported: ' + new Date().toLocaleString() + '*', ''];
  msgs.forEach(function(msg) {
    if (msg.role === 'user') {
      lines.push('## You', '');
    } else {
      lines.push('## Hermes', '');
    }
    lines.push(msg.content || '', '');
    lines.push('---', '');
  });
  var mdText = lines.join('\n');
  var blob = new Blob([mdText], { type: 'text/markdown' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = title.replace(/[^a-zA-Z0-9]/g, '_') + '_' + Date.now() + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

function ThinkingBubble() {
  const [elapsed, setElapsed] = useState(0);
  useEffect(function() {
    var t = setInterval(function() { setElapsed(function(s) { return s + 1; }); }, 1000);
    return function() { clearInterval(t); };
  }, []);
  var latestThought = ThinkingBubble._latestThought || '';
  return (
    <div className="thinking-indicator">
      <div className="thinking-dots"><span></span><span></span><span></span></div>
      <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
        <span>{'Hermes is thinking... (' + elapsed + 's)'}</span>
        {latestThought && (
          <span style={{fontSize:'11px',color:'var(--text-muted)',fontStyle:'italic',maxWidth:'500px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {latestThought}
          </span>
        )}
      </div>
    </div>
  );
}
ThinkingBubble._latestThought = '';

function isDelegationTool(tool) {
  var raw = String((tool && (tool.toolName || tool.name || tool.label)) || '').toLowerCase();
  return raw.indexOf('delegate_task') !== -1
    || raw.indexOf('delegate') !== -1
    || raw.indexOf('subagent') !== -1
    || raw.indexOf('spawn_agent') !== -1
    || raw.indexOf('worker') !== -1
    || raw.indexOf('explorer') !== -1;
}

function getDelegationTitle(tool) {
  var raw = String((tool && (tool.toolName || tool.name || tool.label)) || '').toLowerCase();
  var args = (tool && tool.args) || {};
  var role = String(args.role || args.agent_type || args.type || '').toLowerCase();
  if (raw.indexOf('explorer') !== -1 || role.indexOf('explorer') !== -1) return 'Explorer Subagent';
  if (raw.indexOf('worker') !== -1 || role.indexOf('worker') !== -1) return 'Worker Subagent';
  var tasks = getDelegationTasks(tool);
  if (tasks.length > 1) return tasks.length + ' Subagents';
  return 'Subagent';
}

function parseMaybeJson(value) {
  if (typeof value !== 'string') return value;
  var clean = value.trim();
  if (!clean || (clean[0] !== '[' && clean[0] !== '{')) return value;
  try { return JSON.parse(clean); } catch (e) { return value; }
}

function getDelegationTasks(tool) {
  var args = (tool && tool.args) || {};
  var rawTasks = parseMaybeJson(args.tasks);
  if (!Array.isArray(rawTasks)) return [];
  return rawTasks.map(function(task, idx) {
    var item = parseMaybeJson(task);
    if (item && typeof item === 'object' && !Array.isArray(item)) return item;
    return { goal: String(item || ('Subtask ' + (idx + 1))) };
  });
}

function getDelegationGoal(args) {
  var keys = ['goal', 'task', 'prompt', 'question', 'message', 'description', 'query', 'target'];
  for (var i = 0; i < keys.length; i++) {
    var value = args && args[keys[i]];
    if (value) return value;
  }
  return '';
}

function getDelegationDetail(tool) {
  var args = (tool && tool.args) || {};
  var tasks = getDelegationTasks(tool);
  if (tasks.length > 1) return 'Parallel batch';
  if (tasks.length === 1) return compactAgentStateDetail(getDelegationGoal(tasks[0]), 150);
  var value = getDelegationGoal(args);
  if (value) return compactAgentStateDetail(value, 150);
  return compactAgentStateDetail((tool && (tool.label || tool.toolName)) || 'Delegated task', 150);
}

function extractTodoListFromValue(value) {
  var parsed = parseMaybeJson(value);
  if (Array.isArray(parsed)) return parsed;
  if (!parsed || typeof parsed !== 'object') return [];
  if (Array.isArray(parsed.todos)) return parsed.todos;
  if (Array.isArray(parsed.plan)) return parsed.plan;
  if (parsed.todo && Array.isArray(parsed.todo.todos)) return parsed.todo.todos;
  if (parsed.todo && Array.isArray(parsed.todo.plan)) return parsed.todo.plan;
  if (parsed.result && parsed.result !== value) return extractTodoListFromValue(parsed.result);
  if (parsed.content && parsed.content !== value) return extractTodoListFromValue(parsed.content);
  return [];
}

function normalizeTodoItem(item, index) {
  if (typeof item === 'string') {
    return { id: String(index + 1), content: item, status: 'pending' };
  }
  var status = String((item && (item.status || item.state)) || 'pending').toLowerCase();
  if (status === 'done') status = 'completed';
  if (status === 'doing') status = 'in_progress';
  if (['pending', 'in_progress', 'completed', 'cancelled'].indexOf(status) === -1) status = 'pending';
  return {
    id: String((item && (item.id || item.key)) || (index + 1)),
    content: String((item && (item.content || item.text || item.title || item.task || item.step)) || ('Todo ' + (index + 1))),
    status: status,
  };
}

function isTodoLikeToolName(value) {
  var name = String(value || '').toLowerCase();
  return name.indexOf('todo') !== -1
    || name.indexOf('update_plan') !== -1
    || name.indexOf('planning') !== -1
    || name.indexOf('updating') !== -1;
}

function extractTodoListFromText(value) {
  var text = String(value || '');
  var hasExplicitTodoCue = /\b(todo|to-do|task list|checklist|plan|step|steps)\b/i.test(text);
  if (!hasExplicitTodoCue) return [];
  var lines = text.split(/\r?\n/);
  var items = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    var m = line.match(/^(?:[-*•]|\d+[.)]|\[[ xX-]\])\s+(.+)$/);
    if (!m) continue;
    var content = m[1].trim().replace(/[.,;]+$/, '');
    if (!content || /^(update|maintain|complete)\b/i.test(content)) continue;
    items.push({ id: String(items.length + 1), content: content, status: 'pending' });
  }
  if (items.length) return items;
  var sentence = text
    .replace(/\s+/g, ' ')
    .replace(/^(?:please\s+)?(?:can you|could you|i need you to|i want you to)\s+/i, '')
    .replace(/^create and maintain a (?:live )?(?:plan|todo list|task list|checklist) for this task\.?\s*/i, '')
    .replace(/\bkeep the (?:plan|todo list|task list|checklist) updated as each step finishes\.?$/i, '')
    .trim();
  if (!sentence || sentence.length < 12) return [];
  var parts = sentence.split(/\s+(?:and then|then|next)\s+/i).map(function(part) {
    return part.trim().replace(/[.,;?!]+$/, '');
  }).filter(function(part) {
    return part && !/^(and\s+)?(?:keep|update|maintain|complete)\b/i.test(part);
  });
  if (parts.length >= 2 && parts.length <= 6) {
    return parts.map(function(part, index) {
      return { id: String(index + 1), content: part, status: 'pending' };
    });
  }
  return items;
}

function applyTextTodoProgress(todos, messages, completionText) {
  var calls = [];
  (messages || []).forEach(function(msg) {
    ((msg && msg.toolCalls) || []).forEach(function(tool) { calls.push(tool); });
  });
  var doneLabels = calls.filter(function(tool) { return tool && tool.done; }).map(function(tool) {
    return String(tool.label || tool.toolName || tool.name || '').toLowerCase();
  }).join(' ');
  var doneDetails = calls.filter(function(tool) { return tool && tool.done; }).map(function(tool) {
    return [
      tool.label,
      tool.toolName,
      tool.name,
      tool.result,
      tool.args && JSON.stringify(tool.args)
    ].filter(Boolean).join(' ');
  }).join(' ').toLowerCase();
  var activeLabels = calls.filter(function(tool) { return tool && !tool.done; }).map(function(tool) {
    return String(tool.label || tool.toolName || tool.name || '').toLowerCase();
  }).join(' ');
  var finalText = String(completionText || '').toLowerCase();
  var mermaidFound = /mermaid/.test(finalText) && /(implemented|rendering|hermes-ui\.html|createmermaidblock|rendermermaidblocks|initializemermaid|loadmermaidscript)/.test(finalText);
  if (!mermaidFound && /hermes-ui\.html|createmermaidblock|rendermermaidblocks|initializemermaid|loadmermaidscript/.test(doneDetails)) mermaidFound = true;
  var matchingFileInspected = mermaidFound && /(specific .*code|related code|lines? \d+|createmermaidblock|rendermermaidblocks|initializemermaid|loadmermaidscript|mermaid-block)/.test(finalText + ' ' + doneDetails);
  var containingFileReported = /hermes-ui\.html/.test(finalText) && /(contains|file|implemented|lives in|main file|single-file)/.test(finalText);
  return todos.map(function(todo) {
    var text = String(todo.content || '').toLowerCase();
    var status = todo.status || 'pending';
    if (/(list|inspect).*(root|project)|root.*(list|inspect)/i.test(text) && (/\bls\b|find|rg|root|project/.test(doneLabels) || /project root files|serve_lite\.py|hermes-ui\.html/.test(finalText))) {
      status = 'completed';
    } else if (/mermaid|render/i.test(text)) {
      if (mermaidFound) status = 'completed';
      else if (/mermaid/.test(activeLabels) || /mermaid/.test(doneLabels)) status = 'in_progress';
    } else if (/(inspect|open|read|check).*(matching|file|result)|matching.*file/i.test(text) && matchingFileInspected) {
      status = 'completed';
    } else if (/(report|filename|file name|tell).*(file|contains)|what file contains/i.test(text) && containingFileReported) {
      status = 'completed';
    }
    return Object.assign({}, todo, { status: status });
  });
}

function applyTextTodoCompletion(todos, text) {
  if (!todos.length) return todos;
  var value = String(text || '');
  if (!/\ball\s+\d*\s*tasks?\s+(?:are\s+)?complete|\ball done\b|\bmarked complete\b|\bcompleted successfully\b/i.test(value)) return todos;
  return todos.map(function(todo) {
    return Object.assign({}, todo, { status: 'completed' });
  });
}

function getSessionTodos(messages) {
  var source = messages || [];
  var latestUserIndex = -1;
  for (var userIndex = source.length - 1; userIndex >= 0; userIndex--) {
    if (source[userIndex] && source[userIndex].role === 'user') {
      latestUserIndex = userIndex;
      break;
    }
  }
  if (latestUserIndex === -1) return [];
  var scoped = source.slice(latestUserIndex);
  var latestUserMessage = source[latestUserIndex];
  var latestTextTodos = extractTodoListFromText((latestUserMessage && latestUserMessage.content) || '');
  for (var i = scoped.length - 1; i >= 0; i--) {
    var msg = scoped[i];
    if (msg && msg.role === 'tool') {
      var toolTodos = extractTodoListFromValue(msg.content);
      if (toolTodos.length) return toolTodos.map(normalizeTodoItem);
    }
    var calls = (msg && msg.toolCalls) || [];
    for (var j = calls.length - 1; j >= 0; j--) {
      var tool = calls[j];
      var name = String((tool && (tool.toolName || tool.name || tool.label)) || '').toLowerCase();
      if (!isTodoLikeToolName(name)) continue;
      var todos = extractTodoListFromValue(tool.result);
      if (!todos.length) todos = extractTodoListFromValue(tool.args);
      if (todos.length) return todos.map(normalizeTodoItem);
    }
  }
  if (latestTextTodos.length) {
    var completionText = '';
    for (var k = scoped.length - 1; k >= 0; k--) {
      var textMsg = scoped[k];
      if (textMsg && textMsg.role === 'assistant' && textMsg.content) {
        completionText = textMsg.content;
        break;
      }
    }
    latestTextTodos = applyTextTodoProgress(latestTextTodos, scoped, completionText);
    return applyTextTodoCompletion(latestTextTodos, completionText).map(normalizeTodoItem);
  }
  return [];
}

function isTodoTool(tool) {
  var name = String((tool && (tool.toolName || tool.name || tool.label)) || '').toLowerCase();
  return isTodoLikeToolName(name);
}

function SessionTodosPanel({ todos, onClose, sidePanel }) {
  if (!todos || !todos.length) return null;
  var visibleTodos = todos.map(function(todo, index) {
    var normalized = normalizeTodoItem(todo, index);
    normalized.status = String(normalized.status || 'pending');
    if (['pending', 'in_progress', 'completed', 'cancelled'].indexOf(normalized.status) === -1) {
      normalized.status = 'pending';
    }
    normalized.content = String(normalized.content || '').trim() || ('Todo ' + (index + 1));
    normalized.id = String(normalized.id || (index + 1));
    return normalized;
  });
  var complete = visibleTodos.filter(function(t) { return t.status === 'completed'; }).length;
  var active = visibleTodos.filter(function(t) { return t.status === 'in_progress'; }).length;
  var iconForStatus = function(status) {
    if (status === 'completed') return <Icon name="check" size={14}/>;
    if (status === 'cancelled') return <Icon name="x" size={14}/>;
    if (status === 'in_progress') return <Icon name="activity" size={14}/>;
    return <span style={{width:'9px',height:'9px',border:'1px solid currentColor',borderRadius:'2px'}}></span>;
  };
  return (
    <div className={"session-todos-panel " + (sidePanel ? 'side-panel ' : '')}>
      <div className="session-todos-header">
        <span className="session-todos-title"><Icon name="list-todo" size={14}/> Current Todos</span>
        <span className="session-todos-progress">
          {complete}/{visibleTodos.length} done{active ? ' · ' + active + ' active' : ''}
        </span>
      </div>
      {onClose && (
        <button className="session-todos-close" onClick={onClose} title="Close current todos">
          <Icon name="x" size={13}/>
        </button>
      )}
      <div className="session-todos-list">
        {visibleTodos.length ? visibleTodos.map(function(todo, index) {
          return (
            <div key={(todo.id || index) + '-' + index} className={"session-todo-item " + todo.status}>
              <span className={"session-todo-status " + todo.status}>{iconForStatus(todo.status)}</span>
              <span>
                <span className="session-todo-text">{todo.content}</span>
                <span className="session-todo-meta">{todo.id} · {todo.status.replace('_', ' ')}</span>
              </span>
            </div>
          );
        }) : <div className="session-todos-empty">Waiting for todo details...</div>}
      </div>
    </div>
  );
}

function formatToolDuration(ms) {
  var n = Number(ms);
  if (!Number.isFinite(n) || n <= 0) return '';
  if (n < 1000) return Math.round(n) + 'ms';
  return (n / 1000).toFixed(n < 10000 ? 1 : 0) + 's';
}

function SubagentToolCard({ tool, index, expanded, onToggle, formatResult }) {
  var hasResult = tool.done && tool.result != null;
  var duration = formatToolDuration(tool.duration);
  var tasks = getDelegationTasks(tool);
  var status = tool.done ? 'Done' : 'Running';
  if (duration && tool.done) status += ' · ' + duration;
  return (
    <div className={"subagent-card " + (tool.done ? 'done' : 'active')}>
      <div className="subagent-card-header"
        onClick={hasResult ? function() { onToggle(index); } : undefined}
        style={hasResult ? {cursor: 'pointer'} : {}}>
        <span className="subagent-status-dot"></span>
        <span className="subagent-title">{getDelegationTitle(tool)}</span>
        <span className="subagent-meta">{status}</span>
        {hasResult && (
          <button className="tool-call-toggle" onClick={function(e) { e.stopPropagation(); onToggle(index); }}>
            {expanded ? 'hide' : 'result'}
          </button>
        )}
      </div>
      {tasks.length > 1 ? (
        <div className="subagent-child-list">
          {tasks.map(function(task, taskIndex) {
            return (
              <div key={taskIndex} className="subagent-child-row">
                <span className="subagent-child-index">{taskIndex + 1}</span>
                <span className="subagent-child-goal">{compactAgentStateDetail(getDelegationGoal(task), 160)}</span>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="subagent-detail">{getDelegationDetail(tool)}</div>
      )}
      {hasResult && (
        <div className={"tool-call-result " + (expanded ? 'expanded' : '')}>
          {expanded ? formatResult(tool.result) : ''}
        </div>
      )}
    </div>
  );
}

function AsideBubble({ message, index }) {

  return (
    <div className="aside-message" data-message-index={index}>

        <Icon name="circle-help" size={13}/>
        <span>Aside</span>
      </div>
      <div className="aside-message-body">
        <div className="aside-question">{message.question || ''}</div>

}

function MessageBubble({ message, onImageClick, onEdit, onRetry, index, highlighted }) {
  const isUser = message.role === 'user';
  const contentRef = useRef(null);
  const [expandedTools, setExpandedTools] = useState({});
  const canRetry = !!(onRetry && !message.streaming && !message.thinking && (message.role === 'user' || message.role === 'assistant'));

  var toggleToolExpand = function(idx) {
    setExpandedTools(function(prev) {
      var next = Object.assign({}, prev);
      next[idx] = !next[idx];
      return next;
    });
  };

  var formatResult = function(result) {
    if (!result) return '(no output)';
    if (typeof result === 'string') {
      if (result.length > 2000) return result.slice(0, 2000) + '\n... (' + result.length + ' chars total)';
      return result;
    }
    try {
      var s = JSON.stringify(result, null, 2);
      if (s.length > 2000) return s.slice(0, 2000) + '\n... (truncated)';
      return s;
    } catch (e) { return String(result); }
  };
  var visibleToolCalls = (message.toolCalls || []).filter(function(tool) {
    return !isTodoTool(tool);
  });
  var reasoningItems = Array.isArray(message.reasoning) ? message.reasoning : [];
  var reasoningText = reasoningItems.map(function(item) {
    return typeof item === 'string' ? item : (item && item.text) || '';
  }).filter(Boolean).join('\n');

  useEffect(() => {
    if (!contentRef.current) return;
    contentRef.current.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    contentRef.current.querySelectorAll('pre').forEach(pre => {
      if (!pre.querySelector('.copy-btn')) {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.onclick = () => {
          navigator.clipboard.writeText(pre.textContent.replace('Copy', '').trim());
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 1500);
        };
        pre.style.position = 'relative';
        pre.appendChild(btn);
      }
    });
    renderMermaidBlocks(contentRef.current);
  }, [message.content]);

  return (
    <div
      className={"message " + (isUser ? 'user-msg' : 'assistant-msg') + (highlighted ? ' search-hit' : '')}
      data-message-index={index}
    >
      <div className="message-header">
        <div className={"message-avatar " + (isUser ? 'user' : 'assistant')}>{isUser ? 'Y' : 'H'}</div>
        <span className="message-role">{isUser ? 'You' : 'Hermes'}</span>
        {message.timestamp && <span style={{fontSize:'11px',color:'var(--text-muted)',marginLeft:'auto',fontVariantNumeric:'tabular-nums'}}>{new Date(message.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>}
      </div>

      {visibleToolCalls.length > 0 && (
        <div className="tool-calls-list">
          {visibleToolCalls.map(function(tool, i) {
            var isExpanded = expandedTools[i] || false;
            var hasResult = tool.done && tool.result != null;
            if (isDelegationTool(tool)) {
              return (
                <SubagentToolCard
                  key={i}
                  tool={tool}
                  index={i}
                  expanded={isExpanded}
                  onToggle={toggleToolExpand}
                  formatResult={formatResult}
                />
              );
            }
            return (
              <div key={i} className="tool-call-wrapper">
                <div className={"tool-call-row " + (tool.done ? 'done' : 'active') + (isExpanded ? '' : ' collapsed')}
                  onClick={hasResult ? function() { toggleToolExpand(i); } : undefined}
                  style={hasResult ? {cursor: 'pointer'} : {}}>
                  <span className="tool-call-emoji">{'⚙️'}</span>
                  <span className="tool-call-label">{tool.label || tool.toolName}</span>
                  {!tool.done && (
                    <span className="tool-working-dots">
                      <span/><span/><span/>
                    </span>
                  )}
                  {tool.done && <span className="tool-call-status checkmark">{'✓'}</span>}
                  {hasResult && (
                    <button className="tool-call-toggle" onClick={function(e) { e.stopPropagation(); toggleToolExpand(i); }}>
                      {isExpanded ? '▾ hide' : '▸ result'}
                    </button>
                  )}
                </div>
                {hasResult && (
                  <div className={"tool-call-result " + (isExpanded ? 'expanded' : '')}>
                    {isExpanded ? formatResult(tool.result) : ''}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {message.images && message.images.length > 0 && (
        <div className="message-images">
          {message.images.map((img, i) => (
            <img key={i} src={img.dataUrl} alt="Attached" className="message-image-thumb" onClick={() => onImageClick(img.dataUrl)} />
          ))}
        </div>
      )}

      {reasoningText && (
        <details className="reasoning-card" open={message.streaming}>
          <summary>Reasoning notes</summary>
          <div className="reasoning-card-body">{reasoningText}</div>
        </details>
      )}

      {message.content && (
        <div ref={contentRef} className={"message-content " + (message.streaming ? 'streaming-cursor' : '')} dangerouslySetInnerHTML={renderMarkdown(message.content)} />
      )}
      {message.thinking && <ThinkingBubble />}

      {((isUser && onEdit) || canRetry) && (
        <div className="message-actions">
          {isUser && onEdit && (
            <button className="message-action-btn" onClick={() => onEdit(message.id, message.content)} title="Edit message">
              <Icon name="file-pen" size={13}/>
              <span>Edit</span>
            </button>
          )}
          {canRetry && (
            <button className="message-action-btn" onClick={() => onRetry(index)} title={isUser ? 'Retry this prompt' : 'Retry the previous prompt'}>
              <Icon name="rotate-ccw" size={13}/>
              <span>Retry</span>
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function SettingsModal({ config, onSave, onClose, mcpToolCount }) {
  const [geminiKey, setGeminiKey] = useState(config.geminiKey || '');
  const [imageHelperMode, setImageHelperMode] = useState(normalizeImageHelperMode(config.imageHelperMode));
  const [imageHelperModel, setImageHelperModel] = useState(normalizeImageHelperModel(config.imageHelperModel));

  const [applyBehavioralGuidelines, setApplyBehavioralGuidelines] = useState(!!(config && config.applyBehavioralGuidelines === true));
  const [settingsTab, setSettingsTab] = useState('general');
  const [serverStatus, setServerStatus] = useState(null);
  const [providersStatus, setProvidersStatus] = useState(null);
  const [providerDrafts, setProviderDrafts] = useState({});
  const [providerStatusText, setProviderStatusText] = useState('');
  const [providerSaving, setProviderSaving] = useState('');

  const handleSave = () => {
    onSave(normalizeHermesConfig({
      apiUrl: config.apiUrl,
      geminiKey,
      imageHelperMode: normalizeImageHelperMode(imageHelperMode),
      imageHelperModel: normalizeImageHelperModel(imageHelperModel),
      baseSystemPrompt,
      applyBehavioralGuidelines,
    }));
    onClose();
  };

  const loadProviders = async () => {
    setProviderStatusText('Loading providers...');
    try {
      const r = await fetch(API_BASE + '/api/providers', { cache: 'no-store' });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || 'Failed to load providers');
      setProvidersStatus(data);

  useEffect(function() {
    if (settingsTab === 'providers' && !providersStatus) loadProviders();
  }, [settingsTab]);

  const saveProviderKey = async (providerId) => {
    const key = (providerDrafts[providerId] || '').trim();
    if (!key) {
      setProviderStatusText('Paste a key before saving.');
      return;
    }
    setProviderSaving(providerId);
    setProviderStatusText('Saving key...');
    try {
      const r = await fetch(API_BASE + '/api/providers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: providerId, api_key: key })
      });
      const data = await r.json();
      if (!r.ok || !data.ok) throw new Error(data.error || 'Failed to save key');
      setProviderDrafts(prev => Object.assign({}, prev, { [providerId]: '' }));
      setProvidersStatus(data.status || null);
      setProviderStatusText((data.display_name || providerId) + ' key saved.');
    } catch (e) {
      setProviderStatusText('Save failed: ' + e.message);
    } finally {
      setProviderSaving('');
    }
  };

  const removeProviderKey = async (providerId) => {
    setProviderSaving(providerId);
    setProviderStatusText('Removing key...');
    try {
      const r = await fetch(API_BASE + '/api/providers/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: providerId })
      });
      const data = await r.json();
      if (!r.ok || !data.ok) throw new Error(data.error || 'Failed to remove key');
      setProvidersStatus(data.status || null);
      setProviderStatusText((data.display_name || providerId) + ' key removed.');
    } catch (e) {
      setProviderStatusText('Remove failed: ' + e.message);
    } finally {
      setProviderSaving('');
    }
  };

  // Poll /health until the restarted server comes back up, then reload.
  // Ported from nesquena/hermes-webui #874 — replaces blind setTimeout(reload, 3000)
  // which used to reload while the server was still coming up, yielding a blank
  // page and requiring the user to refresh again manually.
  const waitForServerUp = (onTick) => {
    var start = Date.now();
    var maxMs = 70000; // Full restart may wait for gateway and UI ports.
    return new Promise(function(resolve) {
      var tick = function() {
        var elapsed = Math.floor((Date.now() - start) / 1000);
        if (onTick) onTick(elapsed);
        fetch(API_BASE + '/health', { cache: 'no-store' })
          .then(function(r) {
            if (r && r.ok) { resolve(true); return; }
            if (Date.now() - start > maxMs) { resolve(false); return; }
            setTimeout(tick, 600);
          })
          .catch(function() {
            if (Date.now() - start > maxMs) { resolve(false); return; }
            setTimeout(tick, 600);
          });
      };
      // Give the server a beat to actually shut down before we start polling,
      // otherwise the first /health hits the old process and resolves instantly.
      setTimeout(tick, 800);
    });
  };

  const hardReloadUi = () => {
    var url = new URL(window.location.href);
    url.searchParams.set('restart', String(Date.now()));
    window.location.replace(url.toString());
  };

  const handleRestart = async () => {
    var okToRestart = window.confirm('Quick restart Hermes UI and Hermes Agent now? Active work will pause while the server comes back.');
    if (!okToRestart) {
      setServerStatus('Restart cancelled.');
      return;
    }
    setServerStatus('Quick restart starting...');
    try {
      var r = await fetch(API_BASE + '/server/restart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ confirm: 'restart' })
      });
      var data = await r.json().catch(function(){ return {}; });
      if (!r.ok || data.ok === false) throw new Error(data.error || 'Restart request failed');
    } catch(e) {
      setServerStatus('Restart failed: ' + (e && e.message ? e.message : 'unknown error'));
      return;
    }
    var backUp = await waitForServerUp(function(sec) {
      setServerStatus('Waiting for server (' + sec + 's)...');
    });
    setServerStatus(backUp ? 'Server back up - reloading...' : 'Timed out - reloading anyway...');
    window.location.reload();
  };

  const handleFullRestart = async () => {
    var okToRestart = window.confirm('Full restart now? This stops stale UI processes on the port, restarts Hermes Agent, starts Hermes UI again, then reloads this page.');
    if (!okToRestart) {
      setServerStatus('Full restart cancelled.');
      return;
    }
    setServerStatus('Full restart starting...');
    try {
      var r = await fetch(API_BASE + '/server/full-restart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ confirm: 'full-restart' })
      });
      var data = await r.json().catch(function(){ return {}; });
      if (!r.ok || data.ok === false) throw new Error(data.error || 'Full restart request failed');
    } catch(e) {
      setServerStatus('Full restart failed: ' + (e && e.message ? e.message : 'unknown error'));
      return;
    }
    var backUp = await waitForServerUp(function(sec) {
      setServerStatus('Full restart waiting for server (' + sec + 's)...');
    });
    setServerStatus(backUp ? 'Full restart complete - hard refreshing...' : 'Timed out - hard refreshing anyway...');
    hardReloadUi();
  };

  const handlePullRestart = async () => {
    var okToUpdate = window.confirm('Update from GitHub, then run a full restart? This pulls both repos and restarts the local services.');
    if (!okToUpdate) {
      setServerStatus('Update cancelled.');
      return;
    }
    setServerStatus('Pulling updates & full restart starting...');
    var pullText = 'done';
    try {
      var r = await fetch(API_BASE + '/server/pull-full-restart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ confirm: 'update-full-restart' })
      });
      var data = await r.json().catch(function(){ return {}; });
      if (!r.ok || data.ok === false) throw new Error(data.error || 'Update request failed');
      pullText = data.pull || 'done';
    } catch(e) {
      setServerStatus('Update failed: ' + (e && e.message ? e.message : 'unknown error'));
      return;
    }
    setServerStatus('Pull: ' + pullText + ' - waiting for full restart...');
    var backUp = await waitForServerUp(function(sec) {
      setServerStatus('Pull: ' + pullText + ' - waiting for server (' + sec + 's)...');
    });
    setServerStatus(backUp ? 'Updated and fully restarted - hard refreshing...' : 'Timed out - hard refreshing anyway...');
    hardReloadUi();
  };

  const handleServerHealthCheck = async () => {
    setServerStatus('Checking server...');
    try {
      var r = await fetch(API_BASE + '/health', { cache: 'no-store' });
      setServerStatus(r && r.ok ? 'Server is reachable on port ' + (window.location.port || '3333') + '.' : 'Server health check failed.');

      setServerStatus('Server health check failed: ' + (e && e.message ? e.message : 'unknown error'));
    }

    <div className="modal-overlay" onClick={onClose}>

        <div className="modal-title">Settings</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',gap:'12px'}}>
          <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
            {['general','helpers','providers','server','restart','remote'].map(function(tab) {
              return (
                <button key={tab} onClick={function(){ setSettingsTab(tab); }}
                  style={{background: settingsTab === tab ? 'var(--accent)' : 'var(--bg-tertiary)', color: settingsTab === tab ? 'white' : 'var(--text-secondary)', border:'1px solid ' + (settingsTab === tab ? 'var(--accent)' : 'var(--border)'), borderRadius:'8px', padding:'6px 14px', fontSize:'12px', cursor:'pointer', fontWeight: settingsTab === tab ? '600' : '400', textTransform:'capitalize'}}>
                  {tab === 'general' ? 'General' : tab === 'helpers' ? 'Helpers' : tab === 'providers' ? 'Providers' : tab === 'server' ? 'Server' : tab === 'restart' ? 'Restart' : 'Remote Access'}

        {settingsTab === 'general' ? (

                <strong style={{color:'var(--text-primary)'}}>Open a new chat to apply changes.</strong> Existing chats keep the setting they started with.

                      <span>

              <input className="modal-input" value={imageHelperModel} onChange={e => setImageHelperModel(e.target.value)} placeholder="gemini-2.5-flash" />
              <div style={{fontSize:'11px',color:'var(--text-secondary)',marginTop:'6px',lineHeight:'1.5'}}>
                Example: <span style={{fontFamily:'JetBrains Mono, monospace'}}>gemini-2.5-flash</span>. Changes apply to newly attached images.
              </div>
            </div>

            <div className="config-panel">
              <div className="config-section-title">Current Helper Behavior</div>
              <div className="config-item">
                <span>Image mode</span>
                <span className="config-value">{imageHelperModeLabel(imageHelperMode)}</span>
              </div>
              <div className="config-item">
                <span>Helper model</span>
                <span className="config-value">{normalizeImageHelperModel(imageHelperModel)}</span>
              </div>
              <div className="config-item">
                <span>Gemini key</span>
                <span className="config-value">{geminiKey ? 'Configured' : 'Not set'}</span>
              </div>
            </div>
          </React.Fragment>
        ) : settingsTab === 'providers' ? (
          <React.Fragment>
            <div style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'10px',padding:'16px',marginBottom:'16px'}}>
              <div style={{fontSize:'14px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'8px',display:'flex',alignItems:'center',gap:'8px'}}>
                <Icon name="key-round" size={16}/> Provider Keys
              </div>
              <div style={{fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.6'}}>
                Managed keys are stored locally in ~/.hermes/.env and take effect for new agent turns. Existing key values are never shown.
              </div>
              {providersStatus && (
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'10px',fontFamily:'JetBrains Mono, monospace'}}>
                  Active: {providersStatus.active_provider || 'auto'} · Model: {providersStatus.default_model || 'not set'}
                </div>
              )}
            </div>

            {providerStatusText && (
              <div style={{background:'rgba(69,136,224,0.08)',border:'1px solid rgba(69,136,224,0.2)',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.5',marginBottom:'14px'}}>
                {providerStatusText}
              </div>
            )}

            <div style={{display:'grid',gap:'10px'}}>
              {providersStatus && providersStatus.providers && providersStatus.providers.map(function(p) {
                var disabled = !p.configurable || providerSaving === p.id;
                var status = p.key_source === 'oauth' ? 'OAuth' : p.has_key ? ('Configured via ' + (p.key_source === 'env_file' ? '.env' : p.key_source === 'env_var' ? 'environment' : 'config.yaml')) : 'Not configured';
                return (
                  <div key={p.id} style={{border:'1px solid ' + (p.active ? 'rgba(69,136,224,0.45)' : 'var(--border)'),background:p.active ? 'rgba(69,136,224,0.08)' : 'var(--bg-secondary)',borderRadius:'10px',padding:'14px'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',marginBottom:'10px'}}>
                      <div>
                        <div style={{fontSize:'13px',fontWeight:'650',color:'var(--text-primary)',display:'flex',alignItems:'center',gap:'8px'}}>
                          {p.display_name}
                          {p.active && <span style={{fontSize:'10px',fontWeight:'700',color:'var(--accent)',border:'1px solid rgba(69,136,224,0.35)',borderRadius:'999px',padding:'1px 6px'}}>Active</span>}
                        </div>
                        <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px',fontFamily:'JetBrains Mono, monospace'}}>
                          {p.env_var || p.id}
                        </div>
                      </div>
                      <div style={{fontSize:'11px',color:p.has_key ? 'var(--success)' : 'var(--text-muted)',whiteSpace:'nowrap'}}>
                        {status}
                      </div>

                    {p.configurable ? (
                      <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                        <input
                          type="password"
                          className="modal-input"
                          value={providerDrafts[p.id] || ''}
                          onChange={function(e) { var v = e.target.value; setProviderDrafts(function(prev) { return Object.assign({}, prev, { [p.id]: v }); }); }}
                          placeholder={p.has_key ? 'Paste a replacement key' : 'Paste API key'}
                          autoComplete="off"
                          style={{margin:0,flex:1,minWidth:0}}
                        />
                        <button className="modal-btn primary" onClick={function(){ saveProviderKey(p.id); }} disabled={disabled} style={{padding:'9px 12px',fontSize:'12px',whiteSpace:'nowrap'}}>

                          <button className="modal-btn secondary" onClick={function(){ removeProviderKey(p.id); }} disabled={disabled} style={{padding:'9px 12px',fontSize:'12px',whiteSpace:'nowrap'}}>

                          </button>

                      <div style={{fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.5'}}>

                      </div>
                    )}

              {(!providersStatus || !providersStatus.providers) && (
                <div style={{border:'1px solid var(--border)',borderRadius:'10px',padding:'18px',fontSize:'12px',color:'var(--text-secondary)'}}>
                  Loading provider status...
                </div>
              )}
            </div>
          </React.Fragment>
        ) : settingsTab === 'server' ? (
          <React.Fragment>
            <div style={{background:'var(--bg-tertiary)',border:'1px solid var(--border)',borderRadius:'10px',padding:'16px',marginBottom:'16px'}}>
              <div style={{fontSize:'14px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'8px',display:'flex',alignItems:'center',gap:'8px'}}>
                <span>{'🔧'}</span> Server Status
              </div>
              <div style={{fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.6'}}>
                Check the local proxy and confirm which server this page is connected to.
              </div>
            </div>

            <div style={{display:'flex',gap:'10px',marginBottom:'16px'}}>
              <button onClick={handleServerHealthCheck} style={{width:'100%',background:'var(--bg-tertiary)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:'8px',padding:'10px 12px',cursor:'pointer',textAlign:'center',fontSize:'12px',fontWeight:'600'}}>
                Check Server
              </button>
            </div>

            {serverStatus && (
              <div style={{background:'rgba(68,216,138,0.08)',border:'1px solid rgba(68,216,138,0.2)',borderRadius:'8px',padding:'12px',fontSize:'12px',color:'var(--success)',lineHeight:'1.5',marginBottom:'16px',fontFamily:'JetBrains Mono, monospace'}}>

            <div className="config-panel">

                <div style={{fontSize:'13px',fontWeight:'600',marginBottom:'4px',display:'flex',alignItems:'center',gap:'6px'}}>{'↻'} Quick Restart</div>

              <strong style={{color:'var(--success)'}}>Why Tailscale?</strong> Your Hermes instance stays completely private — only your devices can reach it. No ports opened to the internet, no DNS config, no certificates to manage. All traffic is encrypted end-to-end over WireGuard.

/* ── MCP Browser Modal ── */
function webExtractIsReady(info) {
  return !!(info && (info.enabled || info.available || info.configured));
}

function WebExtractStatusCard({ info, compact }) {
  var ready = webExtractIsReady(info);
  var enabled = !!(info && info.enabled);
  var installed = !!(info && info.installed);
  var toolsets = (info && Array.isArray(info.toolsets)) ? info.toolsets : [];
  var status = enabled ? 'Connected' : installed ? 'Installed' : ready ? 'Detected' : 'Optional';
  var desc = enabled
    ? 'Scrapling is connected through Hermes tools. Ask Hermes to extract or monitor a URL and it can use the Scrapling toolset when appropriate.'
    : installed
      ? 'Scrapling appears installed locally, but Hermes has not exposed it as an enabled toolset yet.'
      : 'Scrapling can add resilient web extraction through MCP without making Hermes UI depend on scraping packages for everyone.';
  return (
    <div className={"web-extract-card " + (ready ? '' : 'disabled')}>
      <div className="web-extract-title">
        <span><Icon name="globe" size={15}/> Web Extract</span>
        <span className={"web-extract-status " + (ready ? '' : 'offline')}>{status}</span>
      </div>
      <div className="web-extract-desc">{desc}</div>
      {toolsets.length > 0 && (
        <div style={{marginBottom:'8px',display:'flex',flexWrap:'wrap',gap:'5px'}}>
          {toolsets.map(function(ts, i) {
            return <span key={i} className="web-extract-code">{ts.label || ts.name}</span>;
          })}
        </div>
      )}
      {!enabled && !compact && (
        <div className="web-extract-actions">
          <span className="web-extract-code">{(info && info.install_hint) || 'uvx scrapling mcp'}</span>
          <a href={(info && info.docs_url) || 'https://github.com/D4Vinci/Scrapling'} target="_blank" rel="noopener noreferrer" style={{color:'var(--accent)',fontSize:'12px',fontWeight:700,textDecoration:'none'}}>
            Scrapling docs ↗
          </a>
        </div>
      )}
    </div>
  );
}

                    <div className="mcp-tool-name">{ts.label || ts.name}</div>
                    <span className="mcp-tool-status" style={{background: ts.enabled ? 'var(--success)' : 'var(--bg-secondary)', color: ts.enabled ? 'white' : 'var(--text-muted)'}}>
                      {ts.enabled ? '✓ Enabled' : 'Disabled'}

/* ── Terminal / Live Logs Panel ── */
function TerminalPanel({ isOpen, onClose, onClear, localLogs, artifacts, onArtifactTab, onAddArtifact, onRemoveArtifact }) {
  const [logLines, setLogLines] = useState([]);
  const [activeTab, setActiveTab] = useState('webui');
  const [isConnected, setIsConnected] = useState(false);
  const bodyRef = useRef(null);
  const eventSourceRef = useRef(null);
  const autoScrollRef = useRef(true);
  const prevArtifactCount = useRef(0);
  const blobUrlCache = useRef({});

  // Auto-switch to artifacts tab when new artifacts are detected
  useEffect(function() {
    if (artifacts && artifacts.length > prevArtifactCount.current) {
      setActiveTab('artifacts');
      if (onArtifactTab) onArtifactTab(true);
    }
    prevArtifactCount.current = (artifacts && artifacts.length) || 0;
  }, [artifacts && artifacts.length]);

  // Colorize a log line
  const colorize = useCallback(function(line, logName) {
    if (logName === 'system') {
      return { className: 'log-system', parts: [{ text: line, cls: 'log-system' }] };
    }
    if (logName === 'webui') {
      var wParts = [];
      var wMatch = line.match(/^(\[[\d:]+\] )(INFO|ERROR|WARNING)(\s+)(.*)/);
      if (wMatch) {
        wParts.push({ text: wMatch[1], cls: 'log-ts' });
        var wLvl = wMatch[2].toLowerCase();
        wParts.push({ text: wMatch[2] + ' ', cls: 'log-level-' + (wLvl === 'warning' ? 'warn' : wLvl) });
        var wText = wMatch[4];
        if (wText.includes('[thinking]')) {
          wParts.push({ text: wText, cls: 'log-thinking' });
        } else if (wText.includes('[tool]')) {
          wParts.push({ text: wText, cls: 'log-tool' });
        } else {
          wParts.push({ text: wText, cls: 'log-webui' });
        }
      } else {
        wParts.push({ text: line, cls: 'log-webui' });
      }
      return { parts: wParts, className: line.includes('ERROR') ? 'highlight' : '' };
    }
    var parts = [];
    var tsMatch = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+)/);
    if (tsMatch) {
      parts.push({ text: tsMatch[1] + ' ', cls: 'log-ts' });
      line = line.slice(tsMatch[1].length + 1);
    }
    var lvlMatch = line.match(/^(INFO|WARNING|ERROR|DEBUG)\s*/);
    if (lvlMatch) {
      var lvl = lvlMatch[1].toLowerCase();
      var lvlCls = 'log-level-' + (lvl === 'warning' ? 'warn' : lvl);
      parts.push({ text: lvlMatch[1] + ' ', cls: lvlCls });
      line = line.slice(lvlMatch[0].length);
    }
    if (line.includes('HTTP Request:') || line.includes('HTTP/1.1')) {
      parts.push({ text: line, cls: 'log-http' });
    } else if (line.includes('tool') || line.includes('Tool') || line.includes('MCP')) {
      parts.push({ text: line, cls: 'log-tool' });
    } else {
      parts.push({ text: line, cls: '' });
    }
    var isHighlight = line.includes('flush') || line.includes('Failsafe') || line.includes('ERROR');
    return { parts: parts, className: isHighlight ? 'highlight' : '' };
  }, []);

  useEffect(function() {
    if (!isOpen) {
      if (eventSourceRef.current) {
        eventSourceRef.current.close();
        eventSourceRef.current = null;
        setIsConnected(false);
      }
      return;
    }

    var url = '/logs/stream?logs=errors&tail=80';
    var es = new EventSource(url);
    eventSourceRef.current = es;

    es.onopen = function() { setIsConnected(true); };
    es.onerror = function() { setIsConnected(false); };
    es.onmessage = function(event) {
      try {
        var data = JSON.parse(event.data);
        setLogLines(function(prev) {
          var next = prev.concat([{
            id: Date.now() + Math.random(),
            log: data.log,
            line: data.line,
          }]);
          if (next.length > 2000) next = next.slice(next.length - 2000);
          return next;
        });
      } catch(e) { /* ignore */ }
    };

    return function() {
      es.close();
      eventSourceRef.current = null;
      setIsConnected(false);
    };
  }, [isOpen]);

  // Auto-scroll
  useEffect(function() {
    if (bodyRef.current && autoScrollRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [logLines, localLogs]);

  // Detect manual scroll
  var handleScroll = useCallback(function() {
    if (!bodyRef.current) return;
    var el = bodyRef.current;
    var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
    autoScrollRef.current = atBottom;
  }, []);

  // Merge local UI logs into the stream
  var allLines = logLines.slice();
  if (localLogs && localLogs.length > 0) {
    localLogs.forEach(function(ll) {
      allLines.push({ id: ll.id, log: 'webui', line: ll.line });
    });
  }

  var filtered = activeTab === 'all'
    ? allLines
    : allLines.filter(function(l) { return l.log === activeTab || l.log === 'system'; });

  return (
    <div className={"terminal-panel " + (isOpen ? '' : 'hidden')}>
      <div className="terminal-panel-header">
        <div style={{display:'flex', gap:'4px', minWidth:0, overflowX:'auto', overflowY:'hidden', flexShrink:1, scrollbarWidth:'none'}}>
          <button className={"terminal-tab " + (activeTab === 'errors' ? 'active' : '')} onClick={function(){setActiveTab('errors'); if(onArtifactTab) onArtifactTab(false);}}>Errors</button>
          <button className={"terminal-tab " + (activeTab === 'webui' ? 'active' : '')} onClick={function(){setActiveTab('webui'); if(onArtifactTab) onArtifactTab(false);}}>Web UI</button>
          <button className={"terminal-tab " + (activeTab === 'all' ? 'active' : '')} onClick={function(){setActiveTab('all'); if(onArtifactTab) onArtifactTab(false);}}>All</button>
          <button title={artifacts && artifacts.length > 0 ? 'Artifacts (' + artifacts.length + ')' : 'Artifacts'} className={"terminal-tab " + (activeTab === 'artifacts' ? 'active' : '')} style={{display:'inline-flex', alignItems:'center', gap:'4px', ...(artifacts && artifacts.length > 0 ? {borderColor:'var(--accent)', color: activeTab === 'artifacts' ? 'white' : 'var(--accent)'} : {})}} onClick={function(){setActiveTab('artifacts'); if(onArtifactTab) onArtifactTab(true);}}><Icon name="paperclip" size={13} />{artifacts && artifacts.length > 0 ? <span style={{background:'var(--accent)', color:'white', borderRadius:'8px', padding:'0 5px', fontSize:'10px', fontWeight:600, minWidth:'14px', textAlign:'center', lineHeight:'14px'}}>{artifacts.length}</span> : null}</button>
        </div>
        <div className="terminal-controls">
          <div className="terminal-status" title={(isConnected ? 'Live' : 'Disconnected') + ' · ' + filtered.length + ' lines'}>
            {isConnected && <div className="live-dot"></div>}
            {isConnected ? 'Live' : 'Off'}
          </div>
          <button className="terminal-close-btn" onClick={function(){setLogLines([]); if (onClear) onClear();}} title="Clear logs"><Icon name="trash" size={14} /></button>
          <button className="terminal-close-btn" onClick={onClose} title="Close">{'✕'}</button>
        </div>
      </div>
      <div className="artifact-container" style={{display: activeTab === 'artifacts' ? 'flex' : 'none', flexDirection: 'column'}}>
          <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'8px', gap:'6px', flexShrink:0}}>
            <label style={{display:'inline-flex', alignItems:'center', gap:'4px', background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'3px 10px', fontSize:'11px', cursor:'pointer', transition:'all 0.15s'}}>
              {'📂 Load File'}
              <input type="file" accept=".html,.htm,.svg,.js,.jsx,.ts,.tsx,.py,.css,.json,.xml,.md,.txt,.yaml,.yml,.sh,.rs,.go,.c,.cpp,.pdf,.csv,.tsv" style={{display:'none'}} onChange={function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'pdf') {
                  var art = { type: 'pdf', url: URL.createObjectURL(file), timestamp: Date.now(), fileName: file.name };
                  if (onAddArtifact) onAddArtifact(art);
                  e.target.value = '';
                  return;
                }
                var reader = new FileReader();
                reader.onload = function(ev) {
                  var type = (ext === 'html' || ext === 'htm') ? 'html' : ext === 'svg' ? 'svg' : (ext === 'csv' || ext === 'tsv') ? 'csv' : 'code';
                  var art = { type: type, content: ev.target.result, timestamp: Date.now(), fileName: file.name };
                  if (type === 'code') art.language = ext;
                  if (onAddArtifact) onAddArtifact(art);
                };
                reader.readAsText(file);
                e.target.value = '';
              }} />
            </label>
          </div>
          {(!artifacts || artifacts.length === 0) ? (
            <div style={{color:'var(--text-muted)', textAlign:'center', padding:'40px 20px', fontSize:'13px'}}>
              <div style={{fontSize:'28px', marginBottom:'12px'}}>{'🎨'}</div>
              <div style={{fontWeight:600, marginBottom:'6px'}}>No artifacts yet</div>
              <div>When Hermes generates HTML, SVG, PDFs, or CSVs, they will appear here as live previews.</div>
              <div style={{marginTop:'12px', fontSize:'11px'}}>Or use the Load File button above to open a local file.</div>
            </div>
          ) : (
            artifacts.map(function(art, idx) {
              var cacheKey = art.timestamp + '_' + idx;
              if (art.type === 'html' || art.type === 'svg') {
                if (!blobUrlCache.current[cacheKey]) {
                  var htmlContent = art.type === 'svg' ? '<html><body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e">' + art.content + '</body></html>' : art.content;
                  blobUrlCache.current[cacheKey] = URL.createObjectURL(new Blob([htmlContent], {type: 'text/html'}));
                }
                var cachedUrl = blobUrlCache.current[cacheKey];
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{(art.fileName || art.type.toUpperCase() + ' artifact')}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'2px 8px', fontSize:'10px', cursor:'pointer'}} onClick={function(){ navigator.clipboard.writeText(art.content); }}>Copy</button>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(blobUrlCache.current[cacheKey]){ URL.revokeObjectURL(blobUrlCache.current[cacheKey]); delete blobUrlCache.current[cacheKey]; } if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <iframe className="artifact-iframe" src={cachedUrl} style={{height:'calc(90vh - 100px)', maxHeight:'calc(90vh - 100px)'}} sandbox="allow-scripts allow-same-origin" />
                  </div>
                );
              } else if (art.type === 'pdf') {
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{'📄 ' + (art.fileName || 'PDF document')}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <iframe src={art.url + '#toolbar=1&navpanes=0'} style={{width:'100%', height:'calc(90vh - 100px)', maxHeight:'calc(90vh - 100px)', border:'1px solid var(--border)', borderRadius:'6px', background:'white'}} />
                  </div>
                );
              } else if (art.type === 'csv') {
                var csvRows = (function() {
                  var lines = (art.content || '').trim().split('\n');
                  var sep = art.fileName && art.fileName.endsWith('.tsv') ? '\t' : ',';
                  return lines.map(function(line) {
                    var row = []; var cell = ''; var inQuotes = false;
                    for (var ci = 0; ci < line.length; ci++) {
                      var ch = line[ci];
                      if (inQuotes) {
                        if (ch === '"' && line[ci+1] === '"') { cell += '"'; ci++; }
                        else if (ch === '"') { inQuotes = false; }
                        else { cell += ch; }
                      } else {
                        if (ch === '"') { inQuotes = true; }
                        else if (ch === sep) { row.push(cell.trim()); cell = ''; }
                        else { cell += ch; }
                      }
                    }
                    row.push(cell.trim());
                    return row;
                  });
                })();
                var csvHeader = csvRows[0] || [];
                var csvData = csvRows.slice(1);
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{'📊 ' + (art.fileName || 'CSV data') + ' (' + csvData.length + ' rows)'}</span>

                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <div style={{maxHeight:'calc(90vh - 100px)', overflow:'auto', border:'1px solid var(--border)', borderRadius:'6px'}}>
                      <table style={{width:'100%', borderCollapse:'collapse', fontSize:'12px', fontFamily:'Monaco, Menlo, monospace'}}>

                        <tbody>

                          })}
                          {csvData.length > 500 && <tr><td colSpan={csvHeader.length} style={{padding:'8px 10px', color:'var(--text-muted)', fontStyle:'italic', textAlign:'center'}}>Showing first 500 of {csvData.length} rows</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              } else {
                return (
                  <div key={cacheKey} style={{marginBottom:'12px', position:'relative'}}>
                    <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span>{(art.fileName || (art.language || 'code').toUpperCase() + ' artifact')}</span>
                      <div style={{display:'flex', gap:'4px'}}>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--text-secondary)', borderRadius:'4px', padding:'2px 8px', fontSize:'10px', cursor:'pointer'}} onClick={function(){ navigator.clipboard.writeText(art.content); }}>Copy</button>
                        <button style={{background:'none', border:'1px solid var(--border)', color:'var(--danger, #e55)', borderRadius:'4px', padding:'2px 6px', fontSize:'10px', cursor:'pointer', lineHeight:1}} onClick={function(){ if(onRemoveArtifact) onRemoveArtifact(idx); }}>✕</button>
                      </div>
                    </div>
                    <pre className="artifact-code"><code>{art.content}</code></pre>
                  </div>
                );
              }
            })
          )}
      </div>
      <div className="terminal-body" ref={bodyRef} onScroll={handleScroll} style={{display: activeTab === 'artifacts' ? 'none' : 'block'}}>
          {filtered.map(function(entry) {
            var colored = colorize(entry.line, entry.log);
            return (
              <div key={entry.id} className={"log-line " + colored.className}>
                {colored.parts.map(function(p, i) {
                  return <span key={i} className={p.cls}>{p.text}</span>;
                })}
              </div>
            );
          })}
      </div>
    </div>
  );
}

/* ── Dashboard View ── */
function DashboardView() {
  const [stats, setStats] = useState({ sessions: 0, messages: 0, tools: 0, tokens: 0 });
  const [skills, setSkills] = useState([]);
  const [recentSessions, setRecentSessions] = useState([]);
  const [health, setHealth] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);

  var fetchAll = async function() {
    // v0.7.0: no /api/sessions listing — use client-side conversation data
    try {
      var saved = [];
      try { saved = JSON.parse(localStorage.getItem('hermes-conversations') || '[]'); } catch(e) {}
      var totalMsgs = 0;
      var totalTools = 0;
      var totalTokens = 0;
      for (var i = 0; i < saved.length; i++) {
        var msgs = saved[i].messages || [];
        totalMsgs += msgs.filter(function(m) { return m.role === 'user'; }).length;
        // Sum tool calls from all messages
        for (var j = 0; j < msgs.length; j++) {
          if (msgs[j].toolCalls) totalTools += msgs[j].toolCalls.length;
        }
        // Sum tokens if tracked
        totalTokens += (saved[i].input_tokens || 0) + (saved[i].output_tokens || 0);
      }
      setStats({ sessions: saved.length, messages: totalMsgs, tools: totalTools, tokens: totalTokens });
      setRecentSessions(saved.slice(0, 7));
    } catch (e) { /* ignore */ }
    try {
      var r2 = await fetch(API_BASE + '/api/skills');
      if (r2.ok) { var data2 = await r2.json(); setSkills(data2.skills || []); }
    } catch (e) { /* ignore */ }
    try {
      var r3 = await fetch(API_BASE + '/health');
      if (r3.ok) { setHealth(await r3.json()); }
    } catch (e) { /* ignore */ }
    setLastRefresh(new Date());
  };

  useEffect(function() {
    fetchAll();
    var iv = setInterval(fetchAll, 15000);
    return function() { clearInterval(iv); };
  }, []);

  function formatTokens(n) {
    if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }

  function formatUptime(s) {
    if (!s) return '--';
    var d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  var modelName = (health && (health.model || health.default_model)) || 'Loading...';
  var providerName = (health && health.provider) || '';
  var modelCaps = inferModelCapabilities(modelName, providerName, health && health.capabilities);
  var uptime = health && health.uptime ? formatUptime(health.uptime) : '--';

  var statCards = [
    { key: 'sessions', label: 'Sessions', value: stats.sessions, icon: <Icon name="message-square" size={16}/>, color: '#4588e0' },
    { key: 'messages', label: 'Messages', value: formatTokens(stats.messages), icon: <Icon name="mail" size={16}/>, color: '#44d88a' },
    { key: 'tools', label: 'Tool Calls', value: formatTokens(stats.tools), icon: <Icon name="cog" size={16}/>, color: '#c088e0' },

  ];

  return (
    <div className="view-dashboard">
      {/* Live indicator */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <div className="status-dot-live"></div>
          <span style={{fontSize:'12px',color:'var(--text-muted)'}}>Live — auto-refreshing every 15s</span>
        </div>
        {lastRefresh && <span style={{fontSize:'11px',color:'var(--text-muted)'}}>Updated {lastRefresh.toLocaleTimeString()}</span>}
      </div>

      <div className="stat-grid">
        {statCards.map(function(card) {
          return (
            <div key={card.key} className={'stat-card ' + card.key}>
              <div className="stat-label">{card.label}</div>
              <div className="stat-value">{card.value}</div>
              <div className="stat-icon">{card.icon}</div>
            </div>
          );
        })}
      </div>

      <div className="card-row">
        <div className="info-card" style={{flex:1}}>
          <div className="info-card-title">Recent Activity</div>
          <div style={{fontSize:'12px',color:'var(--text-secondary)'}}>
            {recentSessions.length === 0 && <div style={{color:'var(--text-muted)',padding:'12px 0'}}>No sessions yet</div>}
            {recentSessions.map(function(s, i) {
              var title = s.title || s.preview || 'Untitled';
              if (title.length > 50) title = title.slice(0, 50) + '...';
              var sMsgs = s.messages || [];
              var msgs = s.user_prompt_count || sMsgs.filter(function(m) { return m.role === 'user'; }).length;
              var tools = s.tool_call_count || sMsgs.reduce(function(sum, m) { return sum + (m.toolCalls ? m.toolCalls.length : 0); }, 0);
              return (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom: i < recentSessions.length - 1 ? '1px solid var(--glass-border)' : 'none',transition:'background 0.2s'}}>
                  <span style={{color:'var(--text-primary)',fontSize:'12px',fontWeight:500}}>{title}</span>
                  <span style={{fontSize:'11px',color:'var(--text-muted)',whiteSpace:'nowrap',marginLeft:'12px',fontFamily:'JetBrains Mono, monospace'}}>{msgs}m {tools}t</span>
                </div>
              );
            })}
          </div>
        </div>
        <div className="info-card" style={{minWidth:'280px'}}>
          <div className="info-card-title">System</div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px',marginTop:'8px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{width:'40px',height:'40px',borderRadius:'12px',background:'linear-gradient(135deg, var(--accent-dim), rgba(192,136,224,0.15))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}}>{'🧠'}</div>
              <div>
                <div style={{fontFamily:'JetBrains Mono, monospace',color:'var(--accent)',fontWeight:600,fontSize:'14px'}}>{modelName}</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>Active model</div>
              </div>
            </div>
            <ModelCapabilityPills model={modelName} provider={providerName} capabilities={modelCaps} />
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <div style={{background:'rgba(255,255,255,0.02)',borderRadius:'8px',padding:'10px'}}>
                <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'4px'}}>Uptime</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'var(--success)',fontFamily:'JetBrains Mono, monospace'}}>{uptime}</div>
              </div>
              <div style={{background:'rgba(255,255,255,0.02)',borderRadius:'8px',padding:'10px'}}>
                <div style={{fontSize:'10px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'4px'}}>Skills</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'var(--accent)',fontFamily:'JetBrains Mono, monospace'}}>{skills.length}</div>
              </div>
            </div>
          </div>

      </div>

      <div className="info-card">
        <div className="info-card-title">Installed Skills ({skills.length})</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginTop:'10px',maxHeight:'180px',overflowY:'auto'}}>
          {skills.map(function(skill, i) {
            return <span key={i} style={{background:'rgba(124,111,224,0.08)',border:'1px solid rgba(124,111,224,0.15)',padding:'5px 12px',borderRadius:'8px',fontSize:'12px',color:'var(--accent)',fontWeight:500,transition:'all 0.2s',cursor:'default'}}>{skill.name}</span>;
          })}

        </div>
      </div>
    </div>
  );
}

/* ── Files View ── */
function SpacesView({ workspaces, activeWorkspace, onSwitch, onRefresh }) {
  var [selectedPath, setSelectedPath] = useState(activeWorkspace && activeWorkspace.path || '');
  var [name, setName] = useState('');
  var [path, setPath] = useState('');
  var [busy, setBusy] = useState(false);
  var [error, setError] = useState('');
  var [pickerOpen, setPickerOpen] = useState(false);
  var [pickerBusy, setPickerBusy] = useState(false);
  var [pickerPath, setPickerPath] = useState('');
  var [pickerParent, setPickerParent] = useState('');
  var [pickerRoots, setPickerRoots] = useState([]);
  var [pickerItems, setPickerItems] = useState([]);
  var [pickerError, setPickerError] = useState('');
  var selected = (workspaces || []).find(function(w) { return w.path === selectedPath; }) || activeWorkspace || (workspaces || [])[0] || null;

  useEffect(function() {
    var next = selected || {};
    setSelectedPath(next.path || '');
    setName(next.name || '');
    setPath(next.path || '');
  }, [activeWorkspace && activeWorkspace.path]);

  function applyWorkspaceResponse(data) {
    if (data && data.workspaces && onRefresh) onRefresh(data.workspaces, data.last);
  }

  async function loadPicker(nextPath) {
    var targetPath = String(nextPath || path || (activeWorkspace && activeWorkspace.path) || '').trim();
    setPickerBusy(true);
    setPickerError('');
    try {
      var resp = await fetch(API_BASE + '/api/workspaces/browse?path=' + encodeURIComponent(targetPath));
      var data = await resp.json().catch(function() { return {}; });
      if ((!resp.ok || data.ok === false) && targetPath) {
        resp = await fetch(API_BASE + '/api/workspaces/browse?path=');
        data = await resp.json().catch(function() { return {}; });
      }
      if (!resp.ok || data.ok === false) throw new Error(data.error || ('HTTP ' + resp.status));
      setPickerPath(data.path || '');
      setPickerParent(data.parent || '');
      setPickerRoots(Array.isArray(data.roots) ? data.roots : []);
      setPickerItems(Array.isArray(data.items) ? data.items : []);
    } catch(e) {
      setPickerError(e.message || String(e));
      setPickerItems([]);
    } finally {
      setPickerBusy(false);
    }
  }

  function openPicker() {
    setPickerOpen(true);
    loadPicker(path || (activeWorkspace && activeWorkspace.path) || '');
  }

  function closePicker() {
    setPickerOpen(false);
    setPickerError('');
  }

  function choosePickerPath(nextPath) {
    setPath(nextPath || '');
    if (!name.trim()) setName(workspaceNameFromPath(nextPath || ''));
    closePicker();
  }

  async function saveSpace() {
    var cleanPath = String(path || '').trim();
    if (!cleanPath) { setError('Path is required'); return; }
    setBusy(true);
    setError('');
    try {
      var endpoint = selected && selected.path === cleanPath ? '/api/workspaces/rename' : '/api/workspaces/add';
      var resp = await fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, path: cleanPath }),
      });
      var data = await resp.json().catch(function() { return {}; });
      if (!resp.ok || data.ok === false) throw new Error(data.error || ('HTTP ' + resp.status));
      applyWorkspaceResponse(data);
      if (onSwitch) onSwitch(cleanPath);
      setSelectedPath(cleanPath);
    } catch(e) {
      setError(e.message || String(e));
    } finally {
      setBusy(false);
    }
  }

  async function removeSpace() {
    if (!selected || !selected.path) return;
    if ((workspaces || []).length <= 1) { setError('Keep at least one space'); return; }
    if (!window.confirm('Remove this space from Hermes UI? Files are not deleted.')) return;
    setBusy(true);
    setError('');
    try {
      var resp = await fetch(API_BASE + '/api/workspaces/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: selected.path }),
      });
      var data = await resp.json().catch(function() { return {}; });
      if (!resp.ok || data.ok === false) throw new Error(data.error || ('HTTP ' + resp.status));
      applyWorkspaceResponse(data);
      var next = normalizeWorkspaceList(data.workspaces, data.last)[0];
      if (next && onSwitch) onSwitch(data.last || next.path);
    } catch(e) {
      setError(e.message || String(e));
    } finally {
      setBusy(false);
    }
  }

  function startNew() {
    setSelectedPath('');
    setName('');
    setPath('');
    setError('');
  }

  function selectSpace(space) {
    setSelectedPath(space.path);
    setName(space.name || workspaceNameFromPath(space.path));
    setPath(space.path);
    setError('');
    if (onSwitch) onSwitch(space.path);
  }

  return (
    <div className="spaces-view">
      <div className="spaces-grid">
        <div className="spaces-list">
          <div className="spaces-list-header">
            <div className="spaces-title"><Icon name="folder" size={15}/> Spaces</div>
            <button className="spaces-btn" onClick={startNew} title="Add space"><Icon name="plus" size={14}/> Add</button>
          </div>
          <div className="spaces-list-body">
            {(workspaces || []).map(function(space) {
              var active = activeWorkspace && activeWorkspace.path === space.path;
              return (
                <button key={space.path} className={"space-row " + (active ? 'active' : '')} onClick={function(){ selectSpace(space); }}>
                  <Icon name="folder" size={15}/>
                  <span className="space-row-main">
                    <span className="space-row-name">{space.name || workspaceNameFromPath(space.path)}</span>
                    <span className="space-row-path">{shortWorkspacePath(space.path)}</span>
                  </span>
                  {active && <Icon name="check" size={14}/>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="spaces-detail">
          <div className="spaces-detail-header">
            <div className="spaces-title">{selectedPath ? 'Space Details' : 'New Space'}</div>
            {activeWorkspace && <button className="spaces-btn" onClick={function(){ onSwitch && onSwitch(activeWorkspace.path); }} title="Use active space"><Icon name="check" size={14}/> Active</button>}
          </div>
          <div className="spaces-detail-body">
            <div className="spaces-field">
              <label>Name</label>
              <input value={name} onChange={function(e){ setName(e.target.value); }} placeholder="Project name" />
            </div>
            <div className="spaces-field">
              <label>Path</label>
              <div className="spaces-path-row">
                <input value={path} onChange={function(e){ setPath(e.target.value); }} placeholder="/absolute/path/to/project" />
                <button className="spaces-btn" type="button" onClick={openPicker} disabled={busy}><Icon name="folder" size={14}/> Browse</button>
              </div>
            </div>
            <div className="spaces-actions">
              <button className="spaces-btn primary" onClick={saveSpace} disabled={busy}>{busy ? 'Saving...' : 'Save Space'}</button>
              {selectedPath && <button className="spaces-btn danger" onClick={removeSpace} disabled={busy}><Icon name="trash" size={14}/> Remove</button>}
            </div>
            <div className="spaces-error">{error}</div>
          </div>
        </div>
      </div>
      {pickerOpen && (
        <div className="modal-overlay" onClick={closePicker}>
          <div className="modal-content space-picker-modal" onClick={function(e){ e.stopPropagation(); }}>
            <button className="modal-close-btn" onClick={closePicker} title="Close" aria-label="Close"><Icon name="x" size={18}/></button>
            <div className="modal-title">Choose Space Folder</div>
            <div className="space-picker-toolbar">
              {pickerRoots.map(function(root) {
                var active = workspacePathStartsWith(pickerPath, root.path);
                return (
                  <button key={root.path} className={"space-picker-root " + (active ? 'active' : '')} onClick={function(){ loadPicker(root.path); }}>
                    {root.name}
                  </button>
                );
              })}
            </div>
            <div className="space-picker-pathbar">
              <button className="spaces-btn" onClick={function(){ if (pickerParent) loadPicker(pickerParent); }} disabled={!pickerParent || pickerBusy}>Up</button>
              <div className="space-picker-current" title={pickerPath}>{pickerPath || 'Loading...'}</div>
            </div>
            <div className="space-picker-list">
              {pickerBusy ? (
                <div className="space-picker-empty">Loading folders...</div>
              ) : pickerError ? (
                <div className="space-picker-empty">{pickerError}</div>
              ) : pickerItems.length ? (
                pickerItems.map(function(item) {
                  return (
                    <button key={item.path} className="space-picker-row" onClick={function(){ loadPicker(item.path); }}>
                      <Icon name="folder" size={16}/>
                      <span className="space-picker-row-main">
                        <span className="space-picker-row-name">{item.name}</span>
                        <span className="space-picker-row-path">{item.path}</span>
                      </span>
                    </button>
                  );
                })
              ) : (
                <div className="space-picker-empty">No folders here yet.</div>
              )}
            </div>
            <div className="modal-buttons">
              <button className="modal-btn secondary" onClick={closePicker}>Cancel</button>
              <button className="modal-btn primary" onClick={function(){ choosePickerPath(pickerPath); }} disabled={!pickerPath || pickerBusy}>Use This Folder</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function FilesView({ activeWorkspace }) {
  // Store all directory children in a flat map: path -> items[]
  var [dirCache, setDirCache] = useState({});
  var [expandedDirs, setExpandedDirs] = useState({});
  var [loadingDirs, setLoadingDirs] = useState({});
  var [rootItems, setRootItems] = useState([]);
